<body>
<div class="container2">
    <div id="healthGrid"></div>
</div>

<div class="modal fade" id="healthModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Daily Health Entry</h5>
                <button type="button" class="close" data-bs-dismiss="modal">
                    <span>&times;</span>
                </button>
            </div>

            <div class="modal-body">
                <form id="healthForm">
                    <div id="packageContext" class="alert alert-info py-2 mb-3"></div>
                    <div id="dynamicQuestionsContainer"></div>

                </form>
            </div>

            <div class="modal-footer">
                <button class="btn btn-primary" onclick="saveHealth()">Save</button>
                <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>

        </div>
    </div>
</div>
<script>
    let healthGrid;
    let editingHealthId = null;
    let packagesData = [];

    let currentTrackingUserId = '';
    let currentPackageId = '';
    let currentPackageName = '';
    let currentQuestions = [];
    let dynamicControls = {};
    let dynamicControlInstances = [];

    const defaultQuestions = [
        { key: 'bedtime', itemtype: 'habit', itemid: null, code: 'BED_TIME', question: 'Bed Time', inputType: 'time' },
        { key: 'waketime', itemtype: 'habit', itemid: null, code: 'WAKE_TIME', question: 'Wake Time', inputType: 'time' },
        { key: 'steps', itemtype: 'habit', itemid: null, code: 'STEPS', question: 'Steps Walked', inputType: 'number', max: 5000 },
        { key: 'bpchecked', itemtype: 'assessment', itemid: null, code: 'BP_CHECKED', question: 'BP Checked', inputType: 'boolean' },
        { key: 'junkfood', itemtype: 'assessment', itemid: null, code: 'JUNK_FOOD', question: 'Junk Food', inputType: 'boolean' },
        { key: 'remarks', itemtype: 'assessment', itemid: null, code: 'REMARKS', question: 'Remarks', inputType: 'text' }
    ];

    function destroyDynamicControls() {
        dynamicControlInstances.forEach(ctrl => {
            if (ctrl && typeof ctrl.destroy === 'function') ctrl.destroy();
        });
        dynamicControlInstances = [];
        dynamicControls = {};

        const container = document.getElementById('dynamicQuestionsContainer');
        if (container) container.innerHTML = '';
    }

    function resetAndDestroyHealthControls() {
        destroyDynamicControls();
        const form = document.getElementById('healthForm');
        if (form) form.reset();
    }

    function safeParseJson(value, fallback) {
        try {
            return value ? JSON.parse(value) : fallback;
        } catch (e) {
            return fallback;
        }
    }

    function parseOptions(optionsStr) {
        if (!optionsStr || !String(optionsStr).trim()) return null;
        const parts = String(optionsStr).split(/[,|;]/).map(s => s.trim()).filter(Boolean);
        return parts.length > 1 ? parts : null;
    }

    function inferInputType(item) {
        // habitmaster.options with multiple values → dropdown
        if (item.options && String(item.options).trim()) {
            const parts = String(item.options).split(/[,|;]/).map(s => s.trim()).filter(Boolean);
            if (parts.length > 1) return 'dropdown';
        }

        // Direct type match from habitmaster.habittype / assessmentmaster1.assessmenttype
        const typeVal = String(item.habittype || item.assessmenttype || '').toLowerCase().trim();
        if (['time', 'timepicker'].includes(typeVal)) return 'time';
        if (['number', 'numeric', 'integer', 'score'].includes(typeVal)) return 'number';
        if (['boolean', 'bool', 'yesno', 'yes/no'].includes(typeVal)) return 'boolean';
        if (['dropdown', 'select', 'list'].includes(typeVal)) return 'dropdown';
        if (['text', 'string', 'textarea'].includes(typeVal)) return 'text';

        // Name-based hints
        const name = `${item.habitname || ''} ${item.assessmentname || ''}`.toLowerCase();
        if (name.includes('time') || name.includes('hour')) return 'time';
        if (name.includes('steps') || name.includes('count') || name.includes('score')) return 'number';

        // assessmentmaster1: maxscore set → numeric
        if (item.maxscore && Number(item.maxscore) > 0) return 'number';

        return 'text';
    }

    function buildQuestionsFromPackage(pkg) {
        // habitid2 stores complete JSON: { habits: [...], assessments: [...] }
        // assessmentid2 stores same JSON — read habitid2 only
        const raw = pkg && pkg.habitid2 ? pkg.habitid2 : '';
        const parsed = safeParseJson(raw, {});
        const habits = Array.isArray(parsed.habits) ? parsed.habits : [];
        const assessments = Array.isArray(parsed.assessments) ? parsed.assessments : [];

        // habitmaster fields: habitname, habittype, options, code, order, frequency, frequencynumber
        const mappedHabits = habits.map(h => ({
            key: `habit_${h.id || h.code || h.habitname}`,
            itemtype: 'habit',
            itemid: h.id || null,
            code: h.code || '',
            question: h.habitname || h.code || 'Habit',
            inputType: inferInputType(h),
            max: null,
            options: parseOptions(h.options)
        }));

        // assessmentmaster1 fields: assessmentname, assessmenttype, maxscore, passingscore, code, status
        const mappedAssessments = assessments.map(a => ({
            key: `assessment_${a.id || a.code || a.assessmentname}`,
            itemtype: 'assessment',
            itemid: a.id || null,
            code: a.code || '',
            question: a.assessmentname || a.code || 'Assessment',
            inputType: inferInputType(a),
            max: a.maxscore || null,
            options: null
        }));

        const questions = [...mappedHabits, ...mappedAssessments];
        return questions.length ? questions : [...defaultQuestions];
    }

    async function resolveAssignedPackage(userId) {
        if (!userId) return null;

        const allocations = await DBHandler.fetchEntityRecords(
            'allocation',
            '*',
            'createdon',
            'desc',
            `userid='${userId}'`,
            true,
            0,
            ''
        );

        const list = allocations || [];
        if (!list.length) return null;

        const active = list.find(a => String(a.status || '').toLowerCase() === 'active') || list[0];
        if (!active.packageid) return null;

        const packages = await DBHandler.fetchEntityRecords(
            'userpackage',
            '*',
            'createdon',
            'desc',
            `id='${active.packageid}'`,
            false,
            1,
            ''
        );

        if (!packages || !packages.length) return null;

        return {
            packageId: active.packageid,
            packageName: packages[0].packagename || '',
            packageRecord: packages[0]
        };
    }

    function readExistingAnswers(record) {
        const answerJson = record && (record.answerjson || record.answersjson || record.responsejson)
            ? (record.answerjson || record.answersjson || record.responsejson)
            : '';

        const parsed = safeParseJson(answerJson, []);
        const map = {};

        if (Array.isArray(parsed)) {
            parsed.forEach(row => {
                if (!row) return;
                if (row.key) map[row.key] = row.answer;
                if (row.code) map[`code_${String(row.code).toLowerCase()}`] = row.answer;
            });
        }

        if (record) {
            if (record.bedtime != null) map.bedtime = record.bedtime;
            if (record.waketime != null) map.waketime = record.waketime;
            if (record.steps != null) map.steps = record.steps;
            if (record.bpchecked != null) map.bpchecked = record.bpchecked;
            if (record.junkfood != null) map.junkfood = record.junkfood;
            if (record.remarks != null) map.remarks = record.remarks;
        }

        return map;
    }

    function getInitialValue(question, existingMap) {
        const direct = existingMap[question.key];
        if (direct !== undefined) return direct;

        const codeKey = question.code ? `code_${String(question.code).toLowerCase()}` : '';
        if (codeKey && existingMap[codeKey] !== undefined) return existingMap[codeKey];

        const normalized = String(question.question || '').toLowerCase();
        if (normalized.includes('bed') && existingMap.bedtime !== undefined) return existingMap.bedtime;
        if (normalized.includes('wake') && existingMap.waketime !== undefined) return existingMap.waketime;
        if (normalized.includes('step') && existingMap.steps !== undefined) return existingMap.steps;
        if (normalized.includes('bp') && existingMap.bpchecked !== undefined) return existingMap.bpchecked;
        if (normalized.includes('junk') && existingMap.junkfood !== undefined) return existingMap.junkfood;
        if (normalized.includes('remark') && existingMap.remarks !== undefined) return existingMap.remarks;

        return null;
    }

    function renderDynamicQuestions(record = null) {
        const container = document.getElementById('dynamicQuestionsContainer');
        destroyDynamicControls();

        const existingMap = readExistingAnswers(record);
        let currentRow = null;

        currentQuestions.forEach((question, index) => {
            // 2-column layout: pair questions side by side
            if (index % 2 === 0) {
                currentRow = document.createElement('div');
                currentRow.className = 'row mt-3';
                container.appendChild(currentRow);
            }

            const col = document.createElement('div');
            col.className = 'col-md-6';

            const label = document.createElement('label');
            label.textContent = question.question;

            const input = document.createElement('input');
            input.type = 'text';
            input.id = `dyn_q_${index}`;

            col.appendChild(label);
            col.appendChild(input);
            currentRow.appendChild(col);

            const initialValue = getInitialValue(question, existingMap);
            let control = null;

            if (question.inputType === 'time') {
                control = new ej.calendars.TimePicker({
                    placeholder: 'Select time',
                    value: initialValue ? new Date(`1970-01-01T${String(initialValue).substring(0, 8)}`) : null
                });
            } else if (question.inputType === 'number') {
                control = new ej.inputs.NumericTextBox({
                    placeholder: 'Enter value',
                    min: 0,
                    max: question.max || 99999,
                    value: initialValue != null && initialValue !== '' ? Number(initialValue) : null
                });
            } else if (question.inputType === 'boolean') {
                control = new ej.dropdowns.DropDownList({
                    dataSource: ['Yes', 'No'],
                    placeholder: 'Select',
                    value: initialValue != null && initialValue !== '' ? String(initialValue) : null
                });
            } else if (question.inputType === 'dropdown' && question.options && question.options.length) {
                // habitmaster.options parsed into array drives this dropdown
                control = new ej.dropdowns.DropDownList({
                    dataSource: question.options,
                    placeholder: 'Select',
                    value: initialValue != null && initialValue !== '' ? String(initialValue) : null
                });
            } else {
                control = new ej.inputs.TextBox({
                    placeholder: 'Enter value',
                    value: initialValue != null ? String(initialValue) : ''
                });
            }

            control.appendTo(`#${input.id}`);

            dynamicControlInstances.push(control);
            dynamicControls[question.key] = {
                question,
                control
            };
        });
    }

    function getControlValue(question, control) {
        if (!control) return null;

        if (question.inputType === 'time') {
            if (!control.value) return null;
            return dayjs(control.value).format('HH:mm:ss');
        }
        if (question.inputType === 'number') {
            return control.value == null ? null : Number(control.value);
        }
        if (question.inputType === 'boolean' || question.inputType === 'dropdown') {
            return control.value == null ? null : String(control.value);
        }
        return control.value == null ? null : String(control.value);
    }

    function collectAnswers() {
        return Object.keys(dynamicControls).map(key => {
            const item = dynamicControls[key];
            return {
                key,
                itemtype: item.question.itemtype,
                itemid: item.question.itemid,
                code: item.question.code,
                question: item.question.question,
                inputType: item.question.inputType,
                answer: getControlValue(item.question, item.control)
            };
        });
    }

    function mapLegacyFieldsFromAnswers(answers) {
        const result = {
            bedtime: null,
            waketime: null,
            steps: 0,
            bpchecked: null,
            junkfood: null,
            remarks: ''
        };

        answers.forEach(row => {
            const hint = `${row.key || ''} ${row.code || ''} ${row.question || ''}`.toLowerCase();
            if (hint.includes('bed')) result.bedtime = row.answer;
            else if (hint.includes('wake')) result.waketime = row.answer;
            else if (hint.includes('step')) result.steps = Number(row.answer || 0);
            else if (hint.includes('bp')) result.bpchecked = row.answer;
            else if (hint.includes('junk')) result.junkfood = row.answer;
            else if (hint.includes('remark')) result.remarks = row.answer || '';
        });

        return result;
    }

    function initHealthGrid() {

        ej.grids.Grid.Inject(
            ej.grids.Page,
            ej.grids.Sort,
            ej.grids.Filter,
            ej.grids.Toolbar
        );

        healthGrid = new ej.grids.Grid({
            dataSource: [],
            allowPaging: true,
            allowSorting: true,
            toolbar: [
                'Search',
                'ExcelExport',
                'PdfExport',
                { text: 'New Entry', id: 'newHealth' },
                { text: 'Edit', id: 'editHealth' },
                { text: 'Delete', id: 'deleteHealth' },
                'ColumnChooser'
            ],
            columns: [
                { type: 'checkbox', width: 50 },
                { field: 'packagename', headerText: 'Package', width: 160 },
                { field: 'createdon', headerText: 'Date', width: 140, type: 'date', format: 'dd/MMM/yyyy' },
                { field: 'bedtime', headerText: 'Bed Time', width: 110 },
                { field: 'waketime', headerText: 'Wake Time', width: 110 },
                { field: 'steps', headerText: 'Steps', width: 90 },
                { field: 'bpchecked', headerText: 'BP Checked', width: 110 },
                { field: 'junkfood', headerText: 'Junk Food', width: 110 },
                { field: 'remarks', headerText: 'Remarks', width: 180 },
                { field: 'userid', headerText: 'User ID', width: 120, visible: false },
                { field: 'packageid', headerText: 'Package ID', width: 120, visible: false }
            ],

            toolbarClick: async function (args) {

                const id = args.item.id;

                if (id.includes('newHealth')) {
                    editingHealthId = null;
                    openHealthModal();
                }

                if (id.includes('editHealth')) {
                    const selected = healthGrid.getSelectedRecords();
                    if (selected.length !== 1) return alert("Select one record");

                    editingHealthId = selected[0].id;
                    openHealthModal(selected[0]);
                }

                if (id.includes('deleteHealth')) {
                    const selected = healthGrid.getSelectedRecords();
                    if (!selected.length) return alert("Select record");

                    const ids = selected.map(r => r.id);
                    await deleteRecordData('healthtracker', ids, true, true);
                    loadHealth();
                }
            }
        });

        healthGrid.appendTo('#healthGrid');
    }

    async function openHealthModal(record = null) {

        const cookieUserId = String(getCookie('userid') || '').trim();
        currentTrackingUserId = record && record.userid ? String(record.userid) : cookieUserId;

        if (!currentTrackingUserId) {
            alert('Unable to detect user. Please login again.');
            return;
        }

        const packageData = await resolveAssignedPackage(currentTrackingUserId);
        currentPackageId = packageData && packageData.packageId ? String(packageData.packageId) : '';
        currentPackageName = packageData && packageData.packageName ? packageData.packageName : '';
        currentQuestions = packageData && packageData.packageRecord
            ? buildQuestionsFromPackage(packageData.packageRecord)
            : [...defaultQuestions];

        const packageContext = document.getElementById('packageContext');
        if (currentPackageId) {
            packageContext.className = 'alert alert-success py-2 mb-3';
            packageContext.textContent = `Questions loaded from package: ${currentPackageName || currentPackageId}`;
        } else {
            packageContext.className = 'alert alert-warning py-2 mb-3';
            packageContext.textContent = 'No package assigned for this user. Showing default questions.';
        }

        const modalEl = document.getElementById('healthModal');
        const modal = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl);

        modal.show();

        modalEl.addEventListener('shown.bs.modal', function handler() {

            resetAndDestroyHealthControls();
            renderDynamicQuestions(record);

            modalEl.removeEventListener('shown.bs.modal', handler);
        });
    }

    async function saveHealth() {

        const answers = collectAnswers();
        const legacy = mapLegacyFieldsFromAnswers(answers);

        if (legacy.steps > 5000) {
            alert("Steps cannot exceed 5000");
            return;
        }

        const data = {
            userid: currentTrackingUserId,
            packageid: currentPackageId || null,
            answerjson: JSON.stringify(answers),
            bedtime: legacy.bedtime,
            waketime: legacy.waketime,
            steps: legacy.steps,
            bpchecked: legacy.bpchecked,
            junkfood: legacy.junkfood,
            remarks: legacy.remarks
        };

        await DBHandler.submitRecordData(
            'healthtracker',
            data,
            editingHealthId,
            false
        );

        bootstrap.Modal.getInstance(document.getElementById('healthModal')).hide();

        loadHealth();
    }

    async function loadMasterData() {
        const pkgs = await DBHandler.fetchEntityRecords('userpackage', 'id,packagename', 'packagename', 'asc', '', true, 0, '');
        packagesData = pkgs || [];
    }

    async function loadHealth() {

        const data = await DBHandler.fetchEntityRecords(
            'healthtracker',
            '*',
            'createdon',
            'desc'
        );

        const rows = (data || []).map(row => {
            const pkg = packagesData.find(p => String(p.id) === String(row.packageid || ''));
            return {
                ...row,
                packagename: pkg ? (pkg.packagename || '') : '',
                createdon: row.createdon ? new Date(row.createdon) : null
            };
        });

        healthGrid.dataSource = rows;
    }

    $(document).ready(async () => {
        initHealthGrid();
        await loadMasterData();
        await loadHealth();
    });
</script>

</body>
