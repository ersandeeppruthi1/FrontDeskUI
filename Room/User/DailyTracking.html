<script>
    // ── State ─────────────────────────────────────────────────────────────────
    let healthGrid;
    let packagesData  = [];   // userpackage rows (id, packagename)
    let allQuestions  = [];   // all questionmaster rows
    let allHabits = [];       // habitmaster rows
    let allAssessments = [];  // assessmentmaster1 rows

    let currentUserId        = '';
    let currentAllocation    = null;   // active allocation record
    let currentQsForModal    = [];     // ordered questionmaster rows for open modal
    let editingAnswerMap     = {};     // questionid → existing answers.row  (edit mode)
    let healthEntryDatePicker = null;

    let dynamicControls      = {};     // questionid → { question, control, inputType }
    let dynamicControlInstances = [];

    // ── Safe user-id reader (works with or without utility.js getCookie) ──────
    function safeGetUserId() {
        if (typeof getCookie === 'function') {
            const v = getCookie('userid');
            if (v) return String(v).trim();
        }
        const match = document.cookie.match(/(?:^|;\s*)userid=([^;]*)/);
        return match ? decodeURIComponent(match[1]).trim() : '';
    }

    function redirectToLogin() {
        window.location.href = 'login.html';
    }

    function requireLoggedInUserId(shouldRedirect = true) {
        const userId = safeGetUserId();
        if (userId) return userId;
        if (shouldRedirect) {
            alert('Please login first.');
            redirectToLogin();
        }
        return '';
    }

    // ── Master-data helpers ───────────────────────────────────────────────────

    async function loadMasterData() {
        const [pkgs, qs, habits, assessments] = await Promise.all([
            DBHandler.fetchEntityRecords('userpackage', 'id,packagename', 'packagename', 'asc', '', true, 0, ''),
            DBHandler.fetchEntityRecords('questionmaster', '*', 'id', 'asc', '', true, 0, ''),
            DBHandler.fetchEntityRecords('habitmaster', '*', 'habitname', 'asc', '', true, 0, ''),
            DBHandler.fetchEntityRecords('assessmentmaster1', '*', 'assessmentname', 'asc', '', true, 0, '')
        ]);
        packagesData = pkgs  || [];
        allQuestions = qs    || [];
        allHabits = habits || [];
        allAssessments = assessments || [];
    }

    // ── Resolve active allocation for a user ─────────────────────────────────

    async function resolveAllocation(userId) {
        if (!userId) return null;
        const list = await DBHandler.fetchEntityRecords(
            'allocation', '*', 'createdon', 'desc', `userid='${userId}'`, true, 0, ''
        );
        if (!list || !list.length) return null;
        return list.find(a => String(a.status || '').toLowerCase() === 'active') || list[0];
    }

    function getNumericAllocationId(allocation) {
        if (!allocation) return null;

        // Try common integer columns first; keep `id` last because it may be GUID in some environments.
        const candidates = [
            allocation.allocationid,
            allocation.allocation_id,
            allocation.intid,
            allocation.rowid,
            allocation.id
        ];

        for (const value of candidates) {
            if (value == null || value === '') continue;
            const parsed = Number(value);
            if (Number.isInteger(parsed) && parsed > 0) return parsed;
        }

        return null;
    }

    function toStrictInt(value) {
        const s = String(value == null ? '' : value).trim();
        if (!/^\d+$/.test(s)) return null;
        const n = Number(s);
        return Number.isInteger(n) ? n : null;
    }

    function hashToPositiveInt(text) {
        let hash = 0;
        const input = String(text || '');
        for (let i = 0; i < input.length; i++) {
            hash = ((hash << 5) - hash) + input.charCodeAt(i);
            hash |= 0;
        }
        const positive = Math.abs(hash);
        return positive === 0 ? 1 : positive;
    }

    function resolveDbQuestionId(question) {
        const direct = toStrictInt(question && question.dbQuestionId);
        if (direct != null) return direct;

        const fromId = toStrictInt(question && question.id);
        if (fromId != null) return fromId;

        const stableKey = `${question && question.source ? question.source : 'q'}|${question && question.id ? question.id : ''}|${question && question.question ? question.question : ''}`;
        return hashToPositiveInt(stableKey);
    }

    // ── Fetch ordered questions for a package via packagequestions ────────────
    // packagequestions: id, packageid, questionid, displayorder, isactive

    async function fetchPackageQuestions(packageid) {
        const rows = await DBHandler.fetchEntityRecords(
            'packagequestions', '*', 'displayorder', 'asc',
            `packageid='${packageid}' and isactive='Yes'`, true, 0, ''
        );
        // join with allQuestions (id, question, type, isrequired)
        const mappedFromQuestionMaster = (rows || [])
            .map(pq => {
                const q = allQuestions.find(item => String(item.id) === String(pq.questionid));
                if (!q) return null;
                return {
                    ...q,
                    dbQuestionId: toStrictInt(pq.questionid),
                    source: 'questionmaster'
                };
            })
            .filter(Boolean);

        // Primary path: explicit packagequestions mapping exists
        if (mappedFromQuestionMaster.length) return mappedFromQuestionMaster;

        // Fallback path: derive questions from userpackage JSON -> habits[] + assessments[]
        const pkgRows = await DBHandler.fetchEntityRecords(
            'userpackage',
            '*',
            'createdon',
            'desc',
            `id='${packageid}'`,
            false,
            1,
            ''
        );

        const pkg = pkgRows && pkgRows.length ? pkgRows[0] : null;
        if (!pkg || !pkg.habitid2) return [];

        let parsed = null;
        try {
            parsed = JSON.parse(pkg.habitid2);
        } catch (e) {
            parsed = null;
        }

        if (!parsed) return [];

        const mappedHabits = (Array.isArray(parsed.habits) ? parsed.habits : [])
            .map(h => {
                const habitId = String(h && h.id != null ? h.id : '').trim();
                const habit = allHabits.find(item => String(item.id) === habitId) || h;
                if (!habit || !habitId) return null;
                return {
                    id: habit.id || h.id,
                    question: habit.habitname || h.habitname,
                    type: habit.habittype || h.habittype || 'text',
                    options: habit.options || h.options || '',
                    isrequired: 'No',
                    dbQuestionId: toStrictInt(habit.id || h.id),
                    source: 'habitmaster'
                };
            })
            .filter(Boolean);

        const mappedAssessments = (Array.isArray(parsed.assessments) ? parsed.assessments : [])
            .map(a => {
                const assessmentId = String(a && a.id != null ? a.id : '').trim();
                const assessment = allAssessments.find(item => String(item.id) === assessmentId) || a;
                if (!assessment || !assessmentId) return null;
                return {
                    id: assessment.id || a.id,
                    question: assessment.assessmentname || a.assessmentname,
                    type: assessment.assessmenttype || a.assessmenttype || 'text',
                    options: assessment.options || a.options || '',
                    isrequired: 'No',
                    dbQuestionId: toStrictInt(assessment.id || a.id),
                    source: 'assessmentmaster1'
                };
            })
            .filter(Boolean);

        return [...mappedHabits, ...mappedAssessments];
    }

    function parseQuestionOptions(question) {
        const raw = question && (question.optionlist || question.options || question.optionslist || '');
        if (!raw) return ['Yes', 'No'];

        if (Array.isArray(raw)) {
            return raw.map(item => String(item).trim()).filter(Boolean);
        }

        const text = String(raw).trim();
        if (!text) return ['Yes', 'No'];

        try {
            if (text.startsWith('[')) {
                const parsed = JSON.parse(text);
                if (Array.isArray(parsed)) {
                    return parsed.map(item => String(item).trim()).filter(Boolean);
                }
            }
        } catch (e) {
        }

        const values = text.split(',').map(item => item.trim()).filter(Boolean);
        return values.length ? values : ['Yes', 'No'];
    }

    // ── Map questionmaster.type → EJ2 control type ───────────────────────────
    // Supported values: time | number | boolean | dropdown | text

    function resolveInputType(typeStr) {
        const t = String(typeStr || '').toLowerCase().trim();
        if (t === 'time')                        return 'time';
        if (['number', 'numeric'].includes(t))   return 'number';
        if (['boolean', 'yesno'].includes(t))    return 'boolean';
        if (['dropdown', 'option', 'options', 'select'].includes(t)) return 'dropdown';
        return 'text';
    }

    // ── Destroy EJ2 controls ─────────────────────────────────────────────────

    function destroyDynamicControls() {
        dynamicControlInstances.forEach(ctrl => {
            if (ctrl && typeof ctrl.destroy === 'function') ctrl.destroy();
        });
        dynamicControlInstances = [];
        dynamicControls = {};
        const container = document.getElementById('dynamicQuestionsContainer');
        if (container) container.innerHTML = '';
    }

    async function loadAnswersForEntryDate(entryDate) {
        if (!currentUserId || !entryDate) return;

        const dateStr = dayjs(entryDate).format('YYYY-MM-DD');
        const numericAllocationId = getNumericAllocationId(currentAllocation);

        let rows = [];
        if (numericAllocationId != null) {
            rows = await DBHandler.fetchEntityRecords(
                'answers', '*', 'createdon', 'asc',
                `allocationid='${numericAllocationId}'`, true, 0, ''
            );
        } else {
            rows = await DBHandler.fetchEntityRecords(
                'answers', '*', 'createdon', 'asc',
                `userid='${currentUserId}'`, true, 0, ''
            );
        }

        const sessionAnswers = (rows || []).filter(a =>
            a.createdon && dayjs(a.createdon).format('YYYY-MM-DD') === dateStr
        );

        editingAnswerMap = {};
        const answerMap = {};
        sessionAnswers.forEach(a => {
            editingAnswerMap[String(a.questionid)] = a;
            answerMap[String(a.questionid)] = a.answer;
        });

        destroyDynamicControls();
        renderDynamicQuestions(answerMap);
    }

    function initHealthEntryDatePicker(value) {
        const element = document.getElementById('healthEntryDate');
        if (!element) return;

        if (healthEntryDatePicker && typeof healthEntryDatePicker.destroy === 'function') {
            healthEntryDatePicker.destroy();
            healthEntryDatePicker = null;
        }

        healthEntryDatePicker = new ej.calendars.DatePicker({
            format: 'dd-MMM-yyyy',
            value: value || new Date(),
            change: async function (args) {
                if (!args.value) return;
                await loadAnswersForEntryDate(args.value);
            }
        });
        healthEntryDatePicker.appendTo('#healthEntryDate');
    }

    // ── Render questions from questionmaster into the modal ──────────────────
    // answerMap: { questionid(string) → answer(string) }

    function renderDynamicQuestions(answerMap = {}) {
        const container = document.getElementById('dynamicQuestionsContainer');
        destroyDynamicControls();

        let currentRow = null;

        currentQsForModal.forEach((q, index) => {

            if (index % 2 === 0) {
                currentRow = document.createElement('div');
                currentRow.className = 'row mt-3';
                container.appendChild(currentRow);
            }

            const col   = document.createElement('div');
            col.className = 'col-md-6';

            const label = document.createElement('label');
            label.textContent = q.question + (String(q.isrequired || '').toLowerCase() === 'yes' ? ' *' : '');

            const dbQuestionId = resolveDbQuestionId(q);

            const input = document.createElement('input');
            input.type  = 'text';
            input.id    = `dyn_q_${dbQuestionId}`;

            col.appendChild(label);
            col.appendChild(input);
            currentRow.appendChild(col);

            const existingVal = answerMap[String(dbQuestionId)] != null ? String(answerMap[String(dbQuestionId)]) : null;
            const inputType   = resolveInputType(q.type);
            let control       = null;

            if (inputType === 'time') {
                control = new ej.calendars.TimePicker({
                    placeholder: 'Select time',
                    value: existingVal ? new Date(`1970-01-01T${existingVal.substring(0, 8)}`) : null
                });
            } else if (inputType === 'number') {
                control = new ej.inputs.NumericTextBox({
                    placeholder: 'Enter value',
                    min: 0,
                    value: existingVal != null && existingVal !== '' ? Number(existingVal) : null
                });
            } else if (inputType === 'boolean') {
                control = new ej.dropdowns.DropDownList({
                    dataSource: parseQuestionOptions(q),
                    placeholder: 'Select',
                    value: existingVal || null
                });
            } else if (inputType === 'dropdown') {
                control = new ej.dropdowns.DropDownList({
                    dataSource: parseQuestionOptions(q),
                    placeholder: 'Select',
                    value: existingVal || null
                });
            } else {
                control = new ej.inputs.TextBox({
                    placeholder: 'Enter value',
                    value: existingVal || ''
                });
            }

            control.appendTo(`#${input.id}`);
            dynamicControlInstances.push(control);
            dynamicControls[String(dbQuestionId)] = { question: { ...q, dbQuestionId }, control, inputType };
        });
    }

    // ── Read current value from a rendered control ────────────────────────────

    function getControlValue(questionId) {
        const item = dynamicControls[String(questionId)];
        if (!item) return null;
        const { control, inputType } = item;

        if (inputType === 'time') {
            return control.value ? dayjs(control.value).format('HH:mm:ss') : null;
        }
        if (inputType === 'number') {
            return control.value == null ? null : String(Number(control.value));
        }
        return control.value == null ? null : String(control.value);
    }

    // ── Grid init ─────────────────────────────────────────────────────────────

    function initHealthGrid() {
        ej.grids.Grid.Inject(
            ej.grids.Page, ej.grids.Sort, ej.grids.Filter,
            ej.grids.Toolbar, ej.grids.ExcelExport, ej.grids.PdfExport
        );

        healthGrid = new ej.grids.Grid({
            dataSource: [],
            allowPaging: true,
            allowSorting: true,
            allowFiltering: true,
            filterSettings: { type: 'Excel' },
            toolbar: [
                'Search',
                'ExcelExport',
                'PdfExport',
                { text: 'New Entry', prefixIcon: 'e-icons e-plus',   id: 'newHealth' },
                { text: 'Edit',      prefixIcon: 'e-icons e-edit',   id: 'editHealth' },
                { text: 'Delete',    prefixIcon: 'e-icons e-delete', id: 'deleteHealth' },
                { text: 'Refresh',   prefixIcon: 'e-icons e-refresh', id: 'refreshHealth' }
            ],
            columns: [
                { type: 'checkbox', width: 50 },
                { field: 'createdon',    headerText: 'Date',         width: 140, type: 'date', format: 'dd/MMM/yyyy' },
                { field: 'packagename', headerText: 'Package',       width: 180 },
                { field: 'questiontext',headerText: 'Question',      width: 260 },
                { field: 'answer',      headerText: 'Answer',        width: 200 },
                { field: 'id',          visible: false },
                { field: 'questionid',  visible: false },
                { field: 'allocationid',visible: false },
                { field: 'userid',      visible: false }
            ],
            toolbarClick: async function (args) {
                const clickedId = args.item.id;

                if (clickedId.includes('newHealth')) {
                    editingAnswerMap = {};
                    openHealthModal([]);
                }

                if (clickedId.includes('editHealth')) {
                    const selected = healthGrid.getSelectedRecords();
                    if (!selected.length) return alert('Select at least one answer row to edit.');

                    // Identify the session: same allocationid + same date
                    const allocationid = selected[0].allocationid;
                    const userid = selected[0].userid;
                    const dateStr      = dayjs(selected[0].createdon).format('YYYY-MM-DD');

                    let allForAlloc = [];

                    if (allocationid != null && allocationid !== '') {
                        allForAlloc = await DBHandler.fetchEntityRecords(
                            'answers', '*', 'createdon', 'asc',
                            `allocationid='${allocationid}'`, true, 0, ''
                        );
                    } else {
                        allForAlloc = await DBHandler.fetchEntityRecords(
                            'answers', '*', 'createdon', 'asc',
                            `userid='${userid}'`, true, 0, ''
                        );
                    }

                    // Filter to the same submission day
                    const sessionAnswers = (allForAlloc || []).filter(a =>
                        a.createdon && dayjs(a.createdon).format('YYYY-MM-DD') === dateStr
                    );

                    editingAnswerMap = {};
                    sessionAnswers.forEach(a => {
                        editingAnswerMap[String(a.questionid)] = a;
                    });

                    openHealthModal(sessionAnswers);
                }

                if (clickedId.includes('deleteHealth')) {
                    const selected = healthGrid.getSelectedRecords();
                    if (!selected.length) return alert('Select record(s) to delete.');
                    if (!confirm(`Delete ${selected.length} answer(s)?`)) return;
                    await deleteRecordData('answers', selected.map(r => r.id), true, true);
                    loadHealth();
                }

                if (clickedId.includes('refreshHealth')) {
                    await loadMasterData();
                    await loadHealth();
                }

                if (clickedId.includes('excelexport')) healthGrid.excelExport();
                if (clickedId.includes('pdfexport'))   healthGrid.pdfExport();
            }
        });

        healthGrid.appendTo('#healthGrid');
    }

    // ── Open modal ────────────────────────────────────────────────────────────
    // existingAnswers: array of answers.rows for edit mode, [] for new

    async function openHealthModal(existingAnswers) {
        currentUserId = requireLoggedInUserId(true);
        if (!currentUserId) {
            return;
        }

        currentAllocation = await resolveAllocation(currentUserId);

        const packageContext = document.getElementById('packageContext');

        if (!currentAllocation || !currentAllocation.packageid) {
            packageContext.className = 'alert alert-warning py-2 mb-3';
            packageContext.textContent = 'No active package allocation found for this user.';
            currentQsForModal = [];
        } else {
            currentQsForModal = await fetchPackageQuestions(currentAllocation.packageid);
            const pkg = packagesData.find(p => String(p.id) === String(currentAllocation.packageid));
            packageContext.className = 'alert alert-success py-2 mb-3';
            packageContext.textContent = `Package: ${pkg ? pkg.packagename : currentAllocation.packageid}`;
        }

        const modalEl = document.getElementById('healthModal');
        const modal   = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl);
        modal.show();

        modalEl.addEventListener('shown.bs.modal', function handler() {
            const entryDate = existingAnswers && existingAnswers.length && existingAnswers[0].createdon
                ? new Date(existingAnswers[0].createdon)
                : new Date();

            initHealthEntryDatePicker(entryDate);
            loadAnswersForEntryDate(entryDate);

            modalEl.removeEventListener('shown.bs.modal', handler);
        });
    }

    // ── Save ──────────────────────────────────────────────────────────────────
    // Writes one row per question to the answers table.
    // On edit: updates existing row (matched by editingAnswerMap[questionid].id).
    // On new:  inserts fresh row (id = null).

    async function saveHealth() {
        if (!currentAllocation) {
            alert('No active allocation found. Cannot save.');
            return;
        }

        const entryDateValue = healthEntryDatePicker && healthEntryDatePicker.value
            ? dayjs(healthEntryDatePicker.value).format('YYYY-MM-DD')
            : null;

        if (!entryDateValue) {
            alert('Please select an entry date.');
            return;
        }

        const numericAllocationId = getNumericAllocationId(currentAllocation);

        // Required-field validation
        for (const qid of Object.keys(dynamicControls)) {
            const { question } = dynamicControls[qid];
            if (String(question.isrequired || '').toLowerCase() === 'yes') {
                const val = getControlValue(qid);
                if (val === null || val === '') {
                    alert(`"${question.question}" is required.`);
                    return;
                }
            }
        }

        // Persist each answer
        for (const qid of Object.keys(dynamicControls)) {
            const answer        = getControlValue(qid);
            const existingRow   = editingAnswerMap[qid] || null;

            await DBHandler.submitRecordData('answers', {
                userid:       currentUserId,
                allocationid: numericAllocationId != null ? numericAllocationId : null,
                createdon:    entryDateValue,
                questionid:   qid,
                answer:       answer != null ? String(answer) : ''
            }, existingRow ? existingRow.id : null, false);
        }

        bootstrap.Modal.getInstance(document.getElementById('healthModal')).hide();
        loadHealth();
    }

    // ── Load grid data ────────────────────────────────────────────────────────

    async function loadHealth() {
        const userId = requireLoggedInUserId(false);
        if (!userId) return;

        const data = await DBHandler.fetchEntityRecords(
            'answers', '*', 'createdon', 'desc', `userid='${userId}'`, true, 0, ''
        );

        // Build allocationid → packageid map from packagesData join via allocation
        // (single fetch; reuse currentAllocation if page-scoped user)
        const allocation = await resolveAllocation(userId);
        const numericAllocationId = getNumericAllocationId(allocation);

        healthGrid.dataSource = (data || []).map(row => {
            const q = allQuestions.find(qm => resolveDbQuestionId({ ...qm, source: 'questionmaster' }) === Number(row.questionid));
            const habit = allHabits.find(h => resolveDbQuestionId({ ...h, question: h.habitname, source: 'habitmaster' }) === Number(row.questionid));
            const assessment = allAssessments.find(a => resolveDbQuestionId({ ...a, question: a.assessmentname, source: 'assessmentmaster1' }) === Number(row.questionid));
            const pkg = allocation && numericAllocationId != null && String(numericAllocationId) === String(row.allocationid)
                ? packagesData.find(p => String(p.id) === String(allocation.packageid))
                : null;
            return {
                ...row,
                questiontext: q ? q.question : (habit ? habit.habitname : (assessment ? assessment.assessmentname : `Q #${row.questionid}`)),
                packagename:  pkg ? (pkg.packagename || '') : '',
                createdon:    row.createdon ? new Date(row.createdon) : null
            };
        });
    }

    // ── Init ──────────────────────────────────────────────────────────────────

    $(document).ready(async () => {
        currentUserId = requireLoggedInUserId(true);
        if (!currentUserId) return;

        initHealthGrid();
        await loadMasterData();
        await loadHealth();
    });
</script>
