<!DOCTYPE html>
<html lang="en">

<head runat="server">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>FrontDesk Login</title>

	<script>
		let classMap = [];
		var apiURL = "https://dbsit2.vsservices.in/";
	</script>

	<link href="https://apisit.vsservices.in/css/Default/bootstrap.min.css" rel="stylesheet" />
	<script src="https://apisit.vsservices.in/css/Default/jquery.min.js"></script>

	<script src="https://apisit.vsservices.in/css/Default/bootstrap.bundle.min.js"></script>
	<link href="https://apisit.vsservices.in/css/app.css?id=081220258" rel="stylesheet" />

	<script src="https://apisit.vsservices.in/JS/utility.js?id=081220258"></script>
	<script src="https://apisit.vsservices.in/JS/Master/DBHandler.js?id=081220258" type="module"></script>

	<style>
		:root {
			--bg-1: #0f172a;
			--bg-2: #1e293b;
			--card: #ffffff;
			--brand: #0ea5e9;
			--brand-2: #0284c7;
			--text: #0f172a;
			--muted: #64748b;
			--danger: #dc2626;
			--ok: #059669;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
			color: var(--text);
			background:
				radial-gradient(circle at 20% 20%, rgba(14, 165, 233, 0.28), transparent 36%),
				radial-gradient(circle at 80% 75%, rgba(2, 132, 199, 0.26), transparent 34%),
				linear-gradient(145deg, var(--bg-1), var(--bg-2));
			display: grid;
			place-items: center;
			padding: 20px;
		}

		.login-shell {
			width: 100%;
			max-width: 980px;
			border-radius: 20px;
			overflow: hidden;
			box-shadow: 0 20px 60px rgba(2, 6, 23, 0.45);
			background: rgba(255, 255, 255, 0.06);
			backdrop-filter: blur(8px);
			display: grid;
			grid-template-columns: 1.1fr 1fr;
		}

		.hero {
			padding: 44px 38px;
			color: #e2e8f0;
			position: relative;
			overflow: hidden;
		}

		.hero::before {
			content: "";
			position: absolute;
			width: 320px;
			height: 320px;
			border-radius: 50%;
			background: rgba(14, 165, 233, 0.24);
			right: -120px;
			top: -80px;
		}

		.hero h1 {
			margin: 0;
			font-size: 2rem;
			line-height: 1.2;
			letter-spacing: 0.3px;
		}

		.hero p {
			margin: 12px 0 0;
			color: #cbd5e1;
			font-size: 0.95rem;
		}

		.hero-badges {
			margin-top: 28px;
			display: flex;
			flex-wrap: wrap;
			gap: 10px;
		}

		.hero-badge {
			border: 1px solid rgba(148, 163, 184, 0.32);
			border-radius: 999px;
			padding: 6px 12px;
			font-size: 0.78rem;
			color: #dbeafe;
			background: rgba(15, 23, 42, 0.24);
		}

		.login-card {
			background: var(--card);
			padding: 36px 30px;
			display: flex;
			flex-direction: column;
			justify-content: center;
		}

		.brand-line {
			font-size: 0.82rem;
			color: var(--muted);
			letter-spacing: 0.5px;
			text-transform: uppercase;
			margin-bottom: 6px;
		}

		.login-card h2 {
			margin: 0 0 20px;
			font-size: 1.55rem;
			color: var(--text);
		}

		.form-label {
			font-weight: 600;
			font-size: 0.9rem;
		}

		.form-control {
			height: 44px;
			border-radius: 10px;
			border: 1px solid #dbe3ec;
			transition: all .2s ease;
		}

		.form-control:focus {
			border-color: var(--brand);
			box-shadow: 0 0 0 0.2rem rgba(14, 165, 233, 0.18);
		}

		.input-with-action {
			position: relative;
		}

		.toggle-pass {
			position: absolute;
			right: 10px;
			top: 50%;
			transform: translateY(-50%);
			border: 0;
			background: transparent;
			color: #64748b;
			font-size: 0.85rem;
			padding: 4px 6px;
			cursor: pointer;
		}

		.btn-login {
			width: 100%;
			height: 46px;
			border: 0;
			border-radius: 11px;
			color: #fff;
			font-weight: 600;
			letter-spacing: 0.2px;
			background: linear-gradient(120deg, var(--brand), var(--brand-2));
			transition: transform .15s ease, box-shadow .15s ease;
		}

		.btn-login:hover {
			transform: translateY(-1px);
			box-shadow: 0 10px 24px rgba(14, 165, 233, 0.3);
		}

		.btn-login:disabled {
			opacity: .75;
			cursor: not-allowed;
			transform: none;
			box-shadow: none;
		}

		.status-msg {
			margin-top: 12px;
			font-size: 0.9rem;
			min-height: 22px;
		}

		.msg-error {
			color: var(--danger);
		}

		.msg-ok {
			color: var(--ok);
		}

		.hint-line {
			margin-top: 14px;
			color: var(--muted);
			font-size: 0.8rem;
			line-height: 1.4;
		}

		@media (max-width: 860px) {
			.login-shell {
				grid-template-columns: 1fr;
				max-width: 520px;
			}

			.hero {
				padding: 28px 24px 22px;
			}

			.login-card {
				padding: 28px 22px;
			}
		}
	</style>
</head>

<body>
	<main class="login-shell" aria-label="Login layout">
		<section class="hero">
			<h1>FrontDesk Management</h1>
			<p>Sign in with your authorized user account to access menus, permissions, and your configured default page.</p>
			<div class="hero-badges">
				<span class="hero-badge">Role-Aware Access</span>
				<span class="hero-badge">Default Page Routing</span>
				<span class="hero-badge">Permission JSON Ready</span>
			</div>
		</section>

		<section class="login-card">
			<div class="brand-line">Secure Sign In</div>
			<h2>Welcome Back</h2>

			<form id="loginForm" autocomplete="on">
				<div class="mb-3">
					<label for="username" class="form-label">Username</label>
					<input id="username" class="form-control" type="text" placeholder="Enter username" required />
				</div>

				<div class="mb-2">
					<label for="password" class="form-label">Password</label>
					<div class="input-with-action">
						<input id="password" class="form-control" type="password" placeholder="Enter password" required />
						<button id="togglePassword" class="toggle-pass" type="button" aria-label="Toggle password visibility">Show</button>
					</div>
				</div>

				<button id="btnLogin" class="btn-login mt-3" type="submit">Login</button>

				<div id="statusMessage" class="status-msg" role="alert" aria-live="polite"></div>
				<div class="hint-line">Your account can be blocked if <strong>disableduser = 1</strong>.</div>
			</form>
		</section>
	</main>

	<script>
		function setCookie(name, value, days) {
			const maxAge = days * 24 * 60 * 60;
			document.cookie = `${encodeURIComponent(name)}=${encodeURIComponent(value || '')}; max-age=${maxAge}; path=/; SameSite=Lax`;
		}

		function setStatus(message, ok = false) {
			const el = document.getElementById('statusMessage');
			el.className = `status-msg ${ok ? 'msg-ok' : 'msg-error'}`;
			el.textContent = message || '';
		}

		function lockLoginButton(loading) {
			const btn = document.getElementById('btnLogin');
			btn.disabled = loading;
			btn.textContent = loading ? 'Authenticating...' : 'Login';
		}

		function normalizePath(defaultPage) {
			const fallback = '/main.html';
			const raw = String(defaultPage || '').trim();
			if (!raw) return fallback;

			if (raw.startsWith('http://') || raw.startsWith('https://')) return raw;
			if (raw.startsWith('/')) return raw;
			return `/${raw}`;
		}

		async function authenticate(username, password) {
			const inputUser = String(username || '').trim();
			const safeUser = inputUser.replace(/'/g, "''");
			const rows = await DBHandler.fetchEntityRecords(
				'users',
				'*',
				'id',
				'asc',
				`username='${safeUser}'`,
				false,
				1,
				''
			);

			let user = rows && rows.length ? rows[0] : null;

			// Fallback: case-insensitive username search for environments with mixed-case values
			if (!user) {
				const allUsers = await DBHandler.fetchEntityRecords('users', '*', 'id', 'asc', '', true, 0, '');
				user = (allUsers || []).find(u => String(u.username || '').toLowerCase() === inputUser.toLowerCase()) || null;
			}

			if (!user) return { ok: false, message: 'Invalid username or password.' };

			if (String(user.disableduser || '0') === '1') {
				return { ok: false, message: 'Your account is disabled. Contact administrator.' };
			}

			const dbPass = String(user.password || '');
			if (dbPass.trim() !== String(password || '').trim()) {
				return { ok: false, message: 'Invalid username or password.' };
			}

			return { ok: true, user };
		}

		function writeUserSession(user) {
			const userId = String(user.id || '');
			const username = String(user.username || '');
			const displayName = String(user.displayname || user.name || username);
			const defaultPage = normalizePath(user.defaultpage);
			const authToken = String(user.token || (crypto && crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}_${userId}`));

			setCookie('userid', userId, 7);
			setCookie('userId', userId, 7);
			setCookie('username', username, 7);
			setCookie('userName', username, 7);
			setCookie('displayName', displayName, 7);
			setCookie('defaultpage', defaultPage, 7);
			setCookie('permissionid', String(user.permissionid || ''), 7);
			setCookie('menuid', String(user.menuid || ''), 7);
			setCookie('issystemadministrator', String(user.issystemadministrator || 0), 7);
			setCookie('token', authToken, 7);
			setCookie('AuthToken', authToken, 7);

			sessionStorage.setItem('userid', userId);
			sessionStorage.setItem('userId', userId);
			sessionStorage.setItem('username', username);
			sessionStorage.setItem('userName', username);
			sessionStorage.setItem('displayName', displayName);
			sessionStorage.setItem('defaultpage', defaultPage);
			sessionStorage.setItem('token', authToken);

			localStorage.setItem('userid', userId);
			localStorage.setItem('userName', username);
			localStorage.setItem('displayName', displayName);
			localStorage.setItem('defaultpage', defaultPage);
			localStorage.setItem('AuthToken', authToken);

			if (user.permissionjson != null) sessionStorage.setItem('permissionjson', String(user.permissionjson));
			if (user.menujson != null) sessionStorage.setItem('menujson', String(user.menujson));
		}

		async function handleLoginSubmit(event) {
			event.preventDefault();
			setStatus('');

			const username = document.getElementById('username').value.trim();
			const password = document.getElementById('password').value;

			if (!username || !password) {
				setStatus('Please enter username and password.');
				return;
			}

			try {
				lockLoginButton(true);
				const result = await authenticate(username, password);

				if (!result.ok) {
					setStatus(result.message);
					return;
				}

				writeUserSession(result.user);
				setStatus('Login successful. Redirecting...', true);

				const redirectTo = normalizePath(result.user.defaultpage);
				setTimeout(() => {
					window.location.href = redirectTo;
				}, 350);
			} catch (err) {
				console.error('Login error:', err);
				setStatus('Unable to login right now. Please try again.');
			} finally {
				lockLoginButton(false);
			}
		}

		function initPasswordToggle() {
			const btn = document.getElementById('togglePassword');
			const input = document.getElementById('password');
			btn.addEventListener('click', function () {
				const isPwd = input.type === 'password';
				input.type = isPwd ? 'text' : 'password';
				btn.textContent = isPwd ? 'Hide' : 'Show';
			});
		}

		function initLoginPage() {
			document.getElementById('loginForm').addEventListener('submit', handleLoginSubmit);
			initPasswordToggle();
			document.getElementById('username').focus();
		}

		$(document).ready(function () {
			initLoginPage();
		});
	</script>
</body>

</html>
