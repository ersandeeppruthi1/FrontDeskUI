    <div id="healthGrid"></div>

<div class="modal fade" id="healthModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Daily Health Entry</h5>
                <button type="button" class="close" data-bs-dismiss="modal">
                    <span>&times;</span>
                </button>
            </div>

            <div class="modal-body">
                <form id="healthForm">

                    <div class="row">
                        <div class="col-md-6">
                            <label>Bed Time</label>
                            <input type="text" id="bedtime" />
                        </div>
                        <div class="col-md-6">
                            <label>Wake Time</label>
                            <input type="text" id="waketime" />
                        </div>
                    </div>

                    <div class="row mt-3">
                        <div class="col-md-6">
                            <label>Steps Walked</label>
                            <input type="number" id="steps" class="form-control" />
                        </div>
                        <div class="col-md-6">
                            <label>BP Checked</label>
                            <input type="text" id="bpchecked" />
                        </div>
                    </div>

                    <div class="row mt-3">
                        <div class="col-md-6">
                            <label>Junk Food</label>
                            <input type="text" id="junkfood" />
                        </div>
                        <div class="col-md-6">
                            <label>Remarks</label>
                            <textarea id="remarks" class="form-control"></textarea>
                        </div>
                    </div>

                </form>
            </div>

            <div class="modal-footer">
                <button class="btn btn-primary" onclick="saveHealth()">Save</button>
                <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>

        </div>
    </div>
</div>
<script>
    let healthGrid;
    let editingHealthId = null;

    let bedtimePicker, waketimePicker;
    let bpDropdown, junkDropdown;

    function resetAndDestroyHealthControls() {
        if (bedtimePicker) {
            bedtimePicker.destroy();
            bedtimePicker = null;
        }
        if (waketimePicker) {
            waketimePicker.destroy();
            waketimePicker = null;
        }
        if (bpDropdown) {
            bpDropdown.destroy();
            bpDropdown = null;
        }
        if (junkDropdown) {
            junkDropdown.destroy();
            junkDropdown = null;
        }

        document.getElementById('steps').value = '';
        document.getElementById('remarks').value = '';
    }

    function initHealthGrid() {

        ej.grids.Grid.Inject(
            ej.grids.Page,
            ej.grids.Sort,
            ej.grids.Filter,
            ej.grids.Toolbar
        );

        healthGrid = new ej.grids.Grid({
            dataSource: [],
            allowPaging: true,
            allowSorting: true,
            toolbar: [
                'Search',
                'ExcelExport',
                'PdfExport',
                { text: 'New Entry', id: 'newHealth' },
                { text: 'Edit', id: 'editHealth' },
                { text: 'Delete', id: 'deleteHealth' },
                'ColumnChooser'
            ],
            columns: [
                { type: 'checkbox', width: 50 },
                { field: 'bedtime', headerText: 'Bed Time', width: 120 },
                { field: 'waketime', headerText: 'Wake Time', width: 120 },
                { field: 'steps', headerText: 'Steps', width: 100 },
                { field: 'bpchecked', headerText: 'BP Checked', width: 120 },
                { field: 'junkfood', headerText: 'Junk Food', width: 120 },
                { field: 'remarks', headerText: 'Remarks', width: 200 }
            ],

            toolbarClick: async function (args) {

                const id = args.item.id;

                if (id.includes('newHealth')) {
                    editingHealthId = null;
                    openHealthModal();
                }

                if (id.includes('editHealth')) {
                    const selected = healthGrid.getSelectedRecords();
                    if (selected.length !== 1) return alert("Select one record");

                    editingHealthId = selected[0].id;
                    openHealthModal(selected[0]);
                }

                if (id.includes('deleteHealth')) {
                    const selected = healthGrid.getSelectedRecords();
                    if (!selected.length) return alert("Select record");

                    const ids = selected.map(r => r.id);
                    await deleteRecordData('healthtracker', ids, true, true);
                    loadHealth();
                }
            }
        });

        healthGrid.appendTo('#healthGrid');
    }

    function initHealthControls() {

        bedtimePicker = new ej.calendars.TimePicker({
            placeholder: "Bed Time"
        });
        bedtimePicker.appendTo('#bedtime');

        waketimePicker = new ej.calendars.TimePicker({
            placeholder: "Wake Time"
        });
        waketimePicker.appendTo('#waketime');

        bpDropdown = new ej.dropdowns.DropDownList({
            dataSource: ['Yes', 'No'],
            placeholder: "BP Checked?"
        });
        bpDropdown.appendTo('#bpchecked');

        junkDropdown = new ej.dropdowns.DropDownList({
            dataSource: ['Yes', 'No'],
            placeholder: "Ate Junk Food?"
        });
        junkDropdown.appendTo('#junkfood');
    }

    function openHealthModal(record = null) {

        const modalEl = document.getElementById('healthModal');
        const modal = new bootstrap.Modal(modalEl);

        modal.show();

        modalEl.addEventListener('shown.bs.modal', function handler() {

            resetAndDestroyHealthControls();

            initHealthControls();

            if (record) {
                bedtimePicker.value = record.bedtime;
                waketimePicker.value = record.waketime;
                bpDropdown.value = record.bpchecked;
                junkDropdown.value = record.junkfood;
                document.getElementById('steps').value = record.steps;
                document.getElementById('remarks').value = record.remarks;
            } else {
                bedtimePicker.value = null;
                waketimePicker.value = null;
                bpDropdown.value = null;
                junkDropdown.value = null;
            }

            modalEl.removeEventListener('shown.bs.modal', handler);
        });
    }

    async function saveHealth() {

        const steps = parseInt(document.getElementById('steps').value || 0);

        if (steps > 5000) {
            alert("Steps cannot exceed 5000 🚫");
            return;
        }

        const data = {
            bedtime: bedtimePicker.value,
            waketime: waketimePicker.value,
            steps,
            bpchecked: bpDropdown.value,
            junkfood: junkDropdown.value,
            remarks: document.getElementById('remarks').value
        };

        await DBHandler.submitRecordData(
            'healthtracker',
            data,
            editingHealthId,
            false
        );

        bootstrap.Modal.getInstance(document.getElementById('healthModal')).hide();

        loadHealth();
    }

    async function loadHealth() {

        const data = await DBHandler.fetchEntityRecords(
            'healthtracker',
            '*',
            'createdon',
            'desc'
        );

        healthGrid.dataSource = data || [];
    }

    $(document).ready(async () => {
        initHealthGrid();
        await loadHealth();
    });
</script>
