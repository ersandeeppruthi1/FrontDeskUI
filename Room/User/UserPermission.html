<body>
    <div class="container2 mt-4">
        <div id="permissionGrid"></div>

    <div class="modal fade" id="permissionModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content custom-modal">

                            <input id="ownerId" class="form-control" datatype="dropdown" dbcolumnname="ownerid" />
                        </div>

                        <div class="col-md-12">
                            <label>Entity Permissions<span style="color: red;">*</span>:</label>
                            <div class="card">
                                <div class="card-header">
                                    <h6 class="mb-0">Select Entities and Configure Permissions</h6>
                                </div>
                                <div class="card-body">
                                    <div class="row mb-3">
                                        <div class="col-md-8">
                                            <label for="entitySelector">Select Entity:</label>
                                            <input id="entitySelector" type="text" class="form-control" />
                                        </div>
                                        <div class="col-md-4 d-flex align-items-end">
                                            <button type="button" class="btn btn-primary btn-sm" onclick="addEntityPermission()">
                                                <i class="fa fa-plus"></i> Add Entity
                                            </button>
                                        </div>
                                    </div>
                                    
                                    <div id="entityPermissionsContainer">
                                        <div class="alert alert-info text-center" id="noEntitiesMessage">
                                            <i class="fa fa-info-circle"></i> No entities selected yet. Add entities to configure permissions.
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="mt-3">
                                <label>Generated Permission JSON<span style="color: red;">*</span>:</label>
                                <textarea class="form-control" id="permissionJSON" dbcolumnname="permissionjson" rows="8" readonly
                                    placeholder='{"entities": [], "globalPermissions": []}'></textarea>

                    <button class="btn btn-info" onclick="viewPermissionJSON()">
                        <i class="fa fa-eye"></i> View JSON

                        <i class="fa fa-refresh"></i> Clear All
                    </button>
                    <button type="button" class="btn btn-primary" onclick="savePermission()">
                        <i class="fa fa-save"></i> Save Permission
                    </button>

    <script>
        $(document).ready(function () {
            // Load users for owner dropdown
            DBHandler.fetchEntityRecords(
                'users',
                'users.id, users.username',
                'users.username',
                'asc',
                '', true,
                0,
                ''
            ).then(owners => {
                var listObj = new ej.dropdowns.DropDownList({
                    dataSource: owners,
                    fields: { text: 'username', value: 'id' },
                });
                listObj.appendTo('#ownerId');
            });

            // Load entities for permission configuration
            loadEntitiesForPermissions();
        });

        let entityPermissions = [];
        let availableEntities = [];
        let entitySelectorDropdown = null;

        async function loadEntitiesForPermissions() {
            try {
                // Fetch available entities from the system
                const entities = await DBHandler.fetchEntityRecords(
                    'entities',
                    'id, name',
                    'name',
                    'asc',
                    '', true,
                    0,
                    ''
                );

                // Map entities and use name as both display name and table name if tablename doesn't exist
                availableEntities = (entities || []).map(entity => ({
                    ...entity,
                    tablename: entity.tablename || entity.name.toLowerCase().replace(/\s+/g, '')
                }));
                
                populateEntitySelector();
            } catch (error) {
                console.error('Failed to load entities:', error);
                // Fallback to common entities if database fetch fails
                availableEntities = [
                    { id: 'users', name: 'Users', tablename: 'users' },
                    { id: 'patients', name: 'Patients', tablename: 'patients' },
                    { id: 'rooms', name: 'Rooms', tablename: 'rooms' },
                    { id: 'appointments', name: 'Appointments', tablename: 'appointments' },
                    { id: 'medicines', name: 'Medicines', tablename: 'medicines' },
                    { id: 'reports', name: 'Reports', tablename: 'reports' }
                ];
                populateEntitySelector();
            }
        }

        function populateEntitySelector() {
            // Destroy existing dropdown if it exists
            if (entitySelectorDropdown) {
                entitySelectorDropdown.destroy();
            }

            // Filter out already added entities
            const filteredEntities = availableEntities.filter(entity => 
                !entityPermissions.find(ep => ep.entityId === entity.id)
            );

            // Create new Syncfusion dropdown
            entitySelectorDropdown = new ej.dropdowns.DropDownList({
                dataSource: filteredEntities,
                fields: { text: 'name', value: 'id' },
                placeholder: 'Select Entity...',
                allowFiltering: true,
                filterBarPlaceholder: 'Search entities...',
                popupHeight: '250px',
                width: '100%'
            });
            entitySelectorDropdown.appendTo('#entitySelector');
        }

        function addEntityPermission() {
            if (!entitySelectorDropdown || !entitySelectorDropdown.value) {
                alert('Please select an entity first');
                return;
            }

            const entityId = entitySelectorDropdown.value;
            const selectedEntity = availableEntities.find(e => e.id === entityId);
            
            if (!selectedEntity) {
                alert('Selected entity not found');
                return;
            }

            const entityName = selectedEntity.name;
            const tableName = selectedEntity.tablename || selectedEntity.name.toLowerCase().replace(/\s+/g, '');

            // Check if entity is already added
            if (entityPermissions.find(ep => ep.entityId === entityId)) {
                alert('This entity is already added');
                return;
            }

            // Add to entity permissions array
            const newPermission = {
                entityId: entityId,
                entityName: entityName,
                tableName: tableName,
                permissions: {
                    create: false,
                    read: false,
                    update: false,
                    delete: false
                }
            };

            entityPermissions.push(newPermission);
            renderEntityPermissions();
            populateEntitySelector(); // Refresh selector to remove added entity
            updatePermissionJSON();
        }

        function renderEntityPermissions() {
            const container = document.getElementById('entityPermissionsContainer');
            const noEntitiesMessage = document.getElementById('noEntitiesMessage');

            if (entityPermissions.length === 0) {
                noEntitiesMessage.style.display = 'block';
                container.innerHTML = '<div class="alert alert-info text-center" id="noEntitiesMessage"><i class="fa fa-info-circle"></i> No entities selected yet. Add entities to configure permissions.</div>';
                return;
            }

            noEntitiesMessage.style.display = 'none';
            
            let html = `
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h6 class="mb-0">
                        Configured Entities 
                        <span class="entity-count-badge">${entityPermissions.length}</span>
                    </h6>
                </div>
            `;

            entityPermissions.forEach((entityPerm, index) => {
                const activePermissions = Object.entries(entityPerm.permissions)
                    .filter(([key, value]) => value)
                    .map(([key]) => key);

                html += `
                    <div class="card mb-3 entity-permission-card" id="entity-${index}">
                        <div class="card-header entity-header d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="mb-0">
                                    <i class="fa fa-database text-primary"></i> ${entityPerm.entityName}
                                    <small class="text-muted">(${entityPerm.tableName})</small>
                                </h6>
                                <div class="permission-summary">
                                    <span class="permission-chip ${entityPerm.permissions.create ? 'active' : ''}">Create</span>
                                    <span class="permission-chip ${entityPerm.permissions.read ? 'active' : ''}">Read</span>
                                    <span class="permission-chip ${entityPerm.permissions.update ? 'active' : ''}">Update</span>
                                    <span class="permission-chip ${entityPerm.permissions.delete ? 'active' : ''}">Delete</span>
                                </div>
                            </div>
                            <button type="button" class="btn btn-danger btn-sm" onclick="removeEntityPermission(${index})" title="Remove Entity">
                                <i class="fa fa-trash"></i>
                            </button>
                        </div>
                        <div class="card-body permission-container">
                            <div class="row g-3">
                                <div class="col-md-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="create-${index}" 
                                               ${entityPerm.permissions.create ? 'checked' : ''}
                                               onchange="updateEntityPermission(${index}, 'create', this.checked)">
                                        <label class="form-check-label permission-label" for="create-${index}">
                                            <i class="fa fa-plus text-success me-1"></i> Create
                                        </label>
                                        <small class="text-muted d-block">Add new records</small>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="read-${index}"
                                               ${entityPerm.permissions.read ? 'checked' : ''}
                                               onchange="updateEntityPermission(${index}, 'read', this.checked)">
                                        <label class="form-check-label permission-label" for="read-${index}">
                                            <i class="fa fa-eye text-info me-1"></i> Read
                                        </label>
                                        <small class="text-muted d-block">View existing records</small>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="update-${index}"
                                               ${entityPerm.permissions.update ? 'checked' : ''}
                                               onchange="updateEntityPermission(${index}, 'update', this.checked)">
                                        <label class="form-check-label permission-label" for="update-${index}">
                                            <i class="fa fa-edit text-warning me-1"></i> Update
                                        </label>
                                        <small class="text-muted d-block">Modify existing records</small>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="delete-${index}"
                                               ${entityPerm.permissions.delete ? 'checked' : ''}
                                               onchange="updateEntityPermission(${index}, 'delete', this.checked)">
                                        <label class="form-check-label permission-label" for="delete-${index}">
                                            <i class="fa fa-trash text-danger me-1"></i> Delete
                                        </label>
                                        <small class="text-muted d-block">Remove records</small>
                                    </div>
                                </div>
                            </div>
                            ${activePermissions.length === 0 ? 
                                '<div class="alert alert-warning alert-sm mt-2 mb-0"><small><i class="fa fa-exclamation-triangle"></i> No permissions selected for this entity</small></div>' 
                                : ''
                            }
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function updateEntityPermission(index, permission, value) {
            if (entityPermissions[index]) {
                entityPermissions[index].permissions[permission] = value;
                updatePermissionJSON();
            }
        }

        function removeEntityPermission(index) {
            if (confirm('Are you sure you want to remove this entity permission?')) {
                entityPermissions.splice(index, 1);
                renderEntityPermissions();
                populateEntitySelector();
                updatePermissionJSON();
            }
        }

        function updatePermissionJSON() {
            const totalPermissions = entityPermissions.reduce((count, ep) => {
                return count + Object.values(ep.permissions).filter(Boolean).length;
            }, 0);

            const permissionData = {
                metadata: {
                    version: "1.0",
                    createdDate: new Date().toISOString(),
                    totalEntities: entityPermissions.length,
                    totalPermissions: totalPermissions,
                    generatedBy: "Dynamic Permission Builder"
                },
                entities: entityPermissions.map(ep => ({
                    entityId: ep.entityId,
                    entityName: ep.entityName,
                    tableName: ep.tableName,
                    permissions: ep.permissions,
                    permissionCount: Object.values(ep.permissions).filter(Boolean).length
                })),
                summary: {
                    entitiesWithCreate: entityPermissions.filter(ep => ep.permissions.create).length,
                    entitiesWithRead: entityPermissions.filter(ep => ep.permissions.read).length,
                    entitiesWithUpdate: entityPermissions.filter(ep => ep.permissions.update).length,
                    entitiesWithDelete: entityPermissions.filter(ep => ep.permissions.delete).length
                },
                globalPermissions: [],
                additionalSettings: {
                    inheritFromParent: false,
                    allowOverride: true,
                    expirationDate: null
                }
            };

            document.getElementById('permissionJSON').value = JSON.stringify(permissionData, null, 2);
        }

        function loadPermissionFromJSON(jsonString) {
            try {
                const permissionData = JSON.parse(jsonString);
                entityPermissions = [];

                if (permissionData.entities && Array.isArray(permissionData.entities)) {
                    entityPermissions = permissionData.entities.map(entity => ({
                        entityId: entity.entityId,
                        entityName: entity.entityName,
                        tableName: entity.tableName,
                        permissions: entity.permissions || {
                            create: false,
                            read: false,
                            update: false,
                            delete: false
                        }
                    }));
                }

                renderEntityPermissions();
                populateEntitySelector();
                updatePermissionJSON();
            } catch (error) {
                console.error('Failed to load permission from JSON:', error);
            }
        }

        function viewPermissionJSON() {
            const jsonTextarea = document.getElementById('permissionJSON');
            if (!jsonTextarea.value.trim()) {
                alert('No permission data available to view');
                return;
            }

            try {
                const parsedJson = JSON.parse(jsonTextarea.value);
                const formattedJson = JSON.stringify(parsedJson, null, 4);
                
                // Create a modal to display the formatted JSON
                const jsonModal = `
                    <div class="modal fade" id="jsonViewModal" tabindex="-1" aria-hidden="true">
                        <div class="modal-dialog modal-lg">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h5 class="modal-title">Permission JSON Preview</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                </div>
                                <div class="modal-body">
                                    <pre class="bg-light p-3 rounded" style="max-height: 400px; overflow-y: auto;"><code>${formattedJson}</code></pre>
                                </div>
                                <div class="modal-footer">
                                    <button class="btn btn-secondary" onclick="copyJsonToClipboard()">
                                        <i class="fa fa-copy"></i> Copy to Clipboard
                                    </button>
                                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Close</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                // Remove existing modal if any
                const existingModal = document.getElementById('jsonViewModal');
                if (existingModal) {
                    existingModal.remove();
                }

                // Add the modal to body
                document.body.insertAdjacentHTML('beforeend', jsonModal);
                
                // Show the modal
                const modal = new bootstrap.Modal(document.getElementById('jsonViewModal'));
                modal.show();

            } catch (error) {
                alert('Invalid JSON format');
            }
        }

        function copyJsonToClipboard() {
            const jsonTextarea = document.getElementById('permissionJSON');
            navigator.clipboard.writeText(jsonTextarea.value).then(() => {
                alert('JSON copied to clipboard!');
            }).catch(err => {
                console.error('Failed to copy: ', err);
                alert('Failed to copy JSON to clipboard');
            });
        }

        function clearAllPermissions() {
            if (confirm('Are you sure you want to clear all entity permissions? This action cannot be undone.')) {
                entityPermissions = [];
                renderEntityPermissions();
                populateEntitySelector();
                updatePermissionJSON();
            }
        }

    </script>

    <script>

        let grid;
        let permissionsMain = [];
        var columns = [
            { type: 'checkbox', width: 50 },
            { field: 'srno', headerText: 'S.No.', textAlign: 'Right', width: 80 },
            { field: 'name', headerText: 'Permission Name', width: 250 },
            {
                field: 'permissionjson', headerText: 'Permission JSON', width: 400,
                template: '<div class="text-truncate" style="max-width: 380px;" title="${permissionjson}">${permissionjson}</div>'
            },
            { field: 'id', headerText: 'id', width: 130, visible: false },
            { field: 'createdon', headerText: 'Created On', width: 130, type: 'date', format: { type: 'dateTime', format: 'dd/MMM/yyyy hh:mm' }, width: 150, allowPdfExport: false, visible: false },
            { field: 'modifiedon', headerText: 'Modified On', width: 130, type: 'date', format: { type: 'dateTime', format: 'dd/MMM/yyyy hh:mm' }, width: 150, allowPdfExport: false, visible: false },
            { field: 'ownerid', headerText: 'Owner Id', width: 130, visible: false },
        ];

        function initGrid(columns, permissionGrid) {
            ej.grids.Grid.Inject(
                ej.grids.Filter,
                ej.grids.Group,
                ej.grids.Page,
                ej.grids.Sort,
                ej.grids.Toolbar,
                ej.grids.ColumnChooser,
                ej.grids.ExcelExport,
                ej.grids.PdfExport
            );

            grid = new ej.grids.Grid({
                dataSource: [],
                allowPaging: true,
                pageSettings: { pageSize: 10 },
                allowSorting: true,
                allowFiltering: true,
                filterSettings: { type: 'Excel' },
                showColumnChooser: true,
                toolbar: ['ColumnChooser',
                    'Search',
                    {
                        prefixIcon: 'e-icons e-excelexport',
                        tooltipText: 'Export Excel',
                        id: 'excelExport'
                    },
                    {
                        prefixIcon: 'e-icons e-pdfexport',
                        tooltipText: 'Export PDF',
                        id: 'pdfExport'
                    },
                    {
                        prefixIcon: 'e-icons e-refresh',
                        tooltipText: 'Refresh Grid',
                        id: 'refreshGrid'
                    },
                    {
                        text: 'New Permission',
                        tooltipText: 'New Permission',
                        prefixIcon: 'e-icons e-plus',
                        id: 'newPermission'
                    },
                    {
                        text: 'Edit',
                        tooltipText: 'Edit Permission',
                        prefixIcon: 'e-icons e-edit',
                        id: 'editPermission',
                    },
                    {
                        text: 'Delete',
                        tooltipText: 'Delete',
                        prefixIcon: 'e-icons e-delete',
                        id: 'deletePermission'
                    },],

                columns: columns,
                allowExcelExport: true,
                allowPdfExport: true,

                toolbarClick: function (args) {
                    if (args.item.id === permissionGrid + '_excelexport') {
                        grid.excelExport({
                            fileName: `MasterPermissions_${formatDate(new Date())}.xlsx`,
                            exportType: 'AllPages',
                        });
                    }

                    if (args.item.id === 'deletePermission') {
                        deletePermission();
                    }
                    if (args.item.id === permissionGrid + '_pdfexport') {
                        grid.pdfExport({
                            fileName: `MasterPermissions_${formatDate(new Date())}.pdf`,
                            exportType: 'CurrentPage',
                            theme: { header: { fontColor: '#000000' } },
                            pageOrientation: 'Landscape',
                            pageSize: 'LETTER',
                            header: {
                                fromTop: 0,
                                height: 120,
                                contents: [
                                    {
                                        type: 'Text',
                                        value: 'Master Permission Management',
                                        position: { x: 280, y: 0 },
                                        style: {
                                            textBrushColor: '#C25050',
                                            fontSize: 25
                                        },
                                    }
                                ]
                            },
                            footer: {
                                fromBottom: 160,
                                height: 150,
                                contents: [
                                    {
                                        type: 'PageNumber',
                                        pageNumberType: 'Arabic',
                                        format: 'Page {$current} of {$total}',
                                        position: { x: 520, y: 10 },
                                        style: { textBrushColor: '#ffff80', fontSize: 15, hAlign: 'Center' }
                                    }
                                ]
                            }
                        });
                    }

                    if (args.item.id === 'refreshGrid') {
                        loadPermissionGrid();
                    }
                    if (args.item.id === 'newPermission') {
                        openPermissionModal();
                    }

                    if (args.item.id === 'editPermission') {
                        editPermission();
                    }
                }
            });
            grid.appendTo('#' + permissionGrid);
        }

        let editingId = null;

        function editPermission() {
            const selectedRecords = grid.getSelectedRecords();
            if (selectedRecords.length !== 1) {
                return alert("Select one record to edit");
            }
            
            const record = selectedRecords[0];
            editingId = record.id;

            document.getElementById('permissionName').value = record.name;
            document.getElementById('ownerId').value = record.ownerid;

            // Load the permission JSON into the dynamic UI
            if (record.permissionjson) {
                loadPermissionFromJSON(record.permissionjson);
            } else {
                // Clear the UI for new permission
                entityPermissions = [];
                renderEntityPermissions();
                populateEntitySelector();
                updatePermissionJSON();
            }

            document.querySelector('#permissionModal .modal-title').innerText = "Edit Master Permission";
            openPermissionModal();
        }

        async function deletePermission() {
            const selectedRecords = grid.getSelectedRecords();
            if (!selectedRecords.length) {
                return alert("Select record(s) to delete");
            }

            if (!confirm(`Delete ${selectedRecords.length} permission(s)?`)) {
                return;
            }

            try {
                for (const record of selectedRecords) {
                    await deleteRecordData('masterpermission', record.id, false, true);
                }
                loadPermissionGrid();
            } catch (error) {
                console.error('Failed to delete permission(s):', error);
                alert('Failed to delete permission(s)');
            }
        }

        function openPermissionModal() {
            // Reset form if it's a new permission (not editing)
            if (!editingId) {
                document.getElementById('permissionName').value = '';
                document.getElementById('ownerId').value = '';
                entityPermissions = [];
                renderEntityPermissions();
                populateEntitySelector();
                updatePermissionJSON();
                document.querySelector('#permissionModal .modal-title').innerText = "Add Master Permission";
            }

            const modal = new bootstrap.Modal(
                document.getElementById('permissionModal'),
                { backdrop: 'static', keyboard: false, focus: false }
            );
            modal.show();

            // Enable ripple effect like in entityColumns
            ej.base.enableRipple(true);
        }

        async function loadPermissionGrid() {

            const filter = '';
            const joinCondition = "";
            try {

                const permissions = await DBHandler.fetchEntityRecords(
                    'masterpermission',
                    'masterpermission.*',
                    'masterpermission.createdon',
                    'desc',
                    filter, true,
                    0,
                    joinCondition
                );

                permissionsMain = permissions || [];

                let serialNumber = 1;

                const rows = permissionsMain.map(a => ({
                    id: a.id,
                    srno: serialNumber++,
                    name: a.name,
                    permissionjson: a.permissionjson,
                    createdon: normalizeDate(a.createdon),
                    modifiedon: normalizeDate(a.modifiedon),
                    ownerid: a.ownerid,
                }));

                grid.dataSource = rows;
                grid.refresh();

            } catch (err) {
                console.error('Failed to load permissions:', err);
            }
        }

        function normalizeDate(val) {
            if (!val) return null;
            const d = val instanceof Date ? val : new Date(val);
            return isNaN(d) ? null : d;
        }

        $(document).ready(async () => {
            initGrid(columns, 'permissionGrid');
            loadPermissionGrid();

            // Handle modal focus issue like in entityColumns
            $('#permissionModal').on('shown.bs.modal', function () {
                $(document).off('focusin.modal');
            });
        });


        async function savePermission() {
            const btn = event.target;
            const permissionName = document.getElementById('permissionName').value.trim();
            const permissionJSON = document.getElementById('permissionJSON').value.trim();
            const ownerId = document.getElementById('ownerId').value;

            // Validation
            if (!permissionName) return alert("Please enter permission name");
            if (!ownerId) return alert("Please select Owner");
            
            // Check if at least one entity is configured
            if (entityPermissions.length === 0) {
                return alert("Please add at least one entity with permissions");
            }

            // Check if at least one permission is selected for each entity
            const hasValidPermissions = entityPermissions.some(ep => 
                ep.permissions.create || ep.permissions.read || ep.permissions.update || ep.permissions.delete
            );

            if (!hasValidPermissions) {
                return alert("Please select at least one permission (Create, Read, Update, or Delete) for the added entities");
            }

            // Validate JSON format
            try {
                JSON.parse(permissionJSON);
            } catch (error) {
                return alert("Invalid JSON format in permission data. Please check the syntax.");
            }

            try {
                if (btn) {
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Saving...';
                }

                await DBHandler.submitRecordData('masterpermission', {
                    name: permissionName,
                    permissionjson: permissionJSON,
                    ownerid: ownerId,
                }, editingId, false);

                await loadPermissionGrid();

                bootstrap.Modal.getInstance(
                    document.getElementById('permissionModal')
                ).hide();

                editingId = null;

                // Reset form
                document.getElementById('permissionName').value = '';
                document.getElementById('ownerId').value = '';
                entityPermissions = [];
                renderEntityPermissions();
                populateEntitySelector();
                updatePermissionJSON();

            } catch (err) {
                console.error('Failed to save permission:', err);
                alert("Failed to save Permission");
            } finally {
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa fa-save"></i> Save Permission';
                }
            }
        }

    </script>
