<body>
	<div class="container2 mt-4">
		<div id="allocationGrid"></div>
	</div>

	<div class="modal fade" id="allocationModal" tabindex="-1">
		<div class="modal-dialog modal-lg modal-dialog-centered">
			<div class="modal-content">

				<div class="modal-header">
					<h5 class="modal-title">Add Allocation</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
				</div>

				<div class="modal-body">
					<form id="allocationForm">
						<div class="row">
							<div class="col-md-6">
								<label>User</label>
								<input type="text" id="userid" class="form-control" required />
							</div>
							<div class="col-md-6">
								<label>Package</label>
								<input type="text" id="packageid" class="form-control" required />
							</div>
						</div>

						<div class="row mt-3">
							<div class="col-md-6">
								<label>Allocation Date</label>
								<input type="text" id="allocationdate" class="form-control" />
							</div>
							<div class="col-md-6">
								<label>Status</label>
								<input type="text" id="status" class="form-control" required />
							</div>
						</div>

						<div class="row mt-3">
							<div class="col-md-12">
								<label>Remarks</label>
								<textarea id="remarks" class="form-control" rows="3"></textarea>
							</div>
						</div>
					</form>
				</div>

				<div class="modal-footer">
					<button class="btn btn-primary" onclick="saveAllocation()">Save</button>
					<button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
				</div>

			</div>
		</div>
	</div>

	<script>
		let allocationGrid;
		let editingAllocationId = null;
		let userDropdown;
		let packageDropdown;
		let statusDropdown;
		let allocationDatePicker;

		let usersData = [];
		let packagesData = [];

		function initAllocationGrid() {
			ej.grids.Grid.Inject(
				ej.grids.Page,
				ej.grids.Sort,
				ej.grids.Filter,
				ej.grids.Toolbar,
				ej.grids.ExcelExport,
				ej.grids.PdfExport
			);

			allocationGrid = new ej.grids.Grid({
				dataSource: [],
				allowPaging: true,
				allowSorting: true,
				allowFiltering: true,
				filterSettings: { type: 'Excel' },
				toolbar: [
					'Search',
					{ text: 'New Allocation', prefixIcon: 'e-icons e-plus', id: 'newAllocation' },
					{ text: 'Edit', prefixIcon: 'e-icons e-edit', id: 'editAllocation' },
					{ text: 'Delete', prefixIcon: 'e-icons e-delete', id: 'deleteAllocation' },
					'ExcelExport',
					'PdfExport'
				],
				columns: [
					{ type: 'checkbox', width: 50 },
					{ field: 'username', headerText: 'User', width: 220 },
					{ field: 'packagename', headerText: 'Package', width: 220 },
					{ field: 'allocationdate', headerText: 'Allocation Date', type: 'date', format: 'dd/MMM/yyyy', width: 160 },
					{ field: 'status', headerText: 'Status', width: 140 },
					{ field: 'remarks', headerText: 'Remarks', width: 260 },
					{ field: 'createdon', headerText: 'Created On', type: 'date', format: 'dd/MMM/yyyy hh:mm', width: 180 },
					{ field: 'userid', visible: false },
					{ field: 'packageid', visible: false },
					{ field: 'id', visible: false }
				],
				toolbarClick: async function (args) {
					if (args.item.id === 'newAllocation') {
						editingAllocationId = null;
						openAllocationModal();
					}

					if (args.item.id === 'editAllocation') {
						const selected = allocationGrid.getSelectedRecords();
						if (selected.length !== 1) return alert('Select one record');

						editingAllocationId = selected[0].id;
						openAllocationModal(selected[0]);
					}

					if (args.item.id === 'deleteAllocation') {
						const selected = allocationGrid.getSelectedRecords();
						if (!selected.length) return alert('Select record(s)');

						const ids = selected.map(row => row.id);
						await deleteRecordData('allocation', ids, true, true);
						loadAllocations();
					}
				}
			});

			allocationGrid.appendTo('#allocationGrid');
		}

		async function loadMasterData() {
			const [users, packages] = await Promise.all([
				DBHandler.fetchEntityRecords('users', 'id, username, displayname', 'displayname', 'asc'),
				DBHandler.fetchEntityRecords('userpackage', 'id, packagename, code', 'packagename', 'asc')
			]);

			usersData = users || [];
			packagesData = packages || [];
		}

		function destroyControl(selector) {
			const element = document.querySelector(selector);
			if (element && element.ej2_instances && element.ej2_instances.length) {
				element.ej2_instances[0].destroy();
			}
		}

		function initFormControls() {
			destroyControl('#userid');
			destroyControl('#packageid');
			destroyControl('#status');
			destroyControl('#allocationdate');

			userDropdown = new ej.dropdowns.DropDownList({
				dataSource: usersData,
				fields: { text: 'displayname', value: 'id' },
				placeholder: 'Select User',
				allowFiltering: true,
				filterBarPlaceholder: 'Search user...'
			});
			userDropdown.appendTo('#userid');

			packageDropdown = new ej.dropdowns.DropDownList({
				dataSource: packagesData,
				fields: { text: 'packagename', value: 'id' },
				placeholder: 'Select Package',
				allowFiltering: true,
				filterBarPlaceholder: 'Search package...'
			});
			packageDropdown.appendTo('#packageid');

			statusDropdown = new ej.dropdowns.DropDownList({
				dataSource: ['Active', 'Pending', 'Closed'],
				placeholder: 'Select Status'
			});
			statusDropdown.appendTo('#status');

			allocationDatePicker = new ej.calendars.DatePicker({
				format: 'dd-MMM-yyyy',
				value: new Date()
			});
			allocationDatePicker.appendTo('#allocationdate');
		}

		function openAllocationModal(record = null) {
			document.getElementById('allocationForm').reset();
			initFormControls();

			if (record) {
				document.querySelector('#allocationModal .modal-title').innerText = 'Edit Allocation';
				userDropdown.value = record.userid || null;
				packageDropdown.value = record.packageid || null;
				statusDropdown.value = record.status || null;
				allocationDatePicker.value = record.allocationdate ? new Date(record.allocationdate) : new Date();
				document.getElementById('remarks').value = record.remarks || '';
			} else {
				document.querySelector('#allocationModal .modal-title').innerText = 'Add Allocation';
				document.getElementById('remarks').value = '';
			}

			new bootstrap.Modal(allocationModal).show();
		}

		async function loadAllocations() {
			const data = await DBHandler.fetchEntityRecords(
				'allocation',
				'*',
				'createdon',
				'desc'
			);

			allocationGrid.dataSource = (data || []).map(row => {
				const user = usersData.find(item => item.id == row.userid);
				const pkg = packagesData.find(item => item.id == row.packageid);

				return {
					...row,
					username: user ? (user.displayname || user.username) : '',
					packagename: pkg ? pkg.packagename : '',
					allocationdate: row.allocationdate ? new Date(row.allocationdate) : null,
					createdon: row.createdon ? new Date(row.createdon) : null
				};
			});
		}

		async function saveAllocation() {
			const userid = userDropdown ? userDropdown.value : null;
			const packageid = packageDropdown ? packageDropdown.value : null;
			const status = statusDropdown ? statusDropdown.value : null;
			const allocationdate = allocationDatePicker && allocationDatePicker.value
				? dayjs(allocationDatePicker.value).format('YYYY-MM-DD')
				: null;
			const remarks = document.getElementById('remarks').value.trim();

			if (!userid || !packageid || !status) return alert('All fields required');

			await DBHandler.submitRecordData('allocation', {
				userid,
				packageid,
				allocationdate,
				status,
				remarks
			}, editingAllocationId, false);

			bootstrap.Modal.getInstance(allocationModal).hide();
			loadAllocations();
		}

		$(document).ready(async () => {
			initAllocationGrid();
			await loadMasterData();
			await loadAllocations();
		});
	</script>

	<style>
		#allocationGrid_toolbarItems {
			height: 10px !important;
		}
	</style>

</body>

</html>
