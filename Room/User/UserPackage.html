    <!-- Selectors + Inner Grids -->
    <script>
        let statusDropdown = null, habitSelectorDropdown = null, assessmentSelectorDropdown = null;
        let habitInnerGrid = null, assessmentInnerGrid = null;
        let availableHabits = [], availableAssessments = [], selectedHabits = [], selectedAssessments = [];

        $(document).ready(function () {
            statusDropdown = new ej.dropdowns.DropDownList({
                dataSource: [{ text: 'Active', value: 'active' }, { text: 'Inactive', value: 'inactive' }, { text: 'Draft', value: 'draft' }],
                fields: { text: 'text', value: 'value' }, placeholder: 'Select Status', allowFiltering: false
            });
            statusDropdown.appendTo('#packageStatus');
            loadHabitsAndAssessments();
        });

        // async function loadHabitsAndAssessments() {
        //     try {
        //         const habits = await DBHandler.fetchEntityRecords(
        //             'habitmaster', '*', 'habitname', 'asc', '', true, 0, ''
        //         );

        //         const assessments = await DBHandler.fetchEntityRecords(
        //             'assessmentmaster1', '*', 'assessmentname', 'asc', '', true, 0, ''
        //         );

        //         availableHabits = habits || [];
        //         availableAssessments = assessments || [];

        //     } catch (err) {
        //         console.error("Error fetching data:", err);
        //         availableHabits = [];
        //         availableAssessments = [];
        //     }
        // }
        function populateHabitSelector() {
            if (habitSelectorDropdown) habitSelectorDropdown.destroy();

            habitSelectorDropdown = new ej.dropdowns.MultiSelect({
                dataSource: [...availableHabits], // 🔥 IMPORTANT
                fields: { text: 'habitname', value: 'id' },
                placeholder: 'Select Habits...',
                allowFiltering: true,
                mode: 'CheckBox',
                showSelectAll: true,
                popupHeight: '250px',
                width: '100%'
            });

            habitSelectorDropdown.appendTo('#habitSelector');
        }

        function addHabit() {
            if (!habitSelectorDropdown?.value?.length) { alert('Please select at least one habit first'); return; }
            let added = 0, skipped = 0;
            habitSelectorDropdown.value.forEach(id => {
                const h = availableHabits.find(x => x.id === id);
                if (!h) return;
                if (selectedHabits.find(s => s.id === id)) { skipped++; return; }
                selectedHabits.push({ ...h }); added++;
            });
            if (added > 0) {
                alert(`Successfully added ${added} habit${added > 1 ? 's' : ''}${skipped > 0 ? ` (${skipped} already existed)` : ''}`);
                renderHabitGrid(); populateHabitSelector(); updatePackageJSON();
            } else if (skipped > 0) alert('All selected habits are already added');
        }

        function selectAllAvailableHabits() {
            if (!habitSelectorDropdown) return;
            const ids = availableHabits.filter(h => !selectedHabits.find(s => s.id === h.id)).map(h => h.id);
            if (!ids.length) { alert('No more habits available to select'); return; }
            habitSelectorDropdown.value = ids;
            alert(`Selected ${ids.length} available habit${ids.length > 1 ? 's' : ''}`);
        }

        function renderHabitGrid() {
            const c = document.getElementById('habitGridContainer');
            if (habitInnerGrid) { habitInnerGrid.destroy(); habitInnerGrid = null; }
            if (!selectedHabits.length) {
                c.innerHTML = '<div class="alert alert-info text-center mb-0"><i class="fa fa-info-circle"></i> No habits selected yet. Add habits to configure.</div>';
                return;
            }
            c.innerHTML = '<div id="habitInnerGrid"></div>';
            ej.grids.Grid.Inject(ej.grids.Page, ej.grids.Sort, ej.grids.Filter, ej.grids.Toolbar);
            habitInnerGrid = new ej.grids.Grid({
                dataSource: selectedHabits.map((h, i) => ({ ...h, _idx: i })),
                allowPaging: selectedHabits.length > 5, pageSettings: { pageSize: 5 },
                allowSorting: true, allowFiltering: true, filterSettings: { type: 'Excel' },
                toolbar: [{ template: `<span class="ms-2 fw-semibold" style="line-height:2.2rem;">Configured Habits <span class="entity-count-badge">${selectedHabits.length}</span></span>` }],
                columns: [
                    { field: 'habitname', headerText: 'Habit Name', width: 170 },
                    { field: 'habittype', headerText: 'Type', width: 120 },
                    { field: 'frequency', headerText: 'Frequency', width: 120 },
                    { field: 'frequencynumber', headerText: 'Freq. No.', width: 100 },
                    { field: 'options', headerText: 'Options', width: 110 },
                    { field: 'code', headerText: 'Code', width: 90 },
                    { field: 'order', headerText: 'Order', width: 80, textAlign: 'Right' },
                    {
                        headerText: 'Action', width: 90, textAlign: 'Center',
                        template: '<button class="btn btn-danger btn-sm" onclick="removeHabit(\'${_idx}\')" title="Remove"><i class="fa fa-trash"></i></button>'
                    }
                ]
            });
            habitInnerGrid.appendTo('#habitInnerGrid');
        }

        function removeHabit(idx) {
            if (confirm('Are you sure you want to remove this habit?')) {
                selectedHabits.splice(parseInt(idx), 1);
                renderHabitGrid(); populateHabitSelector(); updatePackageJSON();
            }
        }

        function clearAllHabits() {
            if (!selectedHabits.length) { alert('No habits configured to clear'); return; }
            if (confirm(`Clear all ${selectedHabits.length} habit(s)?`)) {
                selectedHabits = []; renderHabitGrid(); populateHabitSelector(); updatePackageJSON();
            }
        }

        function populateAssessmentSelector() {
            if (assessmentSelectorDropdown) assessmentSelectorDropdown.destroy();

            assessmentSelectorDropdown = new ej.dropdowns.MultiSelect({
                dataSource: [...availableAssessments], // 🔥 IMPORTANT
                fields: { text: 'assessmentname', value: 'id' },
                placeholder: 'Select Assessments...',
                allowFiltering: true,
                mode: 'CheckBox',
                showSelectAll: true,
                popupHeight: '250px',
                width: '100%'
            });

            assessmentSelectorDropdown.appendTo('#assessmentSelector');
        }

        function addAssessment() {
            if (!assessmentSelectorDropdown?.value?.length) { alert('Please select at least one assessment first'); return; }
            let added = 0, skipped = 0;
            assessmentSelectorDropdown.value.forEach(id => {
                const a = availableAssessments.find(x => x.id === id);
                if (!a) return;
                if (selectedAssessments.find(s => s.id === id)) { skipped++; return; }
                selectedAssessments.push({ ...a }); added++;
            });
            if (added > 0) {
                alert(`Successfully added ${added} assessment${added > 1 ? 's' : ''}${skipped > 0 ? ` (${skipped} already existed)` : ''}`);
                renderAssessmentGrid(); populateAssessmentSelector(); updatePackageJSON();
            } else if (skipped > 0) alert('All selected assessments are already added');
        }

        function selectAllAvailableAssessments() {
            if (!assessmentSelectorDropdown) return;
            const ids = availableAssessments.filter(a => !selectedAssessments.find(s => s.id === a.id)).map(a => a.id);
            if (!ids.length) { alert('No more assessments available to select'); return; }
            assessmentSelectorDropdown.value = ids;
            alert(`Selected ${ids.length} available assessment${ids.length > 1 ? 's' : ''}`);
        }

        function renderAssessmentGrid() {
            const c = document.getElementById('assessmentGridContainer');
            if (assessmentInnerGrid) { assessmentInnerGrid.destroy(); assessmentInnerGrid = null; }
            if (!selectedAssessments.length) {
                c.innerHTML = '<div class="alert alert-info text-center mb-0"><i class="fa fa-info-circle"></i> No assessments selected yet. Add assessments to configure.</div>';

            c.innerHTML = '<div id="assessmentInnerGrid"></div>';

            assessmentInnerGrid = new ej.grids.Grid({
                dataSource: selectedAssessments.map((a, i) => ({ ...a, _idx: i })),
                allowPaging: selectedAssessments.length > 5, pageSettings: { pageSize: 5 },
                allowSorting: true, allowFiltering: true, filterSettings: { type: 'Excel' },
                toolbar: [{ template: `<span class="ms-2 fw-semibold" style="line-height:2.2rem;">Configured Assessments <span class="entity-count-badge">${selectedAssessments.length}</span></span>` }],
                columns: [
                    { field: 'assessmentname', headerText: 'Assessment Name', width: 170 },
                    { field: 'assessmenttype', headerText: 'Type', width: 120 },
                    { field: 'maxscore', headerText: 'Max Score', width: 100, textAlign: 'Right' },
                    { field: 'passingscore', headerText: 'Pass Score', width: 100, textAlign: 'Right' },
                    { field: 'code', headerText: 'Code', width: 90 },
                    { field: 'status', headerText: 'Status', width: 100 },
                    {
                        headerText: 'Action', width: 90, textAlign: 'Center',
                        template: '<button class="btn btn-danger btn-sm" onclick="removeAssessment(\'${_idx}\')" title="Remove"><i class="fa fa-trash"></i></button>'
                    }
                ]
            });
            assessmentInnerGrid.appendTo('#assessmentInnerGrid');
        }

        function removeAssessment(idx) {
            if (confirm('Are you sure you want to remove this assessment?')) {
                selectedAssessments.splice(parseInt(idx), 1);
                renderAssessmentGrid(); populateAssessmentSelector(); updatePackageJSON();
            }
        }

        function clearAllAssessments() {
            if (!selectedAssessments.length) { alert('No assessments configured to clear'); return; }
            if (confirm(`Clear all ${selectedAssessments.length} assessment(s)?`)) {
                selectedAssessments = []; renderAssessmentGrid(); populateAssessmentSelector(); updatePackageJSON();
            }
        }

        function updatePackageJSON() {
            document.getElementById('packageJSON').value = JSON.stringify({
                habits: selectedHabits.map(h => ({ id: h.id, habitname: h.habitname, habittype: h.habittype, options: h.options, code: h.code, order: h.order, frequency: h.frequency, frequencynumber: h.frequencynumber })),
                assessments: selectedAssessments.map(a => ({ id: a.id, assessmentname: a.assessmentname, assessmenttype: a.assessmenttype, description: a.description, maxscore: a.maxscore, passingscore: a.passingscore, code: a.code, status: a.status }))
            }, null, 2);
        }

        function loadPackageFromJSON(str) {
            try {
                const d = JSON.parse(str);
                selectedHabits = Array.isArray(d.habits) ? d.habits : [];
                selectedAssessments = Array.isArray(d.assessments) ? d.assessments : [];
                renderHabitGrid(); renderAssessmentGrid();
                populateHabitSelector(); populateAssessmentSelector();
                updatePackageJSON();
            } catch (e) { console.error(e); alert('Invalid JSON format.'); }
        }

        function viewPackageJSON() {
            const v = document.getElementById('packageJSON').value.trim();
            if (!v) { alert('No package data to view'); return; }
            try {
                const f = JSON.stringify(JSON.parse(v), null, 4);
                const ex = document.getElementById('jsonViewModal'); if (ex) ex.remove();
                document.body.insertAdjacentHTML('beforeend', `
                <div class="modal fade" id="jsonViewModal" tabindex="-1" aria-hidden="true">
                    <div class="modal-dialog modal-lg modal-dialog-centered">
                        <div class="modal-content">
                            <div class="modal-header"><h5 class="modal-title">Package JSON Preview</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                            <div class="modal-body">
                                <pre class="bg-light p-3 rounded" style="max-height:420px;overflow-y:auto;font-size:0.8rem;"><code>${f}</code></pre>
                            </div>
                            <div class="modal-footer">
                                <button class="btn btn-secondary btn-sm" onclick="copyPackageJsonToClipboard()"><i class="fa fa-copy"></i> Copy</button>
                                <button type="button" class="btn btn-primary btn-sm" data-bs-dismiss="modal">Close</button>
                            </div>
                        </div>
                    </div>
                </div>`);
                new bootstrap.Modal(document.getElementById('jsonViewModal')).show();
            } catch { alert('Invalid JSON format'); }
        }

        function copyPackageJsonToClipboard() {
            navigator.clipboard.writeText(document.getElementById('packageJSON').value)
                .then(() => alert('JSON copied to clipboard!')).catch(() => alert('Failed to copy'));
        }

        function clearAllPackageItems() {
            if (confirm('Clear all selected habits and assessments? This action cannot be undone.')) {
                selectedHabits = []; selectedAssessments = [];
                renderHabitGrid(); renderAssessmentGrid();
                populateHabitSelector(); populateAssessmentSelector();
                updatePackageJSON();
            }
        }
    </script>

    <!-- Main Grid + CRUD -->
    <script>
        let grid, packagesMain = [], editingPackageId = null;

        const columns = [
            { type: 'checkbox', width: 50 },
            { field: 'srno', headerText: 'S.No.', textAlign: 'Right', width: 80 },
            { field: 'packagename', headerText: 'Package Name', width: 250 },
            { field: 'code', headerText: 'Code', width: 130 },
            { field: 'status', headerText: 'Status', width: 120 },
            { field: 'modifiedon', headerText: 'Modified On', width: 160, type: 'date', format: { type: 'dateTime', format: 'dd/MMM/yyyy hh:mm' } },
            { field: 'id', headerText: 'id', width: 130, visible: false },
            { field: 'createdon', headerText: 'Created On', width: 150, type: 'date', format: { type: 'dateTime', format: 'dd/MMM/yyyy hh:mm' }, visible: false },
            { field: 'description', headerText: 'Description', width: 200, visible: false },
        ];

        function initGrid(cols, gid) {
            ej.grids.Grid.Inject(
                ej.grids.Filter,
                ej.grids.Group,
                ej.grids.Page,
                ej.grids.Sort,
                ej.grids.Toolbar,
                ej.grids.ColumnChooser,
                ej.grids.ExcelExport,
                ej.grids.PdfExport
            );
            grid = new ej.grids.Grid({
                dataSource: [],
                allowPaging: true,
                pageSettings: { pageSize: 10 },
                allowSorting: true,
                allowFiltering: true,
                filterSettings: { type: 'Excel' },
                showColumnChooser: true,
                toolbar: ['ColumnChooser', 'Search',
                    { prefixIcon: 'e-icons e-excelexport', tooltipText: 'Export Excel', id: 'excelExport' },
                    { prefixIcon: 'e-icons e-pdfexport', tooltipText: 'Export PDF', id: 'pdfExport' },
                    { prefixIcon: 'e-icons e-refresh', tooltipText: 'Refresh Grid', id: 'refreshGrid' },
                    { text: 'New Package', tooltipText: 'New Package', prefixIcon: 'e-icons e-plus', id: 'newPackage' },
                    { text: 'Edit', tooltipText: 'Edit Package', prefixIcon: 'e-icons e-edit', id: 'editPackage' },
                    { text: 'Delete', tooltipText: 'Delete', prefixIcon: 'e-icons e-delete', id: 'deletePackage' },
                ],
                columns: cols, allowExcelExport: true, allowPdfExport: true,
                toolbarClick: function (args) {
                    if (args.item.id === gid + '_excelexport') grid.excelExport({ fileName: `UserPackages_${formatDate(new Date())}.xlsx`, exportType: 'AllPages' });
                    if (args.item.id === gid + '_pdfexport') grid.pdfExport({
                        fileName: `UserPackages_${formatDate(new Date())}.pdf`, exportType: 'CurrentPage',
                        theme: { header: { fontColor: '#000000' } }, pageOrientation: 'Landscape', pageSize: 'LETTER',
                        header: { fromTop: 0, height: 120, contents: [{ type: 'Text', value: 'User Package Management', position: { x: 280, y: 0 }, style: { textBrushColor: '#C25050', fontSize: 25 } }] },
                        footer: { fromBottom: 160, height: 150, contents: [{ type: 'PageNumber', pageNumberType: 'Arabic', format: 'Page {$current} of {$total}', position: { x: 520, y: 10 }, style: { textBrushColor: '#ffff80', fontSize: 15, hAlign: 'Center' } }] }
                    });
                    if (args.item.id === 'refreshGrid')
                        loadUserPackageGrid();
                    if (args.item.id === 'newPackage')
                        openPackageModal();
                    if (args.item.id === 'editPackage')
                        editUserPackage();
                    if (args.item.id === 'deletePackage')
                        deleteUserPackage();
                }
            });
            grid.appendTo('#' + gid);
        }

        async function editUserPackage() {
            const sel = grid.getSelectedRecords();
            if (sel.length !== 1) return alert('Select one record to edit');
            const rec = sel[0]; editingPackageId = rec.id;
            document.getElementById('packageName').value = rec.packagename || '';
            document.getElementById('packageCode').value = rec.code || '';
            document.getElementById('packageDescription').value = rec.description || '';
            if (statusDropdown) statusDropdown.value = rec.status || null;
            selectedHabits = []; selectedAssessments = [];
            renderHabitGrid(); renderAssessmentGrid();
            populateHabitSelector(); populateAssessmentSelector();
            document.getElementById('packageJSON').value = 'Loading...';
            document.querySelector('#userPackageModal .modal-title').innerText = 'Edit User Package';
            openPackageModal();
            try {
                const full = await DBHandler.fetchEntityRecords('userpackage', '*', 'id', 'desc', `id='${editingPackageId}'`, false, 1);
                if (!full?.length) {
                    document.getElementById('packageJSON').value = '';
                    return alert('Unable to load full package record.');
                }
                const d = full[0];
                if (d.habitid2) loadPackageFromJSON(d.habitid2);
                else updatePackageJSON();
            } catch (err) {
                console.error(err); document.getElementById('packageJSON').value = ''; alert('Error fetching package data.');
            }
        }

        async function deleteUserPackage() {
            const sel = grid.getSelectedRecords();
            if (!sel.length) return alert('Select record(s) to delete');
            if (!confirm(`Delete ${sel.length} package(s)?`)) return;
            await deleteRecordData('userpackage', sel.map(r => r.id));
            loadUserPackageGrid();
        }

        function openPackageModal() {
            if (!editingPackageId) {
                document.getElementById('packageName').value = '';
                document.getElementById('packageCode').value = '';
                document.getElementById('packageDescription').value = '';
                if (statusDropdown) statusDropdown.value = null;
                selectedHabits = []; selectedAssessments = [];
                renderHabitGrid();
                renderAssessmentGrid();
                populateHabitSelector();
                populateAssessmentSelector();
                updatePackageJSON();
                document.querySelector('#userPackageModal .modal-title').innerText = 'Add User Package';
            }
            const m = new bootstrap.Modal(document.getElementById('userPackageModal'),
                { backdrop: 'static', keyboard: false, focus: false });
            m.show();
            ej.base.enableRipple(true);
        }

        async function loadUserPackageGrid() {
            try {
                const pkgs = await DBHandler.fetchEntityRecords('userpackage', '*', 'userpackage.modifiedon', 'desc', '', true, 0, '');
                packagesMain = pkgs || []; let srno = 1;
                grid.dataSource = packagesMain.map(p => ({
                    id: p.id, srno: srno++, packagename: p.packagename, code: p.code,
                    status: p.status, description: p.description,
                    createdon: normalizeDate(p.createdon), modifiedon: normalizeDate(p.modifiedon)
                }));
                grid.refresh();
            } catch (err) {
                console.error('Failed to load packages:', err);
            }
        }

        function normalizeDate(val) {
            if (!val) return null;
            const d = val instanceof Date ? val : new Date(val);
            return isNaN(d) ? null : d;
        }

        $(document).ready(async () => {
            initGrid(columns, 'userPackageGrid');
            loadUserPackageGrid();

            $('#userPackageModal').on('shown.bs.modal', function () {
                $(document).off('focusin.modal');

                // ✅ ADD THIS HERE
                populateHabitSelector();
                populateAssessmentSelector();
            });

            $('#userPackageModal').on('hidden.bs.modal', function () {
                editingPackageId = null;
            });
        });

        async function saveUserPackage() {
            const btn = event.target;
            const packageName = document.getElementById('packageName').value.trim();
            const packageCode = document.getElementById('packageCode').value.trim();
            const packageDescription = document.getElementById('packageDescription').value.trim();
            const packageStatus = statusDropdown ? statusDropdown.value : '';
            const packageJSON = document.getElementById('packageJSON').value.trim();

            if (!packageName) return alert('Please enter package name');
            if (!packageCode) return alert('Please enter package code');
            if (!packageStatus) return alert('Please select a status');
            if (!selectedHabits.length && !selectedAssessments.length) return alert('Please add at least one habit or assessment');

            try { JSON.parse(packageJSON); } catch { return alert('Invalid JSON format in package data.'); }

            try {
                if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Saving...'; }
                await DBHandler.submitRecordData('userpackage', {
                    packagename: packageName, code: packageCode, description: packageDescription,
                    status: packageStatus, habitid2: packageJSON, assessmentid2: packageJSON
                }, editingPackageId, false);
                await loadUserPackageGrid();
                bootstrap.Modal.getInstance(document.getElementById('userPackageModal')).hide();
                editingPackageId = null;
                document.getElementById('packageName').value = '';
                document.getElementById('packageCode').value = '';
                document.getElementById('packageDescription').value = '';
                if (statusDropdown) statusDropdown.value = null;
                selectedHabits = []; selectedAssessments = [];
                renderHabitGrid();
                renderAssessmentGrid();
                populateHabitSelector();
                populateAssessmentSelector();
                updatePackageJSON();
            } catch (err) {
                console.error(err); alert('Failed to save User Package');
            }
            finally {
                if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fa fa-floppy-disk"></i> Save Package'; }
            }
        }
    </script>

</body>

</html>
