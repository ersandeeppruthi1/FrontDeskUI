<div class="container mt-4">
    <div class="card p-4">
        <h4 class="mb-4">Daily Health Tracker</h4>

        <form id="dynamicForm"></form>

        <button class="btn btn-primary mt-3" onclick="submitAnswers()">Submit</button>
    </div>
</div>

<!-- Syncfusion JS -->
<script src="https://cdn.syncfusion.com/ej2/25.1.35/dist/ej2.min.js"></script>

<script>
    // 🔥 SAMPLE DATA (Replace with API response)
    const questions = [
        {
            itemtype: "habit",
            itemid: 1,
            question: "Bed Time",
            type: "time"
        },
        {
            itemtype: "habit",
            itemid: 2,
            question: "Wake Up Time",
            type: "time"
        },
        {
            itemtype: "habit",
            itemid: 3,
            question: "Steps Walked Today",
            type: "number",
            max: 5000
        },
        {
            itemtype: "assessment",
            itemid: 4,
            question: "Did you check your BP?",
            type: "boolean"
        },
        {
            itemtype: "assessment",
            itemid: 5,
            question: "Did you eat junk food today?",
            type: "boolean"
        }
    ];

    let answers = {};

    function renderQuestions() {
        const form = document.getElementById("dynamicForm");

        questions.forEach((q, index) => {
            const div = document.createElement("div");
            div.className = "question-block";

            const label = document.createElement("label");
            label.className = "question-label";
            label.innerText = q.question;

            const inputDiv = document.createElement("div");
            inputDiv.id = "input_" + index;

            div.appendChild(label);
            div.appendChild(inputDiv);
            form.appendChild(div);

            // 🔥 RENDER BASED ON TYPE
            if (q.type === "time") {
                new ej.calendars.TimePicker({
                    placeholder: "Select time",
                    change: (args) => {
                        answers[index] = args.value;
                    }
                }).appendTo("#input_" + index);
            }

            else if (q.type === "number") {
                new ej.inputs.NumericTextBox({
                    placeholder: "Enter value",
                    min: 0,
                    max: q.max || 10000,
                    change: (args) => {
                        if (q.max && args.value > q.max) {
                            alert("Max allowed is " + q.max);
                            return;
                        }
                        answers[index] = args.value;
                    }
                }).appendTo("#input_" + index);
            }

            else if (q.type === "boolean") {
                new ej.buttons.Switch({
                    change: (args) => {
                        answers[index] = args.checked ? "Yes" : "No";
                    }
                }).appendTo("#input_" + index);
            }

            else {
                new ej.inputs.TextBox({
                    placeholder: "Enter text",
                    change: (args) => {
                        answers[index] = args.value;
                    }
                }).appendTo("#input_" + index);
            }
        });
    }

    function submitAnswers() {
        let payload = [];

        questions.forEach((q, index) => {
            payload.push({
                itemtype: q.itemtype,
                itemid: q.itemid,
                answer: answers[index] || null
            });
        });

        console.log("Final Payload:", payload);

        // 🔥 API CALL HERE
        /*
        fetch('/saveAnswers', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        */

        alert("Answers submitted successfully!");
    }

    renderQuestions();
</script>
