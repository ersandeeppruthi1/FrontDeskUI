<body>
    <div class="container2 mt-4">
        <div id="businessUnitGrid"></div>
    </div>

    <div class="modal fade" id="businessUnitModal" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Add Business Unit</h5>
                    <button type="button" class="close" data-bs-dismiss="modal">
                        <span>&times;</span>
                    </button>
                </div>

                <div class="modal-body">
                    <form id="businessUnitForm">

                        <div class="row">
                            <div class="col-md-12">
                                <label>Business Unit Name <span class="text-danger">*</span></label>
                                <input type="text" id="bu_name" class="form-control" required
                                    onfocusout="validateBusinessUnitName()" />
                                <div id="buNameMessage" class="mt-1" style="font-size: 12px;"></div>
                            </div>

                            <div class="col-md-12 mt-3">
                                <label>Owner</label>
                                <input type="text" id="bu_users" class="form-control" />
                            </div>

                            <div class="col-md-12 mt-3">
                                <label>Description</label>
                                <textarea id="bu_description" class="form-control" rows="4"></textarea>
                            </div>
                        </div>

                    </form>
                </div>

                <div class="modal-footer">
                    <button id="saveBusinessUnitBtn" class="btn btn-primary" onclick="saveBusinessUnit()"
                        disabled>Save</button>
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>

            </div>
        </div>
    </div>

    <script>

        let businessUnitGrid;
        let editingBusinessUnitId = null;
        let usersData = [];
        let userDropdown;

        async function initBusinessUnitGrid() {
            ej.grids.Grid.Inject(
                ej.grids.Page,
                ej.grids.Sort,
                ej.grids.Filter,
                ej.grids.Toolbar,
                ej.grids.ExcelExport,
                ej.grids.PdfExport,
                ej.grids.ColumnChooser
            );

            businessUnitGrid = new ej.grids.Grid({
                dataSource: [],
                allowPaging: true,
                allowSorting: true,
                allowFiltering: true,
                filterSettings: { type: 'Excel' },
                showColumnChooser: true,

                toolbar: [
                    'Search',
                    'ColumnChooser',
                    {
                        prefixIcon: 'e-icons e-excelexport',
                        tooltipText: 'Export Excel',
                        id: 'excelExport'
                    },
                    {
                        prefixIcon: 'e-icons e-pdfexport',
                        tooltipText: 'Export PDF',
                        id: 'pdfExport'
                    },
                    {
                        prefixIcon: 'e-icons e-refresh',
                        tooltipText: 'Refresh',
                        id: 'refreshGrid'
                    },
                    {
                        text: 'New Business Unit',
                        prefixIcon: 'e-icons e-plus',
                        id: 'newBusinessUnit',
                        disabled: true
                    },
                    { text: 'Edit', prefixIcon: 'e-icons e-edit', id: 'edit' },
                    {
                        text: 'Delete',
                        prefixIcon: 'e-icons e-delete',
                        id: 'deleteBusinessUnit'
                    }
                ],

                columns: [
                    { type: 'checkbox', width: 50 },
                    { field: 'srno', headerText: 'S.No', width: 80, textAlign: 'Right' },
                    { field: 'name', headerText: 'Business Unit Name', width: 400 },
                    { field: 'description', headerText: 'Description', width: 400, visible: false },
                    {
                        field: 'createdon',
                        headerText: 'Created On',
                        type: 'date',
                        format: { type: 'dateTime', format: 'dd/MMM/yyyy hh:mm' },
                        width: 180,
                        visible: false
                    },
                    {
                        field: 'modifiedon',
                        headerText: 'Modified On',
                        type: 'date',
                        format: { type: 'dateTime', format: 'dd/MMM/yyyy hh:mm' },
                        width: 180
                    },
                    { field: 'id', visible: false }
                ],

                toolbarClick: async function (args) {

                    if (args.item.id === 'excelExport') {
                        businessUnitGrid.excelExport({
                            fileName: `BusinessUnits_${new Date().getTime()}.xlsx`,
                            exportType: 'AllPages'
                        });
                    }

                    if (args.item.id === 'pdfExport') {
                        businessUnitGrid.pdfExport({
                            fileName: `BusinessUnits_${new Date().getTime()}.pdf`,
                            pageOrientation: 'Landscape'
                        });
                    }

                    if (args.item.id === 'refreshGrid') {
                        loadBusinessUnits();
                    }

                    if (args.item.id === 'edit') {
                        editBusinessUnit();
                    }

                    if (args.item.id === 'newBusinessUnit') {
                        editingBusinessUnitId = null;
                        document.getElementById('businessUnitForm').reset();
                        document.getElementById('buNameMessage').innerText = '';
                        document.getElementById('saveBusinessUnitBtn').disabled = true;
                        await loadUsersData();

                        const modal = new bootstrap.Modal(businessUnitModal, {
                            focus: false
                        });
                        modal.show();

                        initUserDropdown(); // Don't pass null, let it default to current user

                        document.querySelector('#businessUnitModal .modal-title')
                            .innerText = "Add Business Unit";
                    }

                    if (args.item.id === 'deleteBusinessUnit') {
                        const selected = businessUnitGrid.getSelectedRecords();
                        if (!selected.length) return alert("Select record(s)");

                        if (!confirm(`Delete ${selected.length} business unit(s)?`)) return;

                        const ids = selected.map(r => r.id);
                        await deleteRecordData('businessunit', ids, true, true);
                        loadBusinessUnits();
                    }
                }
            });

            businessUnitGrid.appendTo('#businessUnitGrid');

            await loadBusinessUnits();
            await loadUsersData();
            businessUnitGrid.enableToolbarItems(['newBusinessUnit'], true);
        }

        async function loadUsersData() {
            usersData = await DBHandler.fetchEntityRecords(
                'users',
                'id,displayname,username',
                'displayname',
                'asc',
                '',
                true,
                0,
                ''
            ) || [];

            usersData = usersData.map(user => ({
                ...user,
                displaytext: user.displayname || user.username || ''
            }));

            // Check if current user exists in the list
            const currentUserId = getCookie('userid');
            const currentUserDisplayName = getCookie('displayName');
            const currentUserName = getCookie('userName');

            if (currentUserId && !usersData.find(user => user.id == currentUserId)) {
                // Add current user to the list if not exists
                const currentUser = {
                    id: currentUserId,
                    displayname: currentUserDisplayName || currentUserName || 'Current User',
                    username: currentUserName || '',
                    displaytext: currentUserDisplayName || currentUserName || 'Current User'
                };
                usersData.unshift(currentUser); // Add at the beginning
            }
        }

        function initUserDropdown(selectedValue) {
            if (userDropdown) {
                userDropdown.destroy();
            }

            // Use provided selectedValue first, then fall back to cookie userid
            const currentUserId = getCookie('userid');
            let defaultUserId = selectedValue !== undefined ? selectedValue : currentUserId;
            // Ensure the default user exists in the dropdown data
            if (defaultUserId && !usersData.find(user => user.id == defaultUserId)) {
                defaultUserId = null;
            }

            userDropdown = new ej.dropdowns.DropDownList({
                dataSource: usersData,
                fields: { text: 'displaytext', value: 'id' },
                placeholder: 'Select Owner',
                allowFiltering: true,
                filterBarPlaceholder: 'Search users...',
                popupHeight: '250px',
                value: defaultUserId || null
            });

            userDropdown.appendTo('#bu_users');
        }

        async function loadBusinessUnits() {
            const data = await DBHandler.fetchEntityRecords(
                'businessunit',
                'businessunit.*',
                'businessunit.name',
                'asc',
                '',
                true,
                0,
                ''
            );

            let sr = 1;
            const formattedData = (data || []).map(unit => ({
                ...unit,
                srno: sr++
            }));

            businessUnitGrid.dataSource = formattedData;
        }

        async function editBusinessUnit() {
            const selected = businessUnitGrid.getSelectedRecords();
            if (selected.length !== 1)
                return alert("Select one record to edit");

            const record = selected[0];

            const modal = new bootstrap.Modal(businessUnitModal, {
                focus: false
            });
            modal.show();

            await loadUsersData();
            initUserDropdown(record.users || null);

            editingBusinessUnitId = record.id;

            document.getElementById('bu_name').value = record.name || '';
            document.getElementById('bu_description').value = record.description || '';

            document.querySelector('#businessUnitModal .modal-title')
                .innerText = "Edit Business Unit";

            validateBusinessUnitName();
        }

        async function saveBusinessUnit() {
            const name = document.getElementById('bu_name').value.trim();
            if (!name)
                return alert("Business Unit name is required");

            // Prevent duplicate Business Unit names
            const safeName = name.replace(/'/g, "''");
            const existing = await DBHandler.fetchEntityRecord(
                'businessunit',
                'id,name',
                `LOWER(name)='${safeName.toLowerCase()}'`
            );

            if (existing?.length && existing[0].id !== editingBusinessUnitId)
                return alert('Business Unit name already exists');

            await DBHandler.submitRecordData('businessunit', {
                name,
                ownerid: userDropdown ? (userDropdown.value || null) : null,
                description: document.getElementById('bu_description').value.trim()
            }, editingBusinessUnitId, false);

            bootstrap.Modal.getInstance(businessUnitModal).hide();
            loadBusinessUnits();
        }

        async function validateBusinessUnitName() {
            const name = document.getElementById('bu_name').value.trim();
            const msgEl = document.getElementById('buNameMessage');
            const saveBtn = document.getElementById('saveBusinessUnitBtn');

            if (!name) {
                msgEl.innerText = '';
                saveBtn.disabled = true;
                return;
            }

            const safeName = name.replace(/'/g, "''");
            const existing = await DBHandler.fetchEntityRecord(
                'businessunit',
                'id',
                `LOWER(name)='${safeName.toLowerCase()}'`
            );

            if (existing?.length && existing[0].id !== editingBusinessUnitId) {
                msgEl.innerHTML = '<span style="color:red">Business Unit name already exists</span>';
                saveBtn.disabled = true;
            } else {
                msgEl.innerHTML = '<span style="color:green">Business Unit name available</span>';
                saveBtn.disabled = false;
            }
        }

        function setDefaultUserFromCookie() {
            const userid = getCookie('userid');
            if (userid && userDropdown) {
                // Check if user exists in dropdown data before setting
                const userExists = usersData.find(user => user.id == userid);
                if (userExists) {
                    userDropdown.value = userid;
                }
            }
        }

        $(document).ready(() => {
            initBusinessUnitGrid();

            $('#businessUnitModal').on('shown.bs.modal', function () {
                $(document).off('focusin.modal');

                // Set default user from cookie when modal is shown
                setDefaultUserFromCookie();
            });
        });

    </script>

    <style>
        #businessUnitGrid_toolbarItems {
            height: 10px !important;
        }
    </style>
</body>
