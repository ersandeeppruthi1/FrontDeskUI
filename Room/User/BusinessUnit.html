<body>

    <div class="container-fluid mt-4">
        
        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">Business Unit Management</h2>
        </div>

        <!-- Business Unit Grid -->
        <div class="card shadow-sm">
            <div class="card-body">
                <div id="businessUnitGrid"></div>
            </div>
        </div>

    </div>

    <!-- Business Unit Modal -->
    <div class="modal fade" id="businessUnitModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Add Business Unit</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <form id="businessUnitForm">
                        
                        <div class="row g-3">
                            
                            <div class="col-md-12">
                                <label class="form-label">Business Unit Name <span class="text-danger">*</span></label>
                                <input type="text" id="bu_name" class="form-control" required placeholder="Enter business unit name">
                            </div>

                            <div class="col-md-12">
                                <label class="form-label">Owner <span class="text-danger">*</span></label>
                                <select id="bu_ownerid" class="form-control" required>
                                    <option value="">Select Owner</option>
                                </select>
                            </div>

                        </div>

                    </form>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-primary" onclick="saveBusinessUnit()">Save</button>
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                </div>

            </div>
        </div>
    </div>

    <script>

        let businessUnitGrid;
        let editingBusinessUnitId = null;
        let businessUnitModal;
        let ownerDropdown;

        // Grid columns configuration
        var businessUnitColumns = [
            { type: 'checkbox', width: 50 },
            { field: 'srno', headerText: 'S.No', width: 70, textAlign: 'Right' },
            { field: 'name', headerText: 'Business Unit Name', width: 300 },
            { field: 'ownername', headerText: 'Owner', width: 200 },
            { field: 'id', visible: false },
            { field: 'ownerid', visible: false }
        ];

        // Initialize Grid
        function initBusinessUnitGrid() {

            ej.grids.Grid.Inject(
                ej.grids.Page,
                ej.grids.Sort,
                ej.grids.Filter,
                ej.grids.Toolbar,
                ej.grids.ExcelExport,
                ej.grids.PdfExport
            );

            businessUnitGrid = new ej.grids.Grid({

                dataSource: [],
                allowPaging: true,
                allowSorting: true,
                allowFiltering: true,
                filterSettings: { type: 'Excel' },
                pageSettings: { pageSize: 15 },
                allowExcelExport: true,
                allowPdfExport: true,

                toolbar: [
                    'Search',
                    { text: 'New', prefixIcon: 'e-icons e-plus', id: 'new' },
                    { text: 'Edit', prefixIcon: 'e-icons e-edit', id: 'edit' },
                    { text: 'Delete', prefixIcon: 'e-icons e-delete', id: 'delete' },
                    { text: '', prefixIcon: 'e-excelexport e-icons', id: 'excelexport', tooltipText: 'Export Excel' },
                    { text: '', prefixIcon: 'e-pdfexport e-icons', id: 'pdfexport', tooltipText: 'Export PDF' },
                    { text: '', prefixIcon: 'e-refresh e-icons', id: 'refresh', tooltipText: 'Refresh' }
                ],

                columns: businessUnitColumns,

                toolbarClick: function (args) {

                    if (args.item.id === 'new') {
                        clearBusinessUnitForm();
                        editingBusinessUnitId = null;
                        document.querySelector('#businessUnitModal .modal-title').innerText = "Add Business Unit";
                        openBusinessUnitModal();
                    }

                    if (args.item.id === 'edit') {
                        editBusinessUnit();
                    }

                    if (args.item.id === 'delete') {
                        deleteBusinessUnit();
                    }

                    if (args.item.id === 'excelexport') {
                        exportToExcel();
                    }

                    if (args.item.id === 'pdfexport') {
                        exportToPdf();
                    }

                    if (args.item.id === 'refresh') {
                        loadBusinessUnits();
                    }
                }
            });

            businessUnitGrid.appendTo('#businessUnitGrid');
        }

        // Load business unit data
        async function loadBusinessUnits() {
            try {
                const businessUnits = await DBHandler.fetchEntityRecords(
                    'businessunit bu',
                    'bu.*, u.displayname as ownername',
                    'bu.name',
                    'asc',
                    '',
                    false,
                    0,
                    'LEFT JOIN masteruser u ON u.id = bu.ownerid'
                );

                let sr = 1;
                const formattedData = (businessUnits || []).map(unit => ({
                    ...unit,
                    srno: sr++,
                    ownername: unit.ownername || 'No Owner Assigned'
                }));

                businessUnitGrid.dataSource = formattedData;
                businessUnitGrid.refresh();

                console.log("Business units loaded:", formattedData.length);
            } catch (error) {
                console.error("Error loading business units:", error);
                alert("Error loading business units. Please try again.");
            }
        }

        // Initialize owner dropdown
        async function initializeOwnerDropdown() {
            try {
                const owners = await DBHandler.fetchEntityRecords(
                    'masteruser',
                    'id, displayname',
                    'displayname',
                    'asc',
                    '',
                    false,
                    0,
                    ''
                );

                ownerDropdown = new ej.dropdowns.DropDownList({
                    dataSource: owners || [],
                    fields: { text: 'displayname', value: 'id' },
                    placeholder: 'Select Owner',
                    allowClear: true
                });
                ownerDropdown.appendTo('#bu_ownerid');

            } catch (error) {
                console.error("Error loading owners:", error);
            }
        }

        // Open modal
        function openBusinessUnitModal() {
            if (!businessUnitModal) {
                businessUnitModal = new bootstrap.Modal(document.getElementById('businessUnitModal'));
            }
            businessUnitModal.show();
        }

        // Clear form
        function clearBusinessUnitForm() {
            document.getElementById('businessUnitForm').reset();
            if (ownerDropdown) {
                ownerDropdown.value = null;
            }
        }

        // Edit business unit
        function editBusinessUnit() {
            const selectedRecords = businessUnitGrid.getSelectedRecords();
            if (selectedRecords.length !== 1) {
                alert("Please select exactly one business unit to edit");
                return;
            }

            const unit = selectedRecords[0];
            editingBusinessUnitId = unit.id;

            // Populate form fields
            document.getElementById('bu_name').value = unit.name || '';
            if (ownerDropdown) {
                ownerDropdown.value = unit.ownerid || null;
            }

            document.querySelector('#businessUnitModal .modal-title').innerText = "Edit Business Unit";
            openBusinessUnitModal();
        }

        // Save business unit
        async function saveBusinessUnit() {
            try {
                const name = document.getElementById('bu_name').value.trim();
                const ownerid = ownerDropdown ? ownerDropdown.value : null;

                if (!name) {
                    alert("Business Unit Name is required");
                    return;
                }

                if (!ownerid) {
                    alert("Please select an owner");
                    return;
                }

                await DBHandler.submitRecordData('businessunit', {
                    name: name,
                    ownerid: ownerid
                }, editingBusinessUnitId, false);

                businessUnitModal.hide();
                editingBusinessUnitId = null;
                loadBusinessUnits();
                
                alert("Business unit saved successfully!");

            } catch (error) {
                console.error("Error saving business unit:", error);
                alert("Error saving business unit. Please try again.");
            }
        }

        // Delete business unit
        async function deleteBusinessUnit() {
            const selectedRecords = businessUnitGrid.getSelectedRecords();
            if (!selectedRecords.length) {
                alert("Please select business unit(s) to delete");
                return;
            }

            if (!confirm(`Delete selected ${selectedRecords.length} business unit(s)?`)) {
                return;
            }

            try {
                const ids = selectedRecords.map(unit => unit.id);
                await deleteRecordData('businessunit', ids, true, true);
                loadBusinessUnits();
                alert("Business unit(s) deleted successfully!");
            } catch (error) {
                console.error("Error deleting business units:", error);
                alert("Error deleting business units. Please try again.");
            }
        }

        // Export to Excel
        function exportToExcel() {
            if (businessUnitGrid) {
                businessUnitGrid.excelExport({
                    fileName: `BusinessUnits_${new Date().toISOString().split('T')[0]}.xlsx`
                });
            }
        }

        // Export to PDF
        function exportToPdf() {
            if (businessUnitGrid) {
                businessUnitGrid.pdfExport({
                    fileName: `BusinessUnits_${new Date().toISOString().split('T')[0]}.pdf`,
                    header: {
                        fromTop: 0,
                        height: 120,
                        contents: [{
                            type: 'Text',
                            value: 'Business Unit Management',
                            position: { x: 200, y: 50 },
                            style: {
                                textBrushColor: '#C25050',
                                fontSize: 25
                            }
                        }]
                    }
                });
            }
        }

        // Initialize on page load
        $(document).ready(function () {
            initBusinessUnitGrid();
            initializeOwnerDropdown();
            loadBusinessUnits();
        });

    </script>
