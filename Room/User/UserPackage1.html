<!DOCTYPE html>
<html lang="en">

<head runat="server">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script>
        let classMap = [];
        var apiURL = "https://dbsit2.vsservices.in/";
        //var apiURL = "";
    </script>

    <script src="https://apisit.vsservices.in/css/Default/jquery.min.js"></script>
    <script src="https://apisit.vsservices.in/css/Default/moment.min.js"></script>
    <link href="https://apisit.vsservices.in/css/Default/font-awesome-all.min.css" rel="stylesheet" />

    <script src="https://apisit.vsservices.in/css/Default/bootstrap.bundle.min.js"></script>
    <link href="https://apisit.vsservices.in/css/app.css?id=081220258" rel="stylesheet" />

    <script src="https://apisit.vsservices.in/JS/utility.js?id=081220259"></script>
    <script src="https://apisit.vsservices.in/JS/entityPage.js?id=081220258" type="module"></script>
    <script src="https://apisit.vsservices.in/JS/controls.js?id=081220258" type="module"></script>
    <script src="https://apisit.vsservices.in/JS/listcontrols.js?id=081220258" type="module"></script>
    <script src="https://apisit.vsservices.in/JS/formHandler.js?id=081220258" type="module"></script>
    <script src="https://apisit.vsservices.in/JS/pageLoader.js?id=081220258" type="module"></script>
    <script src="https://apisit.vsservices.in/JS/Master/DBHandler.js?id=081220258" type="module"></script>
    <script src="https://apisit.vsservices.in/JS/VastuBill/VastuBillPDFExporter.js?id=081220258"></script>

    <script src="https://apisit.vsservices.in/css/Default/popper.min.js"></script>
    <script src="https://apisit.vsservices.in/css/Default/bootstrap.min.js"></script>

    <script src="https://apisit.vsservices.in/css/Default/moment.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.11.4/jquery-ui.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.0/jquery-ui.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <script src="https://apisit.vsservices.in/JS/ej2.min.vk02bdl5ad.js"></script>

    <link href="https://apisit.vsservices.in/css/Default/font-awesome-all.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://free-crm.csharpasp.net/lib/syncfusion/css/bootstrap5.dvnzgvxkcq.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.css">
    <link href="https://apisit.vsservices.in/css/app.css" rel="stylesheet">

</head>

<body>
    <div class="container2 mt-4">
        <div id="userPackageGrid"></div>
    </div>

    <!-- MODAL -->
    <div class="modal fade" id="userPackageModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Add User Package</h5>
                    <button type="button" class="close" data-bs-dismiss="modal">
                        <span>&times;</span>
                    </button>
                </div>

                <div class="modal-body">
                    <form id="userPackageForm">

                        <div class="row">
                            <div class="col-md-6">
                                <label>Package Name</label>
                                <input type="text" id="packagename" class="form-control" required />
                            </div>
                            <div class="col-md-6">
                                <label>Code</label>
                                <input type="text" id="packagecode" class="form-control" required />
                            </div>
                        </div>

                        <div class="row mt-3">
                            <div class="col-md-12">
                                <label>Description</label>
                                <textarea id="packagedescription" class="form-control" rows="3"></textarea>
                            </div>
                        </div>

                        <div class="row mt-3">
                            <div class="col-md-6">
                                <label>Status</label>
                                <select id="packagestatus" class="form-control">
                                    <option value="">Select Status</option>
                                    <option value="Active">Active</option>
                                    <option value="Inactive">Inactive</option>
                                </select>
                            </div>
                        </div>

                        <!-- Multi-select for Assessments -->
                        <div class="row mt-3">
                            <!-- Assessments (Permission Style UI - FIXED IDS) -->
                            <div class="col-md-12">
                                <label>Assessments</label>

                                <div class="card">
                                    <div class="card-header">
                                        <h6 class="mb-0">Select Assessments and Configure Permissions</h6>
                                    </div>

                                    <div class="card-body">

                                        <div class="row mb-3">
                                            <div class="col-md-6">
                                                <label>Select Assessments:</label>
                                                <input id="assessmentSelector" type="text" class="form-control" />
                                            </div>

                                            <div class="col-md-6">
                                                <div class="row">
                                                    <div class="col-md-6 d-flex align-items-end">
                                                        <button type="button" class="btn btn-primary btn-sm me-2"
                                                            onclick="addAssessmentPermission()">
                                                            <i class="fa fa-plus"></i> Add Selected
                                                        </button>
                                                    </div>

                                                    <div class="col-md-3 d-flex align-items-end">
                                                        <button type="button" class="btn btn-outline-info btn-sm me-1"
                                                            onclick="selectAllAssessments()">
                                                            <i class="fa fa-check-double"></i> All
                                                        </button>
                                                    </div>

                                                    <div class="col-md-3 d-flex align-items-end">
                                                        <button type="button" class="btn btn-outline-secondary btn-sm"
                                                            onclick="showAssessmentBulkModal()">
                                                            <i class="fa fa-cogs"></i> Bulk
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <div id="assessmentPermissionsContainer">
                                            <div class="alert alert-info text-center" id="noAssessmentMessage">
                                                <i class="fa fa-info-circle"></i>
                                                No assessments selected yet.
                                            </div>
                                        </div>

                                    </div>
                                </div>
                            </div>

                            <!-- Habits (Permission Style UI - FIXED IDS) -->
                            <div class="col-md-12">
                                <label>Habits</label>

                                <div class="card">
                                    <div class="card-header">
                                        <h6 class="mb-0">Select Habits and Configure Permissions</h6>
                                    </div>

                                    <div class="card-body">

                                        <div class="row mb-3">
                                            <div class="col-md-6">
                                                <label>Select Habits:</label>
                                                <input id="habitSelector" type="text" class="form-control" />
                                            </div>

                                            <div class="col-md-6">
                                                <div class="row">
                                                    <div class="col-md-6 d-flex align-items-end">
                                                        <button type="button" class="btn btn-primary btn-sm me-2"
                                                            onclick="addHabitPermission()">
                                                            <i class="fa fa-plus"></i> Add Selected
                                                        </button>
                                                    </div>

                                                    <div class="col-md-3 d-flex align-items-end">
                                                        <button type="button" class="btn btn-outline-info btn-sm me-1"
                                                            onclick="selectAllHabits()">
                                                            <i class="fa fa-check-double"></i> All
                                                        </button>
                                                    </div>

                                                    <div class="col-md-3 d-flex align-items-end">
                                                        <button type="button" class="btn btn-outline-secondary btn-sm"
                                                            onclick="showHabitBulkModal()">
                                                            <i class="fa fa-cogs"></i> Bulk
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <div id="habitPermissionsContainer">
                                            <div class="alert alert-info text-center" id="noHabitMessage">
                                                <i class="fa fa-info-circle"></i>
                                                No habits selected yet.
                                            </div>
                                        </div>

                                    </div>
                                </div>
                            </div>
                        </div>

                    </form>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-primary" onclick="saveUserPackage()">Save</button>
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>

            </div>
        </div>
    </div>

    <script>
        let userPackageGrid;
        let editingPackageId = null;
        let assessmentMultiSelect;
        let habitMultiSelect;

        const userPackageModalEl = document.getElementById('userPackageModal');
        const userPackageModal = new bootstrap.Modal(userPackageModalEl);

        // Initialize Grid
        function initUserPackageGrid() {
            ej.grids.Grid.Inject(
                ej.grids.Page,
                ej.grids.Sort,
                ej.grids.Filter,
                ej.grids.Toolbar,
                ej.grids.ExcelExport,
                ej.grids.PdfExport
            );

            userPackageGrid = new ej.grids.Grid({
                dataSource: [],
                allowPaging: true,
                allowSorting: true,
                allowFiltering: true,
                filterSettings: { type: 'Excel' },
                toolbar: [
                    'Search',
                    { text: 'New Package', prefixIcon: 'e-icons e-plus', id: 'newPackage' },
                    { text: 'Edit', prefixIcon: 'e-icons e-edit', id: 'editPackage' },
                    { text: 'Delete', prefixIcon: 'e-icons e-delete', id: 'deletePackage' },
                    'ExcelExport',
                    'PdfExport'
                ],
                columns: [
                    { type: 'checkbox', width: 50 },
                    { field: 'id', headerText: 'ID', isPrimaryKey: true, visible: false },
                    { field: 'packagename', headerText: 'Package Name', width: 200 },
                    { field: 'code', headerText: 'Code', width: 150 },
                    { field: 'description', headerText: 'Description', width: 250 },
                    { field: 'status', headerText: 'Status', width: 120 },
                    { field: 'assessmentid1', headerText: 'Assessments', width: 200 },
                    { field: 'habitid1', headerText: 'Habits', width: 200 },
                    { field: 'createdon', headerText: 'Created On', width: 150, type: 'datetime' },
                    { field: 'modifiedon', headerText: 'Modified On', width: 150, type: 'datetime' }
                ],
                toolbarClick: function (args) {
                    if (args.item.id === 'newPackage') {
                        editingPackageId = null;
                        document.getElementById('userPackageForm').reset();
                        if (assessmentMultiSelect) assessmentMultiSelect.value = [];
                        if (habitMultiSelect) habitMultiSelect.value = [];
                        document.querySelector('#userPackageModal .modal-title').innerText = "Add User Package";
                        userPackageModal.show();
                    }

                    if (args.item.id === 'editPackage') {
                        const selected = userPackageGrid.getSelectedRecords();
                        if (selected.length !== 1) return alert("Select one record");

                        editingPackageId = selected[0].id;
                        document.getElementById('packagename').value = selected[0].packagename;
                        document.getElementById('packagecode').value = selected[0].code;
                        document.getElementById('packagedescription').value = selected[0].description;
                        document.getElementById('packagestatus').value = selected[0].status;

                        if (assessmentMultiSelect) assessmentMultiSelect.value = selected[0].assessmentid1 ? selected[0].assessmentid1.split(',') : [];
                        if (habitMultiSelect) habitMultiSelect.value = selected[0].habitid1 ? selected[0].habitid1.split(',') : [];

                        document.querySelector('#userPackageModal .modal-title').innerText = "Edit User Package";
                        userPackageModal.show();
                    }
                }
            });

            userPackageGrid.appendTo('#userPackageGrid');
        }


        let businessUnitDropdown = null;
        let assessmentData = [];
        let habitData = [];

        $(document).ready(function () {

            // BUSINESS UNIT
            DBHandler.fetchEntityRecords(
                'businessunit',
                'businessunit.id, businessunit.name',
                'businessunit.name',
                'asc',
                '', true,
                0,
                ''
            ).then(units => {
                businessUnitDropdown = new ej.dropdowns.DropDownList({
                    dataSource: units || [],
                    fields: { text: 'name', value: 'id' },
                    allowFiltering: true,
                    filterBarPlaceholder: 'Search business unit...'
                });
                businessUnitDropdown.appendTo('#businessUnitId');
            });

            // ✅ FETCH ASSESSMENTS
            DBHandler.fetchEntityRecords(
                'assessmentmaster1',
                'id, assessmentname',
                'assessmentname',
                'asc',
                '', true,
                0,
                ''
            ).then(data => {
                assessmentData = data || [];
            });

            // ✅ FETCH HABITS
            DBHandler.fetchEntityRecords(
                'habitmaster',
                'code, habitname',
                'habitname',
                'asc',
                '', true,
                0,
                ''
            ).then(data => {
                habitData = data || [];
            });

            loadEntitiesForPermissions();
        });

        let entityPermissions = [];
        let availableEntities = [];
        let entitySelectorDropdown = null;

        async function loadEntitiesForPermissions() {
            const entities = await DBHandler.fetchEntityRecords('entities', 'id, name,physicalname', 'name', 'asc', '', true, 0, '');
            availableEntities = (entities || []).map(entity => ({ ...entity, tablename: entity.physicalname || entity.name.toLowerCase().replace(/\s+/g, '') }));
            populateEntitySelector();
        }

        function populateEntitySelector() {
            if (entitySelectorDropdown) {
                entitySelectorDropdown.destroy();
            }

            const filteredEntities = availableEntities.filter(entity =>
                !entityPermissions.find(ep => ep.entityId === entity.id)
            );

            entitySelectorDropdown = new ej.dropdowns.MultiSelect({
                dataSource: filteredEntities,
                fields: { text: 'name', value: 'id' },
                placeholder: 'Select Entities...',
                allowFiltering: true,
                filterBarPlaceholder: 'Search entities...',
                popupHeight: '250px',
                width: '100%',
                mode: 'CheckBox',
                showSelectAll: true
            });

            entitySelectorDropdown.appendTo('#entitySelector');
        }

        function addEntityPermission() {

            if (!entitySelectorDropdown.value || entitySelectorDropdown.value.length === 0) {
                alert('Please select at least one entity first');
                return;
            }

            entitySelectorDropdown.value.forEach(entityId => {

                const selectedEntity = availableEntities.find(e => e.id === entityId);

                if (entityPermissions.find(ep => ep.entityId === entityId)) return;

                entityPermissions.push({
                    entityId: entityId,
                    entityName: selectedEntity.name,
                    tableName: selectedEntity.tablename,
                    businessUnitId: null,

                    // ✅ NEW FIELDS
                    assessments: [],
                    habits: [],

                    permissions: {
                        read: 0,
                        write: 0,
                        delete: 0
                    }
                });
            });

            renderEntityPermissions();
            populateEntitySelector();
            updatePermissionJSON();
        }

        function renderEntityPermissions() {

            const container = document.getElementById('entityPermissionsContainer');

            if (entityPermissions.length === 0) {
                container.innerHTML = '<div class="alert alert-info text-center">No entities selected</div>';
                return;
            }

            let html = '';

            entityPermissions.forEach((entityPerm, index) => {

                html += `
        <div class="card mb-3">
            <div class="card-header">${entityPerm.entityName}</div>

            <div class="card-body">

                <!-- BUSINESS UNIT -->
                <input id="businessUnit-${index}" />

                <!-- ✅ ASSESSMENT -->
                <input id="assessment-${index}" />

                <!-- ✅ HABIT -->
                <input id="habit-${index}" />

            </div>
        </div>
        `;
            });

            container.innerHTML = html;

            // =========================
            // INIT DROPDOWNS
            // =========================
            entityPermissions.forEach((entityPerm, index) => {

                // BUSINESS UNIT
                new ej.dropdowns.DropDownList({
                    dataSource: businessUnitDropdown?.dataSource || [],
                    fields: { text: 'name', value: 'id' },
                    value: entityPerm.businessUnitId,
                    change: args => updateEntityBusinessUnit(index, args.value)
                }).appendTo(`#businessUnit-${index}`);


                // ✅ ASSESSMENT MULTISELECT
                new ej.dropdowns.MultiSelect({
                    dataSource: assessmentData,
                    fields: { text: 'assessmentname', value: 'id' },
                    mode: 'Box',
                    allowFiltering: true,
                    value: entityPerm.assessments || [],
                    change: args => {
                        entityPerm.assessments = args.value;
                        updatePermissionJSON();
                    }
                }).appendTo(`#assessment-${index}`);


                // ✅ HABIT MULTISELECT
                new ej.dropdowns.MultiSelect({
                    dataSource: habitData,
                    fields: { text: 'habitname', value: 'code' },
                    mode: 'Box',
                    allowFiltering: true,
                    value: entityPerm.habits || [],
                    change: args => {
                        entityPerm.habits = args.value;
                        updatePermissionJSON();
                    }
                }).appendTo(`#habit-${index}`);
            });
        }

        function updateEntityBusinessUnit(index, value) {
            entityPermissions[index].businessUnitId = value;
            updatePermissionJSON();
        }

        function updatePermissionJSON() {

            const data = entityPermissions.map(ep => ({
                EntityId: ep.entityId,
                BusinessUnitId: ep.businessUnitId,

                // ✅ NEW DATA
                Assessments: ep.assessments,
                Habits: ep.habits,

                ReadPermission: ep.permissions.read,
                WritePermission: ep.permissions.write,
                DeletePermission: ep.permissions.delete,
                EntityName: ep.tableName
            }));

            document.getElementById('permissionJSON').value =
                JSON.stringify(data, null, 2);
        }
    </script>
    <script>
        // Initialize MultiSelects with real DB data
        async function initMultiSelects() {
            // --- Assessments ---
            const assessments = await DBHandler.fetchEntityRecords(
                'assessmentmaster1',
                'id,assessmentname',
                'assessmentname', 'asc'
            );

            const assessmentData = assessments.map(a => ({
                value: a.id.toString(),
                text: a.assessmentname
            }));

            assessmentMultiSelect = new ej.dropdowns.MultiSelect({
                dataSource: assessmentData,
                fields: { value: 'value', text: 'text' },
                showDropDownIcon: true,
                placeholder: 'Select Assessments'
            });
            assessmentMultiSelect.appendTo('#assessmentSelector');

            // --- Habits ---
            const habits = await DBHandler.fetchEntityRecords(
                'habitmaster',
                'code,habitname',
                'habitname', 'asc'
            );

            const habitData = habits.map(h => ({
                value: h.code,
                text: h.habitname
            }));

            habitMultiSelect = new ej.dropdowns.MultiSelect({
                dataSource: habitData,
                fields: { value: 'value', text: 'text' },
                showDropDownIcon: true,
                placeholder: 'Select Habits'
            });
            habitMultiSelect.appendTo('#habitSelector');
        }

        // Save User Package
        async function saveUserPackage() {
            const packagename = document.getElementById('packagename').value.trim();
            const code = document.getElementById('packagecode').value.trim();
            const description = document.getElementById('packagedescription').value.trim();
            const status = document.getElementById('packagestatus').value;

            const assessmentid = assessmentMultiSelect ? assessmentMultiSelect.value.join(',') : '';
            const habitid = habitMultiSelect ? habitMultiSelect.value.join(',') : '';

            if (!packagename || !code) { alert("Package Name and Code are required"); return; }

            const record = {
                packagename,
                code,
                description,
                status,
                assessmentid1: assessmentid,
                habitid1: habitid
            };

            try {
                await DBHandler.submitRecordData('userpackage', record, editingPackageId || null, false);
                userPackageModal.hide();
                loadUserPackages();
                editingPackageId = null;
            } catch (err) {
                console.error(err);
                alert("Failed to save package");
            }
        }

        // Load User Packages into Grid
        async function loadUserPackages() {
            const data = await DBHandler.fetchEntityRecords('userpackage', '*', 'createdon', 'desc');
            userPackageGrid.dataSource = data || [];
        }

        // INIT
        document.addEventListener('DOMContentLoaded', () => {
            initUserPackageGrid();
            initMultiSelects();
            loadUserPackages();
        });
    </script>
</body>

</html>
