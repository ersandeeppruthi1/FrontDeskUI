    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-richtexteditor/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-navigations/styles/bootstrap5.css" rel="stylesheet">

<body>

    <div class="container-fluid mt-4">
        
        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">Booking Management</h2>
        </div>

        <!-- Booking Grid -->
        <div class="card shadow-sm">
            <div class="card-body">
                <div id="bookingGrid"></div>
            </div>
        </div>
    </div>

    <!-- Edit Booking Modal -->
    <div class="modal fade" id="editBookingModal" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">

                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Edit Booking</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <form id="editBookingForm">
                        
                        <div class="row g-3">
                            
                            <!-- Basic Information -->
                            <div class="col-12">
                                <h6 class="text-primary border-bottom pb-2">Guest Information</h6>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Display Name <span class="text-danger">*</span></label>
                                <input type="text" id="edit_displayname" class="form-control" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Mobile Number <span class="text-danger">*</span></label>
                                <input type="tel" id="edit_mobilenumber" class="form-control" required>
                            </div>

                            <div class="col-md-12">
                                <label class="form-label">Address</label>
                                <textarea id="edit_address" class="form-control" rows="2"></textarea>
                            </div>

                            <!-- Booking Details -->
                            <div class="col-12 mt-4">
                                <h6 class="text-primary border-bottom pb-2">Booking Details</h6>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Check-In Date & Time</label>
                                <input type="datetime-local" id="edit_checkindatetime" class="form-control">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Expected Check-Out</label>
                                <input type="datetime-local" id="edit_checkoutdatetime" class="form-control">
                            </div>

                            <div class="col-md-3">
                                <label class="form-label">Gents Count</label>
                                <input type="number" id="edit_gentscount" class="form-control" min="0" value="0">
                            </div>

                            <div class="col-md-3">
                                <label class="form-label">Ladies Count</label>
                                <input type="number" id="edit_ladiescount" class="form-control" min="0" value="0">
                            </div>

                            <div class="col-md-3">
                                <label class="form-label">Booking Status</label>
                                <select id="edit_bookingstatus" class="form-select">
                                    <option value="1">Active</option>
                                    <option value="0">Completed</option>
                                </select>
                            </div>

                            <div class="col-md-3">
                                <label class="form-label">Feedback Rating</label>
                                <select id="edit_feedbackrating" class="form-select">
                                    <option value="0">No Rating</option>
                                    <option value="1">Bad</option>
                                    <option value="2">Good</option>
                                    <option value="3">Very Good</option>
                                    <option value="4">Excellent</option>
                                </select>
                            </div>

                            <div class="col-md-8">
                                <label class="form-label">Reference Detail</label>
                                <input type="text" id="edit_referencedetail" class="form-control">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Donation Amount</label>
                                <div class="input-group">
                                    <span class="input-group-text">₹</span>
                                    <input type="number" id="edit_donationamount" class="form-control" min="0" step="0.01">
                                </div>
                            </div>

                            <div class="col-md-12">
                                <label class="form-label">Feedback Comments</label>
                                <textarea id="edit_feedbackremarks" class="form-control" rows="3"></textarea>
                            </div>

                        </div>

                    </form>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary" onclick="saveBooking()">Save Changes</button>
                </div>

            </div>
        </div>
    </div>

    <script>

        let bookingGrid;
        let editingBookingId = null;
        let editBookingModal;

        // Grid columns configuration
        var bookingColumns = [
            { type: 'checkbox', width: 50 },
            { field: 'srno', headerText: 'S.No', width: 70, textAlign: 'Right' },
            { field: 'bookingnumber', headerText: 'Booking #', width: 150 },
            { field: 'displayname', headerText: 'Guest Name', width: 150 },
            { field: 'mobilenumber', headerText: 'Mobile', width: 130 },
            { field: 'roomnumbers', headerText: 'Rooms', width: 120 },
            { 
                field: 'checkindatetime', 
                headerText: 'Check-In', 
                type: 'date',
                format: { type: 'dateTime', format: 'dd/MMM/yyyy hh:mm' },
                width: 160 
            },
            { 
                field: 'checkoutdatetime', 
                headerText: 'Check-Out', 
                type: 'date',
                format: { type: 'dateTime', format: 'dd/MMM/yyyy hh:mm' },
                width: 160 
            },
            { 
                field: 'bookingstatus', 
                headerText: 'Status', 
                width: 100,
                template: '<div class="${if(bookingstatus==1)}text-success${else}text-secondary${/if}">' +
                         '${if(bookingstatus==1)}Active${else}Completed${/if}</div>'
            },
            { field: 'guestscount', headerText: 'Guests', width: 80, textAlign: 'Center' },
            { field: 'donationamount', headerText: 'Donation', width: 100, format: 'C2', textAlign: 'Right' },
            { 
                field: 'feedbackrating', 
                headerText: 'Rating', 
                width: 100,
                template: '<div class="rating-display">${if(feedbackrating==0)}-${else}${feedbackrating}/4${/if}</div>'
            },
            { field: 'referencedetail', headerText: 'Reference', width: 150 },
            { 
                field: 'createdon', 
                headerText: 'Created', 
                type: 'date',
                format: { type: 'dateTime', format: 'dd/MMM/yyyy' },
                width: 120 
            },
            { field: 'id', visible: false },
            { field: 'address', visible: false },
            { field: 'feedbackremarks', visible: false }
        ];

        // Initialize Grid
        function initBookingGrid() {

            ej.grids.Grid.Inject(
                ej.grids.Page,
                ej.grids.Sort,
                ej.grids.Filter,
                ej.grids.Toolbar,
                ej.grids.ColumnChooser,
                ej.grids.ExcelExport,
                ej.grids.PdfExport
            );

            bookingGrid = new ej.grids.Grid({

                dataSource: [],
                allowPaging: true,
                allowSorting: true,
                allowFiltering: true,
                showColumnChooser: true,
                filterSettings: { type: 'Excel' },
                pageSettings: { pageSize: 15 },
                allowExcelExport: true,
                allowPdfExport: true,

                toolbar: [
                    'Search',
                    'ColumnChooser',
                    { text: 'Edit', prefixIcon: 'e-icons e-edit', id: 'edit' },
                    { text: 'Delete', prefixIcon: 'e-icons e-delete', id: 'delete' },
                    { text: '', prefixIcon: 'e-excelexport e-icons', id: 'excelexport', tooltipText: 'Export Excel' },
                    { text: '', prefixIcon: 'e-pdfexport e-icons', id: 'pdfexport', tooltipText: 'Export PDF' },
                    { text: '', prefixIcon: 'e-refresh e-icons', id: 'refresh', tooltipText: 'Refresh' }
                ],

                columns: bookingColumns,

                toolbarClick: function (args) {

                    if (args.item.id === 'edit') {
                        editBooking();
                    }

                    if (args.item.id === 'delete') {
                        deleteBooking();
                    }

                    if (args.item.id === 'excelexport') {
                        exportToExcel();
                    }

                    if (args.item.id === 'pdfexport') {
                        exportToPdf();
                    }

                    if (args.item.id === 'refresh') {
                        refreshBookings();
                    }
                }
            });

            bookingGrid.appendTo('#bookingGrid');
        }

        // Load booking data
        async function loadBookings() {
            try {
                const bookings = await DBHandler.fetchEntityRecords(
                    'roombooking rb',
                    'rb.*, GROUP_CONCAT(DISTINCT rm.roomnumber ORDER BY rm.roomnumber ASC) as roomnumbers',
                    'rb.createdon',
                    'desc',
                    '',
                    false,
                    0,
                    'LEFT JOIN bookingroom br ON br.bookingid = rb.id LEFT JOIN roommaster rm ON rm.id = br.roomid GROUP BY rb.id'
                );

                let sr = 1;
                const formattedBookings = (bookings || []).map(booking => ({
                    ...booking,
                    srno: sr++,
                    guestscount: (booking.gentscount || 0) + (booking.ladiescount || 0),
                    roomnumbers: booking.roomnumbers || 'No Rooms',
                    checkindatetime: booking.checkindatetime ? new Date(booking.checkindatetime) : null,
                    checkoutdatetime: booking.checkoutdatetime ? new Date(booking.checkoutdatetime) : null,
                    createdon: booking.createdon ? new Date(booking.createdon) : null,
                    donationamount: booking.donationamount || 0,
                    feedbackrating: booking.feedbackrating || 0
                }));

                bookingGrid.dataSource = formattedBookings;
                bookingGrid.refresh();

                console.log("Bookings loaded:", formattedBookings.length);
            } catch (error) {
                console.error("Error loading bookings:", error);
                alert("Error loading bookings. Please try again.");
            }
        }

        // Edit booking
        function editBooking() {
            const selectedRecords = bookingGrid.getSelectedRecords();
            if (selectedRecords.length !== 1) {
                alert("Please select exactly one booking to edit");
                return;
            }

            const booking = selectedRecords[0];
            editingBookingId = booking.id;

            // Populate form fields
            document.getElementById('edit_displayname').value = booking.displayname || '';
            document.getElementById('edit_mobilenumber').value = booking.mobilenumber || '';
            document.getElementById('edit_address').value = booking.address || '';
            document.getElementById('edit_checkindatetime').value = 
                booking.checkindatetime ? formatDateTimeLocal(booking.checkindatetime) : '';
            document.getElementById('edit_checkoutdatetime').value = 
                booking.checkoutdatetime ? formatDateTimeLocal(booking.checkoutdatetime) : '';
            document.getElementById('edit_gentscount').value = booking.gentscount || 0;
            document.getElementById('edit_ladiescount').value = booking.ladiescount || 0;
            document.getElementById('edit_bookingstatus').value = booking.bookingstatus || 1;
            document.getElementById('edit_feedbackrating').value = booking.feedbackrating || 0;
            document.getElementById('edit_referencedetail').value = booking.referencedetail || '';
            document.getElementById('edit_donationamount').value = booking.donationamount || 0;
            document.getElementById('edit_feedbackremarks').value = booking.feedbackremarks || '';

            // Open modal
            if (!editBookingModal) {
                editBookingModal = new bootstrap.Modal(document.getElementById('editBookingModal'));
            }
            editBookingModal.show();
        }

        // Save booking changes
        async function saveBooking() {
            if (!editingBookingId) return;

            try {
                const displayname = document.getElementById('edit_displayname').value.trim();
                const mobilenumber = document.getElementById('edit_mobilenumber').value.trim();

                if (!displayname || !mobilenumber) {
                    alert("Display Name and Mobile Number are required");
                    return;
                }

                const checkInDate = document.getElementById('edit_checkindatetime').value;
                const checkOutDate = document.getElementById('edit_checkoutdatetime').value;

                const formattedCheckInDate = checkInDate ? 
                    new Date(checkInDate).toISOString().slice(0, 19).replace('T', ' ') : null;
                const formattedCheckOutDate = checkOutDate ? 
                    new Date(checkOutDate).toISOString().slice(0, 19).replace('T', ' ') : null;

                await DBHandler.submitRecordData('roombooking', {
                    displayname: displayname,
                    mobilenumber: mobilenumber,
                    address: document.getElementById('edit_address').value.trim(),
                    checkindatetime: formattedCheckInDate,
                    checkoutdatetime: formattedCheckOutDate,
                    gentscount: parseInt(document.getElementById('edit_gentscount').value) || 0,
                    ladiescount: parseInt(document.getElementById('edit_ladiescount').value) || 0,
                    bookingstatus: parseInt(document.getElementById('edit_bookingstatus').value),
                    feedbackrating: parseInt(document.getElementById('edit_feedbackrating').value) || 0,
                    referencedetail: document.getElementById('edit_referencedetail').value.trim(),
                    donationamount: parseFloat(document.getElementById('edit_donationamount').value) || 0,
                    feedbackremarks: document.getElementById('edit_feedbackremarks').value.trim()
                }, editingBookingId, true);

                editBookingModal.hide();
                editingBookingId = null;
                loadBookings();
                
                alert("Booking updated successfully!");

            } catch (error) {
                console.error("Error saving booking:", error);
                alert("Error saving booking. Please try again.");
            }
        }

        // Delete booking
        async function deleteBooking() {
            const selectedRecords = bookingGrid.getSelectedRecords();
            if (!selectedRecords.length) return alert("Select record(s) to delete");

            if (!confirm(`Delete selected ${selectedRecords.length} booking(s)?`)) return;

            const ids = selectedRecords.map(booking => booking.id);

            await deleteRecordData('roombooking', ids, true, true);

            loadBookings();
        }

        // Export to Excel
        function exportToExcel() {
            if (bookingGrid) {
                bookingGrid.excelExport();
            }
        }

        // Export to PDF
        function exportToPdf() {
            if (bookingGrid) {
                bookingGrid.pdfExport();
            }
        }

        // Refresh bookings
        function refreshBookings() {
            loadBookings();
        }

        // Utility function to format date for datetime-local input
        function formatDateTimeLocal(date) {
            if (!date) return '';
            const d = new Date(date);
            return d.getFullYear() + '-' +
                String(d.getMonth() + 1).padStart(2, '0') + '-' +
                String(d.getDate()).padStart(2, '0') + 'T' +
                String(d.getHours()).padStart(2, '0') + ':' +
                String(d.getMinutes()).padStart(2, '0');
        }

        // Initialize on page load
        $(document).ready(function () {
            initBookingGrid();
            loadBookings();
        });

    </script>

    <style>

            text-align: center;

            border: none;

        }

        }
        
        .modal-header.bg-primary {
            background-color: #007bff !important;
        }
        
        .input-group-text {
            background-color: #e9ecef;
            border: 1px solid #ced4da;
        }
        
        #bookingGrid_toolbarItems {
            height: auto !important;
        }
        
        .e-toolbar .e-toolbar-item {
            margin: 2px;
        }
    </style>
