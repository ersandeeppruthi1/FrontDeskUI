    <script>
        // Local cache for rooms
        let roomsCache = [];
        let roomsCacheLoaded = false;
        let totalRoomsCount = 0;
        let availableRoomsCount = 0;
        let maintenanceRoomsCount = 0;

        // Local cache for bookings
        let bookingsCache = [];
        let bookingsCacheLoaded = false;

        // Local cache for booked rooms
        let bookedRoomsCache = [];
        let bookedRoomsCacheLoaded = false;

        let checkInRoomDropdown;
        let checkOutBookingsDropdown;
        let feedbackRatingDropdown;



        function openCheckInModal() {

            setCurrentCheckInTime();
            // Clear form fields
            document.getElementById("displayName").value = "";
            document.getElementById("mobileNumber").value = "";
            document.getElementById("address").value = "";
            document.getElementById("gentsCount").value = "0";
            document.getElementById("ladiesCount").value = "0";
            document.getElementById("referenceDetail").value = "";

            // Reset filter to show only available rooms
            document.getElementById("showOnlyAvailableRooms").checked = true;

            const modal = new bootstrap.Modal(document.getElementById('checkInModal'), {
                focus: false
            });
            modal.show();

            loadAvailableRooms();

        }

        function openCheckOutModal() {
            // Set current check-out time
            setCurrentCheckOutTime();

            // Clear form fields
            if (feedbackRatingDropdown) {
                feedbackRatingDropdown.value = null;
            }
            document.getElementById("feedbackComments").value = "";
            document.getElementById("donationAmount").value = "";

            const modal = new bootstrap.Modal(document.getElementById('checkOutModal'), {
                focus: false
            });
            modal.show();

            // Load active bookings for checkout
            loadActiveBookings();
        }

        function setCurrentCheckOutTime() {
            const now = new Date();
            
            // Format datetime-local input value (YYYY-MM-DDTHH:MM)
            const formattedDate =
                now.getFullYear() + '-' +
                String(now.getMonth() + 1).padStart(2, '0') + '-' +
                String(now.getDate()).padStart(2, '0') + 'T' +
                String(now.getHours()).padStart(2, '0') + ':' +
                String(now.getMinutes()).padStart(2, '0');

            document.getElementById("checkOutDateTime").value = formattedDate;
        }

        function loadActiveBookings() {
            if (bookingsCacheLoaded && bookingsCache.length > 0) {
                // Filter active bookings with room information
                const activeBookings = bookingsCache
                    .filter(booking => booking.bookingstatus === 1)
                    .map(booking => ({
                        id: booking.id,
                        text: `${booking.displayname} -- Room ${booking.roomnumber || 'N/A'}`,
                        displayname: booking.displayname,
                        roomnumber: booking.roomnumber,
                        mobilenumber: booking.mobilenumber,
                        checkindatetime: booking.checkindatetime
                    }));

                if (checkOutBookingsDropdown) {
                    checkOutBookingsDropdown.dataSource = activeBookings;
                    checkOutBookingsDropdown.dataBind();
                }
                console.log("Active bookings loaded:", activeBookings.length);
            } else {
                // Fallback: Load directly from database
                DBHandler.fetchEntityRecords(
                    'roombooking',
                    'roombooking.id, roombooking.displayname, roombooking.mobilenumber, roombooking.checkindatetime, roommaster.roomnumber',
                    'roombooking.checkindatetime',
                    'desc',
                    'roombooking.bookingstatus = 1',
                    false,
                    0,
                    'LEFT JOIN bookingroom ON CAST(bookingroom.bookingid AS CHAR) = CAST(roombooking.id AS CHAR) LEFT JOIN roommaster ON roommaster.id = bookingroom.roomid'
                ).then(function (bookings) {
                    const formattedBookings = (bookings || []).map(booking => ({
                        id: booking.id,
                        text: `${booking.displayname} -- Room ${booking.roomnumber || 'N/A'}`,
                        displayname: booking.displayname,
                        roomnumber: booking.roomnumber,
                        mobilenumber: booking.mobilenumber,
                        checkindatetime: booking.checkindatetime
                    }));

                    if (checkOutBookingsDropdown) {
                        checkOutBookingsDropdown.dataSource = formattedBookings;
                        checkOutBookingsDropdown.dataBind();
                    }
                    console.log("Active bookings loaded from database:", formattedBookings.length);
                }).catch(function (error) {
                    console.error("Error loading active bookings:", error);
                    if (checkOutBookingsDropdown) {
                        checkOutBookingsDropdown.dataSource = [];
                        checkOutBookingsDropdown.dataBind();
                    }
                });
            }
        }

        async function submitCheckIn() {

            // Get form values
            const displayName = document.getElementById("displayName").value.trim();
            const mobileNumber = document.getElementById("mobileNumber").value.trim();
            const address = document.getElementById("address").value.trim();
            const checkInDate = document.getElementById("checkInDateTime").value;
            const checkOutDate = document.getElementById("checkOutDateTime").value;
            const gentsCount = parseInt(document.getElementById("gentsCount").value) || 0;
            const ladiesCount = parseInt(document.getElementById("ladiesCount").value) || 0;
            const referenceDetail = document.getElementById("referenceDetail").value.trim();

            const selectedRooms = checkInRoomDropdown.value || [];

            // Validation
            if (!displayName) {
                alert("Please enter Display Name");
                return;
            }
            if (!mobileNumber) {
                alert("Please enter Mobile Number");
                return;
            }
            if (selectedRooms.length === 0) {
                alert("Select at least one room");
                return;
            }

            // Format dates properly for database
            const formattedCheckInDate = checkInDate ? new Date(checkInDate).toISOString().slice(0, 19).replace('T', ' ') : null;
            const formattedCheckOutDate = checkOutDate ? new Date(checkOutDate).toISOString().slice(0, 19).replace('T', ' ') : null;

            // 1️⃣ Create Main Booking
            var bookingId = await DBHandler.submitRecordData('roombooking', {
                bookingnumber: "BK-" + Date.now(),
                displayname: displayName,
                mobilenumber: mobileNumber,
                address: address,
                checkindatetime: formattedCheckInDate,
                checkoutdatetime: formattedCheckOutDate,
                bookingstatus: 1,
                gentscount: gentsCount,
                ladiescount: ladiesCount,
                referencedetail: referenceDetail,
                feedbackrating: 0,
                feedbackremarks: '',
                donationamount: 0
            }, null, false);

            // 2️⃣ Insert Multiple Rooms
            for (const roomId of selectedRooms) {
                // Insert booking room record
                await DBHandler.submitRecordData('bookingroom', {
                    bookingid: bookingId,
                    roomid: roomId,
                    roomstatus: 1
                }, null, false);
            }

            bootstrap.Modal.getInstance(
                document.getElementById('checkInModal')
            ).hide();

            // Refresh both caches after new check-in
            refreshAllCaches();

            // Show success message
            alert(`Successfully checked in ${selectedRooms.length} room(s) for ${displayName}!`);
        }

        async function submitCheckOut() {
            // Get form values
            const selectedBookings = checkOutBookingsDropdown.value || [];
            const checkOutDateTime = document.getElementById("checkOutDateTime").value;
            const feedbackRating = feedbackRatingDropdown ? parseInt(feedbackRatingDropdown.value) || 0 : 0;
            const feedbackComments = document.getElementById("feedbackComments").value.trim();
            const donationAmount = parseFloat(document.getElementById("donationAmount").value) || 0;

            // Validation
            if (selectedBookings.length === 0) {
                alert("Please select at least one booking to check out");
                return;
            }

            if (!checkOutDateTime) {
                alert("Please select check-out date and time");
                return;
            }

            try {
                // Format check-out date for database
                const formattedCheckOutDate = checkOutDateTime ?
                    new Date(checkOutDateTime).toISOString().slice(0, 19).replace('T', ' ') : null;

                // Process each selected booking
                for (const bookingId of selectedBookings) {
                    // Update the main booking record with checkout details
                    await DBHandler.submitRecordData('roombooking', {
                        checkoutdatetime: formattedCheckOutDate,
                        bookingstatus: 0, // Mark as checked out
                        feedbackrating: feedbackRating,
                        feedbackremarks: feedbackComments,
                        donationamount: donationAmount
                    }, bookingId, true);

                    // Get all associated room bookings and update both booking room status and actual room status
                    const roomBookings = await DBHandler.fetchEntityRecords(
                        'bookingroom',
                        'id, roomid',
                        'id',
                        'desc',
                        `bookingid = '${bookingId}' AND roomstatus = 1`
                    );

                    for (const roomBooking of (roomBookings || [])) {
                        // Update booking room status to checked out
                        await DBHandler.submitRecordData('bookingroom', {
                            roomstatus: 0 // Mark booking room as checked out
                        }, roomBooking.id, true);
                    }
                }

                // Close modal
                bootstrap.Modal.getInstance(
                    document.getElementById('checkOutModal')
                ).hide();

                // Refresh both room and booking data
                refreshAllCaches();

                // Show success message
                alert(`Successfully checked out ${selectedBookings.length} booking(s)!`);

            } catch (error) {
                console.error("Error during checkout:", error);
                alert("Error occurred during checkout. Please try again.");
            }
        }

        // Animation utility functions
        function animateCounter(element, targetValue, duration = 1000) {
            const startValue = parseInt(element.innerText) || 0;

            // Clean up any existing animation classes
            element.classList.remove('animate-count', 'animate-glow', 'updating');

            if (startValue === targetValue) {
                // If values are the same, just apply the animation effect
                element.classList.add('animate-count');
                setTimeout(() => {
                    element.classList.remove('animate-count');
                }, 1400);
                return;
            }

            const increment = targetValue > startValue ? 1 : -1;
            const stepTime = Math.abs(Math.floor(duration / Math.abs(targetValue - startValue)));

            // Add animation classes
            element.classList.add('updating');

            let current = startValue;
            const timer = setInterval(() => {
                current += increment;
                element.innerText = current;

                if (current === targetValue) {
                    clearInterval(timer);
                    element.classList.remove('updating');
                    element.classList.add('animate-count');

                    // Remove animation class after animation completes
                    setTimeout(() => {
                        element.classList.remove('animate-count');
                    }, 1400);
                }
            }, stepTime);
        }

        function animateNumber(elementId, value, shouldGlow = false) {
            const element = document.getElementById(elementId);
            if (!element) return;

            const currentValue = parseInt(element.innerText) || 0;

            // Always clean up existing animation classes first
            element.classList.remove('animate-count', 'animate-glow', 'updating');

            if (currentValue !== value) {
                // Show loading shimmer for very quick updates
                if (Math.abs(value - currentValue) <= 3) {
                    element.innerHTML = '<span class="loading-shimmer"></span>';
                    setTimeout(() => {
                        element.innerText = value;
                        element.classList.add('animate-glow');
                        setTimeout(() => element.classList.remove('animate-glow'), 1500);
                    }, 300);
                } else {
                    // Use counter animation for larger changes
                    animateCounter(element, value, 800);
                }

                if (shouldGlow) {
                    setTimeout(() => {
                        element.classList.add('animate-glow');
                        setTimeout(() => element.classList.remove('animate-glow'), 1500);
                    }, 900);
                }
            } else {
                // Even if values are the same, ensure the value is set and apply glow animation if requested

                    element.classList.add('animate-glow');
                    setTimeout(() => element.classList.remove('animate-glow'), 1500);
                }
            }
        }

                    );

                    bookingsCacheLoaded = true;

                    // Extract and populate booked rooms cache from bookings data
                    const bookedRoomsSet = new Set();

                    bookingsCache.forEach(booking => {
                        // Only include active bookings with active room status
                        if (booking.bookingstatus === 1 && booking.roomid && !bookedRoomsSet.has(booking.roomid)) {
                            bookedRoomsSet.add(booking.roomid);
                            bookedRoomsData.push({
                                roomid: booking.roomid,

                            });

                    bookedRoomsCache = [];

                    bookedRoomsCacheLoaded = true;
                }

        function getTodayCheckInsCount() {
            if (!bookingsCacheLoaded) return 0;
            const today = new Date().toISOString().split('T')[0];

            // Get unique bookings by ID to avoid duplicates from JOINs
            const uniqueBookings = [];
            const seenIds = new Set();

            bookingsCache.forEach(booking => {
                if (!seenIds.has(booking.id)) {
                    seenIds.add(booking.id);
                    uniqueBookings.push(booking);

            return uniqueBookings.filter(booking => {
                if (!booking.checkindatetime) return false;
                const checkInDate = new Date(booking.checkindatetime).toISOString().split('T')[0];
                return checkInDate === today;

        }

        // Helper function to get overdue check-outs count

            if (!bookingsCacheLoaded) return 0;
            const now = new Date();

            // Get unique bookings by ID to avoid duplicates from JOINs
            const uniqueBookings = [];
            const seenIds = new Set();

            bookingsCache.forEach(booking => {
                if (!seenIds.has(booking.id)) {
                    seenIds.add(booking.id);
                    uniqueBookings.push(booking);
                }
            });

            return uniqueBookings.filter(booking => {
                // Check if booking is active and has expected checkout time
                if (booking.bookingstatus !== 1 || !booking.checkoutdatetime) return false;
                
                // Parse expected checkout datetime
                const expectedCheckOut = new Date(booking.checkoutdatetime);
                
                // Return true if current time is past expected checkout time
                return now > expectedCheckOut;
            }).length;
        }

        // Helper function to get overdue bookings
        function getOverdueBookings() {
            if (!bookingsCacheLoaded) return [];
            const now = new Date();

            // Get unique bookings by ID to avoid duplicates from JOINs
            const uniqueBookings = [];
            const seenIds = new Set();

            bookingsCache.forEach(booking => {
                if (!seenIds.has(booking.id)) {
                    seenIds.add(booking.id);
                    uniqueBookings.push(booking);
                }
            });

            const overdueBookings = uniqueBookings.filter(booking => {
                // Check if booking is active and has expected checkout time
                if (booking.bookingstatus !== 1 || !booking.checkoutdatetime) return false;
                
                // Parse expected checkout datetime
                const expectedCheckOut = new Date(booking.checkoutdatetime);
                
                // Return true if current time is past expected checkout time
                return now > expectedCheckOut;
            });

            // Sort by checkout datetime in ascending order (oldest overdue first)
            return overdueBookings.sort((a, b) => {
                const dateA = new Date(a.checkoutdatetime);
                const dateB = new Date(b.checkoutdatetime);
                return dateA - dateB;
            });
        }

                // Reload all caches in sequence to ensure proper counts
                await loadRoomsCache();
                await loadBookingsCache();

                // Update dashboard with fresh data
                await loadDashboard();

                console.log("Dashboard refreshed successfully");
                console.log("Total rooms:", totalRoomsCount);
                console.log("Maintenance rooms:", maintenanceRoomsCount);
            } catch (error) {
                console.error("Error refreshing dashboard:", error);
                alert("Error refreshing dashboard. Please try again.");
            } finally {
                // Remove spinning animation
                setTimeout(() => {
                    refreshIcon.classList.remove('fa-spin');
                    refreshBtn.disabled = false;
                }, 500);
            }
        }

        // Helper function to get rooms by status
        function getRoomsByStatus(status) {
            if (!roomsCacheLoaded) return [];

            // Get currently booked room IDs from booked rooms cache
            const bookedRoomIds = new Set();
            if (bookedRoomsCacheLoaded) {
                bookedRoomsCache.forEach(bookedRoom => {
                    if (bookedRoom.roomid) bookedRoomIds.add(bookedRoom.roomid);
                });
            }

            return roomsCache.filter(room => {
                switch (status) {
                    case 'active':
                        return room.isactive === 1;
                    case 'inactive':
                        return room.isactive === 0;
                    case 'available':
                        return room.isactive === 1 && !bookedRoomIds.has(room.id);
                    case 'booked':
                        return room.isactive === 1 && bookedRoomIds.has(room.id);
                    case 'maintenance':
                        return room.isactive === 0;
                    default:
                        return true;
                }
            });
        }

        // Helper function to get room by ID
        function getRoomById(roomId) {
            if (!roomsCacheLoaded) return null;
            return roomsCache.find(room => room.id === roomId);
        }

        function initializeSyncfusionControls() {
            // Initialize DateTimePicker for checkout
            // new ej.calendars.DateTimePicker({
            //     placeholder: "Select Check-Out Time"
            // }).appendTo('#checkOutDateTime');

            // Initialize Feedback Rating Dropdown
            feedbackRatingDropdown = new ej.dropdowns.DropDownList({
                placeholder: "Select Rating",

            });
            feedbackRatingDropdown.appendTo('#feedbackRating');
        }

        // Initialize room dropdown for check-in
        function initializeRoomDropdown() {
            checkInRoomDropdown = new ej.dropdowns.MultiSelect({
                placeholder: "Select Rooms",
                mode: 'CheckBox',
                showSelectAll: true,
                filterBarPlaceholder: 'Search rooms...',

                dataSource: []
            });
            checkInRoomDropdown.appendTo('#checkInRoom');
        }

        // Initialize bookings dropdown for check-out
        function initializeBookingsDropdown() {
            checkOutBookingsDropdown = new ej.dropdowns.MultiSelect({
                placeholder: "Select Bookings to Check-Out",
                mode: 'CheckBox',
                showSelectAll: true,
                filterBarPlaceholder: 'Search bookings...',
                allowFiltering: true,
                fields: { text: 'text', value: 'id' },
                dataSource: [],
                itemTemplate: '<div class="booking-item">' +
                    '<div class="booking-name">${displayname}</div>' +
                    '<div class="booking-details">Room: ${roomnumber} | Mobile: ${mobilenumber}</div>' +
                    '</div>'
            });
            checkOutBookingsDropdown.appendTo('#checkOutBookings');
        }

        // Load all initial data caches
        function initializeDataCaches() {
            loadRoomsCache();
            loadBookingsCache(); // This now also populates booked rooms cache
        }

        // Main initialization function
        function initializeApplication() {
            initializeSyncfusionControls();
            initializeRoomDropdown();
            initializeBookingsDropdown();
            initializeDataCaches();
            
            // Set default checkout datetime to current time
            setCurrentCheckOutTime();
        }

        $(document).ready(() => {
            initializeApplication();
        });
