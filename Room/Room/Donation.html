<body>


    <div class="container-fluid mt-4">
        
        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">Donation Report</h2>
        </div>

        <!-- Filters Card -->
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <div class="row g-3 align-items-end">
                    
                    <div class="col-md-3">
                        <label class="form-label">Start Date</label>
                        <input type="date" id="startDate" class="form-control">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">End Date</label>
                        <input type="date" id="endDate" class="form-control">
                    </div>

                    <div class="col-md-3">
                        <button class="btn btn-primary" onclick="filterDonations()">
                            <i class="fas fa-search"></i> Filter
                        </button>
                        <button class="btn btn-secondary ms-2" onclick="clearFilters()">
                            <i class="fas fa-times"></i> Clear
                        </button>
                    </div>

                    <div class="col-md-3 text-end">
                        <div class="badge bg-success fs-6 p-2">
                            Total Donations: ₹<span id="totalAmount">0.00</span>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <!-- Donation Report Grid -->
        <div class="card shadow-sm">
            <div class="card-body">
                <div id="donationGrid"></div>
            </div>
        </div>

        <!-- Edit Donation Modal -->
        <div class="modal fade" id="editDonationModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Edit Donation</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="editDonationAmount" class="form-label">Donation Amount</label>
                            <input type="number" id="editDonationAmount" class="form-control" min="0" step="0.01">
                        </div>
                        <div class="mb-3">
                            <label for="editDonationReference" class="form-label">Reference</label>
                            <input type="text" id="editDonationReference" class="form-control" maxlength="250">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-primary" onclick="saveDonationEdit()">Save</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>

        let donationGrid;
        let editDonationModal;
        let editingDonationId = null;
        let totalDonationAmount = 0;

        // Grid columns configuration
        var donationColumns = [
            { type: 'checkbox', width: 50 },
            { field: 'srno', headerText: 'S.No', width: 70, textAlign: 'Right' },
            { field: 'bookingnumber', headerText: 'Booking #', width: 150,visible: false},
            { field: 'displayname', headerText: 'Guest Name', width: 180 },
            { field: 'mobilenumber', headerText: 'Mobile', width: 130 },
            { field: 'checkindatetime',headerText: 'Check-In Date', type: 'date',format: { type: 'dateTime', format: 'dd/MMM/yyyy' },width: 140 ,visible: false },
            { 
                field: 'checkoutdatetime', 
                headerText: 'Check-Out Date', 
                type: 'date',
                format: { type: 'dateTime', format: 'dd/MMM/yyyy' },
                width: 140 ,
                visible: false
            },
            { 
                field: 'donationamountformatted', 
                headerText: 'Donation Amount', 
                width: 150, 
                textAlign: 'Right'
            },
            { field: 'referencedetail', headerText: 'Reference', width: 150 ,visible: false },
            { 
                field: 'createdon', 
                headerText: 'Created On', 
                type: 'date',
                format: { type: 'dateTime', format: 'dd/MMM/yyyy' },
                width: 130 ,
                visible: false
            },
            { field: 'id', visible: false,visible: false },
            { field: 'address', visible: false,visible: false }
        ];

        // Initialize Grid
        function initDonationGrid() {

            ej.grids.Grid.Inject(
                ej.grids.Page,
                ej.grids.Sort,
                ej.grids.Filter,
                ej.grids.Toolbar,
                ej.grids.ColumnChooser,
                ej.grids.ExcelExport,
                ej.grids.PdfExport,
                ej.grids.Aggregate
            );

            donationGrid = new ej.grids.Grid({

                dataSource: [],
                allowPaging: true,
                allowSorting: true,
                allowFiltering: true,
                showColumnChooser: true,
                filterSettings: { type: 'Excel' },
                pageSettings: { pageSize: 20 },
                allowExcelExport: true,
                allowPdfExport: true,

                toolbar: [
                    'Search',
                    'ColumnChooser',
                    { text: 'Edit', prefixIcon: 'e-icons e-edit', id: 'edit' },
                    { text: 'Delete', prefixIcon: 'e-icons e-delete', id: 'delete' },
                    { text: '', prefixIcon: 'e-excelexport e-icons', id: 'excelexport', tooltipText: 'Export Excel' },
                    { text: '', prefixIcon: 'e-pdfexport e-icons', id: 'pdfexport', tooltipText: 'Export PDF' },
                    { text: '', prefixIcon: 'e-refresh e-icons', id: 'refresh', tooltipText: 'Refresh' }
                ],

                columns: donationColumns,

                aggregates: [{
                    columns: [{
                        type: 'Sum',
                        field: 'donationamount',
                        footerTemplate: '<div style="font-weight: bold; color: #28a745; font-size: 14px;">Total: ₹${Sum}</div>'
                    }]
                }],

                toolbarClick: function (args) {

                    if (args.item.id === 'edit') {
                        editDonation();
                    }

                    if (args.item.id === 'delete') {
                        deleteDonation();
                    }

                    if (args.item.id === 'excelexport') {
                        exportToExcel();
                    }

                    if (args.item.id === 'pdfexport') {
                        exportToPdf();
                    }

                    if (args.item.id === 'refresh') {
                        loadDonations();
                    }
                },

                dataBound: function() {
                    updateTotalAmount();
                }
            });

            donationGrid.appendTo('#donationGrid');
        }

        // Edit selected donation
        function editDonation() {
            const selectedRecords = donationGrid.getSelectedRecords();
            if (selectedRecords.length !== 1) {
                alert("Please select exactly one record to edit");
                return;
            }

            const record = selectedRecords[0];
            editingDonationId = record.id;

            document.getElementById('editDonationAmount').value = record.donationamount || 0;
            document.getElementById('editDonationReference').value = record.referencedetail || '';

            if (!editDonationModal) {
                editDonationModal = new bootstrap.Modal(document.getElementById('editDonationModal'));
            }

            editDonationModal.show();
        }

        // Save donation edit
        async function saveDonationEdit() {
            if (!editingDonationId) return;

            try {
                const donationAmount = parseFloat(document.getElementById('editDonationAmount').value) || 0;
                const referenceDetail = document.getElementById('editDonationReference').value.trim();

                await DBHandler.submitRecordData('roombooking', {
                    donationamount: donationAmount,
                    referencedetail: referenceDetail
                }, editingDonationId, true);

                editDonationModal.hide();
                editingDonationId = null;
                await loadDonations();

                alert("Donation updated successfully!");
            } catch (error) {
                console.error("Error updating donation:", error);
                alert("Error updating donation. Please try again.");
            }
        }

        // Delete selected donations (clear donation amount)
        async function deleteDonation() {
            const selectedRecords = donationGrid.getSelectedRecords();
            if (!selectedRecords.length) {
                alert("Please select record(s) to delete");
                return;
            }

            if (!confirm(`Delete selected ${selectedRecords.length} donation record(s)?`)) return;

            try {
                for (const record of selectedRecords) {
                    await DBHandler.submitRecordData('roombooking', {
                        donationamount: 0
                    }, record.id, true);
                }

                await loadDonations();
                alert("Selected donation record(s) deleted successfully!");
            } catch (error) {
                console.error("Error deleting donations:", error);
                alert("Error deleting donations. Please try again.");
            }
        }

        // Load donation data
        async function loadDonations() {
            try {
                const donations = await DBHandler.fetchEntityRecords(
                    'roombooking',
                    'roombooking.*, roombooking.donationamount',
                    'roombooking.createdon',
                    'desc',
                    'roombooking.donationamount > 0',
                    false,
                    0,
                    ''
                );

                const formattedDonations = (donations || []).map((donation, index) => ({
                    ...donation,
                    srno: index + 1,
                    checkindatetime: donation.checkindatetime ? new Date(donation.checkindatetime) : null,
                    checkoutdatetime: donation.checkoutdatetime ? new Date(donation.checkoutdatetime) : null,
                    createdon: donation.createdon ? new Date(donation.createdon) : null,
                    donationamount: donation.donationamount || 0,
                    donationamountformatted: `₹${(donation.donationamount || 0).toFixed(2)}`
                }));

                donationGrid.dataSource = formattedDonations;
                donationGrid.refresh();

                updateTotalAmount();

                console.log("Donations loaded:", formattedDonations.length);
            } catch (error) {
                console.error("Error loading donations:", error);
                alert("Error loading donations. Please try again.");
            }
        }

        // Filter donations by date range - fetch from server
        async function filterDonations() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;

            try {
                let whereClause = 'rb.donationamount > 0';
                
                if (startDate) {
                    whereClause += ` AND DATE(rb.createdon) >= '${startDate}'`;
                }
                
                if (endDate) {
                    whereClause += ` AND DATE(rb.createdon) <= '${endDate}'`;
                }

                const donations = await DBHandler.fetchEntityRecords(
                    'roombooking rb',
                    'rb.*, rb.donationamount',
                    'rb.createdon',
                    'desc',
                    whereClause,
                    false,
                    0,
                    ''
                );

                const filteredData = (donations || []).map((donation, index) => ({
                    ...donation,
                    srno: index + 1,
                    checkindatetime: donation.checkindatetime ? new Date(donation.checkindatetime) : null,
                    checkoutdatetime: donation.checkoutdatetime ? new Date(donation.checkoutdatetime) : null,
                    createdon: donation.createdon ? new Date(donation.createdon) : null,
                    donationamount: donation.donationamount || 0,
                    donationamountformatted: `₹${(donation.donationamount || 0).toFixed(2)}`
                }));

                donationGrid.dataSource = filteredData;
                donationGrid.refresh();

                updateTotalAmount();

                console.log("Filtered donations loaded:", filteredData.length);
            } catch (error) {
                console.error("Error filtering donations:", error);
                alert("Error filtering donations. Please try again.");
            }
        }

        // Clear filters
        async function clearFilters() {
            document.getElementById('startDate').value = '';
            document.getElementById('endDate').value = '';
            
            // Reload all donations from server
            await loadDonations();
        }

        // Update total amount display
        function updateTotalAmount() {
            const currentData = donationGrid.getCurrentViewRecords();
            totalDonationAmount = currentData.reduce((sum, item) => sum + (item.donationamount || 0), 0);
            
            document.getElementById('totalAmount').textContent = totalDonationAmount.toFixed(2);
        }

        // Export to Excel
        function exportToExcel() {
            if (donationGrid) {
                const excelExportProperties = {
                    fileName: `Donation_Report_${new Date().toISOString().split('T')[0]}.xlsx`
                };
                donationGrid.excelExport(excelExportProperties);
            }
        }

        // Export to PDF
        function exportToPdf() {
            if (donationGrid) {
                const pdfExportProperties = {
                    fileName: `Donation_Report_${new Date().toISOString().split('T')[0]}.pdf`
                };
                donationGrid.pdfExport(pdfExportProperties);
            }
        }

        // Set default date range (last 30 days)
        function setDefaultDateRange() {
            const today = new Date();
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(today.getDate() - 30);

            document.getElementById('endDate').value = today.toISOString().split('T')[0];
            document.getElementById('startDate').value = thirtyDaysAgo.toISOString().split('T')[0];
        }

        // Initialize on page load
        $(document).ready(function () {
            initDonationGrid();
            setDefaultDateRange();
            loadDonations();
        });

    </script>

        }

        }

        .e-grid .e-gridfooter .e-table .e-row .e-rowcell {

        }
    </style>
