<body>

    <div class="container-fluid mt-4">
        
        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">Donation Report</h2>
        </div>

        <!-- Filters Card -->
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <div class="row g-3 align-items-end">
                    
                    <div class="col-md-3">
                        <label class="form-label">Start Date</label>
                        <input type="date" id="startDate" class="form-control">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">End Date</label>
                        <input type="date" id="endDate" class="form-control">
                    </div>

                    <div class="col-md-3">
                        <button class="btn btn-primary" onclick="filterDonations()">
                            <i class="fas fa-search"></i> Filter
                        </button>
                        <button class="btn btn-secondary ms-2" onclick="clearFilters()">
                            <i class="fas fa-times"></i> Clear
                        </button>
                    </div>

                    <div class="col-md-3 text-end">
                        <div class="badge bg-success fs-6 p-2">
                            Total Donations: ₹<span id="totalAmount">0.00</span>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <!-- Donation Report Grid -->
        <div class="card shadow-sm">
            <div class="card-body">
                <div id="donationGrid"></div>
            </div>
        </div>

    </div>

    <script>

        let donationGrid;
        let allDonations = [];
        let totalDonationAmount = 0;

        // Grid columns configuration
        var donationColumns = [
            { field: 'srno', headerText: 'S.No', width: 70, textAlign: 'Right' },
            { field: 'bookingnumber', headerText: 'Booking #', width: 150 },
            { field: 'displayname', headerText: 'Guest Name', width: 180 },
            { field: 'mobilenumber', headerText: 'Mobile', width: 130 },
            { 
                field: 'checkindatetime', 
                headerText: 'Check-In Date', 
                type: 'date',
                format: { type: 'dateTime', format: 'dd/MMM/yyyy' },
                width: 140 
            },
            { 
                field: 'checkoutdatetime', 
                headerText: 'Check-Out Date', 
                type: 'date',
                format: { type: 'dateTime', format: 'dd/MMM/yyyy' },
                width: 140 
            },
            { 
                field: 'donationamountformatted', 
                headerText: 'Donation Amount', 
                width: 150, 
                textAlign: 'Right'
            },
            { field: 'referencedetail', headerText: 'Reference', width: 150 },
            { 
                field: 'createdon', 
                headerText: 'Created On', 
                type: 'date',
                format: { type: 'dateTime', format: 'dd/MMM/yyyy' },
                width: 130 
            },
            { field: 'id', visible: false },
            { field: 'address', visible: false }
        ];

        // Initialize Grid
        function initDonationGrid() {

            ej.grids.Grid.Inject(
                ej.grids.Page,
                ej.grids.Sort,
                ej.grids.Filter,
                ej.grids.Toolbar,
                ej.grids.ExcelExport,
                ej.grids.PdfExport,
                ej.grids.Aggregate
            );

            donationGrid = new ej.grids.Grid({

                dataSource: [],
                allowPaging: true,
                allowSorting: true,
                allowFiltering: true,
                filterSettings: { type: 'Excel' },
                pageSettings: { pageSize: 20 },
                allowExcelExport: true,
                allowPdfExport: true,

                toolbar: [
                    'Search',
                    { text: '', prefixIcon: 'e-excelexport e-icons', id: 'excelexport', tooltipText: 'Export Excel' },
                    { text: '', prefixIcon: 'e-pdfexport e-icons', id: 'pdfexport', tooltipText: 'Export PDF' },
                    { text: '', prefixIcon: 'e-refresh e-icons', id: 'refresh', tooltipText: 'Refresh' }
                ],

                columns: donationColumns,

                aggregates: [{
                    columns: [{
                        type: 'Sum',
                        field: 'donationamount',
                        footerTemplate: '<div style="font-weight: bold; color: #28a745; font-size: 14px;">Total: ₹${Sum}</div>'
                    }]
                }],

                toolbarClick: function (args) {

                    if (args.item.id === 'excelexport') {
                        exportToExcel();
                    }

                    if (args.item.id === 'pdfexport') {
                        exportToPdf();
                    }

                    if (args.item.id === 'refresh') {
                        loadDonations();
                    }
                },

                dataBound: function() {
                    updateTotalAmount();
                }
            });

            donationGrid.appendTo('#donationGrid');
        }

        // Load donation data
        async function loadDonations() {
            try {
                const donations = await DBHandler.fetchEntityRecords(
                    'roombooking rb',
                    'rb.*, rb.donationamount',
                    'rb.createdon',
                    'desc',
                    'rb.donationamount > 0',
                    false,
                    0,
                    ''
                );

                allDonations = (donations || []).map((donation, index) => ({
                    ...donation,
                    srno: index + 1,
                    checkindatetime: donation.checkindatetime ? new Date(donation.checkindatetime) : null,
                    checkoutdatetime: donation.checkoutdatetime ? new Date(donation.checkoutdatetime) : null,
                    createdon: donation.createdon ? new Date(donation.createdon) : null,
                    donationamount: donation.donationamount || 0,
                    donationamountformatted: `₹${(donation.donationamount || 0).toFixed(2)}`
                }));

                donationGrid.dataSource = allDonations;
                donationGrid.refresh();

                updateTotalAmount();

                console.log("Donations loaded:", allDonations.length);
            } catch (error) {
                console.error("Error loading donations:", error);
                alert("Error loading donations. Please try again.");
            }
        }

        // Filter donations by date range
        function filterDonations() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;

            if (!startDate && !endDate) {
                donationGrid.dataSource = allDonations;
                donationGrid.refresh();
                updateTotalAmount();
                return;
            }

            let filteredData = [...allDonations];

            if (startDate) {
                const start = new Date(startDate);
                filteredData = filteredData.filter(donation => {
                    const createdDate = new Date(donation.createdon);
                    return createdDate >= start;
                });
            }

            if (endDate) {
                const end = new Date(endDate);
                end.setHours(23, 59, 59, 999); // Include the entire end date
                filteredData = filteredData.filter(donation => {
                    const createdDate = new Date(donation.createdon);
                    return createdDate <= end;
                });
            }

            // Update serial numbers
            filteredData = filteredData.map((donation, index) => ({
                ...donation,
                srno: index + 1,
                donationamountformatted: `₹${(donation.donationamount || 0).toFixed(2)}`
            }));

            donationGrid.dataSource = filteredData;
            donationGrid.refresh();

            updateTotalAmount();
        }

        // Clear filters
        function clearFilters() {
            document.getElementById('startDate').value = '';
            document.getElementById('endDate').value = '';
            
            donationGrid.dataSource = allDonations;
            donationGrid.refresh();
            
            updateTotalAmount();
        }

        // Update total amount display
        function updateTotalAmount() {
            const currentData = donationGrid.getCurrentViewRecords();
            totalDonationAmount = currentData.reduce((sum, item) => sum + (item.donationamount || 0), 0);
            
            document.getElementById('totalAmount').textContent = totalDonationAmount.toFixed(2);
        }

        // Export to Excel
        function exportToExcel() {
            if (donationGrid) {
                const excelExportProperties = {
                    fileName: `Donation_Report_${new Date().toISOString().split('T')[0]}.xlsx`
                };
                donationGrid.excelExport(excelExportProperties);
            }
        }

        // Export to PDF
        function exportToPdf() {
            if (donationGrid) {
                const pdfExportProperties = {
                    fileName: `Donation_Report_${new Date().toISOString().split('T')[0]}.pdf`
                };
                donationGrid.pdfExport(pdfExportProperties);
            }
        }

        // Set default date range (last 30 days)
        function setDefaultDateRange() {
            const today = new Date();
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(today.getDate() - 30);

            document.getElementById('endDate').value = today.toISOString().split('T')[0];
            document.getElementById('startDate').value = thirtyDaysAgo.toISOString().split('T')[0];
        }

        // Initialize on page load
        $(document).ready(function () {
            initDonationGrid();
            setDefaultDateRange();
            loadDonations();
        });

    </script>
