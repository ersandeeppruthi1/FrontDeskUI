	<div class="page-wrap">
		<div class="search-card">
			<div class="row g-3 align-items-end">
				<div class="col-md-8 col-lg-9">
					<label for="patientNameSearch" class="form-label fw-bold">Search Patient Name / UHID / Phone Number</label>
					<input type="text" class="form-control" id="patientNameSearch" placeholder="Type patient name, UHID, or phone number and press Enter">
				</div>
				<div class="col-md-4 col-lg-3 d-grid">
					<button type="button" class="btn btn-primary" onclick="searchPatientDetails()" id="searchBtn">
						<i class="fas fa-search me-1"></i> Search
					</button>
				</div>
			</div>
			<div class="mt-2" id="searchStatus"></div>
		</div>

		<div id="searchResults" class="mt-3"></div>

	<script>
		function escapeHtml(value) {
			return String(value || '')
				.replace(/&/g, '&amp;')
				.replace(/</g, '&lt;')
				.replace(/>/g, '&gt;')
				.replace(/"/g, '&quot;')
				.replace(/'/g, '&#39;');
		}

		function normalizeText(value) {
			return String(value || '').toLowerCase().trim().replace(/\s+/g, ' ');
		}

		function formatDate(value) {
			if (!value) return '-';
			const date = new Date(value);
			if (isNaN(date)) return escapeHtml(value);
			const day = ('0' + date.getDate()).slice(-2);
			const month = ('0' + (date.getMonth() + 1)).slice(-2);
			const year = date.getFullYear();
			return `${day}/${month}/${year}`;
		}

		function setStatus(text, type) {
			const el = document.getElementById('searchStatus');
			const className = type === 'error' ? 'text-danger' : (type === 'ok' ? 'text-success' : 'text-muted');
			el.className = className;
			el.textContent = text || '';
		}

		function splitValues(value) {
			return String(value || '')
				.split(/[,;\n|]+/)
				.map(item => item.trim())
				.filter(Boolean);
		}

		function extractSummaryChips(detail, appointments) {
			const chips = new Set();

			splitValues(detail.diseases).forEach(item => chips.add(item));
			splitValues(detail.habits).forEach(item => chips.add(item));

			if (detail.currentproblem) chips.add(`Problem: ${detail.currentproblem}`);
			if (detail.medicationsyes) chips.add(`Medication: ${detail.medicationsyes}`);
			if (detail.allergic) chips.add(`Allergy: ${detail.allergic}`);
			if (detail.diseasesother) chips.add(`Other disease: ${detail.diseasesother}`);
			if (detail.habitsother) chips.add(`Other habit: ${detail.habitsother}`);
			if (detail.checkupreasonother) chips.add(`Checkup reason: ${detail.checkupreasonother}`);

			appointments.forEach(record => {
				if (record.appointmenttype) chips.add(`Visit type: ${record.appointmenttype}`);
			});

			return Array.from(chips);
		}

		function groupByPatient(records) {
			const map = new Map();
			records.forEach(record => {
				const key = record.id || record.uhid || record.name;
				if (!map.has(key)) map.set(key, []);
				map.get(key).push(record);
			});
			return Array.from(map.values()).map(group =>
				group.sort((a, b) => new Date(b.date || b.createdon) - new Date(a.date || a.createdon))
			);
		}

		async function fetchDentalPatientsBySearch(searchTerm) {
			const allPatients = await DBHandler.fetchEntityRecords(
				'dentaldetails',
				'*',
				'createdon',
				'desc',
				'',
				true,
				0,
				''
			);

			const normalizedSearch = normalizeText(searchTerm);
			return (allPatients || []).filter(record => {
				const name = normalizeText(record.name);
				const uhid = normalizeText(record.uhid);
				const phone = normalizeText(record.phonenumber);
				return name.includes(normalizedSearch)
					|| uhid.includes(normalizedSearch)
					|| phone.includes(normalizedSearch);
			});
		}

		async function fetchAppointmentsByPatientIds(patientIds) {
			if (!patientIds.length) return [];
			const allAppointments = await DBHandler.fetchEntityRecords(
				'dentalappointment',
				'*',
				'modifiedon',
				'desc',
				'',
				true,
				0,
				''
			);

			return (allAppointments || []).filter(record => patientIds.includes(record.patientid));
		}

		async function fetchFrontdeskHistory(uhid) {
			if (!uhid) return [];
			return await DBHandler.fetchEntityRecords(
				'frontdeskpatientrecord',
				'id,patientid,patientname,age,gender,phone,address,date,doctorname,amount,paymentmethod,totaltest,createdon',
				'createdon',
				'desc',
				`patientid='${String(uhid).replace(/'/g, "''")}'`,
				true,
				0,
				''
			);
		}

		function renderPatientCard(patientDetails, appointments, frontdeskRecords, isInsideAccordion = false) {
			const detail = patientDetails[0] || {};
			const latestAppointment = appointments[0] || {};
			const latestFrontdesk = (frontdeskRecords || [])[0] || {};
			const visitCount = appointments.length;
			const summaryChips = extractSummaryChips(detail, appointments);
			const firstVisit = appointments[appointments.length - 1] || {};
			const rawGender = normalizeText(latestFrontdesk.gender);
			const headerGender = rawGender === 'male' ? 'M' : (rawGender === 'female' ? 'F' : (latestFrontdesk.gender || '-'));
			const headerName = detail.name || latestFrontdesk.patientname || '-';
			const headerUhid = detail.uhid || latestFrontdesk.patientid || '-';
			const headerAge = detail.age || latestFrontdesk.age || '-';

			const detailData = {
				'Phone Number': detail.phonenumber || latestFrontdesk.phone || '-',
				'Occupation': detail.occupation || '-',
				'Current Teeth Problem': detail.currentproblem || '-',
				'Latest Treatment': formatDate(latestAppointment.treatmentdate),
				'First Dental Visit': formatDate(firstVisit.treatmentdate),
				'Dental Implant Aware': detail.implantsurgery || '-',
				'Check-up Reason': detail.checkupreason || '-',
				'Address': detail.address || latestFrontdesk.address || '-'
			};

			const chipsHtml = summaryChips.length
				? summaryChips.map(item => `<span class="med-chip">${escapeHtml(item)}</span>`).join('')
				: '<div class="empty-state">No medical summary recorded for this patient.</div>';

			const frontdeskRows = (frontdeskRecords || []).map((record, index) => `
				<tr>
					<td>${index + 1}</td>
					<td>${formatDate(record.date)}</td>
					<td>${escapeHtml(record.doctorname || '-')}</td>
					<td>${escapeHtml(record.totaltest || '-')}</td>
				</tr>
			`).join('');

			const treatmentRows = (appointments || []).map((record, index) => `
				<tr>
					<td>${index + 1}</td>
					<td>${formatDate(record.treatmentdate)}</td>
					<td>${escapeHtml(record.appointmenttype || '-')}</td>
					<td>${escapeHtml(record.treatment || '-')}</td>
					<td>${escapeHtml(record.practitioner || '-')}</td>
					<td>${formatDate(record.nextappointment)}</td>
				</tr>
			`).join('');

			const detailBoxes = Object.keys(detailData).map(label => `
				<div class="detail-box">
					<div class="label">${escapeHtml(label)}</div>
					<div class="value">${escapeHtml(detailData[label])}</div>
				</div>
			`).join('');

			const cardStyleClass = isInsideAccordion ? '' : 'result-card';

			return `
				<div class="${cardStyleClass}">
					${isInsideAccordion ? '' : `
					<div class="result-header">
						<div>
							<div class="fw-bold">${escapeHtml(headerName)}</div>
							<div class="small">UHID: ${escapeHtml(headerUhid)} | Gender: ${escapeHtml(headerGender)} | Age: ${escapeHtml(headerAge)}</div>
						</div>
						<span class="pill">Dental visits: ${visitCount} time(s)</span>
					</div>
					`}

					<div class="p-3">
						<div class="section-title">Patient Details</div>
						<div class="detail-grid">${detailBoxes}</div>

						<div class="section-title mt-3">Medical & Habit Summary</div>
						<div class="med-list">${chipsHtml}</div>

						<div class="section-title mt-3">Dental Treatment History</div>
						<div class="table-responsive">
							<table class="table table-bordered table-sm align-middle">
								<thead class="table-light">
									<tr>
										<th>#</th>
										<th>Date</th>
										<th>Type</th>
										<th>Treatment</th>
										<th>Practitioner</th>
										<th>Next Appointment</th>
									</tr>
								</thead>
								<tbody>
									${treatmentRows || '<tr><td colspan="6" class="text-center text-muted">No dental treatment history found.</td></tr>'}
								</tbody>
							</table>
						</div>

						<div class="section-title mt-3">Other Visit Details</div>
						<div class="table-responsive">
							<table class="table table-bordered table-sm align-middle">
								<thead class="table-light">
									<tr>
										<th>#</th>
										<th>Date</th>
										<th>Doctor/Department</th>
										<th>Test</th>
									</tr>
								</thead>
								<tbody>
									${frontdeskRows || '<tr><td colspan="4" class="text-center text-muted">No additional visit history found.</td></tr>'}
								</tbody>
							</table>
						</div>
					</div>
				</div>
			`;
		}

		function renderPatientAccordion(groupedPatients, appointmentGroups, patientDetailsList) {
			let html = '<div id="patientResultAccordion">';

			for (let index = 0; index < groupedPatients.length; index++) {
				const patientDetails = groupedPatients[index];
				const appointments = appointmentGroups[index] || [];
				const frontdeskRecords = patientDetailsList[index] || [];
				const detail = patientDetails[0] || {};
				const latestFrontdesk = frontdeskRecords[0] || {};

				const headerName = detail.name || latestFrontdesk.patientname || '-';
				const headerUhid = detail.uhid || latestFrontdesk.patientid || '-';
				const headerAge = detail.age || latestFrontdesk.age || '-';
				const headerPhone = detail.phonenumber || latestFrontdesk.phone || '-';
				const rawGender = normalizeText(latestFrontdesk.gender);
				const headerGender = rawGender === 'male' ? 'Male' : (rawGender === 'female' ? 'Female' : (latestFrontdesk.gender || '-'));
				const visitCount = appointments.length;
				const lastVisit = formatDate(appointments[0]?.treatmentdate);

				const collapseId = `patientCollapse_${index}`;
				const initials = headerName.split(' ').filter(Boolean).map(word => word[0]).join('').toUpperCase().slice(0, 2) || '?';

				html += `
					<div class="pat-card" id="patCard_${index}">
						<div class="pat-card-accent"></div>
						<button class="pat-card-btn" type="button"
							onclick="togglePatCard('patCard_${index}', '${collapseId}')"
							aria-expanded="false" aria-controls="${collapseId}">
							<div class="acc-avatar" style="pointer-events:none;">${escapeHtml(initials)}</div>
							<div class="flex-grow-1 overflow-hidden" style="pointer-events:none;">
								<div class="acc-serial">Patient ${index + 1} of ${groupedPatients.length}</div>
								<div class="acc-name">${escapeHtml(headerName)}</div>
								<div class="acc-meta">
									<span class="acc-tag"><i class="fas fa-id-card"></i>${escapeHtml(headerUhid)}</span>
									<span class="acc-tag"><i class="fas fa-${rawGender === 'male' ? 'mars' : rawGender === 'female' ? 'venus' : 'user'}"></i>${escapeHtml(headerGender)}, ${escapeHtml(headerAge)} yrs</span>
									<span class="acc-tag"><i class="fas fa-phone"></i>${escapeHtml(headerPhone)}</span>
									<span class="acc-tag"><i class="fas fa-calendar-check"></i>Last: ${escapeHtml(lastVisit)}</span>
								</div>
							</div>
							<div class="acc-right" style="pointer-events:none;">
								<span class="acc-visits-badge"><i class="fas fa-tooth"></i>${visitCount} Visit${visitCount !== 1 ? 's' : ''}</span>
								<div class="acc-chevron"><i class="fas fa-chevron-down"></i></div>
							</div>
						</button>
						<div class="pat-card-body" id="${collapseId}">
							<div class="patient-banner">
								<div>
									<div class="fw-bold">${escapeHtml(headerName)}</div>
									<div class="small opacity-75 mt-1">
										UHID: ${escapeHtml(headerUhid)} &nbsp;&bull;&nbsp;
										${escapeHtml(headerGender)}, ${escapeHtml(headerAge)} yrs &nbsp;&bull;&nbsp;
										<i class="fas fa-phone me-1"></i>${escapeHtml(headerPhone)}
									</div>
								</div>
								<span class="pill"><i class="fas fa-tooth me-1"></i>Dental Visits: ${visitCount}</span>
							</div>
							${renderPatientCard(patientDetails, appointments, frontdeskRecords, true)}
						</div>
					</div>
				`;
			}

			html += '</div>';
			return html;
		}

		async function searchPatientDetails() {
			const input = document.getElementById('patientNameSearch');
			const searchTerm = input.value.trim();
			const resultsEl = document.getElementById('searchResults');
			const searchBtn = document.getElementById('searchBtn');

			if (!searchTerm) {
				setStatus('Please enter patient name, UHID, or phone number.', 'error');
				resultsEl.innerHTML = '';
				input.focus();
				return;
			}

			searchBtn.disabled = true;
			setStatus('Searching patient records...', '');
			resultsEl.innerHTML = '';

			try {
				const patientMatches = await fetchDentalPatientsBySearch(searchTerm);

				if (!patientMatches.length) {
					setStatus('No patient found for the entered name, UHID, or phone number.', 'error');
					resultsEl.innerHTML = '<div class="empty-state">No matching dental patient data found.</div>';
					return;
				}

				const groupedPatients = groupByPatient(patientMatches);
				const patientIds = groupedPatients.map(group => group[0]?.id).filter(Boolean);
				const allAppointments = await fetchAppointmentsByPatientIds(patientIds);
				const appointmentGroups = groupedPatients.map(group => {
					const patientId = group[0]?.id;
					return allAppointments
						.filter(record => record.patientid === patientId)
						.sort((a, b) => new Date(b.treatmentdate || b.modifiedon) - new Date(a.treatmentdate || a.modifiedon));
				});

				const patientDetailsList = await Promise.all(
					groupedPatients.map(group => fetchFrontdeskHistory(group[0]?.uhid))
				);

				let html = '';
				if (groupedPatients.length > 1) {
					html = renderPatientAccordion(groupedPatients, appointmentGroups, patientDetailsList);
				} else {
					html = renderPatientCard(groupedPatients[0], appointmentGroups[0], patientDetailsList[0], false);
				}

				setStatus(`Found ${groupedPatients.length} patient(s).`, 'ok');
				resultsEl.innerHTML = html;
			} catch (error) {
				console.error('Search error', error);
				setStatus('Unable to fetch records. Please try again.', 'error');
				resultsEl.innerHTML = '<div class="empty-state">Error while loading data.</div>';
			} finally {
				searchBtn.disabled = false;
			}
		}

		function togglePatCard(cardId, collapseId) {
			const card = document.getElementById(cardId);
			const body = document.getElementById(collapseId);
			if (!card || !body) return;

			const isOpen = card.classList.contains('is-open');
			document.querySelectorAll('#patientResultAccordion .pat-card.is-open').forEach(item => {
				item.classList.remove('is-open');
			});

			if (!isOpen) card.classList.add('is-open');
		}

		document.addEventListener('DOMContentLoaded', function () {
			const input = document.getElementById('patientNameSearch');
			input.addEventListener('keydown', function (event) {
				if (event.key === 'Enter') {
					event.preventDefault();
					searchPatientDetails();
				}
			});
		});
	</script>
</body>
