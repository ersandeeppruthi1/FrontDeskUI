<script>

    let itemArray = [];
    let invoiceData = {
        invoiceId: null, // Maintain invoice ID across calls

    async function loadItemsIntoDropdown() {
        try {
            itemArray = await StaticDBHandler.fetchEntityRecord("billingitem", "id,name,price", "", false);
			
			itemArray.sort((a, b) => a.name.localeCompare(b.name));

            $('#itemSelect').empty().append('<option value="">Select an item</option>');
            itemArray.forEach(item => {
                $('#itemSelect').append(new Option(item.name, item.id));
            });

            $('#itemSelect').select2();

            // Add event listener to update price when an item is selected
            $('#itemSelect').on('change', function () {
                const selectedItemId = $(this).val();

                if (selectedItemId) {
                    // Find the selected item in itemArray
                    const selectedItem = itemArray.find(item => item.id === selectedItemId);
                    if (selectedItem) {
                        // Update the price field with the selected item's price
                        $('#itemPrice').val(parseFloat(selectedItem.price).toFixed(2));
                    }
                } else {
                    // Clear the price field if no item is selected
                    $('#itemPrice').val('');
                }
            });

        } catch (error) {
            console.error("Error loading items:", error);
        }
    }

    function loadPackagingSlipIntoDropdown(filterCondition = "") {
        let filterQuery = "";

        // Determine the filter condition
        const today = new Date();
        if (filterCondition === "lastTwoDays") {
            const twoDaysAgo = new Date(today);
            twoDaysAgo.setDate(today.getDate() - 2);
            filterQuery = `slidate >= '${twoDaysAgo.toISOString().split('T')[0]}'`;
        } else if (filterCondition === "lastSevenDays") {
            const sevenDaysAgo = new Date(today);
            sevenDaysAgo.setDate(today.getDate() - 7);
            filterQuery = `slidate >= '${sevenDaysAgo.toISOString().split('T')[0]}'`;
        } else if (filterCondition === "all") {
            filterQuery = ""; // No filter for "All"
        }

        // Load the dropdown with filtered data
        loadFreshDropdown(
            "packagingSlip",
            "id",
            "packagingnumber,packagingcreatedby",
            "packagingitemdetail",
            "id,packagingnumber,packagingcreatedby",
            "packagingnumber",
            "desc",
            filterQuery // Apply the filter query
        ).then(() => {
            $('#packagingSlip').select2(); // Enhance the dropdown with Select2
        }).catch(error => {
            console.error("Error loading packaging slips:", error);
        });
    }

    function loadCustomersIntoDropdown() {
        DropDownHelper.loadDropdown(
            "customerSelect",
            "id",
            "name",
            "billingcustomer",
            "id,name",
            "name",
            "asc",
            ""
        ).then(() => {
            $('#customerSelect').select2();
            // Automatically select "Cash" by default
            const cashOption = $("#customerSelect option").filter(function () {
                return $(this).text().trim().toLowerCase() === "cash / paytm";
            });

            if (cashOption.length > 0) {
                cashOption.prop("selected", true);
                $('#customerSelect').trigger('change'); // Update Select2 UI
            }
        });
    }

    function addItem() {
        const itemName = $('#itemSelect option:selected').text();
        const itemId = $('#itemSelect').val();
        const price = parseFloat($('#itemPrice').val()) || 0;
        const quantity = parseFloat($('#itemQuantity').val()) || 0;
        const totalPrice = price * quantity;
        const customerId = $('#customerSelect').val();
        const customerName = $('#customerSelect option:selected').text();

        if (!customerId || !itemId || !price || !quantity) {
            alert('Please fill all fields correctly before adding.');
            return;
        }

        invoiceData.customerId = customerId;
        invoiceData.customerName = customerName;

        // Add or update item in invoiceData.items
        var item222 = {
            itemId,
            itemName,
            price,
            quantity,
            totalPrice
        };
        invoiceData.items.push(item222);

        renderTable();
        updateTotals();

        // Clear item inputs
        $('#itemSelect').val('').trigger('change');
        $('#itemQuantity').val('');
        $('#itemPrice').val('');
        updateTotals();
        // Pass the index of the newly added item
        const newItemIndex = invoiceData.items.length - 1; // Get the index of the last added item
        submitDataToServer(newItemIndex);
    }

    function addToSummaryClick() {
        try {
            // Get the active tab from the button group
            const activeButton = document.querySelector('#toggleGroup .btn-primary'); // Find the active button
            const activeTab = activeButton ? activeButton.textContent.trim() : null;

            console.log("Active Tab:", activeTab);

            // Perform actions based on the active tab
            if (activeTab === "Item") {
                addItem();
            } else if (activeTab === "Packaging Slip") {
                addPackagingItem();
            } else {
                console.error("Invalid tab selection");
                alert("Please select a valid tab to add an item.");
            }
        } catch (error) {
            console.error("Error handling addToSummary click event:", error);
            alert("An error occurred while processing your request. Please try again.");
        }
    }

    function addPackagingItem() {
        console.log("Adding packaging item...");
        const packagingSlip = document.getElementById('packagingSlip').value;
        if (!packagingSlip) {
            alert("Please select a packaging slip.");
            return;
        }

        // Fetch details of the selected packaging slip
        DBHandler.fetchEntityRecord(
            "packagingitemdetail",
            "itemjson,packagingnumber",
            `id='${packagingSlip}'`, true
        )
            .then(response => {
                if (response && response.length > 0) {
                    const record = response[0]; // Assuming the first record is the required one

                    // Parse and validate itemjson
                    let itemsFromPackagingSlip = {};
                    if (record.itemjson) {
                        try {
                            itemsFromPackagingSlip = JSON.parse(record.itemjson);

                            // Ensure the parsed data is an object
                            if (typeof itemsFromPackagingSlip !== "object") {
                                console.error("Parsed itemjson is not an object:", itemsFromPackagingSlip);
                                itemsFromPackagingSlip = {};
                            }
                        } catch (error) {
                            console.error("Failed to parse itemjson:", error, record.itemjson);
                            itemsFromPackagingSlip = {};
                        }
                    }

                    // Validate, group, and add items
                    const groupedItems = {};

                    // Iterate over each key in the object
                    Object.keys(itemsFromPackagingSlip).forEach(itemName => {
                        const itemArray22 = itemsFromPackagingSlip[itemName]; // Array of item details
                        itemArray22.forEach(item => {
                            const itemId = item.itemId || itemName; // Use itemName as itemId if not provided
                            const quantity = parseFloat(item.meter * item.count, 10) || 0;
                            const selectedItem = itemArray.find(item => item.name === itemId);
                            const price = parseFloat(selectedItem.price);
                            const itemId1 = selectedItem.id;
                            // Initialize or update grouped item
                            if (!groupedItems[itemId]) {
                                groupedItems[itemId] = {
                                    itemId1,
                                    itemName,
                                    price,
                                    quantity: 0,
                                    totalPrice: 0
                                };
                            }

                            groupedItems[itemId].quantity += quantity;
                            groupedItems[itemId].totalPrice += price * quantity;
                        });
                    });

                    // Add grouped items to invoiceData.items
                    Object.values(groupedItems).forEach(groupedItem => {
                        invoiceData.items.push(groupedItem);
                    });

                    // Update the UI
                    renderTable();
                    updateTotals();
                    console.log(`Packaging slip "${packagingSlip}" added successfully.`);
                    // Clear item inputs
                    $('#itemSelect').val('').trigger('change');
                    $('#itemQuantity').val('');
                    $('#itemPrice').val('');
                    submitDataToServer();
                    $('#packagingSlip').val(null).trigger('change');
                    // Set default active section
                    document.querySelector('.toggle-btn[data-target="itemSection"]').click();

                } else {
                    console.warn("No data found for the provided record ID.");
                }

            })
            .catch(error => {
                console.error("Error fetching packaging details:", error);
            });
    }

    function renderTable() {
        $('#summaryTableBody').empty();
        invoiceData.items.forEach((item, index) => {
            const row = `
                                             <tr>
                                                 <td style="text-align:left">${item.itemName}</td>
                                                 <td style="text-align:right" class="editable-cell" data-index="${index}" data-field="price">
                                                     ${item.price.toFixed(2)}
                                                 </td>
                                                 <td style="text-align:center" class="editable-cell" data-index="${index}" data-field="quantity">
                                                     ${item.quantity.toFixed(2)}
                                                 </td>
                                                 <td style="text-align:right">${convertNumberToComma(item.totalPrice)}</td>
                                                 <td>
                                                     <button class="btn btn-danger btn-sm delete-row" data-index="${index}">
                                                         <i class="fa fa-trash"></i>
                                                     </button>
                                                 </td>
                                             </tr>`;
            $('#summaryTableBody').append(row);
        });

        attachFooterEditEvents();
        attachDeleteHandlers();
        toggleTableSectionVisibility();
    }

function attachFooterEditEvents() {
    $(".footer-editable").off("dblclick").on("dblclick", function () {
        let td = $(this);
        let field = td.data("field");
        let currentValue = td.text().trim();

        // If already editing, do nothing
        if (td.find("input").length > 0) return;

        let input = $(`<input type="text" class="form-control form-control-sm" 
                              style="text-align:right;" value="${currentValue}">`);

        td.empty().append(input);
        input.focus();

        // Save on blur
        input.on("blur", function () {
            saveFooterValue(field, input.val(), td);
        });

        // Save on Enter
        input.on("keypress", function (e) {
            if (e.which === 13) {
                saveFooterValue(field, input.val(), td);
            }
        });
    });
}

async function saveFooterValue(field, newValue, td) {
    try {
        let value = parseFloat(newValue);
        if (isNaN(value)) value = 0;
        
        const updatedData = {
            cashreceived: value,
        };

        invoiceData.cashReceived  =value;

        td.text(value.toFixed(2));
        updateTotals();
        await DBHandler.submitRecordData(
            'billinvoice',
            updatedData,
            invoiceData.invoiceId,
            false
        );


        showSuccessMessage('Footer values updated successfully!');
    }
    catch (err) {
        console.error("Error updating footer:", err);
        alert("Failed to update footer values.");
    }
    finally {
        hideLoader();
    }
}



    function attachDoubleClickHandlers() {
        $('#summaryTableBody').on('dblclick', '.editable-cell', function () {
            const cell = $(this);
            const index = cell.data('index'); // Retrieve the item index from data attribute
            const field = cell.data('field'); // Retrieve the field (e.g., price, quantity)

            // Get the current value directly from the invoiceData.items array
            const currentValue = invoiceData.items[index][field];

            // Create an input element for editing
            const input = $('<input>', {
                type: 'number',
                style: 'width: 100%;',
                class: 'form-control form-control-sm',
                value: currentValue.toFixed(2), // Use the value from the array
                step: '0.01',
            });

            // Replace cell content with input
            cell.html(input);
            input.focus();

            // Automatically select the input text
            input[0].select();

            // Save on blur or enter key
            input.on('blur keyup', function (event) {
                if (event.type === 'blur' || event.key === 'Enter') {
                    const newValue = parseFloat(input.val()) || 0;

                    // Update the invoiceData.items array and calculate the total price
                    invoiceData.items[index][field] = newValue;
                    invoiceData.items[index].totalPrice =
                        invoiceData.items[index].price * invoiceData.items[index].quantity;

                    // Replace input with updated value
                    cell.html(newValue.toFixed(2));
                    renderTable(); // Re-render the table to reflect changes
                    updateTotals();
                    submitDataToServer(index); // Submit updated data to the server
                }
            });
        });
    }

    function convertNumberToComma(number) {
        // Convert input to a valid number
        const num = parseFloat(number);

        // Check if the input is a valid number
        if (isNaN(num)) {
            console.error("Invalid number provided:", number);
            return "0.00"; // Return a default value
        }

        // Split the number into integer and decimal parts
        const parts = num.toFixed(2).split("."); // Split into integer and decimal parts
        let integerPart = parts[0];
        const decimalPart = parts[1];

        // Apply Indian comma formatting to the integer part
        const lastThreeDigits = integerPart.slice(-3); // Get the last three digits
        const otherDigits = integerPart.slice(0, -3); // Get the rest of the digits

        // Format the digits with commas
        const formattedInteger = otherDigits.replace(/\B(?=(\d{2})+(?!\d))/g, ",") + (otherDigits ? "," : "") + lastThreeDigits;

        // Combine the formatted integer and decimal parts
        return `${formattedInteger}.${decimalPart}`;
    }





    function attachDeleteHandlers() {
        $('.delete-row').on('click', function () {
            const index = $(this).data('index'); // Get the row index from the button
            invoiceData.items.splice(index, 1); // Remove the item from the array
            renderTable(); // Re-render the table
            updateTotals(); // Update totals after deletion
            submitDataToServer();

            item.itemName,
            convertNumberToComma(item.price),
            convertNumberToComma(item.quantity),
            convertNumberToComma(item.totalPrice),
        ]);
    });

    // Add Total Row
    const totalQty = $('#totalQuantity').text().trim();
    const totalPrice = convertNumberToComma(getTotalPrice());

    tableData.push([
        "Total",
        "",
        totalQty,
        totalPrice
    ]);

    // Add Cash Received & Balance only if >0
    const cashReceived = Number(invoiceData.cashReceived || 0);
    const balance = Number((getTotalPrice() - cashReceived) || 0);

    if (cashReceived > 0) {
        tableData.push([
            "Cash/Paytm Received",
            "",
            "",
            convertNumberToComma(cashReceived)
        ]);

        tableData.push([
            "Pending Balance",
            "",
            "",
            convertNumberToComma(balance)
        ]);
    }

    // Table Headers
    const headers = [["Item Name", "Price", "Quantity", "Total Price"]];

    // Generate PDF Table
    doc.autoTable({
        head: headers,
        body: tableData,
        startY: 35,
        tableLineWidth: 0.1,
        tableLineColor: [0, 0, 0],

        styles: {
            fontSize: 10,
            lineWidth: 0.1,
            valign: "middle"
        },
        headStyles: {
            fillColor: null,
            textColor: [0, 0, 0],
            fontSize: 12,
            fontStyle: "bold",
            halign: "center",
            lineWidth: 0.2
        },
        bodyStyles: {
            textColor: [50, 50, 50],
            lineColor: [0, 0, 0]
        },

        columnStyles: {
            0: { halign: "left" },
            1: { halign: "right" },
            2: { halign: "right" },
            3: { halign: "right" }
        },

        alternateRowStyles: { fillColor: null },

        didDrawCell: function (data) {
            const lastRowIndex = tableData.length - 1;
            if (data.row.index >= tableData.length - (cashReceived > 0 ? 3 : 1)) {
                doc.setFont("helvetica", "bold");
            }
        }
    });

    doc.save(`Estimate_${invoiceNumber}.pdf`);
}

    function submitDataToServer(itemIndex) {
        try {
            if (!invoiceData.customerId) {
                const customerId = $('#customerSelect').val();
                const customerName = $('#customerSelect option:selected').text();
                if (!customerId) {
                    alert('Please fill all fields correctly before adding.');
                    return;
                }
                invoiceData.customerId = customerId;
                invoiceData.customerName = customerName;
            }

            const formData = {
                customerid: invoiceData.customerId,
                customername: invoiceData.customerName,
                billjson: JSON.stringify(invoiceData.items),
                totalprice: parseFloat(getTotalPrice()),
            };
            if (invoiceData.invoicedate) {
                formData["invoicedate"] = invoiceData.invoicedate;
            }
            else {
                // Get today's date in YYYY-MM-DD format
                const today = new Date();
                const yyyy = today.getFullYear();
                const mm = String(today.getMonth() + 1).padStart(2, '0'); // Months are zero-based
                const dd = String(today.getDate()).padStart(2, '0');

                formData["invoicedate"] = `${yyyy}-${mm}-${dd}`;
                invoiceData.invoicedate = formData["slipdate"];

            }
            const addButton = document.getElementById('addToSummary');

            // Add spinner to the "Add" button and disable it
            const loader = document.createElement('span');
            loader.classList.add('spinner-border', 'spinner-border-sm', 'text-light');
            loader.style.marginLeft = '10px';
            addButton.appendChild(loader);
            addButton.disabled = true;

            if (invoiceData.invoiceId && itemIndex) {
                // If invoiceId exists, no need to submit main invoice data
                processItemDetail(itemIndex);

            }

            // Submit main invoice data and get the invoiceId
            DBHandler.submitRecordData("billinvoice", formData, invoiceData.invoiceId, false)
                .then(response => {
                    if (response) {
                        if (!invoiceData.invoiceId) {
                            invoiceData.invoiceId = response;
                            if (itemIndex)
                                processItemDetail(itemIndex); // Submit item details after main invoice
                            // Fetch and display the invoice number
                            return StaticDBHandler.fetchEntityRecord(
                                "billinvoice",
                                "invoicenumber,createdon",
                                `id='${invoiceData.invoiceId}'`
                            ).then((p) => {
                                invoiceData.createdon = p[0].createdon;
                                invoiceData.invoiceNumber = p[0].invoicenumber;
                                $('#invoiceNumber').text(invoiceData.invoiceNumber);
                                $('#invoiceHeading').removeClass('d-none');
                            });
                        }
                    }
                })
                .catch(error => {
                    console.error("Error submitting data:", error);
                    alert("Failed to submit the data. Please try again.");
                })
                .finally(() => {
                    // Remove spinner and re-enable the button
                    loader.remove();
                    addButton.disabled = false;
                });
        } catch (error) {
            console.error("Error in submitDataToServer:", error);
            alert("An unexpected error occurred. Please try again.");
        }
    }

    function updateTotals() {
    let totalQty = 0;

    invoiceData.items.forEach(item => {
        totalQty += item.quantity;
        totalPrice += item.totalPrice;
    });

    // Update totals
    $('#totalQuantity').text(convertNumberToComma(totalQty));
    $('#totalPrice').text(convertNumberToComma(totalPrice));

    // Update footer values
    const cashReceived = invoiceData.cashReceived || 0;
    const balance = totalPrice - cashReceived;

    // Update UI
    $('#cashReceivedCell').text(convertNumberToComma(cashReceived));
    $('#balanceCell').text(convertNumberToComma(balance));
}



    function getTotalPrice() {
        const totalPriceText = $('#totalPrice').text().replace(/,/g, ""); // Remove all commas
        const totalPrice = parseFloat(totalPriceText); // Convert to a number

        if (isNaN(totalPrice)) {
            console.error("Failed to parse total price:", totalPriceText);
            return 0; // Return 0 if parsing fails
        }

        return totalPrice;
    }

        showLoader();

        DBHandler.fetchEntityRecord(

    function populatetab() {
        // Attach click event listeners to toggle buttons
        document.querySelectorAll('.toggle-btn').forEach(button => {
            button.addEventListener('click', () => {

                document.querySelectorAll('.toggle-section').forEach(section => {
                    section.classList.add('d-none');
                });

                // Remove active state from all buttons
                document.querySelectorAll('.toggle-btn').forEach(btn => {
                    btn.classList.remove('btn-primary');
                    btn.classList.add('btn-outline-primary');
                });

                // Show the targeted section
                const target = button.getAttribute('data-target');
                document.getElementById(target).classList.remove('d-none');

                // Set active state for the clicked button
                button.classList.remove('btn-outline-primary');
                button.classList.add('btn-primary');
            });

    function handlePackagingSlipLoadChange(event) {
        const selectedOption = event.target.value;

        let filterQuery = "";
        const today = new Date();

        // Determine filter query based on selected option
        if (selectedOption === "lastTwoDays") {
            const twoDaysAgo = new Date(today);
            twoDaysAgo.setDate(today.getDate() - 2);
            filterQuery = `slipdate >= '${twoDaysAgo.toISOString().split('T')[0]}'`;
        } else if (selectedOption === "lastSevenDays") {
            const sevenDaysAgo = new Date(today);
            sevenDaysAgo.setDate(today.getDate() - 7);
            filterQuery = `slipdate >= '${sevenDaysAgo.toISOString().split('T')[0]}'`;
        } else if (selectedOption === "all") {
            filterQuery = ""; // No filter for "All"
        }

        // Call the function to load packaging slips
        loadFreshDropdown(
            "packagingSlip",
            "id",
            "packagingnumber,packagingcreatedby",
            "packagingitemdetail",
            "id,packagingnumber,packagingcreatedby",
            "packagingnumber",

    function printInvoice() {
        try {
            const lines = [];
            const lineWidth = 48; // Character width for a 3-inch receipt
debugger;
            const rawDate = new Date(invoiceData.createdon);
            const day = rawDate.getDate().toString().padStart(2, '0');
            const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            const month = monthNames[rawDate.getMonth()];
            const year = rawDate.getFullYear();
            const dateofCreation = `${day}-${month}-${year}`;
            // Add Invoice Number
            const invoiceNumber = `Estimate Number: ${invoiceData.invoiceNumber || '...'}`;
            lines.push(centerText(invoiceNumber, lineWidth));
            lines.push(centerText(dateofCreation, lineWidth));
            lines.push('-'.repeat(lineWidth)); // Divider line

            // Add Table Header with proper spacing
            const header = `${'Item Name'.padEnd(20, ' ')}${'Price'.padStart(8, ' ')}${'Qty'.padStart(7, ' ')}${'Total'.padStart(13, ' ')}`;
            lines.push(header);
            lines.push('-'.repeat(lineWidth));

            let totalQty = 0;
            let totalPrice = 0;
            const boldOn = '\x1b\x45\x01';  // Turn bold mode on
            const boldOff = '\x1b\x45\x00'; // Turn bold mode off

            // Add Invoice Items
            invoiceData.items.forEach(item => {
                let itemName = item.itemName;
                const price = convertNumberToComma(item.price).padStart(8, ' ');
                const quantity = item.quantity.toFixed(2).padStart(7, ' ');
                const total = convertNumberToComma(item.totalPrice).padStart(13, ' ');
                if (item.totalPrice != 0) {
                    // Split item name into multiple lines if it exceeds 20 characters
                    while (itemName.length > 20) {
                        lines.push(boldOn + itemName.substring(0, 20) + boldOff);
                        itemName = itemName.substring(20); // Trim the processed part
                    }

                    // Add the last part of the item name with the other columns
                    lines.push(`${boldOn}${itemName.padEnd(20, ' ')}${boldOff}${price}${quantity}${total}`);

                    totalQty += parseFloat(item.quantity);
                    totalPrice += parseFloat(item.totalPrice);
                }
            });

            totalPrice = Math.round(totalPrice);

            // Add Total Section
            lines.push('-'.repeat(lineWidth));
            lines.push(
                `${boldOn}${'Total'.padEnd(20, ' ')}${''.padStart(8, ' ')}${totalQty.toFixed(2).padStart(7, ' ')}${convertNumberToComma(totalPrice).padStart(13, ' ')}${boldOff}`
            );
            lines.push('-'.repeat(lineWidth));

             const cashReceived = Number(invoiceData.cashReceived || 0);
            const balance = Number((totalPrice-cashReceived) || 0);

        if (cashReceived > 0) {
            // Cash Received row
            lines.push(
                `${boldOn}${'Cash Received'.padEnd(20, ' ')}` +
                `${''.padStart(15, ' ')}` +
                `${convertNumberToComma(cashReceived).padStart(13, ' ')}${boldOff}`
            );

            // Pending Balance row
            lines.push(
                `${boldOn}${'Pending Balance'.padEnd(20, ' ')}` +
                `${''.padStart(15, ' ')}` +
                `${convertNumberToComma(balance).padStart(13, ' ')}${boldOff}`
            );

            lines.push('-'.repeat(lineWidth));
        }

            // Add Footer (Optional)
            lines.push(centerText('Thank you for your purchase!', lineWidth));
            lines.push('-'.repeat(lineWidth));

            // Send Lines to Printer
            printerMinPrint(lines);
        } catch (error) {
            console.error('Error printing invoice:', error);
            alert(`Error printing: ${error.message}`);
        }
    }

async function saveInvoiceNumber(newValue) {
    if (!newValue.trim()) {
        alert('Invoice number cannot be empty.');
        return;
    }

    try {
        showLoader();

        // Prepare data for DB
        const updatedData = {
            invoicenumberwithcustomername : `${newValue}`
        };


        // Update DB
        await DBHandler.submitRecordData('billinvoice', updatedData, invoiceData.invoiceId, false);

        // Update invoiceData object
        invoiceData.invoiceNumber = newValue;

        // ✅ Convert back to span after save
        const span = document.createElement('span');
        span.id = 'invoiceNumber';
        span.className = 'editable-text';
        span.textContent = newValue;
        span.onclick = enableInvoiceEdit;

        // Replace only the specific input we created
        const input = document.querySelector('#invoiceNumberInput'); // Use a unique ID
        if (input) {
            input.replaceWith(span);
        }

        showSuccessMessage('Invoice number updated successfully!');
    } catch (error) {
        console.error('Error updating invoice number:', error);
        alert('Failed to update invoice number.');
    } finally {
        hideLoader();
    }
}

function enableInvoiceEdit() {
    const span = document.getElementById('invoiceNumber');
    const currentValue = span.textContent.trim();

    // Create input field with unique ID
    const input = document.createElement('input');
    input.type = 'text';
    input.id = 'invoiceNumberInput'; // ✅ Unique ID
    input.value = currentValue;
    input.className = 'form-control';
    input.style.width = '200px';

    span.replaceWith(input);
    input.focus();

    input.addEventListener('blur', () => saveInvoiceNumber(input.value));
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            saveInvoiceNumber(input.value);
        }
    });
}
