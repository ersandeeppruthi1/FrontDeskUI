	<script>
		(function () {
			if (window.AuthManager) return;

			function getCookie(name) {
				const key = `${name}=`;
				const decoded = decodeURIComponent(document.cookie || '');
				const chunks = decoded.split(';');
				for (let i = 0; i < chunks.length; i++) {
					const item = chunks[i].trim();
					if (item.indexOf(key) === 0) {
						return item.substring(key.length);
					}
				}
				return '';
			}

			function firstNonEmpty(values) {
				for (let i = 0; i < values.length; i++) {
					if (values[i]) return values[i];
				}
				return '';
			}

			function parseJwtPayload(token) {
				try {
					if (!token || token.split('.').length < 2) return {};
					const base64Url = token.split('.')[1];
					const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
					return JSON.parse(atob(base64));
				} catch (e) {
					return {};
				}
			}

			function resolveToken() {
				const url = new URL(window.location.href);
				return firstNonEmpty([
					url.searchParams.get('dataToken') || '',
					url.searchParams.get('authToken') || '',
					url.searchParams.get('token') || '',
					url.searchParams.get('accessToken') || '',
					localStorage.getItem('dataToken') || '',
					localStorage.getItem('authToken') || '',
					localStorage.getItem('AuthToken') || '',
					localStorage.getItem('token') || '',
					localStorage.getItem('accessToken') || '',
					sessionStorage.getItem('dataToken') || '',
					sessionStorage.getItem('authToken') || '',
					sessionStorage.getItem('token') || '',
					sessionStorage.getItem('accessToken') || '',
					getCookie('dataToken') || getCookie('DataToken') || '',
					getCookie('authToken') || getCookie('AuthToken') || '',
					getCookie('token') || getCookie('Token') || '',
					getCookie('accessToken') || getCookie('AccessToken') || '',
					window.dataToken || '',
					window.authToken || window.AuthToken || ''
				]);
			}

			function resolveUserId() {
				const url = new URL(window.location.href);
				const explicitUserId = firstNonEmpty([
					url.searchParams.get('userid') || '',
					url.searchParams.get('userId') || '',
					url.searchParams.get('uid') || '',
					localStorage.getItem('userid') || '',
					localStorage.getItem('userId') || '',
					localStorage.getItem('uid') || '',
					sessionStorage.getItem('userid') || '',
					sessionStorage.getItem('userId') || '',
					sessionStorage.getItem('uid') || '',
					getCookie('userid') || '',
					getCookie('userId') || '',
					getCookie('UserId') || ''
				]);

				if (explicitUserId) return String(explicitUserId).slice(0, 36);

				const payload = parseJwtPayload(resolveToken());
				const id = firstNonEmpty([
					payload.userId,
					payload.userid,
					payload.uid,
					payload.nameid,
					payload.sub,
					payload['http://schemas.xmlsoap.org/ws/2005/05/identity/claims/nameidentifier']
				]);

				return String(id || '0').slice(0, 36);
			}

			window.AuthManager = {
				getDataToken: resolveToken,
				getAuthToken: resolveUserId
			};
		})();
	</script>

	<script src="https://apisit.vsservices.in/JS/Master/DBHandler.js?id=081220258" type="module"></script>

<body>
	<div class="page-shell">
		<div class="page-card">
			<div class="page-content">
				<h1 class="page-title">Bill Invoice Management</h1>

				<div class="card-block mb-3">
					<div class="section-title">Invoice Details</div>
					<form id="invoiceForm" class="needs-validation" novalidate>
						<input type="hidden" id="invoiceId" />
						<div class="row g-3">
							<div class="col-md-3">
								<label for="invoiceNumber" class="form-label">Invoice Number</label>
								<input type="number" id="invoiceNumber" class="form-control" required min="1" />
								<div class="invalid-feedback">Invoice Number is required.</div>
							</div>
							<div class="col-md-5">
								<label for="invoiceName" class="form-label">Name</label>
								<input type="text" id="invoiceName" class="form-control" placeholder="Invoice Name" maxlength="255" />
							</div>
							<div class="col-md-4">
								<label for="invoiceDate" class="form-label">Invoice Date</label>
								<input type="date" id="invoiceDate" class="form-control" required />
								<div class="invalid-feedback">Invoice Date is required.</div>
							</div>

							<div class="col-md-4">
								<label for="customerSelect" class="form-label">Customer</label>
								<select id="customerSelect" class="form-select" required></select>
								<div class="invalid-feedback">Customer is required.</div>
							</div>
							<div class="col-md-4">
								<label for="customerName" class="form-label">Customer Name</label>
								<input type="text" id="customerName" class="form-control" readonly />
							</div>
							<div class="col-md-4">
								<label for="invoiceLabel" class="form-label">Invoice + Customer Label</label>
								<input type="text" id="invoiceLabel" class="form-control" readonly />
							</div>
						</div>

						<hr class="my-4" />

						<div class="section-title mb-2">Bill Items</div>
						<div class="row g-3 align-items-end">
							<div class="col-md-6">
								<label for="itemSelect" class="form-label">Item</label>
								<select id="itemSelect" class="form-select"></select>
							</div>
							<div class="col-md-2">
								<label for="itemQty" class="form-label">Qty</label>
								<input type="number" id="itemQty" class="form-control" min="1" step="1" value="1" />
							</div>
							<div class="col-md-2">
								<label for="itemPrice" class="form-label">Price</label>
								<input type="number" id="itemPrice" class="form-control" min="0" step="0.01" />
							</div>
							<div class="col-md-2">
								<button type="button" id="addItemBtn" class="btn btn-outline-primary w-100">Add Item</button>
							</div>
						</div>

						<div class="table-responsive mt-3">
							<table class="table align-middle">
								<thead>
									<tr>
										<th>Item</th>
										<th>Qty</th>
										<th>Price</th>
										<th>Amount</th>
										<th class="text-center">Action</th>
									</tr>
								</thead>
								<tbody id="lineItemsBody"></tbody>
							</table>
						</div>

						<div class="row g-3 mt-1">
							<div class="col-md-4">
								<label for="cashReceived" class="form-label">Cash Received</label>
								<input type="number" id="cashReceived" class="form-control" min="0" step="0.01" value="0" />
							</div>
							<div class="col-md-4">
								<label for="totalPrice" class="form-label">Total Price</label>
								<input type="number" id="totalPrice" class="form-control" readonly />
							</div>
							<div class="col-md-4">
								<label for="dueAmount" class="form-label">Due Amount</label>
								<input type="number" id="dueAmount" class="form-control" readonly />
							</div>
						</div>

						<div class="mt-3">
							<label for="billJson" class="form-label">Bill JSON</label>
							<textarea id="billJson" class="form-control" readonly></textarea>
						</div>

						<div class="d-flex justify-content-end flex-wrap gap-2 mt-3">
							<button type="button" id="resetBtn" class="btn btn-outline-secondary">Reset</button>
							<button type="submit" id="saveBtn" class="btn btn-primary">
								<span class="btn-label">Save Invoice</span>
							</button>
						</div>
					</form>
				</div>

				<div class="card-block table-wrap">
					<div id="loadingOverlay" class="loading-overlay active">
						<div class="spinner-card">
							<div class="spinner-border spinner-border-sm text-primary" role="status" aria-hidden="true"></div>
							<span>Loading invoices...</span>
						</div>
					</div>

					<div class="toolbar-row">
						<div class="section-title mb-0">Invoice List</div>
						<div class="search-wrap position-relative">
							<input type="text" id="searchInput" class="form-control" placeholder="Search by invoice number, customer or name" />
							<i class="fa fa-search"></i>
						</div>
					</div>

					<div class="summary-pills">
						<div class="pill">Invoices: <span id="invoiceCount">0</span></div>
						<div class="pill">Total Amount: <span id="invoiceTotal">0.00</span></div>
					</div>

					<div class="table-responsive mt-3">
						<table class="table align-middle">
							<thead>
								<tr>
									<th>Invoice #</th>
									<th>Name</th>
									<th>Customer</th>
									<th>Date</th>
									<th>Total</th>
									<th>Cash Received</th>
									<th>Label</th>
									<th class="text-center">Actions</th>
								</tr>
							</thead>
							<tbody id="invoiceTableBody"></tbody>
						</table>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script>
		const state = {
			customers: [],
			items: [],
			invoices: [],
			filteredInvoices: [],
			lineItems: [],
			editingId: null
		};

		const refs = {
			invoiceForm: document.getElementById('invoiceForm'),
			invoiceId: document.getElementById('invoiceId'),
			invoiceNumber: document.getElementById('invoiceNumber'),
			invoiceName: document.getElementById('invoiceName'),
			invoiceDate: document.getElementById('invoiceDate'),
			customerSelect: document.getElementById('customerSelect'),
			customerName: document.getElementById('customerName'),
			invoiceLabel: document.getElementById('invoiceLabel'),
			itemSelect: document.getElementById('itemSelect'),
			itemQty: document.getElementById('itemQty'),
			itemPrice: document.getElementById('itemPrice'),
			addItemBtn: document.getElementById('addItemBtn'),
			lineItemsBody: document.getElementById('lineItemsBody'),
			cashReceived: document.getElementById('cashReceived'),
			totalPrice: document.getElementById('totalPrice'),
			dueAmount: document.getElementById('dueAmount'),
			billJson: document.getElementById('billJson'),
			resetBtn: document.getElementById('resetBtn'),
			saveBtn: document.getElementById('saveBtn'),
			searchInput: document.getElementById('searchInput'),
			invoiceTableBody: document.getElementById('invoiceTableBody'),
			invoiceCount: document.getElementById('invoiceCount'),
			invoiceTotal: document.getElementById('invoiceTotal'),
			loadingOverlay: document.getElementById('loadingOverlay')
		};

		function setLoading(flag, message = 'Loading invoices...') {
			refs.loadingOverlay.classList.toggle('active', flag);
			const label = refs.loadingOverlay.querySelector('span');
			if (label) label.textContent = message;
		}

		function escapeHtml(value) {
			return String(value ?? '')
				.replaceAll('&', '&amp;')
				.replaceAll('<', '&lt;')
				.replaceAll('>', '&gt;')
				.replaceAll('"', '&quot;')
				.replaceAll("'", '&#39;');
		}

		function toNumber(value) {
			const n = parseFloat(value);
			return Number.isFinite(n) ? n : 0;
		}

		function toInt(value, fallback = 0) {
			const n = parseInt(value, 10);
			return Number.isFinite(n) ? n : fallback;
		}

		function formatMoney(value) {
			return toNumber(value).toFixed(2);
		}

		function formatDate(value) {
			if (!value) return '-';
			const d = new Date(value);
			if (Number.isNaN(d.getTime())) return '-';
			return d.toLocaleDateString('en-GB');
		}

		function getTodayIso() {
			const d = new Date();
			const y = d.getFullYear();
			const m = String(d.getMonth() + 1).padStart(2, '0');
			const day = String(d.getDate()).padStart(2, '0');
			return `${y}-${m}-${day}`;
		}

		function computeNextInvoiceNumber() {
			if (!state.invoices.length) return 1;
			const maxNo = Math.max(...state.invoices.map(x => toInt(x.invoicenumber, 0)));
			return maxNo + 1;
		}

		function updateInvoiceLabel() {
			const number = refs.invoiceNumber.value.trim();
			const customerName = refs.customerName.value.trim();
			refs.invoiceLabel.value = number && customerName
				? `${number}-${customerName}`
				: '';
		}

		function buildBillJson() {
			return JSON.stringify(state.lineItems.map(x => ({
				itemid: x.itemid,
				itemname: x.itemname,
				qty: x.qty,
				price: x.price,
				amount: x.amount
			})));
		}

		function recalculateTotals() {
			const total = state.lineItems.reduce((sum, row) => sum + toNumber(row.amount), 0);
			const cash = toNumber(refs.cashReceived.value);
			refs.totalPrice.value = formatMoney(total);
			refs.dueAmount.value = formatMoney(Math.max(0, total - cash));
			refs.billJson.value = buildBillJson();
		}

		function renderLineItems() {
			if (!state.lineItems.length) {
				refs.lineItemsBody.innerHTML = `
					<tr>
						<td colspan="5" class="empty-state">No items added yet.</td>
					</tr>
				`;
				recalculateTotals();
				return;
			}

			refs.lineItemsBody.innerHTML = state.lineItems.map((row, index) => `
				<tr>
					<td>${escapeHtml(row.itemname)}</td>
					<td>${row.qty}</td>
					<td>${formatMoney(row.price)}</td>
					<td>${formatMoney(row.amount)}</td>
					<td class="text-center">
						<button type="button" class="action-btn" data-action="remove-line" data-index="${index}" title="Remove item">
							<i class="fa fa-trash"></i>
						</button>
					</td>
				</tr>
			`).join('');

			recalculateTotals();
		}

		function renderCustomers() {
			const options = ['<option value="">Select Customer</option>']
				.concat(state.customers.map(c => `<option value="${escapeHtml(c.id)}">${escapeHtml(c.customername || c.name || '')}</option>`));
			refs.customerSelect.innerHTML = options.join('');
		}

		function renderItems() {
			const options = ['<option value="">Select Item</option>']
				.concat(state.items.map(i => `<option value="${escapeHtml(i.id)}" data-price="${escapeHtml(i.price)}">${escapeHtml(i.name || '')}</option>`));
			refs.itemSelect.innerHTML = options.join('');
		}

		function updateCustomerFromSelect() {
			const id = refs.customerSelect.value;
			const customer = state.customers.find(c => String(c.id) === String(id));
			refs.customerName.value = customer ? String(customer.customername || customer.name || '') : '';
			updateInvoiceLabel();
		}

		async function fetchRecordsWithFallback(entity, columnSets) {
			let lastError = null;
			for (let i = 0; i < columnSets.length; i++) {
				try {
					const records = await DBHandler.fetchEntityRecord(entity, columnSets[i], '', false);
					return records || [];
				} catch (error) {
					lastError = error;
				}
			}

			if (lastError) {
				throw lastError;
			}

			return [];
		}

		function handleItemSelect() {
			const id = refs.itemSelect.value;
			const item = state.items.find(i => String(i.id) === String(id));
			refs.itemPrice.value = item ? formatMoney(item.price) : '';
		}

		function addLineItem() {
			const id = refs.itemSelect.value;
			const qty = Math.max(1, toInt(refs.itemQty.value, 1));
			const price = Math.max(0, toNumber(refs.itemPrice.value));
			const item = state.items.find(i => String(i.id) === String(id));

			if (!item) {
				alert('Please select an item.');
				return;
			}

			const existing = state.lineItems.find(x => String(x.itemid) === String(id));
			if (existing) {
				existing.qty += qty;
				existing.price = price;
				existing.amount = existing.qty * existing.price;
			} else {
				state.lineItems.push({
					itemid: item.id,
					itemname: item.name,
					qty: qty,
					price: price,
					amount: qty * price
				});
			}

			refs.itemQty.value = '1';
			renderLineItems();
		}

		function removeLineItem(index) {
			state.lineItems = state.lineItems.filter((_, i) => i !== index);
			renderLineItems();
		}

		function applyInvoiceFilter() {
			const term = refs.searchInput.value.trim().toLowerCase();
			state.filteredInvoices = state.invoices.filter(row => {
				if (!term) return true;
				const bag = [
					row.invoicenumber,
					row.name,
					row.customername,
					row.invoicenumberwithcustomername,
					formatDate(row.invoicedate)
				].join(' ').toLowerCase();
				return bag.includes(term);
			});
			renderInvoiceTable();
		}

		function renderInvoiceTable() {
			refs.invoiceCount.textContent = String(state.filteredInvoices.length);
			refs.invoiceTotal.textContent = formatMoney(state.filteredInvoices.reduce((sum, row) => sum + toNumber(row.totalprice), 0));

			if (!state.filteredInvoices.length) {
				refs.invoiceTableBody.innerHTML = `
					<tr>
						<td colspan="8" class="empty-state">
							<div class="fw-semibold mb-1">No invoices found</div>
							<div class="small">Save a new invoice or change your search text.</div>
						</td>
					</tr>
				`;
				return;
			}

			refs.invoiceTableBody.innerHTML = state.filteredInvoices.map(row => `
				<tr>
					<td>${escapeHtml(row.invoicenumber)}</td>
					<td>${escapeHtml(row.name || '-')}</td>
					<td>${escapeHtml(row.customername || '-')}</td>
					<td>${escapeHtml(formatDate(row.invoicedate))}</td>
					<td>${formatMoney(row.totalprice)}</td>
					<td>${formatMoney(row.cashreceived)}</td>
					<td>${escapeHtml(row.invoicenumberwithcustomername || '-')}</td>
					<td class="text-center">
						<div class="d-inline-flex gap-2">
							<button type="button" class="action-btn" data-action="edit" data-id="${escapeHtml(row.id)}" title="Edit">
								<i class="fa fa-pen"></i>
							</button>
							<button type="button" class="action-btn" data-action="delete" data-id="${escapeHtml(row.id)}" title="Delete">
								<i class="fa fa-trash"></i>
							</button>
						</div>
					</td>
				</tr>
			`).join('');
		}

		function resetForm() {
			state.editingId = null;
			state.lineItems = [];
			refs.invoiceForm.reset();
			refs.invoiceForm.classList.remove('was-validated');
			refs.invoiceId.value = '';
			refs.invoiceDate.value = getTodayIso();
			refs.cashReceived.value = '0';
			refs.invoiceNumber.value = String(computeNextInvoiceNumber());
			refs.invoiceName.value = '';
			refs.customerName.value = '';
			refs.invoiceLabel.value = '';
			refs.itemPrice.value = '';
			refs.saveBtn.querySelector('.btn-label').textContent = 'Save Invoice';
			renderLineItems();
		}

		function parseBillJson(text) {
			if (!text) return [];
			try {
				const arr = JSON.parse(text);
				if (!Array.isArray(arr)) return [];
				return arr.map(x => ({
					itemid: x.itemid || x.id || '',
					itemname: x.itemname || x.name || 'Item',
					qty: Math.max(1, toInt(x.qty, 1)),
					price: Math.max(0, toNumber(x.price)),
					amount: Math.max(0, toNumber(x.amount || toNumber(x.qty) * toNumber(x.price)))
				}));
			} catch (e) {
				return [];
			}
		}

		function fillFormForEdit(id) {
			const invoice = state.invoices.find(x => String(x.id) === String(id));
			if (!invoice) return;

			state.editingId = invoice.id;
			refs.invoiceId.value = invoice.id;
			refs.invoiceNumber.value = String(toInt(invoice.invoicenumber, 0) || '');
			refs.invoiceName.value = invoice.name || '';
			refs.invoiceDate.value = (invoice.invoicedate || '').split('T')[0] || '';
			refs.customerSelect.value = invoice.customerid || '';
			refs.customerName.value = invoice.customername || '';
			refs.invoiceLabel.value = invoice.invoicenumberwithcustomername || '';
			refs.cashReceived.value = formatMoney(invoice.cashreceived);
			state.lineItems = parseBillJson(invoice.billjson);
			refs.saveBtn.querySelector('.btn-label').textContent = 'Update Invoice';
			renderLineItems();
			updateInvoiceLabel();
			window.scrollTo({ top: 0, behavior: 'smooth' });
		}

		async function deleteInvoice(id) {
			const invoice = state.invoices.find(x => String(x.id) === String(id));
			if (!invoice) return;
			if (!confirm(`Delete invoice #${invoice.invoicenumber}?`)) return;

			try {
				if (typeof deleteRecordData === 'function') {
					await deleteRecordData('billinvoice', [id], true, true);
				}
				state.invoices = state.invoices.filter(x => String(x.id) !== String(id));
				applyInvoiceFilter();
				if (String(state.editingId) === String(id)) {
					resetForm();
				}
			} catch (e) {
				console.error('Error deleting invoice:', e);
				alert('Failed to delete invoice.');
			}
		}

		async function loadMasterData() {
			if (!window.DBHandler || typeof DBHandler.fetchEntityRecord !== 'function') {
				alert('DBHandler is not available in this context.');
				return;
			}

			const [customersResult, itemsResult, invoicesResult] = await Promise.allSettled([
				fetchRecordsWithFallback('billingcustomer', ['id,customername', 'id,name', 'id,customername,name']),
				DBHandler.fetchEntityRecord('billingitem', 'id,name,price,isforpackaging', ''),
				fetchRecordsWithFallback('billinvoice', [
					'id,createdon,name,invoicenumber,billjson,customerid,customername,totalprice,invoicedate,invoicenumberwithcustomername,cashreceived',
					'id,createdon,name,invoicenumber,billjson,customerid,totalprice,invoicedate,invoicenumberwithcustomername,cashreceived'
				])
			]);

			const customers = customersResult.status === 'fulfilled' ? (customersResult.value || []) : [];
			const items = itemsResult.status === 'fulfilled' ? (itemsResult.value || []) : [];
			const invoices = invoicesResult.status === 'fulfilled' ? (invoicesResult.value || []) : [];

			if (customersResult.status !== 'fulfilled') {
				console.error('Failed to load customers:', customersResult.reason);
			}

			if (itemsResult.status !== 'fulfilled') {
				console.error('Failed to load items:', itemsResult.reason);
			}

			if (invoicesResult.status !== 'fulfilled') {
				console.error('Failed to load invoices:', invoicesResult.reason);
			}

			state.customers = customers.map(x => ({
				id: x.id,
				customername: x.customername || x.name || ''
			})).filter(x => String(x.id || '').trim() !== '');

			state.items = items.map(x => ({
				id: x.id,
				name: x.name || '',
				price: toNumber(x.price)
			})).filter(x => String(x.id || '').trim() !== '').sort((a, b) => String(a.name).localeCompare(String(b.name)));

			const customerById = new Map(state.customers.map(c => [String(c.id), c.customername || c.name || '']));

			state.invoices = invoices.map(x => ({
				id: x.id,
				createdon: x.createdon,
				name: x.name || '',
				invoicenumber: toInt(x.invoicenumber, 0),
				billjson: x.billjson || '[]',
				customerid: x.customerid || '',
				customername: x.customername || customerById.get(String(x.customerid || '')) || '',
				totalprice: toNumber(x.totalprice),
				invoicedate: x.invoicedate || '',
				invoicenumberwithcustomername: x.invoicenumberwithcustomername || '',
				cashreceived: toNumber(x.cashreceived)
			})).sort((a, b) => toInt(b.invoicenumber, 0) - toInt(a.invoicenumber, 0));

			renderCustomers();
			renderItems();
			applyInvoiceFilter();

			if (!state.customers.length) {
				console.warn('No customer records found for billingcustomer.');
			}

			if (!state.items.length) {
				console.warn('No item records found for billingitem.');
			}
		}

		async function saveInvoice(event) {
			event.preventDefault();
			refs.invoiceForm.classList.add('was-validated');
			if (!refs.invoiceForm.checkValidity()) return;
			if (!state.lineItems.length) {
				alert('Please add at least one item to the invoice.');
				return;
			}

			const total = toNumber(refs.totalPrice.value);
			const cash = toNumber(refs.cashReceived.value);
			if (cash > total) {
				alert('Cash received cannot be greater than total price.');
				return;
			}

			const payload = {
				name: refs.invoiceName.value.trim() || `Invoice ${refs.invoiceNumber.value.trim()}`,
				invoicenumber: toInt(refs.invoiceNumber.value, 0),
				billjson: buildBillJson(),
				customerid: refs.customerSelect.value,
				totalprice: total,
				invoicedate: refs.invoiceDate.value,
				invoicenumberwithcustomername: refs.invoiceLabel.value,
				cashreceived: cash
			};

			refs.saveBtn.disabled = true;
			refs.saveBtn.querySelector('.btn-label').textContent = state.editingId ? 'Updating...' : 'Saving...';

			try {
				const responseId = await DBHandler.submitRecordData('billinvoice', payload, state.editingId, false);
				const savedId = state.editingId || responseId;
				const existingIndex = state.invoices.findIndex(x => String(x.id) === String(savedId));
				const row = {
					id: savedId,
					createdon: new Date().toISOString(),
					...payload
				};

				if (existingIndex >= 0) {
					state.invoices[existingIndex] = row;
				} else {
					state.invoices.push(row);
				}

				state.invoices.sort((a, b) => toInt(b.invoicenumber, 0) - toInt(a.invoicenumber, 0));
				applyInvoiceFilter();
				resetForm();
				if (typeof showSuccessMessage === 'function') {
					showSuccessMessage('Invoice saved successfully.');
				}
			} catch (e) {
				console.error('Error saving invoice:', e);
				alert('Failed to save invoice.');
			} finally {
				refs.saveBtn.disabled = false;
				refs.saveBtn.querySelector('.btn-label').textContent = state.editingId ? 'Update Invoice' : 'Save Invoice';
			}
		}

		function wireEvents() {
			refs.customerSelect.addEventListener('change', updateCustomerFromSelect);
			refs.invoiceNumber.addEventListener('input', updateInvoiceLabel);
			refs.cashReceived.addEventListener('input', recalculateTotals);
			refs.itemSelect.addEventListener('change', handleItemSelect);
			refs.addItemBtn.addEventListener('click', addLineItem);
			refs.resetBtn.addEventListener('click', resetForm);
			refs.searchInput.addEventListener('input', applyInvoiceFilter);
			refs.invoiceForm.addEventListener('submit', saveInvoice);

			refs.lineItemsBody.addEventListener('click', function (event) {
				const btn = event.target.closest('button[data-action="remove-line"]');
				if (!btn) return;
				removeLineItem(toInt(btn.getAttribute('data-index'), -1));
			});

			refs.invoiceTableBody.addEventListener('click', function (event) {
				const btn = event.target.closest('button[data-action]');
				if (!btn) return;
				const action = btn.getAttribute('data-action');
				const id = btn.getAttribute('data-id');
				if (action === 'edit') {
					fillFormForEdit(id);
				}
				if (action === 'delete') {
					deleteInvoice(id);
				}
			});
		}

		document.addEventListener('DOMContentLoaded', async function () {
			setLoading(true, 'Loading invoices...');
			wireEvents();
			try {
				await loadMasterData();
				resetForm();
			} catch (e) {
				console.error('Initialization error:', e);
				alert('Failed to load invoice page data.');
			} finally {
				setLoading(false);
			}
		});
	</script>
</body>
</html>
