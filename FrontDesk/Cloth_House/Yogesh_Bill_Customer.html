<body>
    <div class="container2">
        <div id="customersGrid"></div>
    </div>

    <div class="modal fade" id="customerModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add Customer</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <form id="customerForm" novalidate>
                        <div class="row">
                            <div class="col-md-6">
                                <label for="customername" class="form-label">Customer Name</label>
                                <input type="text" id="customername" class="form-control" maxlength="255" required />
                            </div>
                            <div class="col-md-6">
                                <label for="phonenumber" class="form-label">Phone Number</label>
                                <input type="text" id="phonenumber" class="form-control" maxlength="10" inputmode="numeric" />
                            </div>
                        </div>

                        <div class="row mt-3">
                            <div class="col-md-12">
                                <label for="address" class="form-label">Address</label>
                                <textarea id="address" class="form-control" rows="4" maxlength="1000"></textarea>
                            </div>
                        </div>
                    </form>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-primary" type="button" onclick="saveCustomer()">Save</button>
                    <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let customerGrid;
        let editingCustomerId = null;

        function getCustomerModal() {
            const modalEl = document.getElementById('customerModal');
            return bootstrap.Modal.getOrCreateInstance(modalEl);
        }

        function resetCustomerForm() {
            document.getElementById('customerForm').reset();
            document.getElementById('customername').classList.remove('is-invalid');
            document.getElementById('phonenumber').classList.remove('is-invalid');
        }

        function bindPhoneInput() {
            const input = document.getElementById('phonenumber');
            input.addEventListener('input', function () {
                this.value = String(this.value || '').replace(/[^0-9]/g, '').slice(0, 10);
            });
        }

        function initCustomerGrid() {
            ej.grids.Grid.Inject(
                ej.grids.Page,
                ej.grids.Sort,
                ej.grids.Filter,
                ej.grids.Toolbar,
                ej.grids.ExcelExport,
                ej.grids.PdfExport
            );

            customerGrid = new ej.grids.Grid({
                dataSource: [],
                allowPaging: true,
                allowSorting: true,
                allowFiltering: true,
                filterSettings: { type: 'Excel' },
                pageSettings: { pageSize: 12 },
                toolbar: [
                    'Search',
                    { text: 'New Customer', prefixIcon: 'e-icons e-plus', id: 'newCustomer' },
                    { text: 'Edit', prefixIcon: 'e-icons e-edit', id: 'editCustomer' },
                    { text: 'Delete', prefixIcon: 'e-icons e-delete', id: 'deleteCustomer' },
                    'ExcelExport',
                    'PdfExport'
                ],
                columns: [
                    { type: 'checkbox', width: 50 },
                    { field: 'customername', headerText: 'Customer Name', width: 220 },
                    { field: 'phonenumber', headerText: 'Phone Number', width: 160 },
                    { field: 'address', headerText: 'Address', width: 280 },
                    { field: 'createdon', headerText: 'Created On', type: 'date', format: 'dd/MMM/yyyy hh:mm', width: 180 }
                ],
                toolbarClick: async function (args) {
                    if (args.item.id === 'newCustomer') {
                        editingCustomerId = null;
                        resetCustomerForm();
                        document.querySelector('#customerModal .modal-title').innerText = 'Add Customer';
                        getCustomerModal().show();
                    }

                    if (args.item.id === 'editCustomer') {
                        const selected = customerGrid.getSelectedRecords();
                        if (selected.length !== 1) {
                            alert('Select one record');
                            return;
                        }

                        editingCustomerId = selected[0].id;
                        document.getElementById('customername').value = selected[0].customername || '';
                        document.getElementById('phonenumber').value = selected[0].phonenumber || '';
                        document.getElementById('address').value = selected[0].address || '';
                        document.querySelector('#customerModal .modal-title').innerText = 'Edit Customer';
                        getCustomerModal().show();
                    }

                    if (args.item.id === 'deleteCustomer') {
                        const selected = customerGrid.getSelectedRecords();
                        if (!selected.length) {
                            alert('Select record(s)');
                            return;
                        }

                        if (!confirm('Delete selected customer record(s)?')) return;

                        const ids = selected.map(function (r) { return r.id; });
                        await deleteRecordData('billingcustomer', ids, true, true);
                        await loadCustomers();
                    }

                    if (args.item.id === 'customersGrid_excelexport') {
                        customerGrid.excelExport();
                    }

                    if (args.item.id === 'customersGrid_pdfexport') {
                        customerGrid.pdfExport();
                    }
                }
            });

            customerGrid.appendTo('#customersGrid');
        }

        async function loadCustomers() {
            try {
                const data = await DBHandler.fetchEntityRecords(
                    'billingcustomer',
                    '*',
                    'createdon',
                    'desc'
                );

                customerGrid.dataSource = data || [];
            } catch (error) {
                console.error('Error loading billing customers:', error);
                customerGrid.dataSource = [];
                alert('Failed to load billing customers.');
            }
        }

        function validateCustomerForm() {
            const nameEl = document.getElementById('customername');
            const phoneEl = document.getElementById('phonenumber');

            const name = String(nameEl.value || '').trim();
            const phone = String(phoneEl.value || '').trim();

            const nameValid = !!name;
            const phoneValid = !phone || /^[0-9]{1,10}$/.test(phone);

            nameEl.classList.toggle('is-invalid', !nameValid);
            phoneEl.classList.toggle('is-invalid', !phoneValid);

            if (!nameValid) {
                alert('Customer Name is required');
                return false;
            }

            if (!phoneValid) {
                alert('Phone Number must be numeric and up to 10 digits');
                return false;
            }

            return true;
        }

        async function saveCustomer() {
            if (!validateCustomerForm()) return;

            const payload = {
                customername: document.getElementById('customername').value.trim(),
                phonenumber: document.getElementById('phonenumber').value.trim(),
                address: document.getElementById('address').value.trim()
            };

            try {
                await DBHandler.submitRecordData('billingcustomer', payload, editingCustomerId, false);
                getCustomerModal().hide();
                await loadCustomers();
            } catch (error) {
                console.error('Error saving billing customer:', error);
                alert('Failed to save billing customer.');
            }
        }

        $(document).ready(function () {
            bindPhoneInput();
            initCustomerGrid();
            loadCustomers();
        });
    </script>

    <style>

            height: 10px !important;
