	<script>
		(function () {
			if (window.AuthManager) return;

			function getCookie(name) {
				const key = `${name}=`;
				const decoded = decodeURIComponent(document.cookie || '');
				const chunks = decoded.split(';');
				for (let i = 0; i < chunks.length; i++) {
					const item = chunks[i].trim();
					if (item.indexOf(key) === 0) {
						return item.substring(key.length);
					}
				}
				return '';
			}

			function firstNonEmpty(values) {
				for (let i = 0; i < values.length; i++) {
					if (values[i]) return values[i];
				}
				return '';
			}

			function parseJwtPayload(token) {
				try {
					if (!token || token.split('.').length < 2) return {};
					const base64Url = token.split('.')[1];
					const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
					const decoded = atob(base64);
					return JSON.parse(decoded);
				} catch (e) {
					return {};
				}
			}

			function resolveToken() {
				const url = new URL(window.location.href);
				return firstNonEmpty([
					url.searchParams.get('dataToken') || '',
					url.searchParams.get('authToken') || '',
					url.searchParams.get('token') || '',
					url.searchParams.get('accessToken') || '',
					localStorage.getItem('dataToken') || '',
					localStorage.getItem('authToken') || '',
					localStorage.getItem('AuthToken') || '',
					localStorage.getItem('token') || '',
					localStorage.getItem('accessToken') || '',
					sessionStorage.getItem('dataToken') || '',
					sessionStorage.getItem('authToken') || '',
					sessionStorage.getItem('token') || '',
					sessionStorage.getItem('accessToken') || '',
					getCookie('dataToken') || getCookie('DataToken') || '',
					getCookie('authToken') || getCookie('AuthToken') || '',
					getCookie('token') || getCookie('Token') || '',
					getCookie('accessToken') || getCookie('AccessToken') || '',
					window.dataToken || '',
					window.authToken || window.AuthToken || ''
				]);
			}

			function normalizeUserId(value) {
				const clean = String(value || '').trim();
				if (!clean) return '';
				return clean.length > 36 ? clean.slice(0, 36) : clean;
			}

			function resolveUserId() {
				const url = new URL(window.location.href);
				const explicitUserId = normalizeUserId(firstNonEmpty([
					url.searchParams.get('userid') || '',
					url.searchParams.get('userId') || '',
					url.searchParams.get('uid') || '',
					localStorage.getItem('userid') || '',
					localStorage.getItem('userId') || '',
					localStorage.getItem('uid') || '',
					sessionStorage.getItem('userid') || '',
					sessionStorage.getItem('userId') || '',
					sessionStorage.getItem('uid') || '',
					getCookie('userid') || '',
					getCookie('userId') || '',
					getCookie('UserId') || ''
				]));

				if (explicitUserId) return explicitUserId;

				const payload = parseJwtPayload(resolveToken());
				return normalizeUserId(firstNonEmpty([
					payload.userId,
					payload.userid,
					payload.uid,
					payload.nameid,
					payload.sub,
					payload['http://schemas.xmlsoap.org/ws/2005/05/identity/claims/nameidentifier']
				])) || '0';
			}

			window.AuthManager = {
				getDataToken: resolveToken,
				getAuthToken: resolveUserId,
				setDataToken: function (token) {
					if (token) localStorage.setItem('dataToken', token);
				},
				setAuthToken: function (token) {
					if (token) localStorage.setItem('authToken', token);
				}
			};
		})();
	</script>

<body>
	<div class="page-shell">
		<div class="management-card">
			<div class="card-inner">
				<h1 class="page-title">Billing Item Management</h1>

				<div class="section-card mb-4">
					<div class="section-heading">Item Details</div>
					<form id="billingItemForm" class="needs-validation" novalidate>
						<div class="row g-4">
							<div class="col-lg-6">
								<label for="itemName" class="form-label input-label">Item Name</label>
								<div class="combobox-wrap">
									<div class="input-group">
										<input type="text" id="itemName" class="form-control combobox-input" placeholder="Enter Name" required autocomplete="off" role="combobox" aria-expanded="false" aria-autocomplete="list" aria-controls="itemNameComboboxMenu" />
										<button type="button" id="itemNameDropdownToggle" class="btn combobox-toggle" aria-label="Show item list">
											<i class="fa fa-chevron-down"></i>
										</button>
									</div>
									<div id="itemNameComboboxMenu" class="combobox-menu" role="listbox"></div>
								</div>
								<div class="invalid-feedback">Item name is required.</div>
							</div>
							<div class="col-lg-6">
								<label for="itemPrice" class="form-label input-label">Price</label>
								<input type="number" id="itemPrice" class="form-control" placeholder="Enter Price" min="0" step="0.01" required />
								<div class="invalid-feedback">Price is required.</div>
							</div>
							<div class="col-lg-6">
								<label for="isForPackaging" class="form-label input-label">Is For Packaging</label>
								<select id="isForPackaging" class="form-select">
									<option value="0" selected>No</option>
									<option value="1">Yes</option>
								</select>
							</div>
							<div class="col-lg-6 d-flex align-items-end gap-2">
								<button type="submit" id="saveButton" class="btn btn-primary flex-grow-1">
									<span class="btn-label">Save Item</span>
								</button>
								<button type="button" id="cancelEditButton" class="btn btn-outline-secondary d-none">Cancel</button>
							</div>
						</div>
					</form>
				</div>

				<div class="section-card table-wrap">
					<div id="loadingOverlay" class="loading-overlay active">
						<div class="spinner-card">
							<div class="spinner-border text-primary" role="status" aria-hidden="true"></div>
							<span>Loading billing items...</span>
						</div>
					</div>

					<div class="toolbar-row">
						<div class="section-heading mb-0">Items List</div>
						<div class="search-wrap">
							<div class="search-input-group">
								<input type="text" id="searchInput" class="form-control" placeholder="Search by item name or price" />
								<i class="fa fa-search search-icon"></i>
							</div>
						</div>
					</div>

					<div class="table-responsive">
						<table class="table align-middle">
							<thead>
								<tr>
									<th>Item Name</th>
									<th>Price</th>
									<th>Packaging</th>
									<th class="text-center">Actions</th>
								</tr>
							</thead>
							<tbody id="itemsTableBody"></tbody>
						</table>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script>
		const state = {
			items: [],
			filteredItems: [],
			editingId: null,
			loading: false
		};

		const form = document.getElementById('billingItemForm');
		const itemNameInput = document.getElementById('itemName');
		const itemNameDropdownToggle = document.getElementById('itemNameDropdownToggle');
		const itemNameComboboxMenu = document.getElementById('itemNameComboboxMenu');
		const itemPriceInput = document.getElementById('itemPrice');
		const isForPackagingSelect = document.getElementById('isForPackaging');
		const searchInput = document.getElementById('searchInput');
		const tableBody = document.getElementById('itemsTableBody');
		const loadingOverlay = document.getElementById('loadingOverlay');
		const saveButton = document.getElementById('saveButton');
		const cancelEditButton = document.getElementById('cancelEditButton');

		function setLoading(isLoading, message = 'Loading billing items...') {
			state.loading = isLoading;
			loadingOverlay.classList.toggle('active', isLoading);
			const messageNode = loadingOverlay.querySelector('span');
			if (messageNode) {
				messageNode.textContent = message;
			}
		}

		function escapeHtml(value) {
			return String(value ?? '')
				.replaceAll('&', '&amp;')
				.replaceAll('<', '&lt;')
				.replaceAll('>', '&gt;')
				.replaceAll('"', '&quot;')
				.replaceAll("'", '&#39;');
		}

		function formatPrice(value) {
			const number = parseFloat(value || 0);
			return Number.isFinite(number) ? number.toFixed(2) : '0.00';
		}

		function normalisePackaging(value) {
			return String(value) === '1' ? 1 : 0;
		}

		function applyFilter() {
			const term = searchInput.value.trim().toLowerCase();
			state.filteredItems = state.items.filter(item => {
				if (!term) return true;
				const name = String(item.name || '').toLowerCase();
				const price = formatPrice(item.price).toLowerCase();
				const packaging = normalisePackaging(item.isforpackaging) === 1 ? 'yes' : 'no';
				return name.includes(term) || price.includes(term) || packaging.includes(term);
			});
			renderTable();
		}

		function setComboboxExpanded(isExpanded) {
			itemNameComboboxMenu.classList.toggle('show', isExpanded);
			itemNameInput.setAttribute('aria-expanded', isExpanded ? 'true' : 'false');
		}

		function renderComboboxOptions(filterText = '') {
			const term = String(filterText || '').trim().toLowerCase();
			const items = state.items.filter(item => !term || String(item.name || '').toLowerCase().includes(term));

			if (!items.length) {
				itemNameComboboxMenu.innerHTML = '<div class="combobox-empty">No matching items found</div>';
				return;
			}

			itemNameComboboxMenu.innerHTML = items.map(item => `
				<button type="button" class="combobox-option" role="option" data-id="${escapeHtml(item.id)}">
					${escapeHtml(item.name)}
				</button>
			`).join('');
		}

		function openCombobox(showAll = false) {
			renderComboboxOptions(showAll ? '' : itemNameInput.value);
			setComboboxExpanded(true);
		}

		function closeCombobox() {
			setComboboxExpanded(false);
		}

		function renderTable() {
			if (!state.filteredItems.length) {
				tableBody.innerHTML = `
					<tr>
						<td colspan="4" class="empty-state">
							<div class="fw-semibold mb-1">No billing items found</div>
							<div class="small">Save a new item or change the search text.</div>
						</td>
					</tr>
				`;
				return;
			}

			tableBody.innerHTML = state.filteredItems.map(item => {
				const isPackaging = normalisePackaging(item.isforpackaging) === 1;
				return `
					<tr>
						<td>
							<div class="fw-semibold">${escapeHtml(item.name)}</div>
						</td>
						<td>${formatPrice(item.price)}</td>
						<td>
							<span class="${isPackaging ? 'badge-packaging' : 'badge-standard'}">${isPackaging ? 'Yes' : 'No'}</span>
						</td>
						<td class="text-center">
							<div class="d-inline-flex gap-2">
								<button type="button" class="action-btn" data-action="edit" data-id="${escapeHtml(item.id)}" title="Edit item">
									<i class="fa fa-pen"></i>
								</button>
								<button type="button" class="action-btn" data-action="delete" data-id="${escapeHtml(item.id)}" title="Delete item">
									<i class="fa fa-trash"></i>
								</button>
							</div>
						</td>
					</tr>
				`;
			}).join('');
		}

		async function loadItems() {
			if (!window.DBHandler || typeof DBHandler.fetchEntityRecord !== 'function') {
				setLoading(false);
				tableBody.innerHTML = `
					<tr><td colspan="4" class="empty-state">DBHandler is not available in this context.</td></tr>
				`;
				return;
			}

			setLoading(true, 'Loading billing items...');
			try {
				const records = await DBHandler.fetchEntityRecord('billingitem', 'id,name,price,isforpackaging', '', false);
				state.items = (records || []).sort((a, b) => String(a.name || '').localeCompare(String(b.name || '')));
				renderComboboxOptions();
				applyFilter();
			} catch (error) {
				console.error('Error loading billing items:', error);
				tableBody.innerHTML = `
					<tr><td colspan="4" class="empty-state">Failed to load billing items.</td></tr>
				`;
			} finally {
				setLoading(false);
			}
		}

		function resetForm() {
			form.reset();
			form.classList.remove('was-validated');
			isForPackagingSelect.value = '0';
			state.editingId = null;
			closeCombobox();
			saveButton.querySelector('.btn-label').textContent = 'Save Item';
			cancelEditButton.classList.add('d-none');
		}

		function fillFormForEdit(item) {
			state.editingId = item.id;
			itemNameInput.value = item.name || '';
			itemPriceInput.value = formatPrice(item.price);
			isForPackagingSelect.value = String(normalisePackaging(item.isforpackaging));
			closeCombobox();
			saveButton.querySelector('.btn-label').textContent = 'Update Item';
			cancelEditButton.classList.remove('d-none');
			itemNameInput.focus();
		}

		async function saveItem(event) {
			event.preventDefault();
			form.classList.add('was-validated');
			if (!form.checkValidity()) {
				return;
			}

			const payload = {
				name: itemNameInput.value.trim(),
				price: parseFloat(itemPriceInput.value || 0),
				isforpackaging: parseInt(isForPackagingSelect.value, 10) || 0
			};
			const wasEditing = Boolean(state.editingId);

			saveButton.disabled = true;
			saveButton.querySelector('.btn-label').textContent = wasEditing ? 'Updating...' : 'Saving...';

			try {
				const responseId = await DBHandler.submitRecordData('billingitem', payload, state.editingId, false);
				const savedId = state.editingId || responseId;
				const existingIndex = state.items.findIndex(item => String(item.id) === String(savedId));
				const updatedRecord = {
					id: savedId,
					name: payload.name,
					price: payload.price,
					isforpackaging: payload.isforpackaging
				};

				if (existingIndex >= 0) {
					state.items[existingIndex] = updatedRecord;
				} else {
					state.items.push(updatedRecord);
				}

				state.items.sort((a, b) => String(a.name || '').localeCompare(String(b.name || '')));
				renderComboboxOptions();
				applyFilter();
				resetForm();
				if (typeof showSuccessMessage === 'function') {
					showSuccessMessage(wasEditing ? 'Billing item updated successfully.' : 'Billing item saved successfully.');
				}
			} catch (error) {
				console.error('Error saving billing item:', error);
				alert('Failed to save billing item. Please try again.');
			} finally {
				saveButton.disabled = false;
				saveButton.querySelector('.btn-label').textContent = state.editingId ? 'Update Item' : 'Save Item';
			}
		}

		async function deleteItem(id) {
			const item = state.items.find(entry => String(entry.id) === String(id));
			if (!item) return;

			if (!confirm(`Delete billing item "${item.name}"?`)) {
				return;
			}

			try {
				if (typeof deleteRecordData === 'function') {
					await deleteRecordData('billingitem', [id], true, true);
				} else {
					console.warn('deleteRecordData is not available; removing item from the UI only.');
				}
				state.items = state.items.filter(entry => String(entry.id) !== String(id));
				renderComboboxOptions();
				applyFilter();
				if (state.editingId && String(state.editingId) === String(id)) {
					resetForm();
				}
			} catch (error) {
				console.error('Error deleting billing item:', error);
				alert('Failed to delete billing item. Please try again.');
			}
		}

		tableBody.addEventListener('click', function (event) {
			const button = event.target.closest('button[data-action]');
			if (!button) return;

			const action = button.getAttribute('data-action');
			const id = button.getAttribute('data-id');
			const item = state.items.find(entry => String(entry.id) === String(id));

			if (action === 'edit' && item) {
				fillFormForEdit(item);
				return;
			}

			if (action === 'delete') {
				deleteItem(id);
			}
		});

		form.addEventListener('submit', saveItem);
		cancelEditButton.addEventListener('click', resetForm);
		searchInput.addEventListener('input', applyFilter);
		itemNameInput.addEventListener('focus', function () {
			openCombobox(true);
		});
		itemNameInput.addEventListener('input', function () {
			if (state.editingId) {
				const currentItem = state.items.find(entry => String(entry.id) === String(state.editingId));
				if (!currentItem || String(currentItem.name || '') !== itemNameInput.value) {
					state.editingId = null;
					cancelEditButton.classList.add('d-none');
					saveButton.querySelector('.btn-label').textContent = 'Save Item';
				}
			}
			openCombobox(false);
		});
		itemNameDropdownToggle.addEventListener('click', function () {
			if (itemNameComboboxMenu.classList.contains('show')) {
				closeCombobox();
			} else {
				itemNameInput.focus();
				openCombobox(true);
			}
		});
		itemNameComboboxMenu.addEventListener('click', function (event) {
			const option = event.target.closest('.combobox-option');
			if (!option) return;

			const id = option.getAttribute('data-id');
			const item = state.items.find(entry => String(entry.id) === String(id));
			if (!item) return;

			itemNameInput.value = item.name || '';
			fillFormForEdit(item);
		});
		document.addEventListener('click', function (event) {
			const insideCombobox = event.target.closest('.combobox-wrap');
			if (!insideCombobox) {
				closeCombobox();
			}
		});

		document.addEventListener('DOMContentLoaded', function () {
			resetForm();
			loadItems();
		});
	</script>
</body>
</html>
