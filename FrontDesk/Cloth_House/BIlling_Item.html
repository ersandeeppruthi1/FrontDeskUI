<body>
    <div class="container2">
        <div id="itemsGrid"></div>
    </div>

    <div class="modal fade" id="itemModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Add Billing Item</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" title="Close"></button>
                </div>

                <div class="modal-body">
                    <form id="itemForm">
                        <div class="row">
                            <div class="col-md-6">
                                <label for="name">Item Name</label>
                                <input type="text" id="name" class="form-control" placeholder="Enter item name" title="Item Name" required />
                            </div>
                            <div class="col-md-6">
                                <label for="price">Price</label>
                                <input type="number" id="price" class="form-control" min="0" step="0.01" placeholder="Enter price" title="Price" required />
                            </div>
                        </div>
                        <div class="row mt-3">
                            <div class="col-md-6">
                                <label for="isforpackaging">Is For Packaging</label>
                                <select id="isforpackaging" class="form-control" title="Is For Packaging">
                                    <option value="0">No</option>
                                    <option value="1">Yes</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-primary" onclick="saveItem()">Save</button>
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>

            </div>
        </div>
    </div>

    <script>

        let itemGrid;
        let editingItemId = null;

        function normalizeNameKey(value) {
            return String(value || '').trim().replace(/\s+/g, ' ').toLowerCase();
        }

        function getErrorMessage(error) {
            if (!error) return 'Unknown error from server.';

            const direct = [
                error.message,
                error.error,
                error.errorMessage,
                error.responseText,
                error.statusText,
                error.responseJSON && error.responseJSON.message,
                error.responseJSON && error.responseJSON.error,
                error.response && error.response.message,
                error.response && error.response.error,
                error.data && error.data.message,
                error.data && error.data.error
            ];

            for (let i = 0; i < direct.length; i++) {
                if (direct[i]) return String(direct[i]);
            }

            try {
                return JSON.stringify(error);
            } catch (e) {
                return 'Unknown error from server.';
            }
        }

        function isDuplicateConflict(message) {
            const text = String(message || '').toLowerCase();
            return text.includes('same key') || text.includes('duplicate') || text.includes('already exists');
        }

        function findItemByName(items, name, excludeId) {
            const key = normalizeNameKey(name);
            if (!key) return null;
            for (let i = 0; i < items.length; i++) {
                const row = items[i];
                if (excludeId && String(row.id) === String(excludeId)) continue;
                if (normalizeNameKey(row.name) === key) return row;
            }
            return null;
        }

        function initItemGrid() {

            ej.grids.Grid.Inject(
                ej.grids.Page,
                ej.grids.Sort,
                ej.grids.Filter,
                ej.grids.Toolbar,
                ej.grids.ExcelExport,
                ej.grids.PdfExport
            );

            itemGrid = new ej.grids.Grid({
                dataSource: [],
                allowPaging: true,
                allowSorting: true,
                allowFiltering: true,
                filterSettings: { type: 'Excel' },
                toolbar: [
                    'Search',
                    { text: 'New Item', prefixIcon: 'e-icons e-plus', id: 'newItem' },
                    { text: 'Edit', prefixIcon: 'e-icons e-edit', id: 'editItem' },
                    { text: 'Delete', prefixIcon: 'e-icons e-delete', id: 'deleteItem' },
                    'ExcelExport',
                    'PdfExport'
                ],
                columns: [
                    { type: 'checkbox', width: 50 },
                    { field: 'name', headerText: 'Item Name', width: 240 },
                    { field: 'price', headerText: 'Price', width: 140, format: 'N2', textAlign: 'Right' },
                    {
                        field: 'isforpackaging',
                        headerText: 'Is For Packaging',
                        width: 170,
                        template: "${isforpackaging == 1 ? 'Yes' : 'No'}"
                    },
                    { field: 'createdon', headerText: 'Created On', type: 'date', format: 'dd/MMM/yyyy hh:mm', width: 180 }
                ],
                toolbarClick: async function (args) {

                    if (args.item.id === 'newItem') {
                        editingItemId = null;
                        document.getElementById('itemForm').reset();
                        document.getElementById('isforpackaging').value = '0';
                        document.querySelector('#itemModal .modal-title').innerText = 'Add Billing Item';
                        new bootstrap.Modal(itemModal).show();
                    }

                    if (args.item.id === 'editItem') {
                        const selected = itemGrid.getSelectedRecords();
                        if (selected.length !== 1) return alert('Select one record');
                        editingItemId = selected[0].id;

                        document.getElementById('name').value = selected[0].name || '';
                        document.getElementById('price').value = selected[0].price || 0;
                        document.getElementById('isforpackaging').value = String(selected[0].isforpackaging == 1 ? 1 : 0);

                        document.querySelector('#itemModal .modal-title').innerText = 'Edit Billing Item';
                        new bootstrap.Modal(itemModal).show();
                    }

                    if (args.item.id === 'deleteItem') {
                        const selected = itemGrid.getSelectedRecords();
                        if (!selected.length) return alert('Select record(s)');

                        if (!confirm('Delete selected item record(s)?')) return;
                        const ids = selected.map(function (r) { return r.id; });
                        await deleteRecordData('billingitem', ids, true, true);
                        loadItems();
                    }
                }
            });

            itemGrid.appendTo('#itemsGrid');
        }

        async function loadItems() {

            const data = await DBHandler.fetchEntityRecords(
                'billingitem',
                '*',
                'createdon',
                'desc'
            );

            itemGrid.dataSource = data || [];
        }

        async function saveItem() {

            const name = document.getElementById('name').value.trim();
            const priceValue = document.getElementById('price').value;
            const isforpackaging = document.getElementById('isforpackaging').value;
            const price = parseFloat(priceValue || 0);

            if (!name) return alert('Item name is required');
            if (!Number.isFinite(price) || price < 0) return alert('Please enter a valid price');

            const payload = {
                name,
                price,
                isforpackaging: parseInt(isforpackaging, 10) || 0
            };

            try {
                const currentRows = (itemGrid && itemGrid.dataSource) ? itemGrid.dataSource : [];
                let targetId = editingItemId;
                const duplicate = findItemByName(currentRows, name, targetId);

                if (!targetId && duplicate) {
                    targetId = duplicate.id;
                    editingItemId = duplicate.id;
                }

                try {
                    await DBHandler.submitRecordData('billingitem', payload, targetId, false);
                } catch (firstError) {
                    const duplicateFromError = findItemByName(currentRows, name, targetId);
                    const message = getErrorMessage(firstError);
                    if (!targetId && duplicateFromError && isDuplicateConflict(message)) {
                        targetId = duplicateFromError.id;
                        editingItemId = duplicateFromError.id;
                        await DBHandler.submitRecordData('billingitem', payload, targetId, false);
                    } else {
                        throw firstError;
                    }
                }

                bootstrap.Modal.getInstance(itemModal).hide();
                editingItemId = null;
                loadItems();
            } catch (error) {
                console.error('Error saving billing item:', error);
                alert('Failed to save billing item. ' + getErrorMessage(error));
            }
        }

        $(document).ready(() => {
            initItemGrid();
            loadItems();
        });
    </script>

    <style>
        #itemsGrid_toolbarItems {
            height: 10px !important;
