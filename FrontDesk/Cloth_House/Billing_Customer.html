	<script>
		(function () {
			if (window.AuthManager) return;

			function getCookie(name) {
				const key = `${name}=`;
				const decoded = decodeURIComponent(document.cookie || '');
				const chunks = decoded.split(';');
				for (let i = 0; i < chunks.length; i++) {
					const item = chunks[i].trim();
					if (item.indexOf(key) === 0) {
						return item.substring(key.length);
					}
				}
				return '';
			}

			function firstNonEmpty(values) {
				for (let i = 0; i < values.length; i++) {
					if (values[i]) return values[i];
				}
				return '';
			}

			function parseJwtPayload(token) {
				try {
					if (!token || token.split('.').length < 2) return {};
					const base64Url = token.split('.')[1];
					const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
					return JSON.parse(atob(base64));
				} catch (e) {
					return {};
				}
			}

			function resolveToken() {
				const url = new URL(window.location.href);
				return firstNonEmpty([
					url.searchParams.get('dataToken') || '',
					url.searchParams.get('authToken') || '',
					url.searchParams.get('token') || '',
					url.searchParams.get('accessToken') || '',
					localStorage.getItem('dataToken') || '',
					localStorage.getItem('authToken') || '',
					localStorage.getItem('AuthToken') || '',
					localStorage.getItem('token') || '',
					localStorage.getItem('accessToken') || '',
					sessionStorage.getItem('dataToken') || '',
					sessionStorage.getItem('authToken') || '',
					sessionStorage.getItem('token') || '',
					sessionStorage.getItem('accessToken') || '',
					getCookie('dataToken') || getCookie('DataToken') || '',
					getCookie('authToken') || getCookie('AuthToken') || '',
					getCookie('token') || getCookie('Token') || '',
					getCookie('accessToken') || getCookie('AccessToken') || '',
					window.dataToken || '',
					window.authToken || window.AuthToken || ''
				]);
			}

			function resolveUserId() {
				const url = new URL(window.location.href);
				const explicitUserId = firstNonEmpty([
					url.searchParams.get('userid') || '',
					url.searchParams.get('userId') || '',
					url.searchParams.get('uid') || '',
					localStorage.getItem('userid') || '',
					localStorage.getItem('userId') || '',
					localStorage.getItem('uid') || '',
					sessionStorage.getItem('userid') || '',
					sessionStorage.getItem('userId') || '',
					sessionStorage.getItem('uid') || '',
					getCookie('userid') || '',
					getCookie('userId') || '',
					getCookie('UserId') || ''
				]);

				function toSafeNumericUserId(value) {
					const raw = String(value || '').trim();
					if (!raw) return '0';
					if (/^\d+$/.test(raw)) {
						const parsed = parseInt(raw, 10);
						return Number.isFinite(parsed) && parsed >= 0 ? String(parsed) : '0';
					}

					const onlyDigits = raw.replace(/\D/g, '');
					if (!onlyDigits) return '0';

					const normalizedDigits = onlyDigits.length > 9 ? onlyDigits.slice(-9) : onlyDigits;
					const parsed = parseInt(normalizedDigits, 10);
					return Number.isFinite(parsed) && parsed >= 0 ? String(parsed) : '0';
				}

				if (explicitUserId) return toSafeNumericUserId(explicitUserId);

				const payload = parseJwtPayload(resolveToken());
				const id = firstNonEmpty([
					payload.userId,
					payload.userid,
					payload.uid,
					payload.nameid,
					payload.sub,
					payload['http://schemas.xmlsoap.org/ws/2005/05/identity/claims/nameidentifier']
				]);

				return toSafeNumericUserId(id || '0');
			}

			window.AuthManager = {
				getDataToken: resolveToken,
				getAuthToken: resolveUserId
			};
		})();
	</script>

<body>
	<div class="page-shell">
		<div class="page-card">
			<div class="page-content">
				<h1 class="page-title">Billing Customer Management</h1>

				<div class="card-block mb-3">
					<form id="customerForm" class="needs-validation" novalidate>
						<input type="hidden" id="customerId" />
						<div class="row g-3">
							<div class="col-lg-6">
								<label for="customerName" class="form-label">Customer Name <span class="text-danger">*</span></label>
								<input
									type="text"
									id="customerName"
									class="form-control"
									placeholder="Enter Name"
									maxlength="255"
									required
								/>
								<div class="invalid-feedback">Customer Name is required.</div>

								<label for="customerAddress" class="form-label mt-3">Address</label>
								<textarea
									id="customerAddress"
									class="form-control"
									placeholder="Enter Address"
									maxlength="1000"
								></textarea>
							</div>

							<div class="col-lg-6">
								<label for="phoneNumber" class="form-label">Phone Number</label>
								<input
									type="text"
									id="phoneNumber"
									class="form-control"
									placeholder="Enter Number"
									inputmode="numeric"
									maxlength="10"
									pattern="^[0-9]{0,10}$"
								/>
								<div class="invalid-feedback">Phone Number must be numeric and up to 10 digits.</div>
								<div class="muted-note mt-2">Only numeric values are allowed. Maximum 10 digits.</div>
							</div>
						</div>

						<div class="actions-row">
							<button type="button" id="resetBtn" class="btn btn-outline-secondary px-4">Reset</button>
							<button type="submit" id="saveBtn" class="btn btn-primary px-4">Save Customer</button>
						</div>
					</form>
				</div>

				<div class="card-block table-wrap">
					<div id="loadingOverlay" class="loading-overlay active">
						<div class="loading-pill">
							<div class="spinner-border spinner-border-sm text-primary" role="status" aria-hidden="true"></div>
							<span>Loading customer records...</span>
						</div>
					</div>

					<div class="mb-3">
						<div class="input-group search-group">
							<input type="text" id="searchInput" class="form-control" placeholder="Search..." />
							<span class="input-group-text"><i class="fa fa-search"></i></span>
						</div>
					</div>

					<div class="table-responsive">
						<table class="table align-middle">
							<thead>
								<tr>
									<th class="sortable" data-sort="customername">Customer Name <span class="sort-indicator">↕</span></th>
									<th class="sortable" data-sort="phonenumber">Phone Number <span class="sort-indicator">↕</span></th>
									<th class="sortable" data-sort="address">Address <span class="sort-indicator">↕</span></th>
									<th class="sortable" data-sort="createdon">Created Date <span class="sort-indicator">↕</span></th>
									<th class="text-center">Actions</th>
								</tr>
							</thead>
							<tbody id="tableBody"></tbody>
						</table>
					</div>

					<div class="pagination-wrap">
						<div id="paginationInfo" class="pagination-info"></div>
						<nav>
							<ul id="pagination" class="pagination pagination-sm mb-0"></ul>
						</nav>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script>
		const ENTITY_NAME = 'billingcustomer';
		const ENTITY_COLUMNS = 'id,customername,address,phonenumber,createdon';

		const state = {
			records: [],
			filtered: [],
			paged: [],
			searchText: '',
			sortKey: 'createdon',
			sortDirection: 'desc',
			currentPage: 1,
			pageSize: 8
		};

		const refs = {
			customerForm: document.getElementById('customerForm'),
			customerId: document.getElementById('customerId'),
			customerName: document.getElementById('customerName'),
			customerAddress: document.getElementById('customerAddress'),
			phoneNumber: document.getElementById('phoneNumber'),
			resetBtn: document.getElementById('resetBtn'),
			saveBtn: document.getElementById('saveBtn'),
			searchInput: document.getElementById('searchInput'),
			tableBody: document.getElementById('tableBody'),
			pagination: document.getElementById('pagination'),
			paginationInfo: document.getElementById('paginationInfo'),
			loadingOverlay: document.getElementById('loadingOverlay')
		};

		function setLoading(flag, message = 'Loading customer records...') {
			refs.loadingOverlay.classList.toggle('active', flag);
			const text = refs.loadingOverlay.querySelector('span');
			if (text) text.textContent = message;
		}

		function sanitize(value) {
			return String(value ?? '')
				.replaceAll('&', '&amp;')
				.replaceAll('<', '&lt;')
				.replaceAll('>', '&gt;')
				.replaceAll('"', '&quot;')
				.replaceAll("'", '&#39;');
		}

		function normalizeDateValue(value) {
			if (!value) return '';
			const d = new Date(value);
			if (Number.isNaN(d.getTime())) return '';
			const y = d.getFullYear();
			const m = String(d.getMonth() + 1).padStart(2, '0');
			const day = String(d.getDate()).padStart(2, '0');
			return `${y}-${m}-${day}`;
		}

		function formatDate(value) {
			if (!value) return '-';
			const d = new Date(value);
			if (Number.isNaN(d.getTime())) return '-';
			return d.toLocaleDateString('en-GB');
		}

		function mapRecord(item) {
			return {
				id: item.id || '',
				customername: item.customername || '',
				address: item.address || '',
				phonenumber: item.phonenumber || '',
				createdon: item.createdon || ''
			};
		}

		async function loadCustomers() {
			setLoading(true);
			try {
				if (window.DBHandler && typeof DBHandler.fetchEntityRecord === 'function') {
					const result = await DBHandler.fetchEntityRecord(ENTITY_NAME, ENTITY_COLUMNS, '', false);
					state.records = (result || []).map(mapRecord);
				} else {
					state.records = [];
				}
				applyFilters();
			} catch (error) {
				console.error('Error fetching customers:', error);
				state.records = [];
				applyFilters();
			} finally {
				setLoading(false);
			}
		}

		function validatePhone(value) {
			return /^[0-9]{0,10}$/.test(value || '');
		}

		function getErrorMessage(error) {
			if (!error) return 'Unknown error from server.';

			const candidates = [
				error.message,
				error.error,
				error.errorMessage,
				error.responseText,
				error.statusText,
				error.responseJSON && error.responseJSON.message,
				error.responseJSON && error.responseJSON.error,
				error.response && error.response.message,
				error.response && error.response.error,
				error.data && error.data.message,
				error.data && error.data.error
			];

			for (let i = 0; i < candidates.length; i++) {
				if (candidates[i]) return String(candidates[i]);
			}

			try {
				return JSON.stringify(error);
			} catch (e) {
				return 'Unknown error from server.';
			}
		}

		function enforcePhoneInput(event) {
			const cleaned = String(event.target.value || '').replace(/[^0-9]/g, '').slice(0, 10);
			event.target.value = cleaned;
			if (cleaned && !validatePhone(cleaned)) {
				refs.phoneNumber.classList.add('is-invalid');
			} else {
				refs.phoneNumber.classList.remove('is-invalid');
			}
		}

		function validateForm() {
			const htmlValid = refs.customerForm.checkValidity();
			const phone = refs.phoneNumber.value.trim();
			const phoneValid = validatePhone(phone);

			refs.phoneNumber.classList.toggle('is-invalid', !phoneValid);
			refs.customerForm.classList.add('was-validated');

			return htmlValid && phoneValid;
		}

		async function saveCustomer(event) {
			event.preventDefault();
			if (!validateForm()) return;

			const formData = {
				customername: refs.customerName.value.trim(),
				address: refs.customerAddress.value.trim(),
				phonenumber: refs.phoneNumber.value.trim()
			};

			const recordId = refs.customerId.value.trim() || '';

			try {
				refs.saveBtn.disabled = true;
				refs.saveBtn.textContent = 'Saving...';

				if (window.DBHandler && typeof DBHandler.submitRecordData === 'function') {
					await DBHandler.submitRecordData(ENTITY_NAME, formData, recordId, false);
					resetForm();
					await loadCustomers();
					return;
				}

				alert('Save function is not available in this runtime.');
			} catch (error) {
				console.error('Error saving customer:', error);
				alert(`Failed to save customer. ${getErrorMessage(error)}`);
			} finally {
				refs.saveBtn.disabled = false;
				refs.saveBtn.textContent = 'Save Customer';
			}
		}

		function resetForm() {
			refs.customerId.value = '';
			refs.customerName.value = '';
			refs.customerAddress.value = '';
			refs.phoneNumber.value = '';
			refs.customerForm.classList.remove('was-validated');
			refs.phoneNumber.classList.remove('is-invalid');
			refs.saveBtn.textContent = 'Save Customer';
		}

		function applyFilters() {
			const term = state.searchText.trim().toLowerCase();
			state.filtered = state.records.filter(record => {
				if (!term) return true;
				const text = [
					record.customername,
					record.phonenumber,
					record.address,
					formatDate(record.createdon)
				].join(' ').toLowerCase();
				return text.includes(term);
			});

			applySort();
		}

		function compareRecords(a, b, key) {
			if (key === 'createdon') {
				const da = normalizeDateValue(a.createdon);
				const db = normalizeDateValue(b.createdon);
				return da.localeCompare(db);
			}

			const x = String(a[key] ?? '').toLowerCase();
			const y = String(b[key] ?? '').toLowerCase();
			if (x < y) return -1;
			if (x > y) return 1;
			return 0;
		}

		function applySort() {
			state.filtered.sort((a, b) => {
				const value = compareRecords(a, b, state.sortKey);
				return state.sortDirection === 'asc' ? value : -value;
			});

			state.currentPage = 1;
			paginate();
			renderSortState();
		}

		function paginate() {
			const total = state.filtered.length;
			const totalPages = Math.max(1, Math.ceil(total / state.pageSize));
			state.currentPage = Math.min(state.currentPage, totalPages);

			const startIndex = (state.currentPage - 1) * state.pageSize;
			const endIndex = startIndex + state.pageSize;
			state.paged = state.filtered.slice(startIndex, endIndex);

			renderTable();
			renderPagination(total, totalPages, startIndex, endIndex);
		}

		function renderTable() {
			if (!state.paged.length) {
				refs.tableBody.innerHTML = `
					<tr>
						<td colspan="5" class="empty-state">
							<div class="fw-semibold mb-1">No customers found</div>
							<div class="small">Try a different search term or add a new customer.</div>
						</td>
					</tr>
				`;
				return;
			}

			refs.tableBody.innerHTML = state.paged.map(record => `
				<tr>
					<td>${sanitize(record.customername || '-')}</td>
					<td>${sanitize(record.phonenumber || '-')}</td>
					<td>${sanitize(record.address || '-')}</td>
					<td>${sanitize(formatDate(record.createdon))}</td>
					<td class="text-center">
						<div class="d-inline-flex gap-2">
							<button type="button" class="action-btn" data-action="view" data-id="${sanitize(record.id)}" title="View">
								<i class="fa fa-eye"></i>
							</button>
							<button type="button" class="action-btn" data-action="edit" data-id="${sanitize(record.id)}" title="Edit">
								<i class="fa fa-pen"></i>
							</button>
							<button type="button" class="action-btn" data-action="delete" data-id="${sanitize(record.id)}" title="Delete">
								<i class="fa fa-trash"></i>
							</button>
						</div>
					</td>
				</tr>
			`).join('');
		}

		function renderPagination(total, totalPages, startIndex, endIndex) {
			const shownStart = total === 0 ? 0 : startIndex + 1;
			const shownEnd = Math.min(endIndex, total);
			refs.paginationInfo.textContent = `Showing ${shownStart}-${shownEnd} of ${total}`;

			let html = `
				<li class="page-item ${state.currentPage === 1 ? 'disabled' : ''}">
					<button class="page-link" data-page="prev">Previous</button>
				</li>
			`;

			for (let i = 1; i <= totalPages; i++) {
				html += `
					<li class="page-item ${i === state.currentPage ? 'active' : ''}">
						<button class="page-link" data-page="${i}">${i}</button>
					</li>
				`;
			}

			html += `
				<li class="page-item ${state.currentPage === totalPages ? 'disabled' : ''}">
					<button class="page-link" data-page="next">Next</button>
				</li>
			`;

			refs.pagination.innerHTML = html;
		}

		function renderSortState() {
			document.querySelectorAll('th.sortable').forEach(th => {
				const key = th.getAttribute('data-sort');
				const indicator = th.querySelector('.sort-indicator');
				if (!indicator) return;
				if (key !== state.sortKey) {
					indicator.textContent = '↕';
				} else {
					indicator.textContent = state.sortDirection === 'asc' ? '↑' : '↓';
				}
			});
		}

		function onSortClick(event) {
			const th = event.target.closest('th.sortable');
			if (!th) return;
			const key = th.getAttribute('data-sort');

			if (state.sortKey === key) {
				state.sortDirection = state.sortDirection === 'asc' ? 'desc' : 'asc';
			} else {
				state.sortKey = key;
				state.sortDirection = 'asc';
			}

			paginate();
			renderSortState();
		}

		function onPaginationClick(event) {
			const button = event.target.closest('button[data-page]');
			if (!button) return;

			const token = button.getAttribute('data-page');
			const totalPages = Math.max(1, Math.ceil(state.filtered.length / state.pageSize));

			if (token === 'prev' && state.currentPage > 1) {
				state.currentPage -= 1;
			} else if (token === 'next' && state.currentPage < totalPages) {
				state.currentPage += 1;
			} else if (token !== 'prev' && token !== 'next') {
				state.currentPage = parseInt(token, 10) || 1;
			}

			paginate();
		}

		function populateForEdit(recordId) {
			const record = state.records.find(x => String(x.id) === String(recordId));
			if (!record) return;

			refs.customerId.value = record.id || '';
			refs.customerName.value = record.customername || '';
			refs.customerAddress.value = record.address || '';
			refs.phoneNumber.value = record.phonenumber || '';
			refs.customerForm.classList.remove('was-validated');
			refs.phoneNumber.classList.remove('is-invalid');
			refs.saveBtn.textContent = 'Update Customer';
			refs.customerName.focus();
		}

		function viewRecord(recordId) {
			const record = state.records.find(x => String(x.id) === String(recordId));
			if (!record) return;
			const message = [
				`Customer Name: ${record.customername || '-'}`,
				`Phone Number: ${record.phonenumber || '-'}`,
				`Address: ${record.address || '-'}`,
				`Created Date: ${formatDate(record.createdon)}`
			].join('\n');
			alert(message);
		}

		async function deleteRecord(recordId) {
			if (!confirm('Delete this customer?')) return;

			try {
				if (typeof deleteRecordData === 'function') {
					await deleteRecordData(ENTITY_NAME, [recordId], true, true);
					await loadCustomers();
					return;
				}

				alert('Delete function is not available in this runtime.');
			} catch (error) {
				console.error('Error deleting customer:', error);
				alert('Failed to delete customer.');
			}
		}

		function onTableAction(event) {
			const button = event.target.closest('button[data-action]');
			if (!button) return;

			const action = button.getAttribute('data-action');
			const id = button.getAttribute('data-id');

			if (action === 'view') {
				viewRecord(id);
			} else if (action === 'edit') {
				populateForEdit(id);
			} else if (action === 'delete') {
				deleteRecord(id);
			}
		}

		function wireEvents() {
			refs.phoneNumber.addEventListener('input', enforcePhoneInput);
			refs.customerForm.addEventListener('submit', saveCustomer);
			refs.resetBtn.addEventListener('click', resetForm);

			refs.searchInput.addEventListener('input', function () {
				state.searchText = refs.searchInput.value;
				applyFilters();
			});

			document.querySelector('thead').addEventListener('click', onSortClick);
			refs.pagination.addEventListener('click', onPaginationClick);
			refs.tableBody.addEventListener('click', onTableAction);
		}

		document.addEventListener('DOMContentLoaded', function () {
			wireEvents();
			renderSortState();
			loadCustomers();
		});
	</script>
</body>
</html>
