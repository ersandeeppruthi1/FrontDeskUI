<!DOCTYPE html>
<html lang="en">

<head runat="server">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill Invoice Detail Management</title>
    <script>
        let classMap = [];
        var apiURL = "https://dbsit2.vsservices.in/";
        //var apiURL = "";
    </script>

    <link href="https://apisit.vsservices.in/css/Default/bootstrap.min.css" rel="stylesheet" />

    <script src="https://apisit.vsservices.in/css/Default/jquery.min.js"></script>

    <link href="https://apisit.vsservices.in/css/Default/font-awesome-all.min.css" rel="stylesheet" />

    <script src="https://apisit.vsservices.in/css/Default/bootstrap.bundle.min.js"></script>
    <link href="https://apisit.vsservices.in/css/app.css?id=081220258" rel="stylesheet" />

    <script src="https://apisit.vsservices.in/JS/utility.js?id=081220258"></script>
    <script src="https://apisit.vsservices.in/JS/entityPage.js?id=081220258" type="module"></script>
    <script src="https://apisit.vsservices.in/JS/controls.js?id=081220258" type="module"></script>
    <script src="https://apisit.vsservices.in/JS/listcontrols.js?id=081220258" type="module"></script>
    <script src="https://apisit.vsservices.in/JS/formHandler.js?id=081220258" type="module"></script>
    <script src="https://apisit.vsservices.in/JS/Master/DBHandler.js?id=081220258" type="module"></script>
    <script src="https://apisit.vsservices.in/JS/VastuBill/VastuBillPDFExporter.js?id=081220258"></script>

    <script src="https://apisit.vsservices.in/css/Default/popper.min.js"></script>
    <script src="https://apisit.vsservices.in/css/Default/bootstrap.min.js"></script>
    <link href="https://apisit.vsservices.in/css/Default/simple-line-icons.min.css" rel="stylesheet" />

    <script src="https://apisit.vsservices.in/css/Default/dayjs.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/dayjs"></script>
    <link href="https://apisit.vsservices.in/css/Default/font-awesome-all.min.css" rel="stylesheet" />

    <script src="https://apisit.vsservices.in/css/Default/pdfmake.min.js"></script>
    <script src="https://apisit.vsservices.in/css/Default/vfs_fonts.js"></script>

    <script src="https://apisit.vsservices.in/css/Default/xlsx.full.min.js"></script>

    <script src="https://apisit.vsservices.in/css/Default/moment.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.11.4/jquery-ui.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.0/jquery-ui.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-base/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-grids/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-buttons/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-popups/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-richtexteditor/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-navigations/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-dropdowns/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-lists/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-inputs/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-calendars/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-notifications/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-splitbuttons/styles/bootstrap5.css" rel="stylesheet">
    <script src="https://cdn.syncfusion.com/ej2/32.1.19/dist/ej2.min.js" type="text/javascript"></script>
    <script src="https://cdn.syncfusion.com/ej2/syncfusion-helper.js" type="text/javascript"></script>

</head>

<body>
    <div class="container2">
        <div class="toolbar toolbar-spacing">
            <div class="row g-3 align-items-end">
                <div class="col-sm-6 col-md-3">
                    <label for="startDate">From date</label>
                    <input id="startDate" class="form-control" datatype="date" defaultValue="currentDate"
                        onchange="loadDetails()">
                </div>
                <div class="col-sm-6 col-md-3">
                    <label for="endDate">To date</label>
                    <input id="endDate" class="form-control" datatype="date" defaultValue="currentDate"
                        onchange="loadDetails()">
                </div>
            </div>
        </div>
        <div id="invoiceDetailGrid"></div>
    </div>

    <div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Add Invoice Detail</h5>
                    <button type="button" class="btn-close" aria-label="Close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <form id="detailForm">
                        <div class="row">
                            <div class="col-md-4">
                                <label for="name">Name<span class="text-danger">*</span></label>
                                <input id="name" class="form-control" maxlength="255" required />
                            </div>
                            <div class="col-md-4">
                                <label for="billinvoiceid">Bill Invoice<span class="text-danger">*</span></label>
                                <select id="billinvoiceid" class="form-control" onchange="syncInvoiceMeta()" required>
                                    <option value="">Select Invoice</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label for="customerid">Customer Id</label>
                                <input id="customerid" class="form-control" readonly />
                            </div>
                        </div>

                        <div class="row mt-3">
                            <div class="col-md-4">
                                <label for="itemid">Item<span class="text-danger">*</span></label>
                                <select id="itemid" class="form-control" onchange="syncItemMeta()" required>
                                    <option value="">Select Item</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label for="itemname">Item Name</label>
                                <input id="itemname" class="form-control" readonly />
                            </div>
                            <div class="col-md-2">
                                <label for="price">Price<span class="text-danger">*</span></label>
                                <input id="price" type="number" min="0" step="0.01" class="form-control" onchange="recalculateTotal()" required />
                            </div>
                            <div class="col-md-2">
                                <label for="quantity">Quantity<span class="text-danger">*</span></label>
                                <input id="quantity" type="number" min="0.01" step="0.01" class="form-control" value="1" onchange="recalculateTotal()" required />
                            </div>
                        </div>

                        <div class="row mt-3">
                            <div class="col-md-3">
                                <label for="totalprice">Total Price</label>
                                <input id="totalprice" type="number" class="form-control" readonly />
                            </div>
                        </div>
                    </form>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" onclick="saveDetail(event)">Save</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>

            </div>
        </div>
    </div>

    <script>

        let grid;
        let editingId = null;
        let invoiceMap = {};
        let itemMap = {};

        const columns = [
            { type: 'checkbox', width: 50 },
            { field: 'srno', headerText: 'S.No.', textAlign: 'Right', width: 80 },
            { field: 'name', headerText: 'Name', width: 160 },
            { field: 'invoicelabel', headerText: 'Invoice', width: 220 },
            { field: 'customerid', headerText: 'Customer Id', width: 140 },
            { field: 'itemname', headerText: 'Item', width: 180 },
            { field: 'price', headerText: 'Price', width: 120, textAlign: 'Right', format: 'N2' },
            { field: 'quantity', headerText: 'Qty', width: 90, textAlign: 'Right', format: 'N2' },
            { field: 'totalprice', headerText: 'Total', width: 120, textAlign: 'Right', format: 'N2' },
            { field: 'createdon', headerText: 'Created Date', type: 'date', format: { type: 'date', format: 'd/M/y' }, width: 130 },
            { field: 'id', visible: false, allowPdfExport: false },
            { field: 'billinvoiceid', visible: false, allowPdfExport: false },
            { field: 'itemid', visible: false, allowPdfExport: false }
        ];

        function toNumber(value) {
            const n = parseFloat(value);
            return Number.isFinite(n) ? n : 0;
        }

        function normalizeDate(val) {
            if (!val) return null;
            const d = val instanceof Date ? val : new Date(val);
            return isNaN(d) ? null : d;
        }

        function formatDate(value) {
            const d = value instanceof Date ? value : new Date(value);
            if (isNaN(d)) return '';
            const dd = String(d.getDate()).padStart(2, '0');
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const yyyy = d.getFullYear();
            return `${dd}-${mm}-${yyyy}`;
        }

        function getSafeDatePickerValue(id) {
            if (typeof getDatePickerValue === 'function') {
                return getDatePickerValue(id);
            }
            const el = document.getElementById(id);
            return el ? el.value : '';
        }

        function recalculateTotal() {
            const p = toNumber(document.getElementById('price').value);
            const q = toNumber(document.getElementById('quantity').value);
            document.getElementById('totalprice').value = (p * q).toFixed(2);
        }

        function renderInvoiceOptions(records) {
            const select = document.getElementById('billinvoiceid');
            invoiceMap = {};
            let html = '<option value="">Select Invoice</option>';

            (records || []).forEach(function (x) {
                const id = String(x.id || '');
                if (!id) return;
                const label = x.invoicenumberwithcustomername || x.invoicenumber || id;
                invoiceMap[id] = {
                    customerid: x.customerid || '',
                    label: label
                };
                html += `<option value="${id}">${label}</option>`;
            });

            select.innerHTML = html;
        }

        function renderItemOptions(records) {
            const select = document.getElementById('itemid');
            itemMap = {};
            let html = '<option value="">Select Item</option>';

            (records || []).forEach(function (x) {
                const id = String(x.id || '');
                if (!id) return;
                const name = x.name || '';
                const price = toNumber(x.price);
                itemMap[id] = { name: name, price: price };
                html += `<option value="${id}">${name}</option>`;
            });

            select.innerHTML = html;
        }

        function syncInvoiceMeta() {
            const id = String(document.getElementById('billinvoiceid').value || '');
            const invoice = invoiceMap[id];
            document.getElementById('customerid').value = invoice ? String(invoice.customerid || '') : '';
        }

        function syncItemMeta() {
            const id = String(document.getElementById('itemid').value || '');
            const item = itemMap[id];
            document.getElementById('itemname').value = item ? String(item.name || '') : '';
            document.getElementById('price').value = item ? String(item.price || 0) : '';
            recalculateTotal();
        }

        function initGrid(cols, gridId) {
            ej.grids.Grid.Inject(
                ej.grids.Filter,
                ej.grids.Group,
                ej.grids.Page,
                ej.grids.Sort,
                ej.grids.Toolbar,
                ej.grids.ColumnChooser,
                ej.grids.ExcelExport,
                ej.grids.PdfExport
            );

            grid = new ej.grids.Grid({
                dataSource: [],
                allowPaging: true,
                pageSettings: { pageSize: 10 },
                allowSorting: true,
                allowFiltering: true,
                filterSettings: { type: 'Excel' },
                showColumnChooser: true,
                selectionSettings: { type: 'Multiple' },
                rowSelected: toggleEditButton,
                rowDeselected: toggleEditButton,
                allowExcelExport: true,
                allowPdfExport: true,
                toolbar: [
                    'Search',
                    'ColumnChooser',
                    { prefixIcon: 'e-icons e-excelexport', tooltipText: 'Export Excel', id: 'excelExport' },
                    { prefixIcon: 'e-icons e-pdfexport', tooltipText: 'Export PDF', id: 'pdfExport' },
                    { prefixIcon: 'e-icons e-refresh', tooltipText: 'Refresh', id: 'refreshGrid' },
                    { text: 'New', prefixIcon: 'e-icons e-plus', id: 'new' },
                    { text: 'Edit', prefixIcon: 'e-icons e-edit', id: 'edit', disabled: true },
                    { text: 'Delete', prefixIcon: 'e-icons e-delete', id: 'delete' }
                ],
                columns: cols,
                toolbarClick: function (args) {
                    if (args.item.id === 'excelExport') {
                        grid.excelExport({ fileName: `BillInvoiceDetail_${formatDate(new Date())}.xlsx`, exportType: 'AllPages' });
                    }

                    if (args.item.id === 'pdfExport') {
                        grid.pdfExport({ fileName: `BillInvoiceDetail_${formatDate(new Date())}.pdf`, exportType: 'CurrentPage', pageOrientation: 'Landscape', pageSize: 'A4' });
                    }

                    if (args.item.id === 'refreshGrid') {
                        loadDetails();
                    }

                    if (args.item.id === 'new') {
                        openDetailModal();
                    }

                    if (args.item.id === 'edit') {
                        editDetail();
                    }

                    if (args.item.id === 'delete') {
                        deleteDetail();
                    }
                }
            });

            grid.appendTo('#' + gridId);
        }

        function toggleEditButton() {
            const selected = grid.getSelectedRecords();
            const editBtn = grid.toolbarModule.toolbar.items.find(function (item) { return item.id === 'edit'; });
            if (!editBtn) return;
            editBtn.disabled = selected.length !== 1;
        }

        async function loadMasters() {
            const [invoices, items] = await Promise.all([
                DBHandler.fetchEntityRecord('billinvoice', 'id,invoicenumber,customerid,invoicenumberwithcustomername', '', false),
                DBHandler.fetchEntityRecord('billingitem', 'id,name,price', '', false)
            ]);

            renderInvoiceOptions(invoices || []);
            renderItemOptions(items || []);
        }

        function openDetailModal() {
            const modalEl = document.getElementById('detailModal');
            document.getElementById('detailForm').reset();
            editingId = null;
            document.getElementById('quantity').value = '1';
            recalculateTotal();
            document.querySelector('#detailModal .modal-title').innerText = 'Add Invoice Detail';
            bootstrap.Modal.getOrCreateInstance(modalEl).show();
        }

        function editDetail() {
            const selected = grid.getSelectedRecords();
            if (selected.length !== 1) {
                alert('Please select one record to edit');
                return;
            }

            const row = selected[0];
            editingId = row.id;
            document.getElementById('name').value = row.name || '';
            document.getElementById('billinvoiceid').value = row.billinvoiceid || '';
            syncInvoiceMeta();
            document.getElementById('itemid').value = row.itemid || '';
            syncItemMeta();
            document.getElementById('price').value = toNumber(row.price);
            document.getElementById('quantity').value = toNumber(row.quantity);
            recalculateTotal();

            document.querySelector('#detailModal .modal-title').innerText = 'Edit Invoice Detail';
            bootstrap.Modal.getOrCreateInstance(document.getElementById('detailModal')).show();
        }

        async function deleteDetail() {
            const selected = grid.getSelectedRecords();
            if (!selected.length) {
                alert('Please select record(s) to delete');
                return;
            }

            if (!confirm(`Delete ${selected.length} detail record(s)?`)) {
                return;
            }

            const ids = selected.map(function (r) { return r.id; });
            await deleteRecordData('billinvoicedetail', ids, true, true);
            await loadDetails();
        }

        async function loadDetails() {
            const startDate = getSafeDatePickerValue('startDate');
            const endDate = getSafeDatePickerValue('endDate');

            if (!startDate || !endDate) return;

            const start = startDate + ' 00:00:00';
            const end = endDate + ' 23:59:59';
            const filter = `billinvoicedetail.createdon >= '${start}' AND billinvoicedetail.createdon <= '${end}'`;

            try {
                await loadMasters();

                const joinCondition = 'LEFT JOIN billinvoice ON billinvoice.id = billinvoicedetail.billinvoiceid LEFT JOIN billingitem ON billingitem.id = billinvoicedetail.itemid';
                const details = await DBHandler.fetchEntityRecords(
                    'billinvoicedetail',
                    'billinvoicedetail.id,billinvoicedetail.name,billinvoicedetail.billinvoiceid,billinvoicedetail.customerid,billinvoicedetail.itemid,billinvoicedetail.itemname,billinvoicedetail.price,billinvoicedetail.quantity,billinvoicedetail.totalprice,billinvoicedetail.createdon,billinvoice.invoicenumberwithcustomername,billinvoice.invoicenumber,billingitem.name as itemlookupname',
                    'billinvoicedetail.createdon',
                    'desc',
                    filter,
                    true,
                    0,
                    joinCondition
                );

                let sr = 1;
                const rows = (details || []).map(function (x) {
                    const inv = invoiceMap[String(x.billinvoiceid || '')];
                    return {
                        id: x.id,
                        srno: sr++,
                        name: x.name || '',
                        billinvoiceid: x.billinvoiceid || '',
                        customerid: x.customerid || (inv ? inv.customerid : ''),
                        itemid: x.itemid || '',
                        itemname: x.itemname || x.itemlookupname || (itemMap[String(x.itemid || '')] ? itemMap[String(x.itemid || '')].name : ''),
                        price: toNumber(x.price),
                        quantity: toNumber(x.quantity),
                        totalprice: toNumber(x.totalprice),
                        createdon: normalizeDate(x.createdon),
                        invoicelabel: x.invoicenumberwithcustomername || (inv ? inv.label : (x.invoicenumber || ''))
                    };
                });

                grid.dataSource = rows;
                grid.refresh();
            } catch (error) {
                console.error('Failed to load invoice details:', error);
            }
        }

        async function saveDetail(event) {
            if (event && event.target) {
                event.target.disabled = true;
                event.target.innerText = 'Saving...';
            }

            try {
                const name = (document.getElementById('name').value || '').trim();
                const billinvoiceid = document.getElementById('billinvoiceid').value;
                const customerid = document.getElementById('customerid').value;
                const itemid = document.getElementById('itemid').value;
                const itemname = (document.getElementById('itemname').value || '').trim();
                const price = toNumber(document.getElementById('price').value);
                const quantity = toNumber(document.getElementById('quantity').value);
                const totalprice = toNumber(document.getElementById('totalprice').value);

                if (!name) {
                    alert('Name is required');
                    return;
                }

                if (!billinvoiceid) {
                    alert('Bill invoice is required');
                    return;
                }

                if (!itemid) {
                    alert('Item is required');
                    return;
                }

                if (quantity <= 0) {
                    alert('Quantity must be greater than zero');
                    return;
                }

                await DBHandler.submitRecordData('billinvoicedetail', {
                    name: name,
                    billinvoiceid: billinvoiceid,
                    customerid: customerid,
                    itemid: itemid,
                    itemname: itemname,
                    price: price,
                    quantity: quantity,
                    totalprice: totalprice
                }, editingId, false);

                bootstrap.Modal.getOrCreateInstance(document.getElementById('detailModal')).hide();
                editingId = null;
                await loadDetails();
            } catch (error) {
                console.error('Failed to save invoice detail:', error);
                alert('Failed to save invoice detail');
            } finally {
                if (event && event.target) {
                    event.target.disabled = false;
                    event.target.innerText = 'Save';
                }
            }
        }

        $(document).ready(async function () {
            if (typeof applyDatePicker === 'function') {
                applyDatePicker();
            }
            initGrid(columns, 'invoiceDetailGrid');
            await loadDetails();
        });
    </script>

    <style>
        .toolbar-spacing {
            margin-bottom: 10px;
        }

        #invoiceDetailGrid_toolbarItems {
            height: 10px !important;
        }
    </style>

</body>

</html>
