<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<script>
		let classMap = [];

	</script>

	<link href="https://apisit.vsservices.in/css/Default/bootstrap.min.css" rel="stylesheet" />
	<script src="https://apisit.vsservices.in/css/Default/jquery.min.js"></script>
	<script src="https://apisit.vsservices.in/css/Default/moment.min.js"></script>
	<link href="https://apisit.vsservices.in/css/Default/font-awesome-all.min.css" rel="stylesheet" />
	<script src="https://apisit.vsservices.in/css/Default/bootstrap.bundle.min.js"></script>
	<link href="https://apisit.vsservices.in/css/app.css?id=081220258" rel="stylesheet" />
	<script src="https://apisit.vsservices.in/JS/utility.js?id=081220258"></script>
	<script>
		(function () {
			if (window.AuthManager) return;

			function getCookie(name) {
				const key = `${name}=`;
				const decoded = decodeURIComponent(document.cookie || '');
				const chunks = decoded.split(';');
				for (let i = 0; i < chunks.length; i++) {
					const item = chunks[i].trim();
					if (item.indexOf(key) === 0) {
						return item.substring(key.length);
					}
				}
				return '';
			}

			function firstNonEmpty(values) {
				for (let i = 0; i < values.length; i++) {
					if (values[i]) return values[i];
				}
				return '';
			}

			function parseJwtPayload(token) {
				try {
					if (!token || token.split('.').length < 2) return {};
					const base64Url = token.split('.')[1];
					const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
					const decoded = atob(base64);
					return JSON.parse(decoded);
				} catch (e) {
					return {};
				}
			}

			function resolveToken() {
				const url = new URL(window.location.href);
				const qpData = url.searchParams.get('dataToken') || '';
				const qpAuth = url.searchParams.get('authToken') || '';
				const qpToken = url.searchParams.get('token') || '';
				const qpAccessToken = url.searchParams.get('accessToken') || '';

				const localData = localStorage.getItem('dataToken') || '';
				const localAuth = localStorage.getItem('authToken') || '';
				const localAuthToken = localStorage.getItem('AuthToken') || '';
				const localToken = localStorage.getItem('token') || '';
				const localAccessToken = localStorage.getItem('accessToken') || '';

				const sessionData = sessionStorage.getItem('dataToken') || '';
				const sessionAuth = sessionStorage.getItem('authToken') || '';
				const sessionToken = sessionStorage.getItem('token') || '';
				const sessionAccessToken = sessionStorage.getItem('accessToken') || '';

				const cookieData = getCookie('dataToken') || getCookie('DataToken') || '';
				const cookieAuth = getCookie('authToken') || getCookie('AuthToken') || '';
				const cookieToken = getCookie('token') || getCookie('Token') || '';
				const cookieAccessToken = getCookie('accessToken') || getCookie('AccessToken') || '';

				const globalDataToken = window.dataToken || '';
				const globalAuthToken = window.authToken || window.AuthToken || '';

				return firstNonEmpty([
					qpData,
					qpAuth,
					qpToken,
					qpAccessToken,
					localData,
					localAuth,
					localAuthToken,
					localToken,
					localAccessToken,
					sessionData,
					sessionAuth,
					sessionToken,
					sessionAccessToken,
					cookieData,
					cookieAuth,
					cookieToken,
					cookieAccessToken,
					globalDataToken,
					globalAuthToken
				]);
			}

			function normalizeUserId(value) {
				const clean = String(value || '').trim();
				if (!clean) return '';
				return clean.length > 36 ? clean.slice(0, 36) : clean;
			}

			function resolveUserId() {
				const url = new URL(window.location.href);
				const qpUserId = firstNonEmpty([
					url.searchParams.get('userid') || '',
					url.searchParams.get('userId') || '',
					url.searchParams.get('uid') || ''
				]);

				const localUserId = firstNonEmpty([
					localStorage.getItem('userid') || '',
					localStorage.getItem('userId') || '',
					localStorage.getItem('uid') || ''
				]);

				const sessionUserId = firstNonEmpty([
					sessionStorage.getItem('userid') || '',
					sessionStorage.getItem('userId') || '',
					sessionStorage.getItem('uid') || ''
				]);

				const cookieUserId = firstNonEmpty([
					getCookie('userid') || '',
					getCookie('userId') || '',
					getCookie('UserId') || ''
				]);

				const explicitUserId = normalizeUserId(firstNonEmpty([
					qpUserId,
					localUserId,
					sessionUserId,
					cookieUserId
				]));

				if (explicitUserId) return explicitUserId;

				const payload = parseJwtPayload(resolveToken());
				const jwtUserId = normalizeUserId(firstNonEmpty([
					payload.userId,
					payload.userid,
					payload.uid,
					payload.nameid,
					payload.sub,
					payload['http://schemas.xmlsoap.org/ws/2005/05/identity/claims/nameidentifier']
				]));

				return jwtUserId || '0';
			}

			window.AuthManager = {
				getDataToken: resolveToken,
				getAuthToken: resolveUserId,
				setDataToken: function (token) {
					if (!token) return;
					localStorage.setItem('dataToken', token);
				},
				setAuthToken: function (token) {
					if (!token) return;
					localStorage.setItem('authToken', token);
				}
			};
		})();
	</script>
	<script src="https://apisit.vsservices.in/JS/Master/DBHandler.js?id=081220258" type="module"></script>

			background: #f6f8fc;

<body>
<div class="estimate-shell">
	<div class="panel">
		<h2 class="page-title">Estimate</h2>

		<div class="mb-3">
			<label for="customerSelect" class="form-label fw-semibold">Customer Name</label>
			<div class="d-flex gap-2 align-items-center flex-wrap">
	                <select id="customerSelect" class="form-select dropdown-wide"></select>
				<button class="btn btn-primary" id="btnNewCustomer" type="button" onclick="openNewCustomer()">+</button>
			</div>
		</div>

		<div class="btn-group" role="group" id="toggleGroup">
			<button type="button" class="btn btn-outline-primary toggle-btn active" data-target="itemSection">Item</button>
			<button type="button" class="btn btn-outline-primary toggle-btn" data-target="packagingSlipSection">Packaging Slip</button>
		</div>

		<div id="itemSection" class="toggle-section">
			<div class="mb-3">
				<label for="itemSelect" class="form-label fw-semibold">Item</label>
				<div class="d-flex gap-2 align-items-center flex-wrap">
	                    <select id="itemSelect" class="form-select dropdown-wide"></select>
					<button class="btn btn-primary" id="btnNewItem" type="button" onclick="openNewItem()">+</button>
				</div>
			</div>

			<div class="row g-3">
				<div class="col-md-6">
					<label for="itemQuantity" class="form-label fw-semibold">Quantity</label>
					<input type="number" id="itemQuantity" class="form-control" min="0" step="0.01" />
				</div>
				<div class="col-md-6">
					<label for="itemPrice" class="form-label fw-semibold">Price</label>
					<input type="number" id="itemPrice" class="form-control" min="0" step="0.01" />
				</div>
			</div>
		</div>

		<div id="packagingSlipSection" class="toggle-section d-none">
			<div class="row g-3">
				<div class="col-md-6">
					<label for="packagingSlipLoad" class="form-label fw-semibold">Packaging Slip Load</label>
					<select id="packagingSlipLoad" class="form-select" onchange="handlePackagingSlipLoadChange(event)">
						<option value="lastTwoDays">Last two days</option>
						<option value="lastSevenDays">Last seven days</option>
						<option value="all">All</option>
					</select>
				</div>
				<div class="col-md-6">
					<label for="packagingSlip" class="form-label fw-semibold">Packaging Slip</label>
					<select id="packagingSlip" class="form-select">
						<option value="">Select a packaging slip</option>
					</select>
				</div>
			</div>
		</div>

		<div class="mt-3">
			<button class="btn btn-primary" id="addToSummary" type="button" onclick="addToSummaryClick()">Add</button>
		</div>

		<div class="modal fade" id="addCustomerModal" tabindex="-1" aria-labelledby="addCustomerModalLabel" aria-hidden="true">
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header">
						<h5 class="modal-title" id="addCustomerModalLabel">Add Customer</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" onclick="closeModal('addCustomerModal')"></button>
					</div>
					<div class="modal-body">
						<div class="mb-3">
							<label for="customerName" class="form-label">Customer Name</label>
							<input type="text" id="customerName" class="form-control">
						</div>
						<div class="mb-3">
							<label for="customerPhone" class="form-label">Phone Number</label>
							<input type="text" id="customerPhone" class="form-control">
						</div>
						<div class="mb-3">
							<label for="customerAddress" class="form-label">Address</label>
							<textarea id="customerAddress" class="form-control" rows="3"></textarea>
						</div>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-secondary" data-bs-dismiss="modal" onclick="closeModal('addCustomerModal')">Close</button>
						<button type="button" class="btn btn-primary" id="saveCustomer" onclick="saveCustomer()">Save</button>
					</div>
				</div>
			</div>
		</div>

		<div class="modal fade" id="addItemModal" tabindex="-1" aria-labelledby="addItemModalLabel" aria-hidden="true">
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header">
						<h5 class="modal-title" id="addItemModalLabel">Add Item</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" onclick="closeModal('addItemModal')"></button>
					</div>
					<div class="modal-body">
						<div class="mb-3">
							<label for="itemName" class="form-label">Item Name</label>
							<input type="text" id="itemName" class="form-control">
						</div>
						<div class="mb-3">
							<label for="price" class="form-label">Price</label>
							<input type="number" id="price" class="form-control" min="0" step="0.01">
						</div>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-secondary" data-bs-dismiss="modal" onclick="closeModal('addItemModal')">Close</button>
						<button type="button" class="btn btn-primary" id="saveItem" onclick="saveItem()">Save</button>
					</div>
				</div>
			</div>
		</div>

		<div class="table-responsive mt-4 tablesection">
			<table class="table table-bordered summary-table">
				<thead>
				<tr>
					<th colspan="5" class="text-center">
						Estimate Number: <span id="invoiceNumber" role="button" tabindex="0" onclick="enableInvoiceEdit()">...</span>
					</th>
				</tr>
				<tr>
					<th>Item Name</th>
					<th>Price</th>
					<th>Quantity</th>
					<th>Total Price</th>
					<th>Action</th>
				</tr>
				</thead>
				<tbody id="summaryTableBody"></tbody>
				<tfoot id="summaryFooter">
				<tr>
					<td colspan="2" class="text-end">Total</td>
					<td id="totalQuantity" class="text-center">0</td>
					<td id="totalPrice" class="text-end">0.00</td>
					<td></td>
				</tr>
				<tr>
					<td colspan="3" class="text-end">Cash/Paytm Received</td>
					<td id="cashReceivedCell" class="footer-editable text-end" data-field="cashReceived">0.00</td>
					<td></td>
				</tr>
				<tr>
					<td colspan="3" class="text-end">Balance</td>
					<td id="balanceCell" class="text-end">0.00</td>
					<td></td>
				</tr>
				</tfoot>
			</table>
		</div>

		<div class="fixed-actions d-flex justify-content-between align-items-center gap-2 flex-wrap mt-3">
			<button class="btn btn-secondary" id="exportToPDF" type="button" onclick="exportTableToPDF()">Export</button>
			<button class="btn btn-success" id="generateNewBill" type="button">New</button>
			<button class="btn btn-primary" id="printInvoice" type="button" onclick="printInvoice()">Print</button>
		</div>
	</div>
</div>

<script>
	let itemArray = [];
	let invoiceData = {
		invoiceId: null,
		customerId: null,
		customerName: null,
		items: [],
		cashReceived: 0,
		invoicedate: null,
		createdon: null,
		invoiceNumber: null,
	};

	function openModal(modalId) {
		const modalElement = document.getElementById(modalId);
		if (!modalElement || !window.bootstrap || !window.bootstrap.Modal) return;
		const instance = bootstrap.Modal.getInstance(modalElement) || new bootstrap.Modal(modalElement);
		instance.show();
	}

	function closeModal(modalId) {
		const modalElement = document.getElementById(modalId);
		if (!modalElement || !window.bootstrap || !window.bootstrap.Modal) return;
		const instance = bootstrap.Modal.getInstance(modalElement) || new bootstrap.Modal(modalElement);
		instance.hide();
	}

	function openNewItem() {
		document.getElementById('itemName').value = '';
		document.getElementById('price').value = '';
		openModal('addItemModal');
	}

	function openNewCustomer() {
		document.getElementById('customerName').value = '';
		document.getElementById('customerPhone').value = '';
		document.getElementById('customerAddress').value = '';
		openModal('addCustomerModal');
	}

	function loadCustomersIntoDropdown() {
		if (!window.DBHandler || typeof DBHandler.fetchEntityRecord !== 'function') return;

		DBHandler.fetchEntityRecord('billingcustomer', 'id,name', '', true)
			.then(records => {
				const select = $('#customerSelect');
					select.empty().append('<option value="">Select Customer</option>');
				(records || []).sort((a, b) => (a.name || '').localeCompare(b.name || '')).forEach(record => {
					select.append(new Option(record.name || '', record.id || ''));
				});
			})
			.catch(error => {
				console.error('Error loading customers:', error);
			});
	}

	async function loadItemsIntoDropdown() {
		try {
			if (!window.DBHandler || typeof DBHandler.fetchEntityRecord !== 'function') return;
			itemArray = await DBHandler.fetchEntityRecord('billingitem', 'id,name,price', '', true) || [];
			itemArray.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
			const select = $('#itemSelect');
			select.empty().append('<option value="">Select an item</option>');
			itemArray.forEach(item => select.append(new Option(item.name, item.id)));
			select.trigger('change');
		} catch (error) {
			console.error('Error loading items:', error);
		}
	}

	function loadPackagingSlipIntoDropdown(filterCondition = 'lastTwoDays') {
		if (!window.DBHandler || typeof DBHandler.fetchEntityRecord !== 'function') return;

		let filterQuery = '';
		const today = new Date();
		if (filterCondition === 'lastTwoDays') {
			const twoDaysAgo = new Date(today);
			twoDaysAgo.setDate(today.getDate() - 2);
			filterQuery = `slipdate >= '${twoDaysAgo.toISOString().split('T')[0]}'`;
		} else if (filterCondition === 'lastSevenDays') {
			const sevenDaysAgo = new Date(today);
			sevenDaysAgo.setDate(today.getDate() - 7);
			filterQuery = `slipdate >= '${sevenDaysAgo.toISOString().split('T')[0]}'`;
		}

		DBHandler.fetchEntityRecord('packagingitemdetail', 'id,packagingnumber,packagingcreatedby,slipdate', filterQuery, true)
			.then(records => {
				const select = $('#packagingSlip');
				select.empty().append('<option value="">Select a packaging slip</option>');
				(records || []).sort((a, b) => (a.packagingnumber || '').localeCompare(b.packagingnumber || '')).forEach(record => {
					const labelParts = [record.packagingnumber, record.packagingcreatedby].filter(Boolean);
					const label = labelParts.length ? labelParts.join(' - ') : (record.packagingnumber || 'Slip');
					select.append(new Option(label, record.id || ''));
				});
			})
			.catch(error => {
				console.error('Error loading packaging slips:', error);
				const select = $('#packagingSlip');
				select.empty().append('<option value="">Select a packaging slip</option>');
			});
	}

	function handlePackagingSlipLoadChange(event) {
		loadPackagingSlipIntoDropdown(event.target.value);
	}

	function addToSummaryClick() {
		const activeButton = document.querySelector('#toggleGroup .btn-primary');
		const activeTab = activeButton ? activeButton.textContent.trim() : 'Item';
		if (activeTab === 'Packaging Slip') {
			addPackagingItem();
		} else {
			addItem();
		}
	}

	function addItem() {
		const itemName = $('#itemSelect option:selected').text();
		const itemId = $('#itemSelect').val();
		const price = parseFloat($('#itemPrice').val()) || 0;
		const quantity = parseFloat($('#itemQuantity').val()) || 0;
		const customerId = $('#customerSelect').val();
		const customerName = $('#customerSelect option:selected').text();

		if (!customerId || !itemId || !price || !quantity) {
			alert('Please fill all fields correctly before adding.');
			return;
		}

		const totalPrice = price * quantity;
		invoiceData.customerId = customerId;
		invoiceData.customerName = customerName;
		invoiceData.items.push({ itemId, itemName, price, quantity, totalPrice });
		renderTable();
		updateTotals();
		submitDataToServer(invoiceData.items.length - 1);
	}

	function addPackagingItem() {
		const packagingSlip = document.getElementById('packagingSlip').value;
		const customerId = $('#customerSelect').val();
		const customerName = $('#customerSelect option:selected').text();

		if (!customerId) {
			alert('Please select customer before adding packaging slip items.');
			return;
		}

		if (!packagingSlip) {
			alert('Please select a packaging slip.');
			return;
		}

		invoiceData.customerId = customerId;
		invoiceData.customerName = customerName;

		if (!window.DBHandler || typeof DBHandler.fetchEntityRecord !== 'function') return;

		DBHandler.fetchEntityRecord('packagingitemdetail', 'itemjson,packagingnumber', `id='${packagingSlip}'`, true)
			.then(response => {
				if (!response || !response.length) return;

				const record = response[0];
				let itemsFromPackagingSlip = {};
				try {
					itemsFromPackagingSlip = record.itemjson ? JSON.parse(record.itemjson) : {};
				} catch (error) {
					console.error('Failed to parse itemjson:', error);
				}

				const groupedItems = {};
				Object.keys(itemsFromPackagingSlip).forEach(itemName => {
					const rows = itemsFromPackagingSlip[itemName] || [];
					rows.forEach(item => {
						const quantity = parseFloat(item.meter * item.count) || 0;
						const selectedItem = itemArray.find(x => x.name === (item.itemId || itemName));
						if (!selectedItem) return;
						const price = parseFloat(selectedItem.price) || 0;
						if (!groupedItems[itemName]) {
							groupedItems[itemName] = { itemId: selectedItem.id, itemName, price, quantity: 0, totalPrice: 0 };
						}
						groupedItems[itemName].quantity += quantity;
						groupedItems[itemName].totalPrice += price * quantity;
					});
				});

				Object.values(groupedItems).forEach(groupedItem => invoiceData.items.push(groupedItem));
				renderTable();
				updateTotals();
			})
			.catch(error => console.error('Error fetching packaging details:', error));
	}

	function renderTable() {
		const body = $('#summaryTableBody');
		body.empty();
		invoiceData.items.forEach((item, index) => {
			body.append(`
				<tr>
					<td>${escapeHtml(item.itemName || '')}</td>
					<td class="editable-cell" data-index="${index}" data-field="price">${Number(item.price || 0).toFixed(2)}</td>
					<td class="editable-cell" data-index="${index}" data-field="quantity">${Number(item.quantity || 0).toFixed(2)}</td>
					<td>${convertNumberToComma(item.totalPrice || 0)}</td>
					<td><button class="btn btn-danger btn-sm delete-row" data-index="${index}"><i class="fa fa-trash"></i></button></td>
				</tr>
			`);
		});
		attachDeleteHandlers();
		attachDoubleClickHandlers();
		attachFooterEditEvents();
		toggleTableSectionVisibility();
	}

	function attachDeleteHandlers() {
		$('.delete-row').off('click').on('click', function () {
			const index = parseInt($(this).data('index'), 10);
			invoiceData.items.splice(index, 1);
			renderTable();
			updateTotals();
			submitDataToServer();
		});
	}

	function attachDoubleClickHandlers() {
		$('#summaryTableBody').off('dblclick', '.editable-cell').on('dblclick', '.editable-cell', function () {
			const cell = $(this);
			const index = cell.data('index');
			const field = cell.data('field');
			const currentValue = invoiceData.items[index][field];
			const input = $('<input>', { type: 'number', class: 'form-control form-control-sm', step: '0.01', value: Number(currentValue || 0).toFixed(2) });
			cell.html(input);
			input.focus()[0].select();
			input.on('blur keyup', function (event) {
				if (event.type === 'blur' || event.key === 'Enter') {
					const newValue = parseFloat(input.val()) || 0;
					invoiceData.items[index][field] = newValue;
					invoiceData.items[index].totalPrice = invoiceData.items[index].price * invoiceData.items[index].quantity;
					renderTable();
					updateTotals();
					submitDataToServer(index);
				}
			});
		});
	}

	function attachFooterEditEvents() {
		$('.footer-editable').off('dblclick').on('dblclick', function () {
			const td = $(this);
			const field = td.data('field');
			const currentValue = td.text().trim();
			if (td.find('input').length > 0) return;
			const input = $(`<input type="text" class="form-control form-control-sm text-end" value="${currentValue}">`);
			td.empty().append(input);
			input.focus();
			input.on('blur keypress', function (e) {
				if (e.type === 'blur' || e.which === 13) {
					saveFooterValue(field, input.val(), td);
				}
			});
		});
	}

	async function saveFooterValue(field, newValue, td) {
		let value = parseFloat(newValue);
		if (isNaN(value)) value = 0;
		invoiceData.cashReceived = value;
		td.text(value.toFixed(2));
		updateTotals();
		if (invoiceData.invoiceId) {
			try {
				await DBHandler.submitRecordData('billinvoice', { cashreceived: value }, invoiceData.invoiceId, false);
			} catch (err) {
				console.error('Error updating footer:', err);
			}
		}
	}

	function updateTotals() {
		let totalQty = 0;
		let totalPrice = 0;
		invoiceData.items.forEach(item => {
			totalQty += Number(item.quantity || 0);
			totalPrice += Number(item.totalPrice || 0);
		});
		$('#totalQuantity').text(convertNumberToComma(totalQty));
		$('#totalPrice').text(convertNumberToComma(totalPrice));
		$('#cashReceivedCell').text(convertNumberToComma(invoiceData.cashReceived || 0));
		$('#balanceCell').text(convertNumberToComma(totalPrice - (invoiceData.cashReceived || 0)));
	}

	function getTotalPrice() {
		const totalPriceText = $('#totalPrice').text().replace(/,/g, '');
		const totalPrice = parseFloat(totalPriceText);
		return isNaN(totalPrice) ? 0 : totalPrice;
	}

	function popuplateInEditMode() {
		invoiceData.invoiceId = getQueryStringParam('id') || '';
		if (invoiceData.invoiceId) {
			populateInvoiceDetail(invoiceData.invoiceId);
		}
	}

	function populateInvoiceDetail(invoiceId) {
		if (!window.DBHandler || typeof DBHandler.fetchEntityRecord !== 'function') return;
		showLoader();
		DBHandler.fetchEntityRecord('billinvoice', 'customerid,customername,totalprice,billjson,invoicenumber,createdon,invoicenumberwithcustomername,cashreceived', `id='${invoiceId}'`, true)
			.then(response => {
				if (!response || !response.length) return;
				const invoice = response[0];
				invoiceData.createdon = invoice.createdon;
				invoiceData.invoiceNumber = invoice.invoicenumber;
				invoiceData.cashReceived = invoice.cashreceived || 0;
				$('#invoiceNumber').text(invoice.invoicenumberwithcustomername || invoice.invoicenumber || '...');
				$('#customerSelect').val(invoice.customerid).trigger('change');
				invoiceData.invoiceId = invoiceId;
				invoiceData.customerId = invoice.customerid;
				invoiceData.customerName = invoice.customername;
				invoiceData.items = JSON.parse(invoice.billjson || '[]');
				renderTable();
				updateTotals();
			})
			.catch(error => {
				console.error('Error fetching invoice details:', error);
				alert('Failed to fetch the invoice details. Please try again.');
			})
			.finally(() => hideLoader());
	}

	function populatetab() {
		document.querySelectorAll('.toggle-btn').forEach(button => {
			button.addEventListener('click', () => {
				document.querySelectorAll('.toggle-section').forEach(section => section.classList.add('d-none'));
				document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('btn-primary'));
				document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.add('btn-outline-primary'));
				const target = button.getAttribute('data-target');
				document.getElementById(target).classList.remove('d-none');
				button.classList.remove('btn-outline-primary');
				button.classList.add('btn-primary');
			});
		});
	}

	function toggleTableSectionVisibility() {
		const tableSection = document.querySelector('.tablesection');
		if (!tableSection) {
			return;
		}
		tableSection.style.display = invoiceData.items.length ? 'block' : 'none';
	}

	function exportTableToPDF() {
		alert('Export is ready to wire to your PDF flow.');
	}

	function printInvoice() {
		alert('Print is ready to wire to your printer flow.');
	}

	function submitDataToServer(itemIndex) {
		if (!window.DBHandler || typeof DBHandler.submitRecordData !== 'function') return;
		if (!invoiceData.customerId) {
			alert('Please select customer before saving.');
			return;
		}
		if (!invoiceData.items || !invoiceData.items.length) {
			alert('Please add at least one item before saving.');
			return;
		}

		if (!invoiceData.customerName) {
			invoiceData.customerName = $('#customerSelect option:selected').text() || '';
		}

		const formData = {
			customerid: invoiceData.customerId,
			customername: invoiceData.customerName,
			billjson: JSON.stringify(invoiceData.items),
			totalprice: parseFloat(getTotalPrice()),
		};

		const today = new Date();
		const yyyy = today.getFullYear();
		const mm = String(today.getMonth() + 1).padStart(2, '0');
		const dd = String(today.getDate()).padStart(2, '0');
		formData.invoicedate = invoiceData.invoicedate || `${yyyy}-${mm}-${dd}`;

		const loader = document.createElement('span');
		loader.classList.add('spinner-border', 'spinner-border-sm', 'text-light');
		loader.style.marginLeft = '10px';

		const addButton = document.getElementById('addToSummary');
		if (addButton && !addButton.querySelector('.spinner-border')) {
			addButton.appendChild(loader);
		}
		if (addButton) addButton.disabled = true;

		if (window.AuthManager && typeof AuthManager.getAuthToken === 'function' && !AuthManager.getAuthToken()) {
			if (loader.parentNode) loader.remove();
			if (addButton) addButton.disabled = false;
			alert('Session token not found. Please open this page from the app menu after login.');
			return;
		}

		DBHandler.submitRecordData('billinvoice', formData, invoiceData.invoiceId, false)
			.then(response => {
				if (response && !invoiceData.invoiceId) {
					invoiceData.invoiceId = response;
					// Keep UI in sync even when secondary fetch fails.
					$('#invoiceNumber').text(String(response));
					if (window.DBHandler && typeof DBHandler.fetchEntityRecord === 'function') {
						DBHandler.fetchEntityRecord('billinvoice', 'invoicenumber,createdon', `id='${invoiceData.invoiceId}'`, false)
							.then(p => {
								if (p && p.length) {
									invoiceData.createdon = p[0].createdon;
									invoiceData.invoiceNumber = p[0].invoicenumber;
									$('#invoiceNumber').text(invoiceData.invoiceNumber);
								}
							})
							.catch(fetchErr => {
								console.warn('Invoice saved but invoice metadata fetch failed:', fetchErr);
							});
					}
				}
			})
			.catch(error => {
				const serverMessage = (error && (error.responseJSON?.message || error.responseText || error.statusText)) || '';
				console.error('Error submitting data:', error);
				if (serverMessage) {
					console.error('Server message:', serverMessage);
				}
				alert('Failed to submit the data. Please try again.');
			})
			.finally(() => {
				if (loader.parentNode) loader.remove();
				if (addButton) addButton.disabled = false;
			});
	}

		const saveButton = document.getElementById('saveItem');

		saveButton.innerHTML = 'Saving...';

				console.error('Error adding customer:', error);

	async function saveInvoiceNumber(newValue) {
		if (!newValue.trim()) {
			alert('Invoice number cannot be empty.');
			return;
		}
		try {
			showLoader();
			const updatedData = { invoicenumberwithcustomername: `${newValue}` };
			await DBHandler.submitRecordData('billinvoice', updatedData, invoiceData.invoiceId, false);
			invoiceData.invoiceNumber = newValue;
			const span = document.createElement('span');
			span.id = 'invoiceNumber';
			span.className = 'editable-text';
			span.textContent = newValue;
			span.onclick = enableInvoiceEdit;
			const input = document.querySelector('#invoiceNumberInput');
			if (input) input.replaceWith(span);
			showSuccessMessage('Invoice number updated successfully!');
		} catch (error) {
			console.error('Error updating invoice number:', error);
			alert('Failed to update invoice number.');
		} finally {
			hideLoader();
		}
	}

	function enableInvoiceEdit() {
		const span = document.getElementById('invoiceNumber');
		const currentValue = span.textContent.trim();
		const input = document.createElement('input');
		input.type = 'text';
		input.id = 'invoiceNumberInput';
		input.value = currentValue;
		input.className = 'form-control';
		input.style.width = '200px';
		span.replaceWith(input);
		input.focus();
		input.addEventListener('blur', () => saveInvoiceNumber(input.value));
		input.addEventListener('keydown', (e) => {
			if (e.key === 'Enter') saveInvoiceNumber(input.value);
		});
	}

	function convertNumberToComma(number) {
		const num = parseFloat(number);
		if (isNaN(num)) return '0.00';
		const parts = num.toFixed(2).split('.');
		let integerPart = parts[0];
		const decimalPart = parts[1];
		const lastThreeDigits = integerPart.slice(-3);
		const otherDigits = integerPart.slice(0, -3);
		const formattedInteger = otherDigits.replace(/\B(?=(\d{2})+(?!\d))/g, ',') + (otherDigits ? ',' : '') + lastThreeDigits;
		return `${formattedInteger}.${decimalPart}`;
	}

	function escapeHtml(value) {
		return String(value)
			.replaceAll('&', '&amp;')
			.replaceAll('<', '&lt;')
			.replaceAll('>', '&gt;')
			.replaceAll('"', '&quot;')
			.replaceAll("'", '&#39;');
	}

			$('#invoiceNumber').text('...');
