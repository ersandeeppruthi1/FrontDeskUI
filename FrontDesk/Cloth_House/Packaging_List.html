<body>
    <div class="container2">
        <div class="toolbar toolbar-spacing">
            <div class="row g-3 align-items-end">
                <div class="col-sm-6 col-md-3">
                    <label for="startDate">From date</label>
                    <input id="startDate" class="form-control" datatype="date" defaultValue="currentDate"
                        onchange="loadPackagingRecords()">
                </div>
                <div class="col-sm-6 col-md-3">
                    <label for="endDate">To date</label>
                    <input id="endDate" class="form-control" datatype="date" defaultValue="currentDate"
                        onchange="loadPackagingRecords()">
                </div>
            </div>
        </div>
        <div id="packagingGrid"></div>
    </div>

    <div class="modal fade" id="packagingModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Add Packaging</h5>
                    <button type="button" class="btn-close" aria-label="Close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <form id="packagingForm">
                        <div class="row">
                            <div class="col-md-6">
                                <label for="packagingnumber">Packaging Number<span class="text-danger">*</span></label>
                                <input id="packagingnumber" class="form-control" maxlength="100" required />
                            </div>
                            <div class="col-md-6">
                                <label for="packagingcreatedby">Created By</label>
                                <input id="packagingcreatedby" class="form-control" maxlength="255" />
                            </div>
                        </div>
                        <div class="row mt-3">
                            <div class="col-md-6">
                                <label for="createdon">Created Date</label>
                                <input id="createdon" class="form-control" datatype="date" defaultValue="currentDate" />
                            </div>
                            <div class="col-md-6">
                                <label for="status">Status</label>
                                <select id="status" class="form-control">
                                    <option value="Active">Active</option>
                                    <option value="Inactive">Inactive</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" onclick="savePackaging(event)">Save</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>

            </div>
        </div>
    </div>

    <script>

        let grid;
        let editingId = null;

        const columns = [
            { type: 'checkbox', width: 50 },
            { field: 'srno', headerText: 'S.No.', textAlign: 'Right', width: 80 },
            { field: 'packagingnumber', headerText: 'Packaging Number', width: 180 },
            { field: 'packagingcreatedby', headerText: 'Created By', width: 180 },
            { field: 'status', headerText: 'Status', width: 120 },
            { field: 'createdon', headerText: 'Created Date', type: 'date', format: { type: 'date', format: 'd/M/y' }, width: 130 },
            { field: 'id', headerText: 'Id', visible: false, allowPdfExport: false }
        ];

        function getSafeDatePickerValue(id) {
            if (typeof getDatePickerValue === 'function') {
                return getDatePickerValue(id);
            }
            const el = document.getElementById(id);
            return el ? el.value : '';
        }

        function formatDate(value) {
            const d = value instanceof Date ? value : new Date(value);
            if (isNaN(d)) return '';
            const dd = String(d.getDate()).padStart(2, '0');
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const yyyy = d.getFullYear();
            return `${dd}-${mm}-${yyyy}`;
        }

        function normalizeDate(val) {
            if (!val) return null;
            const d = val instanceof Date ? val : new Date(val);
            return isNaN(d) ? null : d;
        }

        function initGrid(cols, gridId) {
            ej.grids.Grid.Inject(
                ej.grids.Filter,
                ej.grids.Group,
                ej.grids.Page,
                ej.grids.Sort,
                ej.grids.Toolbar,
                ej.grids.ColumnChooser,
                ej.grids.ExcelExport,
                ej.grids.PdfExport
            );

            grid = new ej.grids.Grid({
                dataSource: [],
                allowPaging: true,
                pageSettings: { pageSize: 10 },
                allowSorting: true,
                allowFiltering: true,
                filterSettings: { type: 'Excel' },
                showColumnChooser: true,
                selectionSettings: { type: 'Multiple' },
                rowSelected: toggleEditButton,
                rowDeselected: toggleEditButton,
                allowExcelExport: true,
                allowPdfExport: true,
                toolbar: [
                    'Search',
                    'ColumnChooser',
                    { prefixIcon: 'e-icons e-excelexport', tooltipText: 'Export Excel', id: 'excelExport' },
                    { prefixIcon: 'e-icons e-pdfexport', tooltipText: 'Export PDF', id: 'pdfExport' },
                    { prefixIcon: 'e-icons e-refresh', tooltipText: 'Refresh', id: 'refreshGrid' },
                    { text: 'New', prefixIcon: 'e-icons e-plus', id: 'new' },
                    { text: 'Edit', prefixIcon: 'e-icons e-edit', id: 'edit', disabled: true },
                    { text: 'Delete', prefixIcon: 'e-icons e-delete', id: 'delete' }
                ],
                columns: cols,
                toolbarClick: function (args) {
                    if (args.item.id === 'excelExport') {
                        grid.excelExport({ fileName: `PackagingList_${formatDate(new Date())}.xlsx`, exportType: 'AllPages' });
                    }

                    if (args.item.id === 'pdfExport') {
                        grid.pdfExport({ fileName: `PackagingList_${formatDate(new Date())}.pdf`, exportType: 'CurrentPage', pageOrientation: 'Landscape', pageSize: 'A4' });
                    }

                    if (args.item.id === 'refreshGrid') {
                        loadPackagingRecords();
                    }

                    if (args.item.id === 'new') {
                        openPackagingModal();
                    }

                    if (args.item.id === 'edit') {
                        editPackaging();
                    }

                    if (args.item.id === 'delete') {
                        deletePackaging();
                    }
                }
            });

            grid.appendTo('#' + gridId);
        }

        function toggleEditButton() {
            const selected = grid.getSelectedRecords();
            const editBtn = grid.toolbarModule.toolbar.items.find(function (item) { return item.id === 'edit'; });
            if (!editBtn) return;
            editBtn.disabled = selected.length !== 1;
        }

        function openPackagingModal() {
            const modalEl = document.getElementById('packagingModal');
            document.getElementById('packagingForm').reset();
            editingId = null;
            document.querySelector('#packagingModal .modal-title').innerText = 'Add Packaging';
            if (typeof setDatePickerValue === 'function') {
                setDatePickerValue('createdon', new Date());
            }
            bootstrap.Modal.getOrCreateInstance(modalEl).show();
        }

        function editPackaging() {
            const selected = grid.getSelectedRecords();
            if (selected.length !== 1) {
                alert('Please select one record to edit');
                return;
            }

            const row = selected[0];
            editingId = row.id;
            document.getElementById('packagingnumber').value = row.packagingnumber || '';
            document.getElementById('packagingcreatedby').value = row.packagingcreatedby || '';
            document.getElementById('status').value = row.status || 'Active';

            if (typeof setDatePickerValue === 'function') {
                setDatePickerValue('createdon', row.createdon ? new Date(row.createdon) : new Date());
            } else {
                const createdEl = document.getElementById('createdon');
                if (createdEl && row.createdon) {
                    const d = new Date(row.createdon);
                    createdEl.value = isNaN(d) ? '' : d.toISOString().slice(0, 10);
                }
            }

            document.querySelector('#packagingModal .modal-title').innerText = 'Edit Packaging';
            bootstrap.Modal.getOrCreateInstance(document.getElementById('packagingModal')).show();
        }

        async function deletePackaging() {
            const selected = grid.getSelectedRecords();
            if (!selected.length) {
                alert('Please select record(s) to delete');
                return;
            }

            if (!confirm(`Delete ${selected.length} packaging record(s)?`)) {
                return;
            }

            const ids = selected.map(function (r) { return r.id; });
            await deleteRecordData('packagingitemdetail', ids, true, true);
            await loadPackagingRecords();
        }

        async function loadPackagingRecords() {
            const startDate = getSafeDatePickerValue('startDate');
            const endDate = getSafeDatePickerValue('endDate');

            if (!startDate || !endDate) return;

            const start = startDate + ' 00:00:00';
            const end = endDate + ' 23:59:59';
            const filter = `packagingitemdetail.createdon >= '${start}' AND packagingitemdetail.createdon <= '${end}'`;

            try {
                const records = await DBHandler.fetchEntityRecords(
                    'packagingitemdetail',
                    'packagingitemdetail.id,packagingitemdetail.packagingnumber,packagingitemdetail.packagingcreatedby,packagingitemdetail.createdon,packagingitemdetail.status,packagingitemdetail.isactive',
                    'packagingitemdetail.createdon',
                    'desc',
                    filter,
                    false
                );

                let sr = 1;
                const rows = (records || []).map(function (x) {
                    const status = x.status || (String(x.isactive) === '0' ? 'Inactive' : 'Active');
                    return {
                        id: x.id,
                        srno: sr++,
                        packagingnumber: x.packagingnumber || '',
                        packagingcreatedby: x.packagingcreatedby || '',
                        status: status,
                        createdon: normalizeDate(x.createdon)
                    };
                });

                grid.dataSource = rows;
                grid.refresh();
            } catch (error) {
                console.error('Failed to load packaging records:', error);
            }
        }

        async function savePackaging(event) {
            if (event && event.target) {
                event.target.disabled = true;
                event.target.innerText = 'Saving...';
            }

            try {
                const packagingnumber = (document.getElementById('packagingnumber').value || '').trim();
                const packagingcreatedby = (document.getElementById('packagingcreatedby').value || '').trim();
                const status = document.getElementById('status').value || 'Active';
                const createdon = getSafeDatePickerValue('createdon');

                if (!packagingnumber) {
                    alert('Packaging Number is required');
                    return;
                }

                await DBHandler.submitRecordData('packagingitemdetail', {
                    packagingnumber: packagingnumber,
                    packagingcreatedby: packagingcreatedby,
                    status: status,
                    isactive: String(status).toLowerCase() === 'inactive' ? 0 : 1,
                    createdon: createdon || null
                }, editingId, false);

                bootstrap.Modal.getOrCreateInstance(document.getElementById('packagingModal')).hide();
                editingId = null;
                await loadPackagingRecords();
            } catch (error) {
                console.error('Failed to save packaging record:', error);
                alert('Failed to save packaging record');
            } finally {
                if (event && event.target) {
                    event.target.disabled = false;
                    event.target.innerText = 'Save';
                }
            }
        }

        $(document).ready(async function () {
            if (typeof applyDatePicker === 'function') {
                applyDatePicker();
            }
            initGrid(columns, 'packagingGrid');
            await loadPackagingRecords();
        });
    </script>

    <style>
        .toolbar-spacing {
            margin-bottom: 10px;
        }

        #packagingGrid_toolbarItems {
            height: 10px !important;
        }
    </style>

</body>
