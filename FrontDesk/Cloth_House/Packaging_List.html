	<script>
		(function () {
			if (window.AuthManager) return;

			function getCookie(name) {
				const key = `${name}=`;
				const decoded = decodeURIComponent(document.cookie || '');
				const chunks = decoded.split(';');
				for (let i = 0; i < chunks.length; i++) {
					const item = chunks[i].trim();
					if (item.indexOf(key) === 0) {
						return item.substring(key.length);
					}
				}
				return '';
			}

			function firstNonEmpty(values) {
				for (let i = 0; i < values.length; i++) {
					if (values[i]) return values[i];
				}
				return '';
			}

			function parseJwtPayload(token) {
				try {
					if (!token || token.split('.').length < 2) return {};
					const base64Url = token.split('.')[1];
					const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
					return JSON.parse(atob(base64));
				} catch (e) {
					return {};
				}
			}

			function resolveToken() {
				const url = new URL(window.location.href);
				return firstNonEmpty([
					url.searchParams.get('dataToken') || '',
					url.searchParams.get('authToken') || '',
					url.searchParams.get('token') || '',
					url.searchParams.get('accessToken') || '',
					localStorage.getItem('dataToken') || '',
					localStorage.getItem('authToken') || '',
					localStorage.getItem('AuthToken') || '',
					localStorage.getItem('token') || '',
					localStorage.getItem('accessToken') || '',
					sessionStorage.getItem('dataToken') || '',
					sessionStorage.getItem('authToken') || '',
					sessionStorage.getItem('token') || '',
					sessionStorage.getItem('accessToken') || '',
					getCookie('dataToken') || getCookie('DataToken') || '',
					getCookie('authToken') || getCookie('AuthToken') || '',
					getCookie('token') || getCookie('Token') || '',
					getCookie('accessToken') || getCookie('AccessToken') || '',
					window.dataToken || '',
					window.authToken || window.AuthToken || ''
				]);
			}

			function resolveUserId() {
				const url = new URL(window.location.href);
				const explicitUserId = firstNonEmpty([
					url.searchParams.get('userid') || '',
					url.searchParams.get('userId') || '',
					url.searchParams.get('uid') || '',
					localStorage.getItem('userid') || '',
					localStorage.getItem('userId') || '',
					localStorage.getItem('uid') || '',
					sessionStorage.getItem('userid') || '',
					sessionStorage.getItem('userId') || '',
					sessionStorage.getItem('uid') || '',
					getCookie('userid') || '',
					getCookie('userId') || '',
					getCookie('UserId') || ''
				]);

				if (explicitUserId) return String(explicitUserId).slice(0, 36);

				const payload = parseJwtPayload(resolveToken());
				const id = firstNonEmpty([
					payload.userId,
					payload.userid,
					payload.uid,
					payload.nameid,
					payload.sub,
					payload['http://schemas.xmlsoap.org/ws/2005/05/identity/claims/nameidentifier']
				]);

				return String(id || '0').slice(0, 36);
			}

			window.AuthManager = {
				getDataToken: resolveToken,
				getAuthToken: resolveUserId
			};
		})();
	</script>

<body>
	<div class="page-shell">
		<div class="page-card">
			<div class="page-content">
				<h1 class="page-title">Packaging List</h1>
				<div class="header-gap"></div>

				<div class="card-block mb-3">
					<form id="filterForm" class="needs-validation" novalidate>
						<div class="row g-3">
							<div class="col-md-6">
								<label for="startDate" class="form-label">Start Date</label>

									<input type="date" id="startDate" class="form-control" />

							</div>
							<div class="col-md-6">
								<label for="endDate" class="form-label">End Date</label>
								<div class="input-group">
									<input type="date" id="endDate" class="form-control" />
									<!-- <span class="input-group-text"><i class="fa fa-calendar-alt"></i></span> -->
								</div>
								<div class="invalid-feedback">End date should be on or after start date.</div>
							</div>
						</div>
					</form>
				</div>

				<div class="card-block table-wrap">
					<div id="loadingOverlay" class="loading-overlay active">
						<div class="loading-pill">
							<div class="spinner-border spinner-border-sm text-primary" role="status" aria-hidden="true"></div>
							<span>Loading packaging records...</span>
						</div>
					</div>

					<div class="mb-3">
						<div class="input-group search-group">
							<input type="text" id="searchInput" class="form-control" placeholder="Search..." />
							<span class="input-group-text"><i class="fa fa-search"></i></span>
						</div>
					</div>

					<div class="table-responsive">
						<table class="table align-middle">
							<thead>
								<tr>
									<th class="sortable" data-sort="packagingnumber">Packaging Number <span class="sort-indicator">↕</span></th>
									<th class="sortable" data-sort="packagingcreatedby">Created By <span class="sort-indicator">↕</span></th>
									<th class="sortable" data-sort="createddate">Created Date <span class="sort-indicator">↕</span></th>

	<script>
		const state = {
			allRecords: [],
			filteredRecords: [],
			pagedRecords: [],
			searchText: '',
			startDate: '',
			endDate: '',
			sortKey: 'createddate',
			sortDirection: 'desc',
			currentPage: 1,
			pageSize: 8,
			loading: false
		};

		const refs = {
			filterForm: document.getElementById('filterForm'),
			startDate: document.getElementById('startDate'),
			endDate: document.getElementById('endDate'),
			searchInput: document.getElementById('searchInput'),
			tableBody: document.getElementById('tableBody'),
			pagination: document.getElementById('pagination'),
			paginationInfo: document.getElementById('paginationInfo'),
			loadingOverlay: document.getElementById('loadingOverlay')
		};

		function setLoading(isLoading, message = 'Loading packaging records...') {
			state.loading = isLoading;
			refs.loadingOverlay.classList.toggle('active', isLoading);
			const msgNode = refs.loadingOverlay.querySelector('span');
			if (msgNode) msgNode.textContent = message;
		}

		function safeText(value) {
			return String(value ?? '')
				.replaceAll('&', '&amp;')
				.replaceAll('<', '&lt;')
				.replaceAll('>', '&gt;')
				.replaceAll('"', '&quot;')
				.replaceAll("'", '&#39;');
		}

		function toDateValue(value) {
			if (!value) return '';
			const d = new Date(value);
			if (Number.isNaN(d.getTime())) return '';
			const y = d.getFullYear();
			const m = String(d.getMonth() + 1).padStart(2, '0');
			const day = String(d.getDate()).padStart(2, '0');
			return `${y}-${m}-${day}`;
		}

		function formatDate(value) {
			const d = value ? new Date(value) : null;
			if (!d || Number.isNaN(d.getTime())) return '-';
			return d.toLocaleDateString('en-GB');
		}

		function normalizeStatus(record) {
			const raw = String(record.status || '').trim().toLowerCase();
			if (raw) {
				if (raw === 'active' || raw === '1' || raw === 'true') return 'Active';
				if (raw === 'inactive' || raw === '0' || raw === 'false') return 'Inactive';
				return raw.charAt(0).toUpperCase() + raw.slice(1);
			}
			return String(record.isactive) === '0' ? 'Inactive' : 'Active';
		}

		function mapRecord(item) {
			return {
				id: item.id || '',
				packagingnumber: item.packagingnumber || '-',
				packagingcreatedby: item.packagingcreatedby || '-',
				createddate: item.createdon || item.slipdate || '',
				status: normalizeStatus(item)
			};
		}

		async function fetchPackagingRecords() {
			if (window.DBHandler && typeof DBHandler.fetchEntityRecord === 'function') {
				const records = await DBHandler.fetchEntityRecord(
					'packagingitemdetail',
					'id,packagingnumber,packagingcreatedby,createdon,slipdate,status,isactive',
					'',
					false
				);
				return (records || []).map(mapRecord);
			}

			// API-ready fallback shape for local development/runtime without DBHandler.
			return [];
		}

		function validateDateRange() {
			const start = refs.startDate.value;
			const end = refs.endDate.value;

			const valid = !start || !end || start <= end;
			refs.startDate.classList.toggle('is-invalid', !valid);
			refs.endDate.classList.toggle('is-invalid', !valid);
			return valid;
		}

		function applyFilters() {
			const term = state.searchText.trim().toLowerCase();
			const start = state.startDate;
			const end = state.endDate;

			state.filteredRecords = state.allRecords.filter(record => {
				const recordDate = toDateValue(record.createddate);
				const inRange = (!start || (recordDate && recordDate >= start)) && (!end || (recordDate && recordDate <= end));

				if (!inRange) return false;
				if (!term) return true;

				const haystack = [
					record.packagingnumber,
					record.packagingcreatedby,
					formatDate(record.createddate),
					record.status
				].join(' ').toLowerCase();

				return haystack.includes(term);
			});

			applySort();
		}

		function compareValues(a, b, key) {
			if (key === 'createddate') {
				const timeA = a.createddate ? new Date(a.createddate).getTime() : 0;
				const timeB = b.createddate ? new Date(b.createddate).getTime() : 0;
				return timeA - timeB;
			}

			const x = String(a[key] ?? '').toLowerCase();
			const y = String(b[key] ?? '').toLowerCase();
			if (x < y) return -1;
			if (x > y) return 1;
			return 0;
		}

		function applySort() {
			state.filteredRecords.sort((a, b) => {
				const base = compareValues(a, b, state.sortKey);
				return state.sortDirection === 'asc' ? base : -base;
			});

			state.currentPage = 1;
			paginate();
			updateSortIndicators();
		}

		function paginate() {
			const total = state.filteredRecords.length;
			const totalPages = Math.max(1, Math.ceil(total / state.pageSize));
			state.currentPage = Math.min(state.currentPage, totalPages);

			const startIndex = (state.currentPage - 1) * state.pageSize;
			const endIndex = startIndex + state.pageSize;
			state.pagedRecords = state.filteredRecords.slice(startIndex, endIndex);

			renderTable();
			renderPagination(total, totalPages, startIndex, endIndex);
		}

		function renderTable() {
			if (!state.pagedRecords.length) {
				refs.tableBody.innerHTML = `
					<tr>
						<td colspan="5" class="empty-state">
							<div class="fw-semibold mb-1">No packaging records found</div>
							<div class="small">Try changing filters or search text.</div>
						</td>
					</tr>
				`;
				return;
			}

			refs.tableBody.innerHTML = state.pagedRecords.map(record => {
				const active = String(record.status || '').toLowerCase() === 'active';
				return `
					<tr>
						<td>${safeText(record.packagingnumber)}</td>
						<td>${safeText(record.packagingcreatedby)}</td>
						<td>${safeText(formatDate(record.createddate))}</td>
						<td>
							<span class="status-badge ${active ? 'status-active' : 'status-inactive'}">${safeText(record.status)}</span>
						</td>
						<td class="text-center">
							<div class="d-inline-flex gap-2">
								<button type="button" class="action-btn" data-action="view" data-id="${safeText(record.id)}" title="View">
									<i class="fa fa-eye"></i>
								</button>
								<button type="button" class="action-btn" data-action="edit" data-id="${safeText(record.id)}" title="Edit">
									<i class="fa fa-pen"></i>
								</button>
								<button type="button" class="action-btn" data-action="delete" data-id="${safeText(record.id)}" title="Delete">
									<i class="fa fa-trash"></i>
								</button>
							</div>
						</td>
					</tr>
				`;
			}).join('');
		}

		function renderPagination(total, totalPages, startIndex, endIndex) {
			const shownStart = total === 0 ? 0 : startIndex + 1;
			const shownEnd = Math.min(endIndex, total);
			refs.paginationInfo.textContent = `Showing ${shownStart}-${shownEnd} of ${total}`;

			const prevDisabled = state.currentPage === 1 ? 'disabled' : '';
			const nextDisabled = state.currentPage === totalPages ? 'disabled' : '';

			let pageButtons = `
				<li class="page-item ${prevDisabled}">
					<button class="page-link" data-page="prev">Previous</button>
				</li>
			`;

			for (let i = 1; i <= totalPages; i++) {
				const active = i === state.currentPage ? 'active' : '';
				pageButtons += `
					<li class="page-item ${active}">
						<button class="page-link" data-page="${i}">${i}</button>
					</li>
				`;
			}

			pageButtons += `
				<li class="page-item ${nextDisabled}">
					<button class="page-link" data-page="next">Next</button>
				</li>
			`;

			refs.pagination.innerHTML = pageButtons;
		}

		function updateSortIndicators() {
			const headers = document.querySelectorAll('th.sortable');
			headers.forEach(header => {
				const key = header.getAttribute('data-sort');
				const indicator = header.querySelector('.sort-indicator');
				if (!indicator) return;

				if (key !== state.sortKey) {
					indicator.textContent = '↕';
					return;
				}

				indicator.textContent = state.sortDirection === 'asc' ? '↑' : '↓';
			});
		}

		function handleAction(action, id) {
			if (action === 'view') {
				window.location.href = `Yogesh_Cloth.html?id=${encodeURIComponent(id)}`;
				return;
			}

			if (action === 'edit') {
				window.location.href = `Yogesh_Cloth.html?id=${encodeURIComponent(id)}`;
				return;
			}

			if (action === 'delete') {
				if (!confirm('Delete this packaging record?')) return;
				if (typeof deleteRecordData === 'function') {
					deleteRecordData('packagingitemdetail', [id], true, true)
						.then(() => init())
						.catch(err => {
							console.error('Delete failed:', err);
							alert('Failed to delete record.');
						});
				} else {
					alert('Delete function is not available in this runtime.');
				}
			}
		}

		async function init() {
			setLoading(true);
			try {
				state.allRecords = await fetchPackagingRecords();
				applyFilters();
			} catch (error) {
				console.error('Error fetching packaging records:', error);
				state.allRecords = [];
				applyFilters();
			} finally {
				setLoading(false);
			}
		}

		document.querySelectorAll('th.sortable').forEach(header => {
			header.addEventListener('click', function () {
				const key = this.getAttribute('data-sort');
				if (state.sortKey === key) {
					state.sortDirection = state.sortDirection === 'asc' ? 'desc' : 'asc';
				} else {
					state.sortKey = key;
					state.sortDirection = 'asc';
				}
				paginate();
				updateSortIndicators();
			});
		});

		refs.startDate.addEventListener('change', function () {
			state.startDate = refs.startDate.value;
			if (!validateDateRange()) return;
			applyFilters();
		});

		refs.endDate.addEventListener('change', function () {
			state.endDate = refs.endDate.value;
			if (!validateDateRange()) return;
			applyFilters();
		});

		refs.searchInput.addEventListener('input', function () {
			state.searchText = refs.searchInput.value;
			applyFilters();
		});

		refs.pagination.addEventListener('click', function (event) {
			const btn = event.target.closest('button[data-page]');
			if (!btn) return;

			const token = btn.getAttribute('data-page');
			const totalPages = Math.max(1, Math.ceil(state.filteredRecords.length / state.pageSize));

			if (token === 'prev') {
				if (state.currentPage > 1) state.currentPage -= 1;
			} else if (token === 'next') {
				if (state.currentPage < totalPages) state.currentPage += 1;
			} else {
				state.currentPage = parseInt(token, 10) || 1;
			}

			paginate();
		});

		refs.tableBody.addEventListener('click', function (event) {
			const button = event.target.closest('button[data-action]');
			if (!button) return;
			handleAction(button.getAttribute('data-action'), button.getAttribute('data-id'));
		});

		document.addEventListener('DOMContentLoaded', function () {
			updateSortIndicators();
			init();
		});
	</script>
</body>
</html>
