<!DOCTYPE html>
<html lang="en">

<head runat="server">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script>
        let classMap = [];
        var apiURL = "https://dbsit.vsservices.in/";
        //var apiURL = "";
    </script>

    <link href="https://apisit.vsservices.in/css/Default/bootstrap.min.css" rel="stylesheet" />
    <script src="https://apisit.vsservices.in/css/Default/jquery.min.js"></script>
    <script src="https://apisit.vsservices.in/css/Default/moment.min.js"></script>
    <link href="https://apisit.vsservices.in/css/Default/font-awesome-all.min.css" rel="stylesheet" />

    <script src="https://apisit.vsservices.in/css/Default/bootstrap.bundle.min.js"></script>
    <link href="https://apisit.vsservices.in/css/app.css?id=081220258" rel="stylesheet" />

    <script src="https://apisit.vsservices.in/JS/utility.js?id=081220258"></script>
    <script src="https://apisit.vsservices.in/JS/entityPage.js?id=081220258" type="module"></script>
    <script src="https://apisit.vsservices.in/JS/controls.js?id=081220258" type="module"></script>
    <script src="https://apisit.vsservices.in/JS/listcontrols.js?id=081220258" type="module"></script>
    <script src="https://apisit.vsservices.in/JS/formHandler.js?id=081220258" type="module"></script>
    <script src="https://apisit.vsservices.in/JS/pageLoader.js?id=081220258" type="module"></script>
    <script src="https://apisit.vsservices.in/JS/Master/DBHandler.js?id=081220258" type="module"></script>
    <script src="https://apisit.vsservices.in/JS/VastuBill/VastuBillPDFExporter.js?id=081220258"></script>

    <script src="https://apisit.vsservices.in/css/Default/popper.min.js"></script>
    <script src="https://apisit.vsservices.in/css/Default/bootstrap.min.js"></script>
    <link href="https://apisit.vsservices.in/css/Default/simple-line-icons.min.css" rel="stylesheet" />

    <script src="https://apisit.vsservices.in/css/Default/dayjs.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/dayjs"></script>
    <link href="https://apisit.vsservices.in/css/Default/font-awesome-all.min.css" rel="stylesheet" />

    <script src="https://apisit.vsservices.in/css/Default/pdfmake.min.js"></script>
    <script src="https://apisit.vsservices.in/css/Default/vfs_fonts.js"></script>

    <script src="https://apisit.vsservices.in/css/Default/xlsx.full.min.js"></script>
    <script src="https://apisit.vsservices.in/css/Default/moment.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.11.4/jquery-ui.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.0/jquery-ui.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-base/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-grids/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-buttons/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-popups/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-richtexteditor/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-navigations/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-dropdowns/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-lists/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-inputs/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-calendars/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-notifications/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-splitbuttons/styles/bootstrap5.css" rel="stylesheet">
    <script src="https://cdn.syncfusion.com/ej2/32.1.19/dist/ej2.min.js" type="text/javascript"></script>
    <script src="https://cdn.syncfusion.com/ej2/syncfusion-helper.js" type="text/javascript"></script>
</head>

<body>
    <div class="container-fluid mt-4">

        <!-- Top Action Row -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <button class="btn btn-success me-2" id="btnCheckIn" onclick="openCheckInModal()">
                    <i class="bi bi-box-arrow-in-right"></i> Check-In
                </button>

                <button class="btn btn-danger" id="btnCheckOut">
                    <i class="bi bi-box-arrow-right"></i> Check-Out
                </button>
            </div>

        </div>


        <!-- Room Stats -->
        <div class="row g-4">
            <div class="col-md-3">
                <div class="card shadow-sm border-0 text-center">
                    <div class="card-body">
                        <h6 class="text-muted">Total Rooms</h6>
                        <h2 id="totalRooms" class="fw-bold dashboard-link" data-type="total">0</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card shadow-sm border-0 text-center bg-success text-white">
                    <div class="card-body">
                        <h6>Available Rooms</h6>
                        <h2 id="availableRooms" class="fw-bold dashboard-link" data-type="available">0</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card shadow-sm border-0 text-center bg-danger text-white">
                    <div class="card-body">
                        <h6>Booked Rooms</h6>
                        <h2 id="bookedRooms" class="fw-bold dashboard-link" data-type="booked">0</h2>

                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card shadow-sm border-0 text-center bg-warning text-dark">
                    <div class="card-body">
                        <h6>Under Maintenance</h6>
                        <h2 id="maintenanceRooms" class="fw-bold dashboard-link" data-type="maintenance">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <hr class="my-4">

        <!-- Today Stats -->
        <div class="row g-4">

            <div class="col-md-6">
                <div class="card shadow-sm border-0 text-center">
                    <div class="card-body">
                        <h6 class="text-muted">Today's Check-Ins</h6>
                        <h2 id="todayCheckIns" class="fw-bold text-primary dashboard-link" data-type="checkin"
                            defaultValue="currentDate">0</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow-sm border-0 text-center">
                    <div class="card-body">
                        <h6 class="text-muted">Today's Check-Outs</h6>
                        <h2 id="todayCheckOuts" class="fw-bold text-secondary dashboard-link" data-type="checkout">0
                        </h2>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Check-In Modal -->
    <div class="modal fade" id="checkInModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">Guest Check-In</h5>
                    <button type="button" class="close" data-bs-dismiss="modal">
                        <span>&times;</span>
                    </button>
                </div>

                <div class="modal-body">

                    <div class="row g-3">

                        <!-- Display Name -->
                        <div class="col-md-6">
                            <label class="form-label">Display Name <span class="text-danger">*</span></label>
                            <input type="text" id="displayName" class="form-control" required>
                        </div>

                        <!-- Mobile Number -->
                        <div class="col-md-6">
                            <label class="form-label">Mobile Number <span class="text-danger">*</span></label>
                            <input type="tel" id="mobileNumber" class="form-control" required>
                        </div>

                        <!-- Address -->
                        <div class="col-md-12">
                            <label class="form-label">Address</label>
                            <textarea id="address" class="form-control" rows="2"></textarea>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">Select Rooms <span class="text-danger">*</span></label><br>
                            <input type="text" id="checkInRoom" />
                        </div>
                        <!-- Check-In Date -->
                        <div class="col-md-6">
                            <label class="form-label">Check-In Date & Time</label>
                            <input type="datetime-local" id="checkInDateTime" class="form-control">
                        </div>

                        <!-- Expected Check-Out -->
                        <div class="col-md-6">
                            <label class="form-label">Expected Check-Out</label>
                            <input type="datetime-local" id="checkOutDateTime" class="form-control">
                        </div>

                        <!-- Guest Count -->
                        <div class="col-md-6">
                            <label class="form-label">Gents Count</label>
                            <input type="number" id="gentsCount" class="form-control" min="0" value="0">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Ladies Count</label>
                            <input type="number" id="ladiesCount" class="form-control" min="0" value="0">
                        </div>

                        <!-- Reference Detail -->
                        <div class="col-md-12">
                            <label class="form-label">Reference Detail</label>
                            <input type="text" id="referenceDetail" class="form-control">
                        </div>

                        <!-- Room Selection (MULTIPLE) -->


                    </div>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-success" id="saveCheckIn">Confirm Check-In</button>
                </div>

            </div>
        </div>
    </div>
    <!-- Check-Out Modal -->
    <div class="modal fade" id="checkOutModal" tabindex="-1">
        <div class="modal-dialog modal-md modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">Guest Check-Out</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <div class="mb-3">
                        <label class="form-label">Select Room</label>
                        <select id="checkOutRoom" class="form-select">
                            <option value="">Select Room</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Check-Out Date</label>
                        <input type="date" id="checkOutDate" class="form-control">
                    </div>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-danger" id="saveCheckOut">Confirm Check-Out</button>
                </div>

            </div>
        </div>
    </div>

    <!-- Booking List Modal -->
    <div class="modal fade" id="bookingListModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title" id="bookingListTitle">Bookings</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <ul class="list-group" id="bookingListContainer"></ul>
                </div>

            </div>
        </div>
    </div>

    <script>
        function openCheckInModal() {
            
            setCurrentCheckInTime();
            document.getElementById("checkOutDateTime").value = "";
            // Clear form fields
            document.getElementById("displayName").value = "";
            document.getElementById("mobileNumber").value = "";
            document.getElementById("address").value = "";
            document.getElementById("gentsCount").value = "0";
            document.getElementById("ladiesCount").value = "0";
            document.getElementById("referenceDetail").value = "";
            new bootstrap.Modal(
                document.getElementById('checkInModal')
            ).show();
            
            loadAvailableRooms();
            
        }

        $(document).ready(new function () {
            document.getElementById("btnCheckOut").addEventListener("click", function () {
                new bootstrap.Modal(document.getElementById('checkOutModal')).show();
            });
            bindClickMethod();

            loadDashboard();

            document.querySelectorAll('.dashboard-link')
                .forEach(el => {
                    el.addEventListener('click', function () {
                        showBookingList(this.dataset.type);
                    });
                });
        });

        new ej.calendars.DateTimePicker({
            placeholder: "Select Check-Out Time"
        }).appendTo('#checkOutDateTime');

        // Initialize Room DropDownList with multiselect
        let checkInRoomDropdown = new ej.dropdowns.MultiSelect({
            placeholder: "Select Rooms",
            mode: 'CheckBox',
            showSelectAll: true,
            filterBarPlaceholder: 'Search rooms...',
            allowFiltering: true,
            fields: { text: 'roomnumber', value: 'id' },
            dataSource: []
        });
        checkInRoomDropdown.appendTo('#checkInRoom');

        function bindClickMethod() {
            document.getElementById("saveCheckIn")
                .addEventListener("click", async function () {

                    const bookingId = crypto.randomUUID();

                    // Get form values
                    const displayName = document.getElementById("displayName").value.trim();
                    const mobileNumber = document.getElementById("mobileNumber").value.trim();
                    const address = document.getElementById("address").value.trim();
                    const checkInDate = document.getElementById("checkInDateTime").value;
                    const checkOutDate = document.getElementById("checkOutDateTime").value;
                    const gentsCount = parseInt(document.getElementById("gentsCount").value) || 0;
                    const ladiesCount = parseInt(document.getElementById("ladiesCount").value) || 0;
                    const referenceDetail = document.getElementById("referenceDetail").value.trim();

                    const selectedRooms = checkInRoomDropdown.value || [];

                    // Validation
                    if (!displayName) {
                        alert("Please enter Display Name");
                        return;
                    }
                    if (!mobileNumber) {
                        alert("Please enter Mobile Number");
                        return;
                    }
                    if (selectedRooms.length === 0) {
                        alert("Select at least one room");
                        return;
                    }

                    // 1️⃣ Create Main Booking
                    await DBHandler.submitRecordData('roombooking', {
                        bookingnumber: "BK-" + Date.now(),
                        displayname: displayName,
                        mobilenumber: mobileNumber,
                        address: address,
                        checkindatetime: checkInDate,
                        checkoutdatetime: checkOutDate,
                        bookingstatus: 1,
                        gentscount: gentsCount,
                        ladiescount: ladiesCount,
                        referencedetail: referenceDetail,
                        feedbackrating: 0,
                        feedbackremarks: '',
                        donationamount: 0
                    }, bookingId, false);

                    // 2️⃣ Insert Multiple Rooms
                    for (const roomId of selectedRooms) {

                        await DBHandler.submitRecordData('bookingroom', {
                            bookingid: bookingId,
                            roomid: roomId,
                            roomstatus: 1
                        }, null, false);

                    }

                    bootstrap.Modal.getInstance(
                        document.getElementById('checkInModal')
                    ).hide();

                    loadDashboard();
                });

            document.getElementById("saveCheckOut")
                .addEventListener("click", async function () {

                    const roomId = document.getElementById("checkOutRoom").value;

                    await DBHandler.submitRecordData('bookingroom', {
                        roomstatus: 0
                    }, roomId, true);

                    bootstrap.Modal.getInstance(
                        document.getElementById('checkOutModal')).hide();

                    loadDashboard();
                });
        }

        async function loadDashboard() {

            // Total Rooms
            const totalRooms = await DBHandler.fetchEntityRecords(
                'roommaster',
                'id,COUNT(*) as count',
                'id',
                'desc',
                ' group by id'
            );

            document.getElementById("totalRooms").innerText =
                totalRooms?.[0]?.count || 0;

            // Available Rooms
            const availableRooms = await DBHandler.fetchEntityRecords(
                'roommaster',
                'COUNT(*) as count',
                '',
                '',
                "bookingstatus = 'Available'"
            );

            document.getElementById("availableRooms").innerText =
                availableRooms?.[0]?.count || 0;

            // Booked Rooms
            const bookedRooms = await DBHandler.fetchEntityRecords(
                'bookingroom br LEFT JOIN roombooking rb ON rb.id = br.bookingid',
                'COUNT(DISTINCT br.roomid) as count',
                '',
                '',
                "rb.bookingstatus = 1"
            );

            document.getElementById("bookedRooms").innerText =
                bookedRooms?.[0]?.count || 0;

            // Maintenance
            const maintenanceRooms = await DBHandler.fetchEntityRecords(
                'roommaster',
                'COUNT(*) as count',
                '',
                '',
                "isactive = 0"
            );

            document.getElementById("maintenanceRooms").innerText =
                maintenanceRooms?.[0]?.count || 0;

            // Today's Check-ins
            const todayCheckins = await DBHandler.fetchEntityRecords(
                'roombooking',
                'COUNT(*) as count',
                '',
                '',
                "DATE(checkindatetime) = CURDATE()"
            );

            document.getElementById("todayCheckIns").innerText =
                todayCheckins?.[0]?.count || 0;

            // Today's Check-outs
            const todayCheckouts = await DBHandler.fetchEntityRecords(
                'roombooking',
                'COUNT(*) as count',
                '',
                '',
                "DATE(checkoutdatetime) = CURDATE()"
            );

            document.getElementById("todayCheckOuts").innerText =
                todayCheckouts?.[0]?.count || 0;
        }

        async function showBookingList(type) {

            let condition = "";

            if (type === "checkin")
                condition = "DATE(rb.checkindatetime) = CURDATE()";

            if (type === "checkout")
                condition = "DATE(rb.checkoutdatetime) = CURDATE()";

            if (type === "booked")
                condition = "rb.bookingstatus = 1";

            const data = await DBHandler.fetchEntityRecords(
                'roombooking rb',
                'rb.*, rm.roomnumber',
                'rb.checkindatetime',
                'desc',
                condition,
                false,
                0,
                'LEFT JOIN bookingroom br ON br.bookingid = rb.id LEFT JOIN roommaster rm ON rm.id = br.roomid'
            );

            const container = document.getElementById("bookingListContainer");
            container.innerHTML = "";

            data.forEach(item => {
                container.innerHTML += `
            <li class="list-group-item">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <strong>Booking: ${item.bookingnumber || 'N/A'}</strong><br>
                        <strong>Name: ${item.displayname || 'N/A'}</strong><br>
                        <small>Mobile: ${item.mobilenumber || 'N/A'}</small><br>
                        <small>Room: ${item.roomnumber || 'N/A'}</small><br>
                        <small>Check-in: ${new Date(item.checkindatetime).toLocaleString()}</small><br>
                        <small>Guests: ${(item.gentscount || 0)} Gents, ${(item.ladiescount || 0)} Ladies</small>
                        ${item.referencedetail ? `<br><small>Reference: ${item.referencedetail}</small>` : ''}
                    </div>
                    <div class="text-end">
                        <small class="text-muted">Status: ${item.bookingstatus == 1 ? 'Active' : 'Completed'}</small>
                        ${item.donationamount > 0 ? `<br><small class="text-success">Donation: ₹${item.donationamount}</small>` : ''}
                    </div>
                </div>
            </li>
        `;
            });

            document.getElementById("bookingListTitle").innerText =
                type === "checkin" ? "Today's Check-ins" :
                    type === "checkout" ? "Today's Check-outs" :
                        type === "booked" ? "Currently Booked Rooms" :
                            "Bookings";

            new bootstrap.Modal(document.getElementById('bookingListModal')).show();
        }

        function setCurrentCheckInTime() {

            const now = new Date();

            const formattedDate =
                now.getFullYear() + '-' +
                String(now.getMonth() + 1).padStart(2, '0') + '-' +
                String(now.getDate()).padStart(2, '0') + 'T' +
                String(now.getHours()).padStart(2, '0') + ':' +
                String(now.getMinutes()).padStart(2, '0');

            document.getElementById("checkInDateTime").value = formattedDate;

        }
        function loadAvailableRooms() {

            DBHandler.fetchEntityRecords(
                'roommaster',
                'id,roomnumber',
                'roomnumber',
                'asc',
                "isactive = 1",
                false,
                0
            ).then(function (rooms) {

                rooms = rooms || [];

                // Update the dropdown data source
                checkInRoomDropdown.dataSource = rooms;
                checkInRoomDropdown.dataBind();

            }).catch(function (error) {

                console.error("Error loading rooms:", error);
                checkInRoomDropdown.dataSource = [];
                checkInRoomDropdown.dataBind();

            });

        }
    </script>

    <style>
        .dashboard-link {
            cursor: pointer;
        }

        .dashboard-link:hover {
            text-decoration: underline;
        }

        #checkOutDateTime:invalid::-webkit-datetime-edit {
            color: transparent;
        }

        #checkOutDateTime:focus::-webkit-datetime-edit {
            color: inherit;
        }
    </style>
</body>

</html>
