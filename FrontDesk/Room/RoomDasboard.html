    <script>
        // Local cache for rooms
        let roomsCache = [];
        let roomsCacheLoaded = false;
        let totalRoomsCount = 0;
        let availableRoomsCount = 0;
        let maintenanceRoomsCount = 0;

        // Local cache for bookings
        let bookingsCache = [];
        let bookingsCacheLoaded = false;

        // Local cache for booked rooms
        let bookedRoomsCache = [];
        let bookedRoomsCacheLoaded = false;

        let checkInRoomDropdown;
        let checkOutBookingsDropdown;
        let feedbackRatingDropdown;



        function openCheckInModal() {

            setCurrentCheckInTime();
            document.getElementById("checkOutDateTime").value = "";
            // Clear form fields
            document.getElementById("displayName").value = "";
            document.getElementById("mobileNumber").value = "";
            document.getElementById("address").value = "";
            document.getElementById("gentsCount").value = "0";
            document.getElementById("ladiesCount").value = "0";
            document.getElementById("referenceDetail").value = "";

            // Reset filter to show only available rooms
            document.getElementById("showOnlyAvailableRooms").checked = true;

            const modal = new bootstrap.Modal(document.getElementById('checkInModal'), {
                focus: false
            });
            modal.show();

            loadAvailableRooms();

        }

        function openCheckOutModal() {
            // Set current check-out time
            setCurrentCheckOutTime();

            // Clear form fields
            if (feedbackRatingDropdown) {
                feedbackRatingDropdown.value = null;
            }
            document.getElementById("feedbackComments").value = "";
            document.getElementById("donationAmount").value = "";

            const modal = new bootstrap.Modal(document.getElementById('checkOutModal'), {
                focus: false
            });
            modal.show();

            // Load active bookings for checkout
            loadActiveBookings();
        }

        function setCurrentCheckOutTime() {
            const now = new Date();
            const formattedDate =
                now.getFullYear() + '-' +
                String(now.getMonth() + 1).padStart(2, '0') + '-' +
                String(now.getDate()).padStart(2, '0') + 'T' +
                String(now.getHours()).padStart(2, '0') + ':' +
                String(now.getMinutes()).padStart(2, '0');

            document.getElementById("checkOutDateTime").value = formattedDate;
        }

        function loadActiveBookings() {
            if (bookingsCacheLoaded && bookingsCache.length > 0) {
                // Filter active bookings with room information
                const activeBookings = bookingsCache
                    .filter(booking => booking.bookingstatus === 1)
                    .map(booking => ({
                        id: booking.id,
                        text: `${booking.displayname} -- Room ${booking.roomnumber || 'N/A'}`,
                        displayname: booking.displayname,
                        roomnumber: booking.roomnumber,
                        mobilenumber: booking.mobilenumber,
                        checkindatetime: booking.checkindatetime
                    }));

                if (checkOutBookingsDropdown) {
                    checkOutBookingsDropdown.dataSource = activeBookings;
                    checkOutBookingsDropdown.dataBind();
                }
                console.log("Active bookings loaded:", activeBookings.length);
            } else {
                // Fallback: Load directly from database
                DBHandler.fetchEntityRecords(
                    'roombooking rb',
                    'rb.id, rb.displayname, rb.mobilenumber, rb.checkindatetime, rm.roomnumber',
                    'rb.checkindatetime',
                    'desc',
                    'rb.bookingstatus = 1',
                    false,
                    0,
                    'LEFT JOIN bookingroom br ON CAST(br.bookingid AS CHAR) = CAST(rb.id AS CHAR) LEFT JOIN roommaster rm ON rm.id = br.roomid'
                ).then(function (bookings) {
                    const formattedBookings = (bookings || []).map(booking => ({
                        id: booking.id,
                        text: `${booking.displayname} -- Room ${booking.roomnumber || 'N/A'}`,
                        displayname: booking.displayname,
                        roomnumber: booking.roomnumber,
                        mobilenumber: booking.mobilenumber,
                        checkindatetime: booking.checkindatetime
                    }));

                    if (checkOutBookingsDropdown) {
                        checkOutBookingsDropdown.dataSource = formattedBookings;
                        checkOutBookingsDropdown.dataBind();
                    }
                    console.log("Active bookings loaded from database:", formattedBookings.length);
                }).catch(function (error) {
                    console.error("Error loading active bookings:", error);
                    if (checkOutBookingsDropdown) {
                        checkOutBookingsDropdown.dataSource = [];
                        checkOutBookingsDropdown.dataBind();
                    }
                });
            }
        }

        async function submitCheckIn() {

            // Get form values
            const displayName = document.getElementById("displayName").value.trim();
            const mobileNumber = document.getElementById("mobileNumber").value.trim();
            const address = document.getElementById("address").value.trim();
            const checkInDate = document.getElementById("checkInDateTime").value;
            const checkOutDate = document.getElementById("checkOutDateTime").value;
            const gentsCount = parseInt(document.getElementById("gentsCount").value) || 0;
            const ladiesCount = parseInt(document.getElementById("ladiesCount").value) || 0;
            const referenceDetail = document.getElementById("referenceDetail").value.trim();

            const selectedRooms = checkInRoomDropdown.value || [];

            // Validation
            if (!displayName) {
                alert("Please enter Display Name");
                return;
            }
            if (!mobileNumber) {
                alert("Please enter Mobile Number");
                return;
            }
            if (selectedRooms.length === 0) {
                alert("Select at least one room");
                return;
            }

            // Format dates properly for database
            const formattedCheckInDate = checkInDate ? new Date(checkInDate).toISOString().slice(0, 19).replace('T', ' ') : null;
            const formattedCheckOutDate = checkOutDate ? new Date(checkOutDate).toISOString().slice(0, 19).replace('T', ' ') : null;

            // 1️⃣ Create Main Booking
            var bookingId = await DBHandler.submitRecordData('roombooking', {
                bookingnumber: "BK-" + Date.now(),
                displayname: displayName,
                mobilenumber: mobileNumber,
                address: address,
                checkindatetime: formattedCheckInDate,
                checkoutdatetime: formattedCheckOutDate,
                bookingstatus: 1,
                gentscount: gentsCount,
                ladiescount: ladiesCount,
                referencedetail: referenceDetail,
                feedbackrating: 0,
                feedbackremarks: '',
                donationamount: 0
            }, null, false);

            // 2️⃣ Insert Multiple Rooms
            for (const roomId of selectedRooms) {
                // Insert booking room record
                await DBHandler.submitRecordData('bookingroom', {
                    bookingid: bookingId,
                    roomid: roomId,
                    roomstatus: 1
                }, null, false);
            }

            bootstrap.Modal.getInstance(
                document.getElementById('checkInModal')
            ).hide();

            // Refresh both caches after new check-in
            refreshAllCaches();

            // Show success message
            alert(`Successfully checked in ${selectedRooms.length} room(s) for ${displayName}!`);
        }

        async function submitCheckOut() {
            // Get form values
            const selectedBookings = checkOutBookingsDropdown.value || [];
            const checkOutDateTime = document.getElementById("checkOutDateTime").value;
            const feedbackRating = feedbackRatingDropdown ? parseInt(feedbackRatingDropdown.value) || 0 : 0;
            const feedbackComments = document.getElementById("feedbackComments").value.trim();
            const donationAmount = parseFloat(document.getElementById("donationAmount").value) || 0;

            // Validation
            if (selectedBookings.length === 0) {
                alert("Please select at least one booking to check out");
                return;
            }

            if (!checkOutDateTime) {
                alert("Please select check-out date and time");
                return;
            }

            try {
                // Format check-out date for database
                const formattedCheckOutDate = checkOutDateTime ?
                    new Date(checkOutDateTime).toISOString().slice(0, 19).replace('T', ' ') : null;

                // Process each selected booking
                for (const bookingId of selectedBookings) {
                    // Update the main booking record with checkout details
                    await DBHandler.submitRecordData('roombooking', {
                        checkoutdatetime: formattedCheckOutDate,
                        bookingstatus: 0, // Mark as checked out
                        feedbackrating: feedbackRating,
                        feedbackremarks: feedbackComments,
                        donationamount: donationAmount
                    }, bookingId, true);

                    // Get all associated room bookings and update both booking room status and actual room status
                    const roomBookings = await DBHandler.fetchEntityRecords(
                        'bookingroom',
                        'id, roomid',
                        'id',
                        'desc',
                        `bookingid = '${bookingId}' AND roomstatus = 1`
                    );

                    for (const roomBooking of (roomBookings || [])) {
                        // Update booking room status to checked out
                        await DBHandler.submitRecordData('bookingroom', {
                            roomstatus: 0 // Mark booking room as checked out
                        }, roomBooking.id, true);
                    }
                }

                // Close modal
                bootstrap.Modal.getInstance(
                    document.getElementById('checkOutModal')
                ).hide();

                // Refresh both room and booking data
                refreshAllCaches();

                // Show success message
                alert(`Successfully checked out ${selectedBookings.length} booking(s)!`);

            } catch (error) {
                console.error("Error during checkout:", error);
                alert("Error occurred during checkout. Please try again.");
            }
        }

        // Animation utility functions
        function animateCounter(element, targetValue, duration = 1000) {
            const startValue = parseInt(element.innerText) || 0;
            const increment = targetValue > startValue ? 1 : -1;
            const stepTime = Math.abs(Math.floor(duration / Math.abs(targetValue - startValue)));
            
            // Add animation classes
            element.classList.add('updating');
            
            let current = startValue;
            const timer = setInterval(() => {
                current += increment;
                element.innerText = current;
                
                if (current === targetValue) {
                    clearInterval(timer);
                    element.classList.remove('updating');
                    element.classList.add('animate-count');
                    
                    // Remove animation class after animation completes
                    setTimeout(() => {
                        element.classList.remove('animate-count');
                    }, 1400);
                }
            }, stepTime);
        }

        function animateNumber(elementId, value, shouldGlow = false) {
            const element = document.getElementById(elementId);
            if (!element) return;
            
            const currentValue = parseInt(element.innerText) || 0;
            
            if (currentValue !== value) {
                // Show loading shimmer for very quick updates
                if (Math.abs(value - currentValue) <= 3) {
                    element.innerHTML = '<span class="loading-shimmer"></span>';
                    setTimeout(() => {
                        element.innerText = value;
                        element.classList.add('animate-glow');
                        setTimeout(() => element.classList.remove('animate-glow'), 1500);
                    }, 300);
                } else {
                    // Use counter animation for larger changes
                    animateCounter(element, value, 800);
                }
                
                if (shouldGlow) {
                    setTimeout(() => {
                        element.classList.add('animate-glow');
                        setTimeout(() => element.classList.remove('animate-glow'), 1500);
                    }, 900);
                }
            }
        }

        async function loadDashboard() {

            // Animate total rooms count
            animateNumber("totalRooms", totalRoomsCount);

            // Calculate booked rooms from cache
            const bookedRoomsCount = getBookedRoomsCount();
            animateNumber("bookedRooms", bookedRoomsCount, true);

            // Calculate available rooms dynamically (total active rooms - booked rooms)
            const dynamicAvailableRoomsCount = Math.max(0, (roomsCache.filter(room => room.isactive === 1).length) - bookedRoomsCount);
            animateNumber("availableRooms", dynamicAvailableRoomsCount, true);

            // Animate maintenance rooms count
            animateNumber("maintenanceRooms", maintenanceRoomsCount);

            // Calculate today's check-ins from cache
            const todayCheckInsCount = getTodayCheckInsCount();
            animateNumber("todayCheckIns", todayCheckInsCount, true);

            // Calculate today's check-outs from cache
            const todayCheckOutsCount = getTodayCheckOutsCount();
            animateNumber("todayCheckOuts", todayCheckOutsCount, true);
        }

        async function showBookingList(type) {
            let filteredBookings = [];

            if (type === "checkin") {
                filteredBookings = getTodayCheckIns();
            } else if (type === "checkout") {
                filteredBookings = getTodayCheckOuts();
            } else if (type === "booked") {
                filteredBookings = getActiveBookings();
            }

            const container = document.getElementById("bookingListContainer");
            container.innerHTML = "";

            filteredBookings.forEach(item => {
                container.innerHTML += `
            <li class="list-group-item">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <strong>Booking: ${item.bookingnumber || 'N/A'}</strong><br>
                        <strong>Name: ${item.displayname || 'N/A'}</strong><br>
                        <small>Mobile: ${item.mobilenumber || 'N/A'}</small><br>
                        <small>Room: ${item.roomnumber || 'N/A'}</small><br>
                        <small>Check-in: ${new Date(item.checkindatetime).toLocaleString()}</small><br>
                        <small>Guests: ${(item.gentscount || 0)} Gents, ${(item.ladiescount || 0)} Ladies</small>
                        ${item.referencedetail ? `<br><small>Reference: ${item.referencedetail}</small>` : ''}
                    </div>
                    <div class="text-end">
                        <small class="text-muted">Status: ${item.bookingstatus == 1 ? 'Active' : 'Completed'}</small>
                        ${item.donationamount > 0 ? `<br><small class="text-success">Donation: ₹${item.donationamount}</small>` : ''}
                    </div>
                </div>
            </li>
        `;
            });

            document.getElementById("bookingListTitle").innerText =
                type === "checkin" ? "Today's Check-ins" :
                    type === "checkout" ? "Today's Check-outs" :
                        type === "booked" ? "Currently Booked Rooms" :
                            "Bookings";

            const modal = new bootstrap.Modal(document.getElementById('bookingListModal'), {
                focus: false
            });
            modal.show();
        }

        function setCurrentCheckInTime() {

            const now = new Date();

            const formattedDate =
                now.getFullYear() + '-' +
                String(now.getMonth() + 1).padStart(2, '0') + '-' +
                String(now.getDate()).padStart(2, '0') + 'T' +
                String(now.getHours()).padStart(2, '0') + ':' +
                String(now.getMinutes()).padStart(2, '0');

            document.getElementById("checkInDateTime").value = formattedDate;

        }

        async function loadRoomsCache() {
            if (!roomsCacheLoaded) {
                try {
                    // Fetch all room data with all columns
                    const rooms = await DBHandler.fetchEntityRecords(
                        'roommaster',
                        '*',
                        'roomnumber',
                        'asc',
                        "",
                        false,
                        0
                    );
                    roomsCache = rooms || [];

                    // Calculate counts from cached data
                    totalRoomsCount = roomsCache.length;

                    // Calculate available rooms dynamically (active rooms that are not currently booked)
                    availableRoomsCount = roomsCache.filter(room => room.isactive === 1).length;

                    maintenanceRoomsCount = roomsCache.filter(room =>
                        room.isactive === 0
                    ).length;

                    roomsCacheLoaded = true;
                    console.log("Rooms cache loaded:", roomsCache.length, "rooms");
                    console.log("Total rooms count cached:", totalRoomsCount);
                    console.log("Available rooms count cached:", availableRoomsCount);
                    console.log("Maintenance rooms count cached:", maintenanceRoomsCount);
                    loadDashboard();
                } catch (error) {
                    console.error("Error loading rooms cache:", error);
                    roomsCache = [];
                    totalRoomsCount = 0;
                    availableRoomsCount = 0;
                    maintenanceRoomsCount = 0;
                }
            }
        }

        async function loadBookingsCache() {
            if (!bookingsCacheLoaded) {
                try {
                    // Fetch all booking data with room information
                    const bookings = await DBHandler.fetchEntityRecords(
                        'roombooking rb',
                        'rb.*, rm.roomnumber, br.roomid',
                        'rb.checkindatetime',
                        'desc',
                        "",
                        false,
                        0,
                        'LEFT JOIN bookingroom br ON CAST(br.bookingid AS CHAR) = CAST(rb.id AS CHAR) LEFT JOIN roommaster rm ON rm.id = br.roomid'
                    );
                    bookingsCache = bookings || [];
                    bookingsCacheLoaded = true;
                    console.log("Bookings cache loaded:", bookingsCache.length, "bookings");

                    // Extract and populate booked rooms cache from bookings data
                    const bookedRoomsSet = new Set();
                    const bookedRoomsData = [];

                    bookingsCache.forEach(booking => {
                        // Only include active bookings with active room status
                        if (booking.bookingstatus === 1 && booking.roomid && !bookedRoomsSet.has(booking.roomid)) {
                            bookedRoomsSet.add(booking.roomid);
                            bookedRoomsData.push({
                                roomid: booking.roomid,
                                roomnumber: booking.roomnumber
                            });
                        }
                    });

                    // Populate booked rooms cache
                    bookedRoomsCache = bookedRoomsData;
                    bookedRoomsCacheLoaded = true;
                    console.log("Booked rooms cache populated from bookings:", bookedRoomsCache.length, "booked rooms");
                    console.log("Booked rooms details:", bookedRoomsCache);
                    loadDashboard();
                } catch (error) {
                    console.error("Error loading bookings cache:", error);
                    bookingsCache = [];
                    bookedRoomsCache = [];
                    bookingsCacheLoaded = true;
                    bookedRoomsCacheLoaded = true;
                }
            }
        }

        async function loadBookedRoomsCache() {
            if (!bookedRoomsCacheLoaded) {
                try {
                    // Directly query for currently booked rooms
                    const bookedRooms = await DBHandler.fetchEntityRecords(
                        'bookingroom br',
                        'DISTINCT br.roomid, rm.roomnumber',
                        'br.roomid',
                        'asc',
                        'br.roomstatus = 1 AND EXISTS (SELECT 1 FROM roombooking rb WHERE rb.id = br.bookingid AND rb.bookingstatus = 1)',
                        false,
                        0,
                        'LEFT JOIN roommaster rm ON rm.id = br.roomid'
                    );

                    bookedRoomsCache = bookedRooms || [];
                    bookedRoomsCacheLoaded = true;
                    console.log("Booked rooms cache loaded:", bookedRoomsCache.length, "booked rooms");
                    console.log("Booked rooms details:", bookedRoomsCache);
                } catch (error) {
                    console.error("Error loading booked rooms cache:", error);
                    bookedRoomsCache = [];
                    bookedRoomsCacheLoaded = true; // Set to true even on error to prevent infinite loops
                }
            }
        }

        // Helper function to get booked rooms count
        function getBookedRoomsCount() {
            if (!bookedRoomsCacheLoaded) return 0;
            return bookedRoomsCache.length;
        }

        // Helper function to get today's check-ins count
        function getTodayCheckInsCount() {
            if (!bookingsCacheLoaded) return 0;
            const today = new Date().toISOString().split('T')[0];

            // Get unique bookings by ID to avoid duplicates from JOINs
            const uniqueBookings = [];
            const seenIds = new Set();

            bookingsCache.forEach(booking => {
                if (!seenIds.has(booking.id)) {
                    seenIds.add(booking.id);
                    uniqueBookings.push(booking);
                }
            });

            return uniqueBookings.filter(booking => {
                if (!booking.checkindatetime) return false;
                const checkInDate = new Date(booking.checkindatetime).toISOString().split('T')[0];
                return checkInDate === today;
            }).length;
        }

        // Helper function to get today's check-outs count
        function getTodayCheckOutsCount() {
            if (!bookingsCacheLoaded) return 0;
            const today = new Date().toISOString().split('T')[0];

            // Get unique bookings by ID to avoid duplicates from JOINs
            const uniqueBookings = [];
            const seenIds = new Set();

            bookingsCache.forEach(booking => {
                if (!seenIds.has(booking.id)) {
                    seenIds.add(booking.id);
                    uniqueBookings.push(booking);
                }
            });

            return uniqueBookings.filter(booking => {
                if (!booking.checkoutdatetime) return false;
                const checkOutDate = new Date(booking.checkoutdatetime).toISOString().split('T')[0];
                return checkOutDate === today;
            }).length;
        }

        // Helper function to get today's check-ins
        function getTodayCheckIns() {
            if (!bookingsCacheLoaded) return [];
            const today = new Date().toISOString().split('T')[0];

            // Get unique bookings by ID to avoid duplicates from JOINs
            const uniqueBookings = [];
            const seenIds = new Set();

            bookingsCache.forEach(booking => {
                if (!seenIds.has(booking.id)) {
                    seenIds.add(booking.id);
                    uniqueBookings.push(booking);
                }
            });

            return uniqueBookings.filter(booking => {
                if (!booking.checkindatetime) return false;
                const checkInDate = new Date(booking.checkindatetime).toISOString().split('T')[0];
                return checkInDate === today;
            });
        }

        // Helper function to get today's check-outs
        function getTodayCheckOuts() {
            if (!bookingsCacheLoaded) return [];
            const today = new Date().toISOString().split('T')[0];

            // Get unique bookings by ID to avoid duplicates from JOINs
            const uniqueBookings = [];
            const seenIds = new Set();

            bookingsCache.forEach(booking => {
                if (!seenIds.has(booking.id)) {
                    seenIds.add(booking.id);
                    uniqueBookings.push(booking);
                }
            });

            return uniqueBookings.filter(booking => {
                if (!booking.checkoutdatetime) return false;
                const checkOutDate = new Date(booking.checkoutdatetime).toISOString().split('T')[0];
                return checkOutDate === today;
            });
        }

        // Helper function to get active bookings
        function getActiveBookings() {
            if (!bookingsCacheLoaded) return [];

            // Get unique bookings by ID to avoid duplicates from JOINs
            const uniqueBookings = [];
            const seenIds = new Set();

            bookingsCache.forEach(booking => {
                if (!seenIds.has(booking.id)) {
                    seenIds.add(booking.id);
                    uniqueBookings.push(booking);
                }
            });

            return uniqueBookings.filter(booking => booking.bookingstatus === 1);
        }

        function loadAvailableRooms() {
            // Use cached rooms if available
            if (roomsCacheLoaded && roomsCache.length > 0) {
                filterRoomsForCheckIn();
                return;
            }

            // Load from database if cache is empty (fallback)
            DBHandler.fetchEntityRecords(
                'roommaster',
                'id,roomnumber,isactive,bookingstatus',
                'roomnumber',
                'asc',
                "",
                false,
                0
            ).then(function (rooms) {
                rooms = rooms || [];

                // Update the dropdown data source
                checkInRoomDropdown.dataSource = rooms;
                checkInRoomDropdown.dataBind();
                console.log("Loaded rooms from database:", rooms.length, "rooms");

            }).catch(function (error) {
                console.error("Error loading rooms:", error);
                checkInRoomDropdown.dataSource = [];
                checkInRoomDropdown.dataBind();
            });
        }

        function filterRoomsForCheckIn() {
            if (!roomsCacheLoaded || !checkInRoomDropdown) return;

            const showOnlyAvailable = document.getElementById("showOnlyAvailableRooms").checked;
            let filteredRooms = [];

            if (showOnlyAvailable) {
                // Get currently booked room IDs from booked rooms cache
                const bookedRoomIds = new Set();
                if (bookedRoomsCacheLoaded) {
                    bookedRoomsCache.forEach(bookedRoom => {
                        if (bookedRoom.roomid) bookedRoomIds.add(bookedRoom.roomid);
                    });
                }

                // Show only active rooms that are not currently booked
                filteredRooms = roomsCache.filter(room =>
                    room.isactive === 1 && !bookedRoomIds.has(room.id)
                );
            } else {
                // Show all active rooms
                filteredRooms = roomsCache.filter(room => room.isactive === 1);
            }

            // Update the dropdown data source
            checkInRoomDropdown.dataSource = filteredRooms;
            checkInRoomDropdown.dataBind();

            const filterText = showOnlyAvailable ? "available" : "all active";
            console.log(`Showing ${filterText} rooms:`, filteredRooms.length, "rooms");
        }

        // Function to refresh rooms cache when needed
        function refreshRoomsCache() {
            roomsCacheLoaded = false;
            totalRoomsCount = 0;
            maintenanceRoomsCount = 0;
            loadRoomsCache().then(() => {
                if (checkInRoomDropdown) {
                    filterRoomsForCheckIn(); // Use filter function for dynamic calculation
                }
                // Update dashboard with new counts (dashboard will calculate available rooms dynamically)
                animateNumber("totalRooms", totalRoomsCount);
                animateNumber("maintenanceRooms", maintenanceRoomsCount);
                loadDashboard(); // This will calculate available and booked rooms dynamically
            });
        }

        // Function to refresh bookings cache when needed
        function refreshBookingsCache() {
            bookingsCacheLoaded = false;
            bookedRoomsCacheLoaded = false;
            loadBookingsCache().then(() => { // This now also refreshes booked rooms cache
                loadDashboard(); // Refresh all counts
            });
        }

        // Function to refresh all caches
        function refreshAllCaches() {
            refreshRoomsCache();
            refreshBookingsCache();
        }

        // Helper function to get rooms by status
        function getRoomsByStatus(status) {
            if (!roomsCacheLoaded) return [];

            // Get currently booked room IDs from booked rooms cache
            const bookedRoomIds = new Set();
            if (bookedRoomsCacheLoaded) {
                bookedRoomsCache.forEach(bookedRoom => {
                    if (bookedRoom.roomid) bookedRoomIds.add(bookedRoom.roomid);
                });
            }

            return roomsCache.filter(room => {
                switch (status) {
                    case 'active':
                        return room.isactive === 1;
                    case 'inactive':
                        return room.isactive === 0;
                    case 'available':
                        return room.isactive === 1 && !bookedRoomIds.has(room.id);
                    case 'booked':
                        return room.isactive === 1 && bookedRoomIds.has(room.id);
                    case 'maintenance':
                        return room.isactive === 0;
                    default:
                        return true;
                }
            });
        }

        // Helper function to get room by ID
        function getRoomById(roomId) {
            if (!roomsCacheLoaded) return null;
            return roomsCache.find(room => room.id === roomId);
        }

        // Initialize Syncfusion components
        function initializeSyncfusionControls() {
            // Initialize DateTimePicker for checkout
            new ej.calendars.DateTimePicker({
                placeholder: "Select Check-Out Time"
            }).appendTo('#checkOutDateTime');

            // Initialize Feedback Rating Dropdown
            feedbackRatingDropdown = new ej.dropdowns.DropDownList({
                placeholder: "Select Rating",
                dataSource: [
                    { value: 1, text: "Bad" },
                    { value: 2, text: "Good" },
                    { value: 3, text: "Very Good" },
                    { value: 4, text: "Excellent" }
                ],
                fields: { text: 'text', value: 'value' },
                allowFiltering: false,
                width: '100%'
            });
            feedbackRatingDropdown.appendTo('#feedbackRating');
        }

        // Initialize room dropdown for check-in
        function initializeRoomDropdown() {
            checkInRoomDropdown = new ej.dropdowns.MultiSelect({
                placeholder: "Select Rooms",
                mode: 'CheckBox',
                showSelectAll: true,
                filterBarPlaceholder: 'Search rooms...',
                allowFiltering: true,
                fields: { text: 'roomnumber', value: 'id' },
                dataSource: []
            });
            checkInRoomDropdown.appendTo('#checkInRoom');
        }

        // Initialize bookings dropdown for check-out
        function initializeBookingsDropdown() {
            checkOutBookingsDropdown = new ej.dropdowns.MultiSelect({
                placeholder: "Select Bookings to Check-Out",
                mode: 'CheckBox',
                showSelectAll: true,
                filterBarPlaceholder: 'Search bookings...',
                allowFiltering: true,
                fields: { text: 'text', value: 'id' },
                dataSource: [],
                itemTemplate: '<div class="booking-item">' +
                    '<div class="booking-name">${displayname}</div>' +
                    '<div class="booking-details">Room: ${roomnumber} | Mobile: ${mobilenumber}</div>' +
                    '</div>'
            });
            checkOutBookingsDropdown.appendTo('#checkOutBookings');
        }

        // Load all initial data caches
        function initializeDataCaches() {
            loadRoomsCache();
            loadBookingsCache(); // This now also populates booked rooms cache
        }

        // Main initialization function
        function initializeApplication() {
            initializeSyncfusionControls();
            initializeRoomDropdown();
            initializeBookingsDropdown();
            initializeDataCaches();
        }

        $(document).ready(() => {
            initializeApplication();
        });

    </script>

    <style>
        .dashboard-link {
            cursor: pointer;
        }

        .dashboard-link:hover {
            text-decoration: underline;
        }

        /* Animated counter styles */
        .dashboard-number {
            display: inline-block;
            font-weight: bold;
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .dashboard-number::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .dashboard-number.updating::before {
            left: 100%;
        }

        /* Number animation keyframes */
        @keyframes countUp {
            0% {
                transform: translateY(20px);
                opacity: 0;
            }
            50% {
                transform: translateY(-5px);
                opacity: 0.7;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }

        @keyframes glow {
            0% {
                text-shadow: 0 0 5px rgba(255,255,255,0.3);
            }
            50% {
                text-shadow: 0 0 20px rgba(255,255,255,0.8), 0 0 30px rgba(255,255,255,0.6);
            }
            100% {
                text-shadow: 0 0 5px rgba(255,255,255,0.3);
            }
        }

        .animate-count {
            animation: countUp 0.6s ease-out, pulse 0.8s ease-out 0.6s;
        }

        .animate-glow {
            animation: glow 1.5s ease-in-out;
        }

        /* Card hover effects */
        .card {
            transition: all 0.3s ease;
            border-radius: 10px;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15) !important;
        }

        /* Specific colors for different card types */
        .bg-success:hover {
            background: linear-gradient(45deg, #28a745, #34ce57) !important;
        }

        .bg-danger:hover {
            background: linear-gradient(45deg, #dc3545, #e55560) !important;
        }

        .bg-warning:hover {
            background: linear-gradient(45deg, #ffc107, #ffcd3c) !important;
        }

        /* Loading shimmer effect */
        @keyframes shimmer {
            0% {
                background-position: -200px 0;
            }
            100% {
                background-position: calc(200px + 100%) 0;
            }
        }

        .loading-shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200px 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
            height: 2rem;
            width: 3rem;
            display: inline-block;
        }

        #checkOutDateTime:invalid::-webkit-datetime-edit {
            color: transparent;
        }

        #checkOutDateTime:focus::-webkit-datetime-edit {
            color: inherit;
        }

        /* Booking item styling in checkout dropdown */
        .booking-item {
            padding: 5px 0;
        }

        .booking-name {
            font-weight: bold;
            color: #333;
            font-size: 14px;
        }

        .booking-details {
            font-size: 12px;
            color: #666;
            margin-top: 2px;
        }

        /* Donation input styling */
        .input-group-text {
            background-color: #e9ecef;
            border: 1px solid #ced4da;
        }
    </style>
</body>
