<body>
    <div class="container-fluid mt-4">

        <!-- Top Action Row -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <button class="btn btn-success me-2" id="btnCheckIn" onclick="openCheckInModal()">
                    <i class="bi bi-box-arrow-in-right"></i> Check-In
                </button>

                <button class="btn btn-danger" id="btnCheckOut" onclick="openCheckOutModal()">
                    <i class="bi bi-box-arrow-right"></i> Check-Out
                </button>
            </div>

        </div>


        <!-- Room Stats -->
        <div class="row g-4">
            <div class="col-md-3">
                <div class="card shadow-sm border-0 text-center">
                    <div class="card-body">
                        <h6 class="text-muted">Total Rooms</h6>
                        <h2 id="totalRooms" class="fw-bold dashboard-link" data-type="total">0</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card shadow-sm border-0 text-center bg-success text-white">
                    <div class="card-body">
                        <h6>Available Rooms</h6>
                        <h2 id="availableRooms" class="fw-bold dashboard-link" data-type="available">0</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card shadow-sm border-0 text-center bg-danger text-white">
                    <div class="card-body">
                        <h6>Booked Rooms</h6>
                        <h2 id="bookedRooms" class="fw-bold dashboard-link" data-type="booked">0</h2>

                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card shadow-sm border-0 text-center bg-warning text-dark">
                    <div class="card-body">
                        <h6>Under Maintenance</h6>
                        <h2 id="maintenanceRooms" class="fw-bold dashboard-link" data-type="maintenance">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <hr class="my-4">

        <!-- Today Stats -->
        <div class="row g-4">

            <div class="col-md-6">
                <div class="card shadow-sm border-0 text-center">
                    <div class="card-body">
                        <h6 class="text-muted">Today's Check-Ins</h6>
                        <h2 id="todayCheckIns" class="fw-bold text-primary dashboard-link" data-type="checkin"
                            defaultValue="currentDate">0</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow-sm border-0 text-center">
                    <div class="card-body">
                        <h6 class="text-muted">Today's Check-Outs</h6>
                        <h2 id="todayCheckOuts" class="fw-bold text-secondary dashboard-link" data-type="checkout">0
                        </h2>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Check-In Modal -->
    <div class="modal fade" id="checkInModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">Guest Check-In</h5>
                    <button type="button" class="close" data-bs-dismiss="modal">
                        <span>&times;</span>
                    </button>
                </div>

                <div class="modal-body">

                    <div class="row g-3">

                        <!-- Display Name -->
                        <div class="col-md-6">
                            <label class="form-label">Display Name <span class="text-danger">*</span></label>
                            <input type="text" id="displayName" class="form-control" required>
                        </div>

                        <!-- Mobile Number -->
                        <div class="col-md-6">
                            <label class="form-label">Mobile Number <span class="text-danger">*</span></label>
                            <input type="tel" id="mobileNumber" class="form-control" required>
                        </div>

                        <!-- Address -->
                        <div class="col-md-12">
                            <label class="form-label">Address</label>
                            <textarea id="address" class="form-control" rows="2"></textarea>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">Select Rooms <span class="text-danger">*</span></label><br>
                            <input type="text" id="checkInRoom" />
                        </div>
                        <!-- Check-In Date -->
                        <div class="col-md-6">
                            <label class="form-label">Check-In Date & Time</label>
                            <input type="datetime-local" id="checkInDateTime" class="form-control">
                        </div>

                        <!-- Expected Check-Out -->
                        <div class="col-md-6">
                            <label class="form-label">Expected Check-Out</label>
                            <input type="datetime-local" id="checkOutDateTime" class="form-control">
                        </div>

                        <!-- Guest Count -->
                        <div class="col-md-6">
                            <label class="form-label">Gents Count</label>
                            <input type="number" id="gentsCount" class="form-control" min="0" value="0">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Ladies Count</label>
                            <input type="number" id="ladiesCount" class="form-control" min="0" value="0">
                        </div>

                        <!-- Reference Detail -->
                        <div class="col-md-12">
                            <label class="form-label">Reference Detail</label>
                            <input type="text" id="referenceDetail" class="form-control">
                        </div>

                        <!-- Room Selection (MULTIPLE) -->


                    </div>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-success" id="saveCheckIn" onclick="submitCheckIn()">Confirm Check-In</button>
                </div>

            </div>
        </div>

    <!-- Check-Out Modal -->
    <div class="modal fade" id="checkOutModal" tabindex="-1">
        <div class="modal-dialog modal-md modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">Guest Check-Out</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <div class="mb-3">
                        <label class="form-label">Select Room</label>
                        <select id="checkOutRoom" class="form-select">
                            <option value="">Select Room</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Check-Out Date</label>
                        <input type="date" id="checkOutDate" class="form-control">
                    </div>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-danger" id="saveCheckOut" onclick="submitCheckOut()">Confirm
                        Check-Out</button>
                </div>

            </div>
        </div>
    </div>

    <!-- Booking List Modal -->
    <div class="modal fade" id="bookingListModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title" id="bookingListTitle">Bookings</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <ul class="list-group" id="bookingListContainer"></ul>
                </div>

            </div>
        </div>
    </div>

    <script>
        // Local cache for rooms
        let roomsCache = [];
        let roomsCacheLoaded = false;
        let totalRoomsCount = 0;
        let availableRoomsCount = 0;
        let maintenanceRoomsCount = 0;

        // Local cache for bookings
        let bookingsCache = [];
        let bookingsCacheLoaded = false;

        let checkInRoomDropdown;



        function openCheckInModal() {

            setCurrentCheckInTime();
            document.getElementById("checkOutDateTime").value = "";
            // Clear form fields
            document.getElementById("displayName").value = "";
            document.getElementById("mobileNumber").value = "";
            document.getElementById("address").value = "";
            document.getElementById("gentsCount").value = "0";
            document.getElementById("ladiesCount").value = "0";
            document.getElementById("referenceDetail").value = "";
            const modal = new bootstrap.Modal(document.getElementById('checkInModal'), {
                focus: false
            });
            modal.show();

            loadAvailableRooms();

        }

        function openCheckOutModal() {
            const modal = new bootstrap.Modal(document.getElementById('checkOutModal'), {
                focus: false
            });
            modal.show();
        }

        async function submitCheckIn() {

            // Get form values
            const displayName = document.getElementById("displayName").value.trim();
            const mobileNumber = document.getElementById("mobileNumber").value.trim();
            const address = document.getElementById("address").value.trim();
            const checkInDate = document.getElementById("checkInDateTime").value;
            const checkOutDate = document.getElementById("checkOutDateTime").value;
            const gentsCount = parseInt(document.getElementById("gentsCount").value) || 0;
            const ladiesCount = parseInt(document.getElementById("ladiesCount").value) || 0;
            const referenceDetail = document.getElementById("referenceDetail").value.trim();

            const selectedRooms = checkInRoomDropdown.value || [];

            // Validation
            if (!displayName) {
                alert("Please enter Display Name");
                return;
            }
            if (!mobileNumber) {
                alert("Please enter Mobile Number");
                return;
            }
            if (selectedRooms.length === 0) {
                alert("Select at least one room");
                return;
            }

            // Format dates properly for database
            const formattedCheckInDate = checkInDate ? new Date(checkInDate).toISOString().slice(0, 19).replace('T', ' ') : null;
            const formattedCheckOutDate = checkOutDate ? new Date(checkOutDate).toISOString().slice(0, 19).replace('T', ' ') : null;

            // 1️⃣ Create Main Booking
            var bookingId = await DBHandler.submitRecordData('roombooking', {
                bookingnumber: "BK-" + Date.now(),
                displayname: displayName,
                mobilenumber: mobileNumber,
                address: address,
                checkindatetime: formattedCheckInDate,
                checkoutdatetime: formattedCheckOutDate,
                bookingstatus: 1,
                gentscount: gentsCount,
                ladiescount: ladiesCount,
                referencedetail: referenceDetail,
                feedbackrating: 0,
                feedbackremarks: '',
                donationamount: 0
            }, null, false);

            // 2️⃣ Insert Multiple Rooms
            for (const roomId of selectedRooms) {
                await DBHandler.submitRecordData('bookingroom', {
                    bookingid: bookingId,
                    roomid: roomId,
                    roomstatus: 1
                }, null, false);
            }

            bootstrap.Modal.getInstance(
                document.getElementById('checkInModal')
            ).hide();

            refreshBookingsCache(); // Refresh booking data after new check-in
        }

        async function submitCheckOut() {
            const roomId = document.getElementById("checkOutRoom").value;

            await DBHandler.submitRecordData('bookingroom', {
                roomstatus: 0
            }, roomId, true);

            bootstrap.Modal.getInstance(
                document.getElementById('checkOutModal')).hide();

            refreshBookingsCache(); // Refresh booking data after check-out
        }

        async function loadDashboard() {

            // Use cached total rooms count
            document.getElementById("totalRooms").innerText = totalRoomsCount;

            // Use cached available rooms count
            document.getElementById("availableRooms").innerText = availableRoomsCount;

            // Calculate booked rooms from cache
            const bookedRoomsCount = getBookedRoomsCount();
            document.getElementById("bookedRooms").innerText = bookedRoomsCount;

            // Use cached maintenance rooms count
            document.getElementById("maintenanceRooms").innerText = maintenanceRoomsCount;

            // Calculate today's check-ins from cache
            const todayCheckInsCount = getTodayCheckInsCount();
            document.getElementById("todayCheckIns").innerText = todayCheckInsCount;

            // Calculate today's check-outs from cache
            const todayCheckOutsCount = getTodayCheckOutsCount();
            document.getElementById("todayCheckOuts").innerText = todayCheckOutsCount;
        }

        async function showBookingList(type) {
            let filteredBookings = [];

            if (type === "checkin") {
                filteredBookings = getTodayCheckIns();
            } else if (type === "checkout") {
                filteredBookings = getTodayCheckOuts();
            } else if (type === "booked") {
                filteredBookings = getActiveBookings();
            }

            const container = document.getElementById("bookingListContainer");
            container.innerHTML = "";

            filteredBookings.forEach(item => {
                container.innerHTML += `
            <li class="list-group-item">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <strong>Booking: ${item.bookingnumber || 'N/A'}</strong><br>
                        <strong>Name: ${item.displayname || 'N/A'}</strong><br>
                        <small>Mobile: ${item.mobilenumber || 'N/A'}</small><br>
                        <small>Room: ${item.roomnumber || 'N/A'}</small><br>
                        <small>Check-in: ${new Date(item.checkindatetime).toLocaleString()}</small><br>
                        <small>Guests: ${(item.gentscount || 0)} Gents, ${(item.ladiescount || 0)} Ladies</small>
                        ${item.referencedetail ? `<br><small>Reference: ${item.referencedetail}</small>` : ''}
                    </div>
                    <div class="text-end">
                        <small class="text-muted">Status: ${item.bookingstatus == 1 ? 'Active' : 'Completed'}</small>
                        ${item.donationamount > 0 ? `<br><small class="text-success">Donation: ₹${item.donationamount}</small>` : ''}
                    </div>
                </div>
            </li>
        `;
            });

            document.getElementById("bookingListTitle").innerText =
                type === "checkin" ? "Today's Check-ins" :
                    type === "checkout" ? "Today's Check-outs" :
                        type === "booked" ? "Currently Booked Rooms" :
                            "Bookings";

            const modal = new bootstrap.Modal(document.getElementById('bookingListModal'), {
                focus: false
            });
            modal.show();
        }

        function setCurrentCheckInTime() {

            const now = new Date();

            const formattedDate =
                now.getFullYear() + '-' +
                String(now.getMonth() + 1).padStart(2, '0') + '-' +
                String(now.getDate()).padStart(2, '0') + 'T' +
                String(now.getHours()).padStart(2, '0') + ':' +
                String(now.getMinutes()).padStart(2, '0');

            document.getElementById("checkInDateTime").value = formattedDate;

        }

        async function loadRoomsCache() {
            if (!roomsCacheLoaded) {
                try {
                    // Fetch all room data with all columns
                    const rooms = await DBHandler.fetchEntityRecords(
                        'roommaster',
                        '*',
                        'roomnumber',
                        'asc',
                        "",
                        false,
                        0
                    );
                    roomsCache = rooms || [];

                    // Calculate counts from cached data
                    totalRoomsCount = roomsCache.length;
                    availableRoomsCount = roomsCache.filter(room =>
                        room.isactive === 1 && room.bookingstatus === 'Available'
                    ).length;
                    maintenanceRoomsCount = roomsCache.filter(room =>
                        room.isactive === 0
                    ).length;

                    roomsCacheLoaded = true;
                    console.log("Rooms cache loaded:", roomsCache.length, "rooms");
                    console.log("Total rooms count cached:", totalRoomsCount);
                    console.log("Available rooms count cached:", availableRoomsCount);
                    console.log("Maintenance rooms count cached:", maintenanceRoomsCount);
                } catch (error) {
                    console.error("Error loading rooms cache:", error);
                    roomsCache = [];
                    totalRoomsCount = 0;
                    availableRoomsCount = 0;
                    maintenanceRoomsCount = 0;
                }
            }
        }

        async function loadBookingsCache() {
            if (!bookingsCacheLoaded) {
                try {
                    // Fetch all booking data with room information
                    const bookings = await DBHandler.fetchEntityRecords(
                        'roombooking rb',
                        'rb.*, rm.roomnumber',
                        'rb.checkindatetime',
                        'desc',
                        "",
                        false,
                        0,
                        'LEFT JOIN bookingroom br ON br.bookingid = rb.id LEFT JOIN roommaster rm ON rm.id = br.roomid'
                    );
                    bookingsCache = bookings || [];
                    bookingsCacheLoaded = true;
                    console.log("Bookings cache loaded:", bookingsCache.length, "bookings");
                } catch (error) {
                    console.error("Error loading bookings cache:", error);
                    bookingsCache = [];
                }
            }
        }

        // Helper function to get booked rooms count
        function getBookedRoomsCount() {
            if (!bookingsCacheLoaded) return 0;
            const bookedRoomIds = new Set();
            bookingsCache.filter(booking => booking.bookingstatus === 1)
                .forEach(booking => {
                    if (booking.roomid) bookedRoomIds.add(booking.roomid);
                });
            return bookedRoomIds.size;
        }

        // Helper function to get today's check-ins count
        function getTodayCheckInsCount() {
            if (!bookingsCacheLoaded) return 0;
            const today = new Date().toISOString().split('T')[0];
            return bookingsCache.filter(booking => {
                const checkInDate = new Date(booking.checkindatetime).toISOString().split('T')[0];
                return checkInDate === today;
            }).length;
        }

        // Helper function to get today's check-outs count
        function getTodayCheckOutsCount() {
            if (!bookingsCacheLoaded) return 0;
            const today = new Date().toISOString().split('T')[0];
            return bookingsCache.filter(booking => {
                if (!booking.checkoutdatetime) return false;
                const checkOutDate = new Date(booking.checkoutdatetime).toISOString().split('T')[0];
                return checkOutDate === today;
            }).length;
        }

        // Helper function to get today's check-ins
        function getTodayCheckIns() {
            if (!bookingsCacheLoaded) return [];
            const today = new Date().toISOString().split('T')[0];
            return bookingsCache.filter(booking => {
                const checkInDate = new Date(booking.checkindatetime).toISOString().split('T')[0];
                return checkInDate === today;
            });
        }

        // Helper function to get today's check-outs
        function getTodayCheckOuts() {
            if (!bookingsCacheLoaded) return [];
            const today = new Date().toISOString().split('T')[0];
            return bookingsCache.filter(booking => {
                if (!booking.checkoutdatetime) return false;
                const checkOutDate = new Date(booking.checkoutdatetime).toISOString().split('T')[0];
                return checkOutDate === today;
            });
        }

        // Helper function to get active bookings
        function getActiveBookings() {
            if (!bookingsCacheLoaded) return [];
            return bookingsCache.filter(booking => booking.bookingstatus === 1);
        }

        function loadAvailableRooms() {
            // Use cached rooms if available
            if (roomsCacheLoaded && roomsCache.length > 0) {
                // Filter only active rooms for dropdown
                const activeRooms = roomsCache.filter(room => room.isactive === 1);
                checkInRoomDropdown.dataSource = activeRooms;
                checkInRoomDropdown.dataBind();
                console.log("Using cached active rooms:", activeRooms.length, "rooms");
                return;
            }

            // Load from database if cache is empty (fallback)
            DBHandler.fetchEntityRecords(
                'roommaster',
                'id,roomnumber',
                'roomnumber',
                'asc',
                "isactive = 1",
                false,
                0
            ).then(function (rooms) {
                rooms = rooms || [];

                // Update the dropdown data source
                checkInRoomDropdown.dataSource = rooms;
                checkInRoomDropdown.dataBind();
                console.log("Loaded active rooms from database:", rooms.length, "rooms");

            }).catch(function (error) {
                console.error("Error loading rooms:", error);
                checkInRoomDropdown.dataSource = [];
                checkInRoomDropdown.dataBind();
            });
        }

        // Function to refresh rooms cache when needed
        function refreshRoomsCache() {
            roomsCacheLoaded = false;
            totalRoomsCount = 0;
            availableRoomsCount = 0;
            maintenanceRoomsCount = 0;
            loadRoomsCache().then(() => {
                if (checkInRoomDropdown) {
                    const activeRooms = roomsCache.filter(room => room.isactive === 1);
                    checkInRoomDropdown.dataSource = activeRooms;
                    checkInRoomDropdown.dataBind();
                }
                // Update dashboard with new counts
                document.getElementById("totalRooms").innerText = totalRoomsCount;
                document.getElementById("availableRooms").innerText = availableRoomsCount;
                document.getElementById("maintenanceRooms").innerText = maintenanceRoomsCount;
            });
        }

        // Function to refresh bookings cache when needed
        function refreshBookingsCache() {
            bookingsCacheLoaded = false;
            loadBookingsCache().then(() => {
                loadDashboard(); // Refresh all counts
            });
        }

        // Function to refresh all caches
        function refreshAllCaches() {
            refreshRoomsCache();
            refreshBookingsCache();
        }

        // Helper function to get rooms by status
        function getRoomsByStatus(status) {
            if (!roomsCacheLoaded) return [];
            return roomsCache.filter(room => {
                switch (status) {
                    case 'active':
                        return room.isactive === 1;
                    case 'inactive':
                        return room.isactive === 0;
                    case 'available':
                        return room.isactive === 1 && room.bookingstatus === 'Available';
                    case 'maintenance':
                        return room.isactive === 0;
                    default:
                        return true;
                }
            });
        }

        // Helper function to get room by ID
        function getRoomById(roomId) {
            if (!roomsCacheLoaded) return null;
            return roomsCache.find(room => room.id === roomId);
        }

        $(document).ready(() => {
            // Initialize Syncfusion DateTimePicker
            new ej.calendars.DateTimePicker({
                placeholder: "Select Check-Out Time"
            }).appendTo('#checkOutDateTime');

            // Initialize Room DropDownList with multiselect
            checkInRoomDropdown = new ej.dropdowns.MultiSelect({
                placeholder: "Select Rooms",
                mode: 'CheckBox',
                showSelectAll: true,
                filterBarPlaceholder: 'Search rooms...',
                allowFiltering: true,
                fields: { text: 'roomnumber', value: 'id' },
                dataSource: []
            });
            checkInRoomDropdown.appendTo('#checkInRoom');

            // Load initial data
            loadRoomsCache();
            loadBookingsCache();
            loadDashboard();

            // Bind dashboard link events
            document.querySelectorAll('.dashboard-link')
                .forEach(el => {
                    el.addEventListener('click', function () {
                        showBookingList(this.dataset.type);
                    });
                });
        });

    </script>

    <style>
        .dashboard-link {
            cursor: pointer;
        }

        .dashboard-link:hover {
            text-decoration: underline;
        }

        #checkOutDateTime:invalid::-webkit-datetime-edit {
            color: transparent;
        }

        #checkOutDateTime:focus::-webkit-datetime-edit {
            color: inherit;
        }
    </style>
</body>

</html>
