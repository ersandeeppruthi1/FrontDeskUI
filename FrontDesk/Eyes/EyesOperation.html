    <script>

        // Calculate doctor fee based on amount mapping
        function calculateDoctorFee(amount) {
            // Ensure numeric
            var a = parseFloat(amount) || 0;
            if (a === 10000) return 7000;
            if (a === 8000) return 5000;
            if (a === 5000) return 4000;
            return 0; // default
        }
        // Function to fetch data from the API
        async function fetchData() {
            const startDate1 = document.getElementById("startDate").value;
            const endDate1 = document.getElementById("endDate").value;

            let filterCondition = `doctorname = 'Eyes Operation' AND date >= '${startDate1}'`;
            filterCondition += ` AND date <= '${endDate1}'`;

            const data = await DBHandler.fetchEntityRecords(
                'frontdeskpatientrecord',
                'serialnumber,amount,patientname,age,gender,phone,doctorname,totaltest,paymentmethod,date,optiongroup',
                'createdon',
                'desc',
                filterCondition,
                true
            );

            patientCache = data;
            createTable();
        }

        // === Dropdown Handling ===
        function buildDoctorFilter(groupedData, prevSelected) {
            const doctorFilter = document.getElementById("DoctorFilter");
            doctorFilter.innerHTML = ""; // clear options

            // Add "All Doctors" first
            const allOption = document.createElement("option");
            allOption.value = "all";
            allOption.textContent = "All Doctors";
            doctorFilter.appendChild(allOption);

            // Add doctors from data
            Object.keys(groupedData).forEach(doctorName => {
                const opt = document.createElement("option");
                opt.value = doctorName;
                opt.textContent = doctorName;
                doctorFilter.appendChild(opt);
            });

            // Restore selection if possible
            if (doctorFilter.querySelector(`option[value="${prevSelected}"]`)) {
                doctorFilter.value = prevSelected;
            } else {
                doctorFilter.value = "all";
            }
        }

        // === Totals Section ===
        function buildTotalsSection(data) {
            const totalAmount = data.reduce((sum, e) => sum + (parseFloat(e.amount) || 0), 0);
            const totalPatients = data.length;

            const div = document.createElement("div");
            div.id = "totalAmountContainer";

            div.innerHTML = `
                <table class="table" style="">
                    <thead class="table-light">
                        <tr>
                            <th>Type</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Total Patients</td>
                            <td id="TotalPatients">${totalPatients}</td>
                        </tr>
                        <tr>
                            <td><b>Total Amount</b></td>
                            <td id="totalAmount"><b>${formatIndianCurrency(totalAmount)}</b></td>
                        </tr>
                    </tbody>
                </table>
            `;
            return div;
        }


        // === Table Rendering ===
        function buildDoctorTable(doctorName, appointments, idTable) {
            const wrapper = document.createElement("div");
            wrapper.className = "mt-4";
            wrapper.id = "tbl" + idTable;

            const title = document.createElement("div");
            title.textContent = doctorName;
            title.className = "mt-2 caption2";
            title.style.border = "1px solid black";
            title.style.padding = "8px";
            title.style.lineHeight = "20px";
            wrapper.appendChild(title);

            let cashTotal = 0;
            let onlineTotal = 0;
            let otherTotal = 0;
            let doctorTotal = 0;
            let totalAmount = 0;

            appointments.forEach(app => {
                const amount = parseFloat(app.amount) || 0;
                const paymentMethod = (app.paymentmethod || "").toLowerCase();
                totalAmount += amount;

                if (paymentMethod.includes("cash")) {
                    cashTotal += amount;
                } else if (paymentMethod.includes("online")) {
                    onlineTotal += amount;
                } else {
                    otherTotal += amount;
                }

                // compute doctor fee for this appointment and accumulate
                var docFee = calculateDoctorFee(amount);
                doctorTotal += docFee;
            });
            const summaryTable = document.createElement("table");
            summaryTable.className = "table";
            summaryTable.style.width = "100%";
            summaryTable.style.marginTop = "10px";
            summaryTable.innerHTML = `
                    <thead class="table-light">
                        <tr>
                            <th>Payment Type</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Cash</td>
                            <td>${formatIndianCurrency(cashTotal)}</td>
                        </tr>
                        <tr>
                            <td>Online</td>
                            <td>${formatIndianCurrency(onlineTotal)}</td>
                        </tr>
                        ${otherTotal > 0 ? `
                        <tr>
                            <td>Other</td>
                            <td>${formatIndianCurrency(otherTotal)}</td>
                        </tr>
                        ` : ""}
                        <tr>
                            <td style="font-weight:bold;">Total</td>
                            <td style="font-weight:bold;">${formatIndianCurrency(totalAmount)}</td>
                        </tr>
                        <tr>
                            <td>Doctor Fees</td>
                            <td>${formatIndianCurrency(doctorTotal)}</td>
                        </tr>
                        <tr>
                            <td style="font-weight:bold;">Remaining</td>
                            <td style="font-weight:bold;">${formatIndianCurrency(totalAmount - doctorTotal)}</td>
                        </tr>
                    </tbody>
                `;
            wrapper.appendChild(summaryTable);

            const detailTable = document.createElement("table");
            detailTable.className = "table";
            detailTable.style.width = "100%";
            detailTable.style.marginTop = "10px";

            const detailHeader = document.createElement("thead");
            detailHeader.innerHTML = `
                    <tr>
                        <th style="width:130px;">Date</th>
                        <th>Patient Name</th>
                        <th>Age</th>
                        <th>Amount</th>
                        <th>Doctor Value</th>
                    </tr>
                `;
            detailTable.appendChild(detailHeader);

            const detailBody = document.createElement("tbody");
            appointments.forEach(app => {
                const formattedDate = formatDateDisplay(app.date);
                const row = document.createElement("tr");
                var docVal = calculateDoctorFee(parseFloat(app.amount) || 0);
                row.innerHTML = `
                        <td>${formattedDate}</td>
                        <td>${app.patientname || ""}</td>
                        <td>${app.age || ""}</td>
                        <td>${formatIndianCurrency(parseFloat(app.amount) || 0)}</td>
                        <td>${formatIndianCurrency(docVal)}</td>
                    `;
                detailBody.appendChild(row);
            });

            const totalRow = document.createElement("tr");
            totalRow.innerHTML = `
                    <td colspan="3" style="font-weight:bold;text-align:right;padding-right:10px;">Total</td>
                    <td style="font-weight:bold;">${formatIndianCurrency(totalAmount)}</td>
                    <td style="font-weight:bold;">${formatIndianCurrency(doctorTotal)}</td>
                `;
            detailBody.appendChild(totalRow);

            detailTable.appendChild(detailBody);
            wrapper.appendChild(detailTable);

            return wrapper;
        }

        function createTable() {
            const data = patientCache || [];
            const container = document.getElementById("patienDetailInfoFull");
            container.innerHTML = ""; // reset

            const doctorFilter = document.getElementById("DoctorFilter");
            const prevSelected = doctorFilter ? doctorFilter.value : "All";

            if (!Array.isArray(data) || data.length === 0) {
                container.innerHTML = "<p>No records found.</p>";
                buildDoctorFilter({}, prevSelected);
                return;
            }

            // Group records by doctor
            const groupedData = {};
            data.forEach(item => {
                const doctor = item.doctorname || "Unknown Doctor";
                if (!groupedData[doctor]) groupedData[doctor] = [];
                groupedData[doctor].push(item);
            });

            buildDoctorFilter(groupedData, prevSelected);

            let filteredDoctors = groupedData;
            if (prevSelected && prevSelected !== "all") {
                filteredDoctors = { [prevSelected]: groupedData[prevSelected] || [] };
            }

            const totalsData = (prevSelected && prevSelected !== "all")
                ? filteredDoctors[prevSelected]
                : data;

            //container.appendChild(buildTotalsSection(totalsData));

            const tablesWrapper = document.createElement("div");
            tablesWrapper.classList.add("mt-3");

            let idTable = 0;
            Object.keys(filteredDoctors).forEach(doctorName => {
                idTable++;
                const table = buildDoctorTable(doctorName, filteredDoctors[doctorName], idTable);
                tablesWrapper.appendChild(table);
            });

            container.appendChild(tablesWrapper);
        }

        async function exportToCSVPatient() {
            if (!patientCache || patientCache.length === 0) {
                alert("No data available to export.");
                return;
            }

            const startDate1 = document.getElementById("startDate").value;
            const endDate1 = document.getElementById("endDate").value;

            let filterCondition = ` date >= '${startDate1}'`;
            filterCondition += ` AND date <= '${endDate1}'`;


            const data2 = await DBHandler.fetchEntityRecords(
                'frontdeskpatientrecord',
                'serialnumber,amount,patientname,age,gender,phone,doctorname,totaltest,paymentmethod,date,optiongroup',
                'createdon',
                'desc',
                filterCondition,
                true
            );

            patientCache = data2;

            // Define the header
            const headers = [
                "Date",
                "Doctor Name",
                "Patient Name",
                "Amount",
                "Payment Method",
                "Gender",
                "Option Group",
                "Phone",
                "Total Test",
                "Serial Number"
            ];

            // Build CSV rows
            const rows = patientCache.map(item => [
                formatDateDisplay(item.date), // Ensure date is formatted
                item.doctorname || "",
                item.patientname || "",
                item.amount || "", // ✅ Added amount
                item.paymentmethod || "",
                item.gender || "",
                item.optiongroup || "",
                item.phone || "",
                item.totaltest || "",
                item.serialnumber || ""
            ]);

            // Combine header + rows
            const csvContent = [headers.join(","), ...rows.map(r => r.map(val => `"${val}"`).join(","))].join("\n");

            // File name with date range
            const startDate = document.getElementById("startDate").value || "Start";
            const endDate = document.getElementById("endDate").value || "End";
            const fileName = `PatientReport_${startDate}_to_${endDate}.csv`;

            // Download CSV
            const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            link.click();
        }

        function exportTableToPdfPatientNew() {
            exportHtmlToPdf('patienDetailInfoFull');
        }

        function exportTableToPdfPatientNew1() {
            exportHtmlToPdf1('patienDetailInfoFull');
        }

        async function exportHtmlToPdf1(selector, fileName = "export.pdf") {
            const element = document.getElementById(selector);
            if (!element) {
                console.error("Element not found:", selector);
                return;
            }

            // Custom Table CSS (your requested style)
            const tableCSS = `
            <style>
                table {
                    width: 100%;
                    border-collapse: collapse;
                    font-size: 14px;
                }
                table th, table td {
                    border: 1px solid #000;
                    padding: 6px 8px;
                    text-align: left;
                    font-size: 16px;
                }
                table th {
                    background: #fff;       /* No color */
                    color: #000;            /* Black text */
                    font-size: 16px;        /* Bigger heading */
                    font-weight: bold;
                }
            </style>
        `;

            // Add CSS + element HTML
            const bodyHtml = tableCSS + element.outerHTML;
            // Prepare request payload
            const payload = {
                HeaderHTML: "",
                FooterHTML: "",
                BodyHTML: bodyHtml,
                DynamicProperties: {
                    Name: fileName.replace(".pdf", ""),
                    PageWidth: 210,
                    PageHeight: 297,
                    TopMargin: 10,
                    BottomMargin: 10,
                    LeftMargin: 10,
                    RightMargin: 10
                }
            };

            try {
                const response = await fetch("/api/ConvertPDF", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    alert("Failed to generate PDF: " + response.statusText);
                    return;
                }

                const blob = await response.blob();

                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = fileName;
                document.body.appendChild(link);
                link.click();

                document.body.removeChild(link);
                URL.revokeObjectURL(link.href);

            } catch (err) {
                console.error("Error:", err);
            }
        }




        function onDomLoaded() {
            const today = new Date();
            const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);

            $("#startDate").val(getDefaultValue('currentMonthStartDate'));
            $("#endDate").val(getDefaultValue('currentMonthEndDate'));
            $('#DoctorFilter').select2();
            fetchData();
        }

        $(document).ready(async () => {
            onDomLoaded();
        });

    </script>
