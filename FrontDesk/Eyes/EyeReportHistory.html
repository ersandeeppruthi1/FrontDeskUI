    <div class="page-wrap">
        <div class="search-card">
            <div class="row g-3 align-items-end">

                        Number</label>

                        placeholder="Type patient name, UHID, or phone number and press Enter">
                </div>
                <div class="col-md-4 col-lg-3 d-grid">
                    <button type="button" class="btn btn-primary" onclick="searchPatientDetails()" id="searchBtn">
                        <i class="fas fa-search me-1"></i> Search
                    </button>
                </div>
            </div>
            <div class="mt-2" id="searchStatus"></div>
        </div>

        <div id="searchResults" class="mt-3"></div>
    </div>

    <script>
        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function normalizeText(value) {
            return String(value || '').toLowerCase().trim().replace(/\s+/g, ' ');
        }

        function formatDate(value) {
            if (!value) return '-';
            const d = new Date(value);
            if (isNaN(d)) return escapeHtml(value);
            const day = ('0' + d.getDate()).slice(-2);
            const month = ('0' + (d.getMonth() + 1)).slice(-2);
            const year = d.getFullYear();
            return `${day}/${month}/${year}`;
        }

        function setStatus(text, type) {
            const el = document.getElementById('searchStatus');
            const className = type === 'error' ? 'text-danger' : (type === 'ok' ? 'text-success' : 'text-muted');
            el.className = className;
            el.textContent = text || '';
        }

        function extractMedicines(records) {
            const meds = new Set();
            records.forEach(r => {
                const raw = String(r.medication || '').trim();
                if (!raw) return;
                raw.split(/[,;\n|]+/).forEach(item => {
                    const med = item.trim();
                    if (med) meds.add(med);
                });
            });
            return Array.from(meds);
        }

        function groupByPatient(records) {
            const map = new Map();
            records.forEach(r => {
                const key = r.uhid || r.patientid || r.patientname;
                if (!map.has(key)) map.set(key, []);
                map.get(key).push(r);
            });
            return Array.from(map.values()).map(group =>
                group.sort((a, b) => new Date(b.examinationdate || b.modifiedon) - new Date(a.examinationdate || a.modifiedon))
            );
        }

        async function fetchEyeCheckupsBySearch(searchTerm) {
            const all = await DBHandler.fetchEntityRecords(
                'eyeexamination',
                'id,patientid,uhid,patientname,examinationdate,inspection,specprovided,specnumberrear,specnumberfar,operation,operationdate,medication,modifiedon',
                'modifiedon',
                'desc',
                '',
                true,
                0,
                ''
            );

            const normalizedSearch = normalizeText(searchTerm);
            const eyeRecords = all || [];

            const frontdeskAll = await DBHandler.fetchEntityRecords(
                'frontdeskpatientrecord',
                'patientid,phone',
                'createdon',
                'desc',
                '',
                true,
                0,
                ''
            );

            const matchingPatientIdsByPhone = new Set(
                (frontdeskAll || [])
                    .filter(r => normalizeText(r.phone).includes(normalizedSearch))
                    .map(r => normalizeText(r.patientid))
                    .filter(Boolean)
            );

            return eyeRecords.filter(r => {
                const patientName = normalizeText(r.patientname);
                const uhid = normalizeText(r.uhid);
                const patientId = normalizeText(r.patientid);

                return patientName.includes(normalizedSearch)
                    || uhid.includes(normalizedSearch)
                    || matchingPatientIdsByPhone.has(uhid)
                    || matchingPatientIdsByPhone.has(patientId);
            });
        }

        async function fetchFrontdeskHistory(uhid) {
            if (!uhid) return [];
            return await DBHandler.fetchEntityRecords(
                'frontdeskpatientrecord',
                'id,patientid,patientname,age,gender,phone,address,date,doctorname,amount,paymentmethod,totaltest,createdon',
                'createdon',
                'desc',
                `patientid='${String(uhid).replace(/'/g, "''")}'`,
                true,
                0,
                ''
            );
        }

        function renderPatientCard(eyeRecords, frontdeskRecords) {
            const latestEye = eyeRecords[0] || {};
            const latestFrontdesk = (frontdeskRecords || [])[0] || {};
            const visitCount = eyeRecords.length;
            const medicineList = extractMedicines(eyeRecords);
            const firstVisit = eyeRecords[eyeRecords.length - 1];
            const rawGender = normalizeText(latestFrontdesk.gender);
            const headerGender = rawGender === 'male' ? 'M' : (rawGender === 'female' ? 'F' : (latestFrontdesk.gender || '-'));
            const headerName = latestEye.patientname || latestFrontdesk.patientname || '-';
            const headerUhid = latestEye.uhid || latestFrontdesk.patientid || '-';
            const headerAge = latestFrontdesk.age || '-';
            const headerPhone = latestFrontdesk.phone || '-';

            const detailData = {
                'First Eye Checkup': formatDate(firstVisit ? firstVisit.examinationdate : ''),
                'Latest Eye Checkup': formatDate(latestEye.examinationdate)
            };

            const medicineHtml = medicineList.length
                ? medicineList.map(m => `<span class="med-chip">${escapeHtml(m)}</span>`).join('')
                : '<div class="empty-state">No medicine recorded for this patient.</div>';

            const frontdeskRows = (frontdeskRecords || []).map((r, idx) => `
                <tr>
                    <td>${idx + 1}</td>
                    <td>${formatDate(r.date)}</td>
                    <td>${escapeHtml(r.doctorname || '-')}</td>
                    <td>${escapeHtml(r.totaltest || '-')}</td>
                </tr>
            `).join('');

            const eyeRows = (eyeRecords || []).map((r, idx) => `
                <tr>
                    <td>${idx + 1}</td>
                    <td>${formatDate(r.examinationdate)}</td>
                    <td>${escapeHtml(r.inspection || '-')}</td>
                    <td>${escapeHtml(r.specprovided || '-')}</td>
                    <td>${escapeHtml(r.specnumberrear || '-')}</td>
                    <td>${escapeHtml(r.specnumberfar || '-')}</td>
                    <td>${escapeHtml(r.operation || '-')}</td>
                    <td>${formatDate(r.operationdate)}</td>
                    <td>${escapeHtml(r.medication || '-')}</td>
                </tr>
            `).join('');

            const detailBoxes = Object.keys(detailData).map(label => `
                <div class="detail-box">
                    <div class="label">${escapeHtml(label)}</div>
                    <div class="value">${escapeHtml(detailData[label])}</div>
                </div>
            `).join('');

            return `
                <div class="result-card">
                    <div class="result-header">
                        <div>
                            <div class="fw-bold">${escapeHtml(headerName)}</div>
                            <div class="small">UHID: ${escapeHtml(headerUhid)} | Gender: ${escapeHtml(headerGender)} | Age: ${escapeHtml(headerAge)}</div>
                        </div>
                        <span class="pill">Checked by eye doctor: ${visitCount} time(s)</span>
                    </div>

                    <div class="p-3">
                        <div class="section-title">Patient Details</div>
                        <div class="detail-grid">${detailBoxes}</div>

                        <div class="section-title mt-3">Medicines Provided</div>
                        <div class="med-list">${medicineHtml}</div>

                        <div class="section-title mt-3">Eye Checkup History</div>
                        <div class="table-responsive">
                            <table class="table table-bordered table-sm align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>#</th>
                                        <th>Date</th>
                                        <th>Inspection</th>
                                        <th>Spec Provided</th>
                                        <th>Spec Rear</th>
                                        <th>Spec Far</th>
                                        <th>Operation</th>
                                        <th>Operation Date</th>
                                        <th>Medication</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${eyeRows || '<tr><td colspan="9" class="text-center text-muted">No eye checkup history found.</td></tr>'}
                                </tbody>
                            </table>
                        </div>

                        <div class="section-title mt-3">Other Visit Details</div>
                        <div class="table-responsive">
                            <table class="table table-bordered table-sm align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>#</th>
                                        <th>Date</th>
                                        <th>Doctor/Department</th>
                                        <th>Test</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${frontdeskRows || '<tr><td colspan="4" class="text-center text-muted">No additional visit history found.</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderPatientAccordion(groupedPatients, patientDetailsList) {
            let html = '<div class="accordion" id="patientResultAccordion">';

            for (let i = 0; i < groupedPatients.length; i++) {
                const patientEyeRecords = groupedPatients[i];
                const frontdeskRecords = patientDetailsList[i] || [];
                const latestEye = patientEyeRecords[0] || {};
                const latestFrontdesk = frontdeskRecords[0] || {};

                const headerName = latestEye.patientname || latestFrontdesk.patientname || '-';
                const headerUhid = latestEye.uhid || latestFrontdesk.patientid || '-';
                const headerAge = latestFrontdesk.age || '-';
                const rawGender = normalizeText(latestFrontdesk.gender);
                const headerGender = rawGender === 'male' ? 'M' : (rawGender === 'female' ? 'F' : (latestFrontdesk.gender || '-'));
                const visitCount = patientEyeRecords.length;

                const headingId = `patientHeading_${i}`;
                const collapseId = `patientCollapse_${i}`;

                html += `
                    <div class="accordion-item mb-3 border rounded-3 overflow-hidden shadow-sm">
                        <h2 class="accordion-header" id="${headingId}">
                            <button class="accordion-button collapsed py-3" type="button" data-bs-toggle="collapse" data-bs-target="#${collapseId}" aria-expanded="false" aria-controls="${collapseId}" style="background: #f8fafc; color: #10243e;">
                                <div class="d-flex justify-content-between align-items-center w-100 me-3 flex-wrap gap-2">
                                    <div>
                                        <strong class="fs-5">${escapeHtml(headerName)}</strong> 
                                        <span class="text-muted ms-2 small">(UHID: ${escapeHtml(headerUhid)})</span>
                                    </div>
                                    <div class="small text-secondary">
                                        <span class="badge bg-secondary me-2">Gender: ${escapeHtml(headerGender)}</span>
                                        <span class="badge bg-secondary me-2">Age: ${escapeHtml(headerAge)}</span>
                                        <span class="badge bg-primary">Visits: ${visitCount}</span>
                                    </div>
                                </div>
                            </button>
                        </h2>
                        <div id="${collapseId}" class="accordion-collapse collapse" aria-labelledby="${headingId}" data-bs-parent="#patientResultAccordion">
                            <div class="accordion-body p-0">
                                ${renderPatientCard(patientEyeRecords, frontdeskRecords)}
                            </div>
                        </div>
                    </div>
                `;
            }

            html += '</div>';
            return html;
        }

        async function searchPatientDetails() {
            const input = document.getElementById('patientNameSearch');
            const searchTerm = input.value.trim();
            const resultsEl = document.getElementById('searchResults');
            const searchBtn = document.getElementById('searchBtn');

            if (!searchTerm) {
                setStatus('Please enter patient name, UHID, or phone number.', 'error');
                resultsEl.innerHTML = '';
                input.focus();
                return;
            }

            searchBtn.disabled = true;
            setStatus('Searching patient records...', '');
            resultsEl.innerHTML = '';

            try {
                const eyeRecords = await fetchEyeCheckupsBySearch(searchTerm);

                if (!eyeRecords.length) {
                    setStatus('No patient found for the entered name, UHID, or phone number.', 'error');
                    resultsEl.innerHTML = '<div class="empty-state">No matching eye checkup data found.</div>';
                    return;
                }

                const groupedPatients = groupByPatient(eyeRecords);
                let html = "";

                // Load all patient histories together
                const patientDetailsList = await Promise.all(
                    groupedPatients.map(group =>
                        fetchFrontdeskHistory(group[0].uhid)
                    )
                );

                // FIX: Check if the SAME NAME exists across DIFFERENT patients (UHIDs)
                const patientNameMap = {};
                groupedPatients.forEach(group => {
                    const name = normalizeText(group[0].patientname);
                    const uhid = normalizeText(group[0].uhid);
                    
                    if (!patientNameMap[name]) {
                        patientNameMap[name] = new Set();
                    }
                    patientNameMap[name].add(uhid); // Keeps track of unique individuals with this name
                });

                // Trigger accordion only if a name maps to more than 1 unique UHID
                const hasSameName = Object.values(patientNameMap).some(uhidSet => uhidSet.size > 1);

                if (hasSameName) {
                    // Show accordion format for duplicate names
                    html = renderPatientAccordion(groupedPatients, patientDetailsList);
                } else {
                    // Show normal flat cards for unique patients
                    groupedPatients.forEach((group, index) => {
                        html += renderPatientCard(group, patientDetailsList[index]);
                    });
                }

                setStatus(`Found ${groupedPatients.length} patient(s).`, "ok");
                resultsEl.innerHTML = html;
            } catch (error) {
                console.error('Search error', error);
                setStatus('Unable to fetch records. Please try again.', 'error');
                resultsEl.innerHTML = '<div class="empty-state">Error while loading data.</div>';
            } finally {
                searchBtn.disabled = false;
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            const input = document.getElementById('patientNameSearch');
            input.addEventListener('keydown', function (event) {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    searchPatientDetails();
                }
            });
        });
    </script>
</body>

        }
        .pat-card-btn:hover { background: #f6f9fe; }
        .pat-card.is-open .pat-card-btn { background: #f0f5fd; }

        /* Avatar */
        .acc-avatar {
            width: 46px; height: 46px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0f4c81, #1b6ca8);
            color: #fff;
            font-weight: 800; font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 3px 8px rgba(27,108,168,0.35);
            letter-spacing: 0.5px;
        }
        .pat-card:nth-child(2) .acc-avatar { background: linear-gradient(135deg,#145e38,#198754); box-shadow:0 3px 8px rgba(25,135,84,0.35); }
        .pat-card:nth-child(3) .acc-avatar { background: linear-gradient(135deg,#9b1221,#dc3545); box-shadow:0 3px 8px rgba(220,53,69,0.35); }
        .pat-card:nth-child(4) .acc-avatar { background: linear-gradient(135deg,#b85500,#fd7e14); box-shadow:0 3px 8px rgba(253,126,20,0.35); }
        .pat-card:nth-child(5) .acc-avatar { background: linear-gradient(135deg,#4a2c8a,#6f42c1); box-shadow:0 3px 8px rgba(111,66,193,0.35); }
        .pat-card:nth-child(6) .acc-avatar { background: linear-gradient(135deg,#0895b0,#0dcaf0); box-shadow:0 3px 8px rgba(13,202,240,0.35); }

        /* Info block */
        .acc-serial {
            font-size: 10px; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase;
            color: #8fa6c2; margin-bottom: 2px;
        }
        .acc-name {
            font-size: 15px; font-weight: 700;
            color: #10243e; line-height: 1.2;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            max-width: 340px;
        }
        .acc-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
        .acc-tag {
            background: #f0f4fa;
            border: 1px solid #dbe4f0;
            border-radius: 999px;
            padding: 3px 10px;
            font-size: 11.5px; color: #3a5472; font-weight: 500;
            display: inline-flex; align-items: center; gap: 4px;
        }
        .acc-tag i { font-size: 10px; color: #1b6ca8; }
        .pat-card:nth-child(2) .acc-tag i { color: #198754; }
        .pat-card:nth-child(3) .acc-tag i { color: #dc3545; }
        .pat-card:nth-child(4) .acc-tag i { color: #fd7e14; }
        .pat-card:nth-child(5) .acc-tag i { color: #6f42c1; }
        .pat-card:nth-child(6) .acc-tag i { color: #0dcaf0; }

        /* Right side */
        .acc-right {
            margin-left: auto;
            display: flex; flex-direction: column;
            align-items: flex-end; gap: 8px; flex-shrink: 0;
        }
        .acc-visits-badge {
            background: linear-gradient(135deg,#0f4c81,#1b6ca8);
            color: #fff; border-radius: 999px;
            padding: 5px 13px; font-size: 12px; font-weight: 700;
            display: inline-flex; align-items: center; gap: 5px;
            box-shadow: 0 2px 6px rgba(27,108,168,0.3);
        }
        .pat-card:nth-child(2) .acc-visits-badge { background: linear-gradient(135deg,#145e38,#198754); box-shadow:0 2px 6px rgba(25,135,84,0.3); }
        .pat-card:nth-child(3) .acc-visits-badge { background: linear-gradient(135deg,#9b1221,#dc3545); box-shadow:0 2px 6px rgba(220,53,69,0.3); }
        .pat-card:nth-child(4) .acc-visits-badge { background: linear-gradient(135deg,#b85500,#fd7e14); box-shadow:0 2px 6px rgba(253,126,20,0.3); }
        .pat-card:nth-child(5) .acc-visits-badge { background: linear-gradient(135deg,#4a2c8a,#6f42c1); box-shadow:0 2px 6px rgba(111,66,193,0.3); }
        .pat-card:nth-child(6) .acc-visits-badge { background: linear-gradient(135deg,#0895b0,#0dcaf0); box-shadow:0 2px 6px rgba(13,202,240,0.3); }
        .acc-chevron {
            width: 30px; height: 30px; border-radius: 50%;
            border: 1.5px solid #d0daea;
            background: #f4f7fc;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.25s, background 0.2s, border-color 0.2s;
            color: #1b6ca8; font-size: 12px;
        }
        .pat-card.is-open .acc-chevron {
            transform: rotate(180deg);
            background: #1b6ca8; border-color: #1b6ca8; color: #fff;
        }
        .pat-card:nth-child(2).is-open .acc-chevron { background:#198754; border-color:#198754; }
        .pat-card:nth-child(3).is-open .acc-chevron { background:#dc3545; border-color:#dc3545; }
        .pat-card:nth-child(4).is-open .acc-chevron { background:#fd7e14; border-color:#fd7e14; }
        .pat-card:nth-child(5).is-open .acc-chevron { background:#6f42c1; border-color:#6f42c1; }
        .pat-card:nth-child(6).is-open .acc-chevron { background:#0dcaf0; border-color:#0dcaf0; }

        /* Body */
        .pat-card-body { display: none; border-top: 1px solid #e8edf5; }
        .pat-card.is-open .pat-card-body { display: block; }

        .patient-banner {
            background: linear-gradient(90deg, #0f4c81 0%, #1b6ca8 100%);
            color: #fff; padding: 12px 18px;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 10px;
        }
        .pat-card:nth-child(2) .patient-banner { background: linear-gradient(90deg,#145e38,#198754); }
        .pat-card:nth-child(3) .patient-banner { background: linear-gradient(90deg,#9b1221,#dc3545); }
        .pat-card:nth-child(4) .patient-banner { background: linear-gradient(90deg,#b85500,#fd7e14); }
        .pat-card:nth-child(5) .patient-banner { background: linear-gradient(90deg,#4a2c8a,#6f42c1); }
        .pat-card:nth-child(6) .patient-banner { background: linear-gradient(90deg,#0895b0,#0dcaf0); }
        .patient-banner .pill {
            background: rgba(255,255,255,0.2);
            border-radius: 999px; padding: 4px 12px; font-size: 12px;
        }

        @media (max-width: 992px) {
            .detail-grid {
                grid-template-columns: repeat(2, minmax(160px, 1fr));
            }
        }

        @media (max-width: 576px) {
            .detail-grid {
                grid-template-columns: 1fr;
            }

            .result-header {
                align-items: flex-start;
            }
        }
    </style>

    <div class="page-wrap">
        <div class="search-card">
            <div class="row g-3 align-items-end">
                <div class="col-md-8 col-lg-9">
                    <label for="patientNameSearch" class="form-label fw-bold">Search Patient Name / UHID / Phone Number</label>
                    <input type="text" class="form-control" id="patientNameSearch" placeholder="Type patient name, UHID, or phone number and press Enter">
                </div>
                <div class="col-md-4 col-lg-3 d-grid">
                    <button type="button" class="btn btn-primary" onclick="searchPatientDetails()" id="searchBtn">
                        <i class="fas fa-search me-1"></i> Search
                    </button>
                </div>
            </div>
            <div class="mt-2" id="searchStatus"></div>
        </div>

        <div id="searchResults" class="mt-3"></div>
    </div>

    <script>
        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function normalizeText(value) {
            return String(value || '').toLowerCase().trim().replace(/\s+/g, ' ');
        }

        function formatDate(value) {
            if (!value) return '-';
            const d = new Date(value);
            if (isNaN(d)) return escapeHtml(value);
            const day = ('0' + d.getDate()).slice(-2);
            const month = ('0' + (d.getMonth() + 1)).slice(-2);
            const year = d.getFullYear();
            return `${day}/${month}/${year}`;
        }

        function setStatus(text, type) {
            const el = document.getElementById('searchStatus');
            const className = type === 'error' ? 'text-danger' : (type === 'ok' ? 'text-success' : 'text-muted');
            el.className = className;
            el.textContent = text || '';
        }

        function extractMedicines(records) {
            const meds = new Set();
            records.forEach(r => {
                const raw = String(r.medication || '').trim();
                if (!raw) return;
                raw.split(/[,;\n|]+/).forEach(item => {
                    const med = item.trim();
                    if (med) meds.add(med);
                });
            });
            return Array.from(meds);
        }

        function groupByPatient(records) {
            const map = new Map();
            records.forEach(r => {
                const key = r.uhid || r.patientid || r.patientname;
                if (!map.has(key)) map.set(key, []);
                map.get(key).push(r);
            });
            return Array.from(map.values()).map(group =>
                group.sort((a, b) => new Date(b.examinationdate || b.modifiedon) - new Date(a.examinationdate || a.modifiedon))
            );
        }

        async function fetchEyeCheckupsBySearch(searchTerm) {
            const all = await DBHandler.fetchEntityRecords(
                'eyeexamination',
                'id,patientid,uhid,patientname,examinationdate,inspection,specprovided,specnumberrear,specnumberfar,operation,operationdate,medication,modifiedon',
                'modifiedon',
                'desc',
                '',
                true,
                0,
                ''
            );

            const normalizedSearch = normalizeText(searchTerm);
            const eyeRecords = all || [];

            const frontdeskAll = await DBHandler.fetchEntityRecords(
                'frontdeskpatientrecord',
                'patientid,phone',
                'createdon',
                'desc',
                '',
                true,
                0,
                ''
            );

            const matchingPatientIdsByPhone = new Set(
                (frontdeskAll || [])
                    .filter(r => normalizeText(r.phone).includes(normalizedSearch))
                    .map(r => normalizeText(r.patientid))
                    .filter(Boolean)
            );

            return eyeRecords.filter(r => {
                const patientName = normalizeText(r.patientname);
                const uhid = normalizeText(r.uhid);
                const patientId = normalizeText(r.patientid);

                return patientName.includes(normalizedSearch)
                    || uhid.includes(normalizedSearch)
                    || matchingPatientIdsByPhone.has(uhid)
                    || matchingPatientIdsByPhone.has(patientId);
            });
        }

        async function fetchFrontdeskHistory(uhid) {
            if (!uhid) return [];
            return await DBHandler.fetchEntityRecords(
                'frontdeskpatientrecord',
                'id,patientid,patientname,age,gender,phone,address,date,doctorname,amount,paymentmethod,totaltest,createdon',
                'createdon',
                'desc',
                `patientid='${String(uhid).replace(/'/g, "''")}'`,
                true,
                0,
                ''
            );
        }

        // Modified to accept an optional flag to drop margins inside an accordion panel
        function renderPatientCard(eyeRecords, frontdeskRecords, isInsideAccordion = false) {
            const latestEye = eyeRecords[0] || {};
            const latestFrontdesk = (frontdeskRecords || [])[0] || {};
            const visitCount = eyeRecords.length;
            const medicineList = extractMedicines(eyeRecords);
            const firstVisit = eyeRecords[eyeRecords.length - 1];
            const rawGender = normalizeText(latestFrontdesk.gender);
            const headerGender = rawGender === 'male' ? 'M' : (rawGender === 'female' ? 'F' : (latestFrontdesk.gender || '-'));
            const headerName = latestEye.patientname || latestFrontdesk.patientname || '-';
            const headerUhid = latestEye.uhid || latestFrontdesk.patientid || '-';
            const headerAge = latestFrontdesk.age || '-';

            const detailData = {
                'First Eye Checkup': formatDate(firstVisit ? firstVisit.examinationdate : ''),
                'Latest Eye Checkup': formatDate(latestEye.examinationdate)
            };

            const medicineHtml = medicineList.length
                ? medicineList.map(m => `<span class="med-chip">${escapeHtml(m)}</span>`).join('')
                : '<div class="empty-state">No medicine recorded for this patient.</div>';

            const frontdeskRows = (frontdeskRecords || []).map((r, idx) => `
                <tr>
                    <td>${idx + 1}</td>
                    <td>${formatDate(r.date)}</td>
                    <td>${escapeHtml(r.doctorname || '-')}</td>
                    <td>${escapeHtml(r.totaltest || '-')}</td>
                </tr>
            `).join('');

            const eyeRows = (eyeRecords || []).map((r, idx) => `
                <tr>
                    <td>${idx + 1}</td>
                    <td>${formatDate(r.examinationdate)}</td>
                    <td>${escapeHtml(r.inspection || '-')}</td>
                    <td>${escapeHtml(r.specprovided || '-')}</td>
                    <td>${escapeHtml(r.specnumberrear || '-')}</td>
                    <td>${escapeHtml(r.specnumberfar || '-')}</td>
                    <td>${escapeHtml(r.operation || '-')}</td>
                    <td>${formatDate(r.operationdate)}</td>
                    <td>${escapeHtml(r.medication || '-')}</td>
                </tr>
            `).join('');

            const detailBoxes = Object.keys(detailData).map(label => `
                <div class="detail-box">
                    <div class="label">${escapeHtml(label)}</div>
                    <div class="value">${escapeHtml(detailData[label])}</div>
                </div>
            `).join('');

            // If it's loaded inside an accordion, strip the outer styling box so CSS doesn't collide
            const cardStyleClass = isInsideAccordion ? "" : "result-card";

            return `
                <div class="${cardStyleClass}">
                    ${isInsideAccordion ? '' : `
                    <div class="result-header">
                        <div>
                            <div class="fw-bold">${escapeHtml(headerName)}</div>
                            <div class="small">UHID: ${escapeHtml(headerUhid)} | Gender: ${escapeHtml(headerGender)} | Age: ${escapeHtml(headerAge)}</div>
                        </div>
                        <span class="pill">Checked by eye doctor: ${visitCount} time(s)</span>
                    </div>
                    `}

                    <div class="p-3">
                        <div class="section-title">Patient Details</div>
                        <div class="detail-grid">${detailBoxes}</div>

                        <div class="section-title mt-3">Medicines Provided</div>
                        <div class="med-list">${medicineHtml}</div>

                        <div class="section-title mt-3">Eye Checkup History</div>
                        <div class="table-responsive">
                            <table class="table table-bordered table-sm align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>#</th>
                                        <th>Date</th>
                                        <th>Inspection</th>
                                        <th>Spec Provided</th>
                                        <th>Spec Rear</th>
                                        <th>Spec Far</th>
                                        <th>Operation</th>
                                        <th>Operation Date</th>
                                        <th>Medication</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${eyeRows || '<tr><td colspan="9" class="text-center text-muted">No eye checkup history found.</td></tr>'}
                                </tbody>
                            </table>
                        </div>

                        <div class="section-title mt-3">Other Visit Details</div>
                        <div class="table-responsive">
                            <table class="table table-bordered table-sm align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>#</th>
                                        <th>Date</th>
                                        <th>Doctor/Department</th>
                                        <th>Test</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${frontdeskRows || '<tr><td colspan="4" class="text-center text-muted">No additional visit history found.</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderPatientAccordion(groupedPatients, patientDetailsList) {
            let html = '<div id="patientResultAccordion">';

            for (let i = 0; i < groupedPatients.length; i++) {
                const patientEyeRecords = groupedPatients[i];
                const frontdeskRecords = patientDetailsList[i] || [];
                const latestEye = patientEyeRecords[0] || {};
                const latestFrontdesk = frontdeskRecords[0] || {};

                const headerName = latestEye.patientname || latestFrontdesk.patientname || '-';
                const headerUhid = latestEye.uhid || latestFrontdesk.patientid || '-';
                const headerAge = latestFrontdesk.age || '-';
                const headerPhone = latestFrontdesk.phone || '-';
                const rawGender = normalizeText(latestFrontdesk.gender);
                const headerGender = rawGender === 'male' ? 'Male' : (rawGender === 'female' ? 'Female' : (latestFrontdesk.gender || '-'));
                const visitCount = patientEyeRecords.length;
                const lastVisit = formatDate(patientEyeRecords[0]?.examinationdate);

                const collapseId = `patientCollapse_${i}`;
                const initials = headerName.split(' ').filter(Boolean).map(w => w[0]).join('').toUpperCase().slice(0, 2) || '?';

                html += `
                    <div class="pat-card" id="patCard_${i}">
                        <div class="pat-card-accent"></div>
                        <button class="pat-card-btn" type="button"
                            onclick="togglePatCard('patCard_${i}', '${collapseId}')"
                            aria-expanded="false" aria-controls="${collapseId}">
                            <div class="acc-avatar" style="pointer-events:none;">${escapeHtml(initials)}</div>
                            <div class="flex-grow-1 overflow-hidden" style="pointer-events:none;">
                                <div class="acc-serial">Patient ${i + 1} of ${groupedPatients.length}</div>
                                <div class="acc-name">${escapeHtml(headerName)}</div>
                                <div class="acc-meta">
                                    <span class="acc-tag"><i class="fas fa-id-card"></i>${escapeHtml(headerUhid)}</span>
                                    <span class="acc-tag"><i class="fas fa-${rawGender === 'male' ? 'mars' : rawGender === 'female' ? 'venus' : 'user'}"></i>${escapeHtml(headerGender)}, ${escapeHtml(headerAge)} yrs</span>
                                    <span class="acc-tag"><i class="fas fa-phone"></i>${escapeHtml(headerPhone)}</span>
                                    <span class="acc-tag"><i class="fas fa-calendar-check"></i>Last: ${escapeHtml(lastVisit)}</span>
                                </div>
                            </div>
                            <div class="acc-right" style="pointer-events:none;">
                                <span class="acc-visits-badge"><i class="fas fa-eye"></i>${visitCount} Visit${visitCount !== 1 ? 's' : ''}</span>
                                <div class="acc-chevron"><i class="fas fa-chevron-down"></i></div>
                            </div>
                        </button>
                        <div class="pat-card-body" id="${collapseId}">
                            <div class="patient-banner">
                                <div>
                                    <div class="fw-bold">${escapeHtml(headerName)}</div>
                                    <div class="small opacity-75 mt-1">
                                        UHID: ${escapeHtml(headerUhid)} &nbsp;&bull;&nbsp;
                                        ${escapeHtml(headerGender)}, ${escapeHtml(headerAge)} yrs &nbsp;&bull;&nbsp;
                                        <i class="fas fa-phone me-1"></i>${escapeHtml(headerPhone)}
                                    </div>
                                </div>
                                <span class="pill"><i class="fas fa-eye me-1"></i>Eye Visits: ${visitCount}</span>
                            </div>
                            ${renderPatientCard(patientEyeRecords, frontdeskRecords, true)}
                        </div>
                    </div>
                `;
            }

            html += '</div>';
            return html;
        }

        async function searchPatientDetails() {
            const input = document.getElementById('patientNameSearch');
            const searchTerm = input.value.trim();
            const resultsEl = document.getElementById('searchResults');
            const searchBtn = document.getElementById('searchBtn');

            if (!searchTerm) {
                setStatus('Please enter patient name, UHID, or phone number.', 'error');
                resultsEl.innerHTML = '';
                input.focus();
                return;
            }

            searchBtn.disabled = true;
            setStatus('Searching patient records...', '');
            resultsEl.innerHTML = '';

            try {
                const eyeRecords = await fetchEyeCheckupsBySearch(searchTerm);

                if (!eyeRecords.length) {
                    setStatus('No patient found for the entered name, UHID, or phone number.', 'error');
                    resultsEl.innerHTML = '<div class="empty-state">No matching eye checkup data found.</div>';
                    return;
                }

                const groupedPatients = groupByPatient(eyeRecords);
                let html = "";

            const patientDetailsList = await Promise.all(
                    groupedPatients.map(group =>
                        fetchFrontdeskHistory(group[0].uhid)
                    )
                );

                // ==========================================
                // FOOLPROOF DUPLICATE NAME DETECTION LOGIC
                // ==========================================
                const uniquePatientsByNameMap = {};

                groupedPatients.forEach((group, index) => {
                    const latestEye = group[0] || {};
                    const latestFrontdesk = (patientDetailsList[index] || [])[0] || {};
                    
                    // Fallback names exactly like the headers do, then normalize completely
                    const rawName = latestEye.patientname || latestFrontdesk.patientname || '';
                    const cleanName = normalizeText(rawName);
                    
                    // Fallback UHID exactly like the headers do
                    const rawUhid = latestEye.uhid || latestFrontdesk.patientid || `unknown_${index}`;
                    const cleanUhid = normalizeText(rawUhid);

                    if (cleanName) {
                        if (!uniquePatientsByNameMap[cleanName]) {
                            uniquePatientsByNameMap[cleanName] = new Set();
                        }
                        // Add this unique medical ID to this name bucket
                        uniquePatientsByNameMap[cleanName].add(cleanUhid);
                    }
                });

                // Check if ANY group of names maps to more than 1 distinct patient ID
                let hasSameName = false;
                for (const nameKey in uniquePatientsByNameMap) {
                    if (uniquePatientsByNameMap[nameKey].size > 1) {
                        hasSameName = true;
                        break;
                    }
                }
                // ==========================================

                if (groupedPatients.length > 1) {
                    // Show accordion format whenever multiple patients are found
                    html = renderPatientAccordion(groupedPatients, patientDetailsList);
                } else {
                    // Single patient — show flat card
                    groupedPatients.forEach((group, index) => {
                        html += renderPatientCard(group, patientDetailsList[index], false);
                    });
                }

                setStatus(`Found ${groupedPatients.length} patient(s).`, "ok");
                resultsEl.innerHTML = html;

            } catch (error) {
                console.error('Search error', error);
                setStatus('Unable to fetch records. Please try again.', 'error');
                resultsEl.innerHTML = '<div class="empty-state">Error while loading data.</div>';
            } finally {
                searchBtn.disabled = false;
            }
        }

        function togglePatCard(cardId, collapseId) {
            const card = document.getElementById(cardId);
            const body = document.getElementById(collapseId);
            if (!card || !body) return;

            const isOpen = card.classList.contains('is-open');

            // Close all
            document.querySelectorAll('#patientResultAccordion .pat-card.is-open').forEach(c => {
                c.classList.remove('is-open');
            });

            // Open if was closed
            if (!isOpen) card.classList.add('is-open');
        }

        function toggleAccordion(collapseId, btn) {
            const accordion = document.getElementById('patientResultAccordion');
            const target = document.getElementById(collapseId);
            if (!accordion || !target) return;

            const isOpen = target.classList.contains('show');

            // Close all panels
            accordion.querySelectorAll('.accordion-collapse.show').forEach(el => {
                el.classList.remove('show');
            });
            accordion.querySelectorAll('.accordion-button').forEach(b => {
                b.classList.add('collapsed');
                b.setAttribute('aria-expanded', 'false');
            });

            // Open clicked if it was closed
            if (!isOpen) {
                target.classList.add('show');
                btn.classList.remove('collapsed');
                btn.setAttribute('aria-expanded', 'true');
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            const input = document.getElementById('patientNameSearch');
            input.addEventListener('keydown', function (event) {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    searchPatientDetails();
                }
            });
        });
    </script>
