    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-grids/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-buttons/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-popups/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-richtexteditor/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-navigations/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-dropdowns/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-lists/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-inputs/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-calendars/styles/bootstrap5.css" rel="stylesheet">
    <link href="https://cdn.syncfusion.com/ej2/32.1.19/ej2-notifications/styles/bootstrap5.css" rel="stylesheet">

</head>

<body>

    <div class="container2 mt-4">
        <div id="menuGrid"></div>
    </div>

    <div class="modal fade" id="menuModal" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-centered">

            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Add Menu Item</h5>
                    <button type="button" class="close" data-bs-dismiss="modal">
                        <span>&times;</span>
                    </button>
                </div>

                <div class="modal-body">

                    <form id="menuForm">

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label>User</label>
                                <input id="menu_user" type="text" class="form-control" />
                            </div>

                            <div class="col-md-6">
                                <label>Web Resource (Optional)</label>
                                <input id="menu_webresource" type="text" class="form-control" />
                            </div>

                            <div class="col-md-6">
                                <label>Name</label>
                                <input type="text" id="menu_name" class="form-control" required>
                            </div>

                            <div class="col-md-6">
                                <label>Parent Menu</label>
                                <input type="text" id="menu_parent" class="form-control">
                            </div>

                            <div class="col-md-6">
                                <label>Link</label>
                                <input type="text" id="menu_link" class="form-control">
                            </div>

                            <div class="col-md-6">
                                <label>Sort Order</label>
                                <input type="number" id="menu_sort" class="form-control">
                            </div>

                        </div>

                    </form>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-primary" onclick="saveMenu()">Save</button>
                    <button class="btn btn-success" onclick="saveAndNew()">Save and New</button>
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>

            </div>
        </div>
    </div>

    <script>

        let menuGrid;
        let editingMenuId = null;

        let parentDropdown;
        let userDropdown;
        let webResourceDropdown;

        let usersData = [];
        let webResourcesData = [];
        let sortOrderCache = {}; // Cache for sort order data by user and parent

        async function initMenuGrid() {

            ej.grids.Grid.Inject(
                ej.grids.Page,
                ej.grids.Sort,
                ej.grids.Filter,
                ej.grids.Toolbar,
                ej.grids.ExcelExport,
                ej.grids.PdfExport,
                ej.grids.ColumnChooser
            );

            menuGrid = new ej.grids.Grid({

                dataSource: [],
                allowPaging: true,
                allowSorting: true,
                allowFiltering: true,
                allowExcelExport: true,
                allowPdfExport: true,
                filterSettings: { type: 'Excel' },
                showColumnChooser: true,

                toolbar: [
                    'Search',
                    'ColumnChooser',
                    { prefixIcon: 'e-icons e-excelexport', tooltipText: 'Export Excel', id: 'excelExport' },
                    { prefixIcon: 'e-icons e-pdfexport', tooltipText: 'Export PDF', id: 'pdfExport' },
                    { prefixIcon: 'e-icons e-refresh', tooltipText: 'Refresh', id: 'refreshGrid' },
                    { text: 'New Menu', prefixIcon: 'e-icons e-plus', id: 'newMenu' },
                    { text: 'Edit', prefixIcon: 'e-icons e-edit', id: 'editMenu' },
                    { text: 'Delete', prefixIcon: 'e-icons e-delete', id: 'deleteMenu' }
                ],

                columns: [
                    { type: 'checkbox', width: 50 },
                    { field: 'name', headerText: 'Menu Name', width: 200 },
                    { field: 'username', headerText: 'User Name', width: 150 },
                    { field: 'parentname', headerText: 'Parent Menu', width: 200 },
                    { field: 'link', headerText: 'Link', width: 200 },
                    { field: 'sortorder', headerText: 'Order', width: 100 },
                    { field: 'createdon', headerText: 'Created On', type: 'date', format: { type: 'dateTime', format: 'dd/MMM/yyyy hh:mm' }, width: 160, visible: false },
                    { field: 'modifiedon', headerText: 'Modified On', type: 'date', format: { type: 'dateTime', format: 'dd/MMM/yyyy hh:mm' }, width: 160, visible: false }
                ],

                toolbarClick: async function (args) {

                    if (args.item.id === 'excelExport') {
                        menuGrid.excelExport({ fileName: `Menus_${Date.now()}.xlsx`, exportType: 'AllPages' });
                    }

                    if (args.item.id === 'pdfExport') {
                        menuGrid.pdfExport({ fileName: `Menus_${Date.now()}.pdf`, pageOrientation: 'Landscape' });
                    }

                    if (args.item.id === 'refreshGrid') {
                        loadMenus();
                    }

                    if (args.item.id === 'newMenu') {
                        openMenuModal();
                    }

                    if (args.item.id === 'editMenu') {
                        editMenu();
                    }

                    if (args.item.id === 'deleteMenu') {
                        deleteMenu();
                    }

                }

            });

            menuGrid.appendTo('#menuGrid');

            await loadMenus();
            await loadUsers();
            await loadWebResources();
        }

        async function loadUsers() {

            usersData = await DBHandler.fetchEntityRecords(
                'users',
                'id,username',
                'username',
                'asc',
                'isdeleted = 0',
                false,
                0
            ) || [];

        }

        async function loadWebResources() {

            webResourcesData = await DBHandler.fetchEntityRecords(
                'webresource',
                'id,name,resourcetype',
                'name',
                'asc',
                'isactive = 1',
                false,
                0
            ) || [];

        }

        async function loadSortOrderCache(userId) {
            // Load all menu items for the user to cache sort order data
            const menuItems = await DBHandler.fetchEntityRecords(
                'menuitem',
                'id,sortorder,parentmenuid',
                'sortorder',
                'desc',
                `userid = '${userId}'`,
                false,
                0
            ) || [];

            // Initialize cache for this user
            sortOrderCache[userId] = {
                maxWithoutParent: 0,
                maxByParent: {}
            };

            // Process menu items to find max sort orders
            menuItems.forEach(item => {
                const sortOrder = parseInt(item.sortorder) || 0;
                
                if (!item.parentmenuid) {
                    // Items without parent
                    if (sortOrder > sortOrderCache[userId].maxWithoutParent) {
                        sortOrderCache[userId].maxWithoutParent = sortOrder;
                    }
                } else {
                    // Items with parent
                    const parentId = item.parentmenuid;
                    if (!sortOrderCache[userId].maxByParent[parentId] || 
                        sortOrder > sortOrderCache[userId].maxByParent[parentId]) {
                        sortOrderCache[userId].maxByParent[parentId] = sortOrder;
                    }
                }
            });
        }

        function getNextSortOrder(userId, parentId) {
            if (!sortOrderCache[userId]) {
                return 1; // Default if cache not loaded
            }

            if (!parentId) {
                // No parent - use max without parent + 1
                return sortOrderCache[userId].maxWithoutParent + 1;
            } else {
                // Has parent - use max for that parent + 1
                return (sortOrderCache[userId].maxByParent[parentId] || 0) + 1;
            }
        }

        function updateSortOrderCache(userId, parentId, newSortOrder) {
            if (!sortOrderCache[userId]) {
                sortOrderCache[userId] = {
                    maxWithoutParent: 0,
                    maxByParent: {}
                };
            }

            if (!parentId) {
                if (newSortOrder > sortOrderCache[userId].maxWithoutParent) {
                    sortOrderCache[userId].maxWithoutParent = newSortOrder;
                }
            } else {
                if (!sortOrderCache[userId].maxByParent[parentId] || 
                    newSortOrder > sortOrderCache[userId].maxByParent[parentId]) {
                    sortOrderCache[userId].maxByParent[parentId] = newSortOrder;
                }
            }
        }

        async function loadParentMenus(userId) {

            DBHandler.fetchEntityRecords(
                'menuitem',
                'id,name',
                'name',
                'asc',
                `userid = '${userId}'`,
                false,
                0
            ).then(parentMenus => {
                parentDropdown.dataSource = parentMenus || [];
                parentDropdown.dataBind();
            });

        }

        async function loadMenus() {

            const joinCondition =
                "LEFT JOIN menuitem parent ON parent.id = menuitem.parentmenuid " +
                "LEFT JOIN users ON users.id = menuitem.userid";

            const data = await DBHandler.fetchEntityRecords(
                'menuitem',
                'menuitem.*, parent.name as parentname, users.username',
                'menuitem.modifiedon',
                'desc',
                '',
                true,
                0,
                joinCondition
            );

            menuGrid.dataSource = data || [];

        }

        function openMenuModal() {

            editingMenuId = null;

            document.getElementById('menuForm').reset();

            if (parentDropdown) parentDropdown.destroy();
            if (userDropdown) userDropdown.destroy();
            if (webResourceDropdown) webResourceDropdown.destroy();

            const modal = new bootstrap.Modal(menuModal, { focus: false });
            modal.show();

            ej.base.enableRipple(true);

            userDropdown = new ej.dropdowns.DropDownList({

                dataSource: usersData,
                fields: { text: 'username', value: 'id' },
                placeholder: 'Select User',
                allowFiltering: true,
                filterBarPlaceholder: 'Search User...',

                change: function (args) {

                    if (args.value) {
                        loadParentMenus(args.value);
                        // Load sort order cache for the selected user
                        loadSortOrderCache(args.value).then(() => {
                            // Update sort order based on no parent initially
                            const nextSortOrder = getNextSortOrder(args.value, null);
                            document.getElementById('menu_sort').value = nextSortOrder;
                        });
                    }

                }

            });

            userDropdown.appendTo('#menu_user');

            webResourceDropdown = new ej.dropdowns.DropDownList({

                dataSource: webResourcesData,
                fields: { text: 'name', value: 'id' },
                placeholder: 'Select Web Resource (Optional)',
                allowFiltering: true,
                filterBarPlaceholder: 'Search Web Resource...',
                filterType: 'Contains',
                ignoreCase: true,

                change: function (args) {
                    if (args.value) {
                        // Find the selected web resource
                        const selectedResource = webResourcesData.find(wr => wr.id == args.value);
                        if (selectedResource) {
                            // Auto-fill name and link
                            document.getElementById('menu_name').value = selectedResource.name;
                            
                            // Generate link based on resource type
                            let typeStr = 'html';
                            switch (parseInt(selectedResource.resourcetype)) {
                                case 1: typeStr = 'javascript'; break;
                                case 2: typeStr = 'html'; break;
                                case 3: typeStr = 'css'; break;
                                case 4: typeStr = 'json'; break;
                                default: typeStr = 'html';
                            }
                            
                            document.getElementById('menu_link').value = `/main.html?type=${typeStr}&webresourceid=${selectedResource.id}`;
                        }
                    }
                }

            });

            webResourceDropdown.appendTo('#menu_webresource');

            parentDropdown = new ej.dropdowns.DropDownList({

                dataSource: [],
                fields: { text: 'name', value: 'id' },
                placeholder: 'Select Parent Menu',
                allowFiltering: true,
                filterBarPlaceholder: 'Search Parent Menu...',
                filterType: 'Contains',
                ignoreCase: true,

                change: function (args) {
                    // Update sort order when parent menu changes
                    const userId = userDropdown.value;
                    if (userId) {
                        const nextSortOrder = getNextSortOrder(userId, args.value);
                        document.getElementById('menu_sort').value = nextSortOrder;
                    }
                }

            });

            parentDropdown.appendTo('#menu_parent');

            document.querySelector('#menuModal .modal-title').innerText = "Add Menu Item";

        }

        function editMenu() {

            const selected = menuGrid.getSelectedRecords();

            if (selected.length !== 1)
                return alert("Select one menu to edit");

            const record = selected[0];

            openMenuModal();

            editingMenuId = record.id;

            setTimeout(() => {

                document.querySelector('#menuModal .modal-title').innerText = "Edit Menu Item";

                document.getElementById('menu_name').value = record.name || '';
                document.getElementById('menu_link').value = record.link || '';
                document.getElementById('menu_sort').value = record.sortorder || '';

                userDropdown.value = record.userid || null;

                if (record.userid) {
                    loadSortOrderCache(record.userid);
                }

                loadParentMenus(record.userid);

                setTimeout(() => {
                    parentDropdown.value = record.parentmenuid || null;
                }, 300);

            }, 300);

        }

        async function saveMenu() {

            const name = document.getElementById('menu_name').value;

            if (!name)
                return alert("Name is required");

            await DBHandler.submitRecordData('menuitem', {

                name: name,
                userid: userDropdown.value,
                parentmenuid: parentDropdown.value,
                link: document.getElementById('menu_link').value,
                sortorder: document.getElementById('menu_sort').value,
                type: 1

            }, editingMenuId, false);

            // Update cache with the new sort order
            const sortOrder = parseInt(document.getElementById('menu_sort').value);
            updateSortOrderCache(userDropdown.value, parentDropdown.value, sortOrder);

            bootstrap.Modal.getInstance(menuModal).hide();

            loadMenus();

        }

        async function saveAndNew() {

            const name = document.getElementById('menu_name').value;

            if (!name)
                return alert("Name is required");

            await DBHandler.submitRecordData('menuitem', {

                name: name,
                userid: userDropdown.value,
                parentmenuid: parentDropdown.value,
                link: document.getElementById('menu_link').value,
                sortorder: document.getElementById('menu_sort').value,
                type: 1

            }, editingMenuId, false);

            // Update cache with the new sort order
            const sortOrder = parseInt(document.getElementById('menu_sort').value);
            updateSortOrderCache(userDropdown.value, parentDropdown.value, sortOrder);

            // Preserve user and parent menu selections
            const selectedUserId = userDropdown.value;
            const selectedParentId = parentDropdown.value;

            // Clear only specific fields for new entry
            document.getElementById('menu_name').value = '';
            document.getElementById('menu_link').value = '';
            if (webResourceDropdown) webResourceDropdown.value = null;

            // Generate next sort order automatically
            const nextSortOrder = getNextSortOrder(selectedUserId, selectedParentId);
            document.getElementById('menu_sort').value = nextSortOrder;

            // Reset editing mode
            editingMenuId = null;
            document.querySelector('#menuModal .modal-title').innerText = "Add Menu Item";

            // Refresh grid data
            loadMenus();

        }

        async function deleteMenu() {

            const selected = menuGrid.getSelectedRecords();

            if (!selected.length)
                return alert("Select record");

            if (!confirm("Delete selected menu(s)?"))
                return;

            const ids = selected.map(r => r.id);

            await deleteRecordData('menuitem', ids, true, true);

            loadMenus();

        }

        $(document).ready(() => {

            initMenuGrid();

            $('#menuModal').on('shown.bs.modal', function () {
                $(document).off('focusin.modal');
            });

        });

    </script>

    <style>
        #menuGrid_toolbarItems {
            height: 10px !important;
        }

        label {
            font-weight: bold;
        }
    </style>

</body>
