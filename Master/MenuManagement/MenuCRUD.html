<body>
    <div class="container2 mt-4">
        <div id="menuGrid"></div>
    </div>

    <div class="modal fade" id="menuModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add Menu</h5>
                    <button type="button" class="close" data-bs-dismiss="modal">
                        <span>&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <form id="menuForm">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Menu Name <span class="text-danger">*</span></label>
                                <input type="text" id="menu_name" class="form-control" required />
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Web Resource (Optional)</label>
                                <input id="menu_webresource" type="text" class="form-control" />
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Parent Menu</label>
                                <input type="text" id="menu_parent" class="form-control" />
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Link</label>
                                <input type="text" id="menu_link" class="form-control" />
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Sort Order</label>
                                <input type="number" id="menu_sort" class="form-control" value="1" />
                            </div>
                            
                            <div class="col-md-12 mb-3">
                                <h6>Menu Items Configuration</h6>
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <div>
                                        <select id="menuItemSelector" class="form-control" style="width: 300px; display: inline-block;">
                                            <option value="">Select Menu Items...</option>
                                        </select>
                                        <button type="button" class="btn btn-primary btn-sm ms-2" onclick="addSelectedMenuItems()">
                                            <i class="fa fa-plus"></i> Add
                                        </button>
                                    </div>
                                    <div class="btn-group" role="group">
                                        <button type="button" class="btn btn-info btn-sm" onclick="generateMenuJSON()">
                                            <i class="fa fa-file-code"></i> Generate JSON
                                        </button>
                                    </div>
                                </div>
                                <div id="menuItemsContainer" class="border p-3 mb-3" style="min-height: 200px; background-color: #f8f9fa;">
                                    <div class="alert alert-info text-center" id="noMenuItemsMessage">
                                        <i class="fa fa-info-circle"></i> No menu items selected yet. Select menu items to configure.
                                    </div>
                                </div>
                            </div>
                            
                            <div class="col-md-12 mb-3">
                                <label>Generated Menu JSON</label>
                                <textarea id="menu_json" class="form-control json-editor" rows="15" placeholder='[]'></textarea>
                            </div>
                            
                            <div class="col-md-12 mb-3">
                                <div class="d-flex justify-content-between">
                                    <button type="button" class="btn btn-info btn-sm" onclick="formatJSON()">
                                        <i class="fa fa-code"></i> Format JSON
                                    </button>
                                    <button type="button" class="btn btn-secondary btn-sm" onclick="validateJSON()">
                                        <i class="fa fa-check"></i> Validate JSON
                                    </button>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" onclick="saveMenu()">Save Menu</button>
                    <button type="button" class="btn btn-success" onclick="saveAndNew()">Save and New</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>

    <!-- HTML Preview Modal removed -->

    <script>
        let menuGrid;
        let editingMenuId = null;
        let menuItemSelector;
        let parentDropdown;
        let webResourceDropdown;

        let selectedMenuItems = [];
        let availableMenuItems = [];
        let webResourcesData = [];
        let sortOrderCache = {}; // Cache for sort order data by parent

        async function initMenuGrid() {
            ej.grids.Grid.Inject(
                ej.grids.Page,
                ej.grids.Sort,
                ej.grids.Filter,
                ej.grids.Toolbar,
                ej.grids.ExcelExport,
                ej.grids.PdfExport,
                ej.grids.ColumnChooser
            );

            menuGrid = new ej.grids.Grid({
                dataSource: [],
                allowPaging: true,
                pageSettings: { pageSize: 10 },
                allowSorting: true,
                allowFiltering: true,
                filterSettings: { type: 'Excel' },
                showColumnChooser: true,
                
                toolbar: [
                    'Search',
                    'ColumnChooser',
                    {
                        prefixIcon: 'e-icons e-excelexport',
                        tooltipText: 'Export Excel',
                        id: 'excelExport'
                    },
                    {
                        prefixIcon: 'e-icons e-pdfexport',
                        tooltipText: 'Export PDF',
                        id: 'pdfExport'
                    },
                    {
                        prefixIcon: 'e-icons e-refresh',
                        tooltipText: 'Refresh',
                        id: 'refreshGrid'
                    },
                    {
                        text: 'New Menu',
                        prefixIcon: 'e-icons e-plus',
                        id: 'newMenu'
                    },
                    { 
                        text: 'Edit', 
                        prefixIcon: 'e-icons e-edit', 
                        id: 'edit' 
                    },
                    {
                        text: 'Delete',
                        prefixIcon: 'e-icons e-delete',
                        id: 'deleteMenu'
                    }
                ],

                columns: [
                    { type: 'checkbox', width: 50 },
                    { field: 'name', headerText: 'Menu Name', width: 200 },
                    { field: 'parentname', headerText: 'Parent Menu', width: 200 },
                    { field: 'link', headerText: 'Link', width: 200 },
                    { field: 'sortorder', headerText: 'Order', width: 100 },
                    { field: 'createdon', headerText: 'Created On', width: 160, type: 'date', format: { type: 'dateTime', format: 'dd/MMM/yyyy hh:mm' } },
                    { field: 'modifiedon', headerText: 'Modified On', width: 160, type: 'date', format: { type: 'dateTime', format: 'dd/MMM/yyyy hh:mm' } },
                    { field: 'id', headerText: 'ID', width: 130, visible: false }
                ],

                toolbarClick: async function (args) {
                    if (args.item.id === 'excelExport') {
                        menuGrid.excelExport({
                            fileName: `Menus_${new Date().getTime()}.xlsx`,
                            exportType: 'AllPages'
                        });
                    }

                    if (args.item.id === 'pdfExport') {
                        menuGrid.pdfExport({
                            fileName: `Menus_${new Date().getTime()}.pdf`,
                            pageOrientation: 'Landscape'
                        });
                    }

                    if (args.item.id === 'refreshGrid') {
                        loadMenuGrid();
                    }

                    if (args.item.id === 'newMenu') {
                        openMenuModal();
                    }

                    if (args.item.id === 'edit') {
                        editMenu();
                    }

                    if (args.item.id === 'deleteMenu') {
                        const selected = menuGrid.getSelectedRecords();
                        if (!selected.length) return alert("Select record(s)");

                        if (!confirm(`Delete ${selected.length} menu(s)?`)) return;

                        const ids = selected.map(r => r.id);
                        await deleteRecordData('mastermenu', ids, true, true);
                        loadMenuGrid();
                    }
                }
            });

            menuGrid.appendTo('#menuGrid');
            await loadMenuGrid();
            await loadAvailableMenuItems();
            await loadWebResources();
        }

        async function loadWebResources() {
            webResourcesData = await DBHandler.fetchEntityRecords(
                'webresource',
                'id, name, resourcetype',
                'name',
                'asc',
                'isactive = 1',
                false,
                0
            ) || [];
        }

        async function loadSortOrderCache(parentId = null) {
            // Load all menu items to cache sort order data
            const menuItems = await DBHandler.fetchEntityRecords(
                'mastermenu',
                'id, sortorder, parentmenuid',
                'sortorder',
                'desc',
                parentId ? `parentmenuid = '${parentId}'` : 'parentmenuid IS NULL',
                false,
                0
            ) || [];

            // Initialize cache
            if (!sortOrderCache[parentId || 'root']) {
                sortOrderCache[parentId || 'root'] = { max: 0 };
            }

            // Find max sort order
            menuItems.forEach(item => {
                const sortOrder = parseInt(item.sortorder) || 0;
                if (sortOrder > sortOrderCache[parentId || 'root'].max) {
                    sortOrderCache[parentId || 'root'].max = sortOrder;
                }
            });
        }

        function getNextSortOrder(parentId = null) {
            const key = parentId || 'root';
            if (!sortOrderCache[key]) {
                return 1;
            }
            return sortOrderCache[key].max + 1;
        }

        function updateSortOrderCache(parentId, newSortOrder) {
            const key = parentId || 'root';
            if (!sortOrderCache[key]) {
                sortOrderCache[key] = { max: 0 };
            }
            if (newSortOrder > sortOrderCache[key].max) {
                sortOrderCache[key].max = newSortOrder;
            }
        }

        async function loadParentMenus() {
            const parentMenus = await DBHandler.fetchEntityRecords(
                'mastermenu',
                'id, name',
                'name',
                'asc',
                '',
                false,
                0
            ) || [];

            if (parentDropdown) {
                parentDropdown.dataSource = parentMenus;
                parentDropdown.dataBind();
            }
        }

        async function loadAvailableMenuItems() {
            availableMenuItems = await DBHandler.fetchEntityRecords(
                'menuitem',
                'id, name, link, parentmenuid, sortorder',
                'sortorder',
                'asc',
                '',
                true,
                0,
                ''
            ) || [];
            populateMenuItemSelector();
        }

        function populateMenuItemSelector() {
            if (menuItemSelector) {
                menuItemSelector.destroy();
            }

            // Filter out already selected menu items
            const filteredMenuItems = availableMenuItems.filter(item =>
                !selectedMenuItems.find(sm => sm.id === item.id)
            );

            menuItemSelector = new ej.dropdowns.MultiSelect({
                dataSource: filteredMenuItems,
                fields: { text: 'name', value: 'id' },
                placeholder: 'Select Menu Items...',
                allowFiltering: true,
                filterBarPlaceholder: 'Search menu items...',
                popupHeight: '250px',
                width: '100%',
                mode: 'CheckBox',
                selectAllText: 'Select All',
                unSelectAllText: 'Unselect All',
                enableSelectionOrder: false,
                showSelectAll: true,
                showDropDownIcon: true
            });
            menuItemSelector.appendTo('#menuItemSelector');
        }

        async function loadMenuGrid() {
            const joinCondition = "LEFT JOIN mastermenu parent ON parent.id = mastermenu.parentmenuid";
            
            const data = await DBHandler.fetchEntityRecords(
                'mastermenu',
                'mastermenu.*, parent.name as parentname',
                'mastermenu.sortorder, mastermenu.modifiedon',
                'asc, desc',
                '',
                true,
                0,
                joinCondition
            );

            menuGrid.dataSource = data || [];
        }

        function openMenuModal() {
            editingMenuId = null;
            document.getElementById('menuForm').reset();
            selectedMenuItems = [];

            // Destroy existing dropdowns
            if (parentDropdown) parentDropdown.destroy();
            if (webResourceDropdown) webResourceDropdown.destroy();

            const modal = new bootstrap.Modal(menuModal, { focus: false });
            modal.show();

            ej.base.enableRipple(true);

            // Initialize Web Resource Dropdown
            webResourceDropdown = new ej.dropdowns.DropDownList({
                dataSource: webResourcesData,
                fields: { text: 'name', value: 'id' },
                placeholder: 'Select Web Resource (Optional)',
                allowFiltering: true,
                filterBarPlaceholder: 'Search Web Resource...',
                filterType: 'Contains',
                ignoreCase: true,

                change: function (args) {
                    if (args.value) {
                        const selectedResource = webResourcesData.find(wr => wr.id == args.value);
                        if (selectedResource) {
                            document.getElementById('menu_name').value = selectedResource.name;
                            
                            let typeStr = 'html';
                            switch (parseInt(selectedResource.resourcetype)) {
                                case 1: typeStr = 'javascript'; break;
                                case 2: typeStr = 'html'; break;
                                case 3: typeStr = 'css'; break;
                                case 4: typeStr = 'json'; break;
                                default: typeStr = 'html';
                            }
                            
                            document.getElementById('menu_link').value = `/main.html?type=${typeStr}&webresourceid=${selectedResource.id}`;
                        }
                    }
                }
            });
            webResourceDropdown.appendTo('#menu_webresource');

            // Initialize Parent Menu Dropdown
            parentDropdown = new ej.dropdowns.DropDownList({
                dataSource: [],
                fields: { text: 'name', value: 'id' },
                placeholder: 'Select Parent Menu',
                allowFiltering: true,
                filterBarPlaceholder: 'Search Parent Menu...',
                filterType: 'Contains',
                ignoreCase: true,

                change: function (args) {
                    loadSortOrderCache(args.value).then(() => {
                        const nextSortOrder = getNextSortOrder(args.value);
                        document.getElementById('menu_sort').value = nextSortOrder;
                    });
                }
            });
            parentDropdown.appendTo('#menu_parent');

            // Load parent menus and set initial sort order
            loadParentMenus();
            loadSortOrderCache().then(() => {
                document.getElementById('menu_sort').value = getNextSortOrder();
            });

            populateMenuItemSelector();
            renderSelectedMenuItems();

            document.querySelector('#menuModal .modal-title').innerText = "Add Menu";
        }

        function addSelectedMenuItems() {
            if (!menuItemSelector || !menuItemSelector.value || menuItemSelector.value.length === 0) {
                alert('Please select at least one menu item first');
                return;
            }

            const selectedItemIds = menuItemSelector.value;
            let addedCount = 0;

            selectedItemIds.forEach(itemId => {
                const selectedItem = availableMenuItems.find(item => item.id === itemId);

                if (!selectedItem) {
                    console.warn(`Menu item with ID ${itemId} not found`);
                    return;
                }

                // Check if item is already added
                if (selectedMenuItems.find(sm => sm.id === itemId)) {
                    return;
                }

                selectedMenuItems.push({
                    id: selectedItem.id,
                    name: selectedItem.name,
                    link: selectedItem.link || '',
                    sortorder: selectedItem.sortorder || 0,
                    parentmenuid: selectedItem.parentmenuid || null
                });

                addedCount++;
            });

            if (addedCount > 0) {
                alert(`Successfully added ${addedCount} menu item${addedCount === 1 ? '' : 's'}`);
                renderSelectedMenuItems();
                populateMenuItemSelector(); // Refresh selector
                generateMenuJSON();
            }
        }

        function renderSelectedMenuItems() {
            const container = document.getElementById('menuItemsContainer');

            if (selectedMenuItems.length === 0) {
                container.innerHTML = '<div class="alert alert-info text-center" id="noMenuItemsMessage"><i class="fa fa-info-circle"></i> No menu items selected yet. Select menu items to configure.</div>';
                return;
            }

            // Sort menu items by sort order
            selectedMenuItems.sort((a, b) => (a.sortorder || 0) - (b.sortorder || 0));

            let html = `
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h6 class="mb-0">Selected Menu Items <span class="entity-count-badge">${selectedMenuItems.length}</span></h6>
                    <button type="button" class="btn btn-danger btn-sm" onclick="clearAllMenuItems()">
                        <i class="fa fa-trash"></i> Clear All
                    </button>
                </div>
            `;

            selectedMenuItems.forEach((item, index) => {
                html += `
                    <div class="card mb-2 menu-item-card">
                        <div class="card-body py-2">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="mb-1">${item.name}</h6>
                                    <small class="text-muted">
                                        Link: ${item.link || 'No link'} | Order: ${item.sortorder || 0}
                                        ${item.parentmenuid ? ' | Has Parent' : ' | Root Item'}
                                    </small>
                                </div>
                                <button type="button" class="btn btn-outline-danger btn-sm" onclick="removeMenuItem(${index})">
                                    <i class="fa fa-times"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function removeMenuItem(index) {
            if (confirm('Are you sure you want to remove this menu item?')) {
                selectedMenuItems.splice(index, 1);
                renderSelectedMenuItems();
                populateMenuItemSelector();
                generateMenuJSON();
            }
        }

        function clearAllMenuItems() {
            if (confirm('Are you sure you want to clear all selected menu items?')) {
                selectedMenuItems = [];
                renderSelectedMenuItems();
                populateMenuItemSelector();
                generateMenuJSON();
            }
        }

        function generateMenuJSON() {
            // Generate JSON in the required format
            const menuJSON = selectedMenuItems
                .sort((a, b) => (a.sortorder || 0) - (b.sortorder || 0))
                .map(item => ({
                    "Name": item.name,
                    "Link": item.link || "",
                    "Id": item.id,
                    "MenuIcon": ""
                }));

            document.getElementById('menu_json').value = JSON.stringify(menuJSON, null, 2);
        }

        function generateMenuHTML() {
            // HTML generation removed
        }

        async function editMenu() {
            const selected = menuGrid.getSelectedRecords();
            if (selected.length !== 1) return alert("Select one record to edit");

            // Destroy existing dropdowns
            if (parentDropdown) parentDropdown.destroy();
            if (webResourceDropdown) webResourceDropdown.destroy();

            const modal = new bootstrap.Modal(menuModal, { focus: false });
            modal.show();

            ej.base.enableRipple(true);

            // Initialize dropdowns
            webResourceDropdown = new ej.dropdowns.DropDownList({
                dataSource: webResourcesData,
                fields: { text: 'name', value: 'id' },
                placeholder: 'Select Web Resource (Optional)',
                allowFiltering: true,
                filterBarPlaceholder: 'Search Web Resource...',
                filterType: 'Contains',
                ignoreCase: true,

                change: function (args) {
                    if (args.value) {
                        const selectedResource = webResourcesData.find(wr => wr.id == args.value);
                        if (selectedResource) {
                            document.getElementById('menu_name').value = selectedResource.name;
                            
                            let typeStr = 'html';
                            switch (parseInt(selectedResource.resourcetype)) {
                                case 1: typeStr = 'javascript'; break;
                                case 2: typeStr = 'html'; break;
                                case 3: typeStr = 'css'; break;
                                case 4: typeStr = 'json'; break;
                                default: typeStr = 'html';
                            }
                            
                            document.getElementById('menu_link').value = `/main.html?type=${typeStr}&webresourceid=${selectedResource.id}`;
                        }
                    }
                }
            });
            webResourceDropdown.appendTo('#menu_webresource');

            parentDropdown = new ej.dropdowns.DropDownList({
                dataSource: [],
                fields: { text: 'name', value: 'id' },
                placeholder: 'Select Parent Menu',
                allowFiltering: true,
                filterBarPlaceholder: 'Search Parent Menu...',
                filterType: 'Contains',
                ignoreCase: true,

                change: function (args) {
                    loadSortOrderCache(args.value).then(() => {
                        const nextSortOrder = getNextSortOrder(args.value);
                        document.getElementById('menu_sort').value = nextSortOrder;
                    });
                }
            });
            parentDropdown.appendTo('#menu_parent');

            const record = selected[0];
            editingMenuId = record.id;

            // Clear selected items initially
            selectedMenuItems = [];
            renderSelectedMenuItems();

            // Load parent menus
            await loadParentMenus();

            // Fetch full record with JSON
            const fullRecord = await DBHandler.fetchEntityRecords(
                'mastermenu',
                '*',
                '',
                '',
                `id = '${record.id}'`
            );

            if (fullRecord && fullRecord.length) {
                const data = fullRecord[0];
                
                setTimeout(() => {
                    document.getElementById('menu_name').value = data.name || '';
                    document.getElementById('menu_link').value = data.link || '';
                    document.getElementById('menu_sort').value = data.sortorder || '';
                    parentDropdown.value = data.parentmenuid || null;
                }, 300);

                document.getElementById('menu_json').value = data.menujson || '[]';

                // Parse JSON to populate selected menu items
                if (data.menujson) {
                    try {
                        const parsedMenu = JSON.parse(data.menujson);
                        if (Array.isArray(parsedMenu)) {
                            loadMenuItemsFromJSON(parsedMenu);
                        }
                    } catch (error) {
                        console.error('Failed to parse menu JSON:', error);
                    }
                }
            }

            populateMenuItemSelector();
            document.querySelector('#menuModal .modal-title').innerText = "Edit Menu";
        }

        function loadMenuItemsFromJSON(items) {
            items.forEach(item => {
                const menuItem = availableMenuItems.find(mi => mi.id === item.Id);
                if (menuItem && !selectedMenuItems.find(sm => sm.id === item.Id)) {
                    selectedMenuItems.push({
                        id: menuItem.id,
                        name: menuItem.name,
                        link: menuItem.link || '',
                        sortorder: menuItem.sortorder || 0,
                        parentmenuid: menuItem.parentmenuid
                    });
                }
            });

            renderSelectedMenuItems();
            populateMenuItemSelector();
        }

        async function saveMenu() {
            const menuName = document.getElementById('menu_name').value.trim();
            const menuJSON = document.getElementById('menu_json').value.trim();

            if (!menuName) return alert("Please enter menu name");
            if (!menuJSON) return alert("Please generate menu JSON");

            // Validate JSON
            try {
                JSON.parse(menuJSON);
            } catch (error) {
                return alert("Invalid JSON format. Please check the JSON syntax.");
            }

            await DBHandler.submitRecordData('mastermenu', {
                name: menuName,
                menuhtml: '', // Empty since HTML is not needed
                menujson: menuJSON
            }, editingMenuId, false);

            bootstrap.Modal.getInstance(menuModal).hide();
            loadMenuGrid();
        }

        async function saveAndNew() {
            const menuName = document.getElementById('menu_name').value.trim();
            const menuJSON = document.getElementById('menu_json').value.trim();

            if (!menuName) return alert("Please enter menu name");
            if (!menuJSON) return alert("Please generate menu JSON");

            // Validate JSON
            try {
                JSON.parse(menuJSON);
            } catch (error) {
                return alert("Invalid JSON format. Please check the JSON syntax.");
            }

            await DBHandler.submitRecordData('mastermenu', {
                name: menuName,
                menuhtml: '', // Empty since HTML is not needed
                menujson: menuJSON
            }, editingMenuId, false);

            // Clear form for new entry
            document.getElementById('menu_name').value = '';
            selectedMenuItems = [];
            renderSelectedMenuItems();
            populateMenuItemSelector();
            document.getElementById('menu_json').value = '[]';

            // Reset editing mode
            editingMenuId = null;
            document.querySelector('#menuModal .modal-title').innerText = "Add Menu";

            // Refresh grid data
            loadMenuGrid();
        }

        function formatJSON() {
            const jsonTextarea = document.getElementById('menu_json');
            try {
                const parsed = JSON.parse(jsonTextarea.value);
                jsonTextarea.value = JSON.stringify(parsed, null, 2);
            } catch (error) {
                alert('Invalid JSON format. Cannot format.');
            }
        }

        function validateJSON() {
            const jsonTextarea = document.getElementById('menu_json');
            try {
                JSON.parse(jsonTextarea.value);
                alert('JSON is valid!');
            } catch (error) {
                alert('Invalid JSON format: ' + error.message);
            }
        }

        $(document).ready(() => {
            initMenuGrid();

            $('#menuModal').on('shown.bs.modal', function () {
                $(document).off('focusin.modal');
            });
        });

    </script>
