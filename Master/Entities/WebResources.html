<!DOCTYPE html>
<html lang="en">

<head runat="server">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script>
        let classMap = [];
        var apiURL = "https://dbsit.vsservices.in/";
        //var apiURL = "";
    </script>

    <script src="https://apisit.vsservices.in/css/Default/jquery.min.js"></script>
    <script src="https://apisit.vsservices.in/css/Default/moment.min.js"></script>
    <link href="https://apisit.vsservices.in/css/Default/font-awesome-all.min.css" rel="stylesheet" />

    <script src="https://apisit.vsservices.in/css/Default/bootstrap.bundle.min.js"></script>
    <link href="https://apisit.vsservices.in/css/app.css?id=081220258" rel="stylesheet" />

    <script src="https://apisit.vsservices.in/JS/utility.js?id=081220259"></script>
    <script src="https://apisit.vsservices.in/JS/entityPage.js?id=081220258" type="module"></script>
    <script src="https://apisit.vsservices.in/JS/controls.js?id=081220258" type="module"></script>
    <script src="https://apisit.vsservices.in/JS/listcontrols.js?id=081220258" type="module"></script>
    <script src="https://apisit.vsservices.in/JS/formHandler.js?id=081220258" type="module"></script>
    <script src="https://apisit.vsservices.in/JS/pageLoader.js?id=081220258" type="module"></script>
    <script src="https://apisit.vsservices.in/JS/Master/DBHandler.js?id=081220258" type="module"></script>
    <script src="https://apisit.vsservices.in/JS/VastuBill/VastuBillPDFExporter.js?id=081220258"></script>

    <script src="https://apisit.vsservices.in/css/Default/popper.min.js"></script>
    <script src="https://apisit.vsservices.in/css/Default/bootstrap.min.js"></script>

    <script src="https://apisit.vsservices.in/css/Default/moment.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.11.4/jquery-ui.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.0/jquery-ui.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <script src="https://apisit.vsservices.in/JS/ej2.min.vk02bdl5ad.js"></script>

    <link href="https://apisit.vsservices.in/css/Default/font-awesome-all.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://free-crm.csharpasp.net/lib/syncfusion/css/bootstrap5.dvnzgvxkcq.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.css">
    <link href="https://apisit.vsservices.in/css/app.css" rel="stylesheet">

</head>

<body>

    <div class="container2">

        <div id="webResourceGrid"></div>

    </div>

    <!-- Modal -->
    <div class="modal fade" id="webResourceModal" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Add Web Resource</h5>
                     <button type="button" class="close" data-bs-dismiss="modal">
                        <span>&times;</span>
                    </button>
                </div>

                <div class="modal-body">
                    <form id="webResourceForm">

                        <div class="row g-3">

                            <div class="col-md-6">
                                <label>Name <span class="text-danger">*</span></label>
                                <input type="text" id="wr_name" class="form-control" />
                            </div>

                            <div class="col-md-6">
                                <label>Title</label>
                                <input type="text" id="wr_title" class="form-control" />
                            </div>

                            <div class="col-md-6">
                                <label>Page Title</label>
                                <input type="text" id="wr_pagetitle" class="form-control" />
                            </div>

                            <div class="col-md-6">
                                <label>Resource Type</label>
                                <select id="wr_resourcetype" class="form-control">
                                    <option value="">Select Type</option>
                                    <option value="2">HTML</option>
                                    <option value="1">JavaScript</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label>Lookup Entity</label>
                                <input type="text" id="wr_lookupentityid" class="form-control" />
                            </div>

                            <div class="col-md-6">
                                <label>Business Unit</label>
                                <input type="text" id="wr_businessunitid" class="form-control" datatype="dropdown" dbcolumnname="businessunitid" />
                            </div>

                            <div class="col-md-6">
                                <label>Icon</label>
                                <input type="text" id="wr_icon" class="form-control" dbcolumnname="icon" />
                            </div>

                            <div class="col-md-12">
                                <label>Resource Text</label>
                                <textarea id="wr_resourcetext" class="form-control" rows="12"
                                    style="font-family: monospace;" onblur="handleResourceTextBlur()"></textarea>
                            </div>
                        </div>

                    </form>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-primary" onclick="saveWebResource()">Save</button>
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>

            </div>
        </div>
    </div>
    <script>

        let grid;
        let editingId = null;
        let entitiesData = [];
        let businessunitData = [];
        let lookupEntityDropdown;
        let businessunitDropdown;

        var columns = [
            { type: 'checkbox', width: 50 },
            { field: 'srno', headerText: 'S.No', width: 80, textAlign: 'Right' },
            { field: 'name', headerText: 'Name', width: 180 },
            { field: 'title', headerText: 'Title', width: 180 },
            { field: 'pagetitle', headerText: 'Page Title', width: 180 },
            { field: 'resourcetype', headerText: 'Type', width: 120 },
            { field: 'isactive', headerText: 'Active', width: 100 },
            {
                field: 'createdon', headerText: 'Created On', type: 'date',
                format: { type: 'dateTime', format: 'dd/MMM/yyyy hh:mm' }, width: 160, visible: false
            },
            {
                field: 'modifiedon', headerText: 'Modified On', type: 'date',
                format: { type: 'dateTime', format: 'dd/MMM/yyyy hh:mm' }, width: 160
            },
            { field: 'id', visible: false }
        ];

        // ---------- INIT GRID ----------
        function initGrid() {

            ej.grids.Grid.Inject(
                ej.grids.Page,
                ej.grids.Sort,
                ej.grids.Filter,
                ej.grids.Toolbar,
                ej.grids.ColumnChooser,
                ej.grids.ExcelExport,
                ej.grids.PdfExport
            );

            grid = new ej.grids.Grid({

                dataSource: [],
                allowPaging: true,
                allowSorting: true,
                allowFiltering: true,
                filterSettings: { type: 'Excel' },
                sortSettings: { columns: [{ field: 'modifiedon', direction: 'Descending' }] },

                showColumnChooser: true,
                allowExcelExport: true,
                allowPdfExport: true,

                pageSettings: { pageSize: 10 },

                toolbar: [
                    'ColumnChooser',
                    'Search',
                    {
                        prefixIcon: 'e-icons e-excelexport',
                        tooltipText: 'Export Excel',
                        id: 'excelExport'
                    },
                    {
                        prefixIcon: 'e-icons e-pdfexport',
                        tooltipText: 'Export PDF',
                        id: 'pdfExport'
                    },
                    {
                        prefixIcon: 'e-icons e-refresh',
                        tooltipText: 'Refresh Grid',
                        id: 'refreshGrid'
                    },
                    {
                        text: 'New',
                        prefixIcon: 'e-icons e-plus',
                        id: 'new'
                    },
                    {
                        text: 'Edit',
                        prefixIcon: 'e-icons e-edit',
                        id: 'edit'
                    },
                    {
                        text: 'Delete',
                        prefixIcon: 'e-icons e-delete',
                        id: 'delete'
                    },
                    {
                        text: 'Preview',
                        prefixIcon: 'e-icons e-preview',
                        id: 'preview'
                    }
                ],

                columns: columns,

                toolbarClick: function (args) {

                    // Excel Export
                    if (args.item.id === 'excelExport') {
                        grid.excelExport({
                            fileName: `WebResource_${formatDate(new Date())}.xlsx`,
                            exportType: 'AllPages'
                        });
                    }

                    // PDF Export
                    if (args.item.id === 'pdfExport') {
                        grid.pdfExport({
                            fileName: `WebResource_${formatDate(new Date())}.pdf`,
                            exportType: 'CurrentPage',
                            pageOrientation: 'Landscape',
                            pageSize: 'A4'
                        });
                    }

                    // Refresh
                    if (args.item.id === 'refreshGrid') {
                        loadWebResources();
                    }

                    // New
                    if (args.item.id === 'new') {
                        clearForm();
                        editingId = null;

                        // Destroy if already exists
                        if (lookupEntityDropdown) lookupEntityDropdown.destroy();
                        if (businessunitDropdown) businessunitDropdown.destroy();

                        const modal = new bootstrap.Modal(webResourceModal, {
                            focus: false,
                            keyboard: true
                        });
                        modal.show();

                        ej.base.enableRipple(true);

                        // Initialize dropdown after modal is shown
                        lookupEntityDropdown = new ej.dropdowns.DropDownList({
                            dataSource: entitiesData,
                            fields: { text: 'name', value: 'id' },
                            placeholder: 'Select Lookup Entity',
                            allowFiltering: true,
                            filterBarPlaceholder: 'Search entities...',
                            ignoreCase: true,
                            filterType: 'Contains',
                            popupHeight: '250px'
                        });
                        lookupEntityDropdown.appendTo('#wr_lookupentityid');

                        businessunitDropdown = new ej.dropdowns.DropDownList({
                            dataSource: businessunitData,
                            fields: { text: 'name', value: 'id' },
                            placeholder: 'Select Business Unit',
                            allowFiltering: true,
                            filterBarPlaceholder: 'Search business units...',
                            ignoreCase: true,
                            filterType: 'Contains',
                            popupHeight: '250px'
                        });
                        businessunitDropdown.appendTo('#wr_businessunitid');

                        document.querySelector('#webResourceModal .modal-title').innerText = "Add Web Resource";
                    }

                    // Edit
                    if (args.item.id === 'edit') {
                        editWebResource();
                    }

                    // Delete
                    if (args.item.id === 'delete') {
                        deleteWebResource();
                    }

                    if (args.item.id === 'preview') {
                        const selected = grid.getSelectedRecords();
                        if (selected.length !== 1) {
                            return alert("Select one record to preview");
                        }

                        const r = selected[0];

                        // Map resourcetype to lowercase string
                        let typeStr = '';
                        switch (r.resourcetype) {
                            case 'HTML': typeStr = 'html'; break;
                            case 'JavaScript': typeStr = 'javascript'; break;
                            case 'CSS': typeStr = 'css'; break;
                            case 'JSON': typeStr = 'json'; break;
                            default: typeStr = 'html';
                        }

                        const url = apiURL + `main.html?type=${typeStr}&webresourceid=${r.id}`;
                        window.open(url, '_blank'); // open in new tab
                    }
                }
            });

            grid.appendTo('#webResourceGrid');
        }


        // ---------- LOAD DATA ----------
        async function loadWebResources() {

            const data = await DBHandler.fetchEntityRecords(
                'webresource',
                'id,name,title,pagetitle,resourcetype,isactive,createdon,modifiedon',
                'modifiedon',
                'desc',
                '',
                true,
                0,
                ''
            );

            let sr = 1;

            grid.dataSource = (data || []).map(r => ({
                ...r,
                srno: sr++,
                isactive: r.isactive == 1 ? "Yes" : "No",
                resourcetype: formatResourceType(r.resourcetype)
            }));

            grid.refresh();
        }


        // ---------- FORMAT RESOURCE TYPE ----------
        function formatResourceType(type) {

            switch (type) {
                case 1: return "JavaScript";
                case 2: return "HTML";
                case 3: return "CSS";
                case 4: return "JSON";
                default: return "";
            }
        }


        // ---------- MODAL ----------
        function clearForm() {
            document.getElementById('webResourceForm').reset();
            document.getElementById('wr_resourcetext').value = '';
            document.getElementById('wr_icon').value = '';
            if (lookupEntityDropdown) {
                lookupEntityDropdown.value = null;
            }
            if (businessunitDropdown) {
                businessunitDropdown.value = null;
            }
        }

        async function loadEntitiesData() {
            entitiesData = await DBHandler.fetchEntityRecords(
                'entities',
                'id,name',
                'name',
                'asc'
            ) || [];
        }

        async function loadBusinessunitData() {
            businessunitData = await DBHandler.fetchEntityRecords(
                'businessunit',
                'id,name',
                'name',
                'asc'
            ) || [];
        }


        // ---------- EDIT ----------
        async function editWebResource() {
            const selected = grid.getSelectedRecords();
            if (selected.length !== 1) {
                return alert("Select one record to edit");
            }

            const r = selected[0];
            editingId = r.id;

            // Destroy if already exists
            if (lookupEntityDropdown) lookupEntityDropdown.destroy();
            if (businessunitDropdown) businessunitDropdown.destroy();

            // 1️⃣ Open modal immediately with basic info
            const modal = new bootstrap.Modal(webResourceModal, {
                focus: false,
                keyboard: true
            });
            modal.show();

            ej.base.enableRipple(true);

            // Initialize dropdown after modal is shown
            lookupEntityDropdown = new ej.dropdowns.DropDownList({
                dataSource: entitiesData,
                fields: { text: 'name', value: 'id' },
                placeholder: 'Select Lookup Entity',
                allowFiltering: true,
                filterBarPlaceholder: 'Search entities...',
                ignoreCase: true,
                filterType: 'Contains',
                popupHeight: '250px',
                value: r.entityid || null
            });
            lookupEntityDropdown.appendTo('#wr_lookupentityid');

            businessunitDropdown = new ej.dropdowns.DropDownList({
                dataSource: businessunitData,
                fields: { text: 'name', value: 'id' },
                placeholder: 'Select Business Unit',
                allowFiltering: true,
                filterBarPlaceholder: 'Search business units...',
                ignoreCase: true,
                filterType: 'Contains',
                popupHeight: '250px',
                value: r.businessunitid || null
            });
            businessunitDropdown.appendTo('#wr_businessunitid');

            document.getElementById('wr_name').value = r.name;
            document.getElementById('wr_title').value = r.title;
            document.getElementById('wr_pagetitle').value = r.pagetitle;
            document.getElementById('wr_icon').value = r.icon || '';
            let typeValue = '';
            switch (r.resourcetype) {
                case "HTML": typeValue = "2"; break;
                case "JavaScript": typeValue = "1"; break;
                default: typeValue = "";
            }
            document.getElementById('wr_resourcetype').value = typeValue;
            document.getElementById('wr_resourcetext').value = 'Loading...'; // placeholder while fetching
            document.querySelector('#webResourceModal .modal-title').innerText = "Edit Web Resource";

            try {
                // 2️⃣ Fetch full record including resourcetext
                const fullRecord = await DBHandler.fetchEntityRecords(
                    'webresource',
                    '*',
                    'id',
                    'desc',
                    `id='${editingId}'`,
                    false,
                    1
                );

                if (!fullRecord || !fullRecord.length) {
                    document.getElementById('wr_resourcetext').value = '';
                    return alert("Unable to load full record.");
                }

                const data = fullRecord[0];

                // 3️⃣ Update textarea with resourcetext
                document.getElementById('wr_resourcetext').value = data.resourcetext || '';
                if (lookupEntityDropdown) {
                    lookupEntityDropdown.value = data.entityid || null;
                }
                if (businessunitDropdown) {
                    businessunitDropdown.value = data.businessunitid || null;
                }

            } catch (err) {
                console.error(err);
                document.getElementById('wr_resourcetext').value = '';
                alert("Error fetching resource text.");
            }
        }

        // ---------- HANDLE RESOURCE TEXT BLUR ----------
        function handleResourceTextBlur() {
            let resourceText = document.getElementById('wr_resourcetext').value;
            resourceText = extractBodyContent(resourceText);
            document.getElementById('wr_resourcetext').value = resourceText;
        }

        // ---------- EXTRACT BODY CONTENT ----------
        function extractBodyContent(htmlText) {
            const resourceType = document.getElementById('wr_resourcetype').value;
            
            // Only apply to HTML resources (type = 2)
            if (resourceType !== '2') {
                return htmlText;
            }

            // Check if it contains <body> tag
            const bodyStartRegex = /<body[^>]*>/i;
            const bodyEndRegex = /<\/body>/i;
            
            const bodyStartMatch = htmlText.match(bodyStartRegex);
            const bodyEndMatch = htmlText.match(bodyEndRegex);
            
            if (bodyStartMatch && bodyEndMatch) {
                const startIndex = htmlText.indexOf(bodyStartMatch[0]) + bodyStartMatch[0].length;
                const endIndex = htmlText.indexOf(bodyEndMatch[0]);
                return htmlText.substring(startIndex, endIndex).trim();
            }
            
            // If no body tags found, return as is
            return htmlText;
        }

        // ---------- SAVE ----------
        async function saveWebResource() {

            const name = document.getElementById('wr_name').value.trim();
            if (!name) return alert("Name is required");

            let resourceText = document.getElementById('wr_resourcetext').value;
            resourceText = extractBodyContent(resourceText);

            await DBHandler.submitRecordData('webresource', {

                name: name,
                title: document.getElementById('wr_title').value,
                pagetitle: document.getElementById('wr_pagetitle').value,
                resourcetype: document.getElementById('wr_resourcetype').value || null,
                resourcetext: resourceText,
                entityid: lookupEntityDropdown ? (lookupEntityDropdown.value || null) : null,
                businessunitid: businessunitDropdown ? (businessunitDropdown.value || null) : null,
                icon: document.getElementById('wr_icon').value.trim() || null,

            }, editingId, false);

            bootstrap.Modal.getInstance(
                document.getElementById('webResourceModal')
            ).hide();

            loadWebResources();
        }


        // ---------- DELETE ----------
        async function deleteWebResource() {

            const selected = grid.getSelectedRecords();
            if (!selected.length) return alert("Select record(s) to delete");

            if (!confirm("Delete selected records?")) return;

            const ids = selected.map(r => r.id);

            await deleteRecordData('webresource', ids, true, true);

            loadWebResources();
        }


        // ---------- DATE FORMAT ----------
        function formatDate(date) {

            const d = new Date(date);
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const year = d.getFullYear();

            return `${day}${month}${year}`;
        }


        // ---------- DOCUMENT READY ----------
        $(document).ready(function () {
            initGrid();
            loadWebResources();
            loadEntitiesData();
            loadBusinessunitData();
        });

    </script>

    <style>
        #webResourceGrid_toolbarItems {
            height: 10px !important;
        }
    </style>


</body>

</html>
