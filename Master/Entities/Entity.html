<body>
    <div class="container2">
        <div id="entitiesGrid"></div>
    </div>

    <div class="modal fade" id="entityModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Add Entity</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <form id="entityForm">
                        <div class="row">
                            <div class="col-md-6">
                                <label>Name</label>
                                <input type="text" id="name" class="form-control" required
                                    onkeyup="bindEntityNameField()" />
                            </div>
                            <div class="col-md-6">
                                <label>Physical Name</label>
                                <input type="text" id="physicalname" class="form-control" disabled />
                            </div>
                        </div>
                        <div class="row mt-3">
                            <div class="col-md-6">
                                <label>Icon</label>
                                <input type="text" id="icon" class="form-control" dbcolumnname="icon" placeholder="fa-table" />
                            </div>
                        </div>
                    </form>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-primary" onclick="saveEntity()">Save</button>
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>

            </div>
        </div>
    </div>

    <script>

        let entityGrid;
        let editingEntityId = null;

        function initEntityGrid() {

            ej.grids.Grid.Inject(
                ej.grids.Page,
                ej.grids.Sort,
                ej.grids.Filter,
                ej.grids.Toolbar,
                ej.grids.ExcelExport,
                ej.grids.PdfExport
            );

            entityGrid = new ej.grids.Grid({
                dataSource: [],
                allowPaging: true,
                allowSorting: true,
                allowFiltering: true,
                filterSettings: { type: 'Excel' },
                toolbar: [
                    'Search',
                    { text: 'New Entity', prefixIcon: 'e-icons e-plus', id: 'newEntity' },
                    { text: 'Edit', prefixIcon: 'e-icons e-edit', id: 'editEntity' },
                    { text: 'Delete', prefixIcon: 'e-icons e-delete', id: 'deleteEntity' },
                    { text: 'Copy Schema', prefixIcon: 'e-icons e-copy', id: 'copySchema' },
                    'ExcelExport',
                    'PdfExport'
                ],
                columns: [
                    { type: 'checkbox', width: 50 },
                    { field: 'name', headerText: 'Name', width: 200 },
                    { field: 'physicalname', headerText: 'Physical Name', width: 200 },
                    { field: 'icon', headerText: 'Icon', width: 140, template: '<i class="fa ${icon}"></i> ${icon}' },
                    { field: 'createdon', headerText: 'Created On', type: 'date', format: 'dd/MMM/yyyy hh:mm', width: 180 }
                ],
                toolbarClick: async function (args) {

                    if (args.item.id === 'newEntity') {
                        editingEntityId = null;
                        document.getElementById('entityForm').reset();
                        document.querySelector('#entityModal .modal-title').innerText = "Add Entity";
                        new bootstrap.Modal(entityModal).show();
                    }

                    if (args.item.id === 'editEntity') {
                        const selected = entityGrid.getSelectedRecords();
                        if (selected.length !== 1) return alert("Select one record");
                        editingEntityId = selected[0].id;

                        document.getElementById('name').value = selected[0].name;
                        document.getElementById('physicalname').value = selected[0].physicalname;
                        document.getElementById('icon').value = selected[0].icon || '';

                        document.querySelector('#entityModal .modal-title').innerText = "Edit Entity";
                        new bootstrap.Modal(entityModal).show();
                    }

                    if (args.item.id === 'deleteEntity') {
                        const selected = entityGrid.getSelectedRecords();
                        if (!selected.length) return alert("Select record(s)");

                        const ids = selected.map(r => r.id);
                        await deleteRecordData('entities', ids, true, true);
                        loadEntities();
                    }

                    if (args.item.id === 'copySchema') {
                        copySchemaToClipboard();
                    }
                }
            });

            entityGrid.appendTo('#entitiesGrid');
        }

        async function loadEntities() {

            const data = await DBHandler.fetchEntityRecords(
                'entities',
                '*',
                'createdon',
                'desc'
            );

            entityGrid.dataSource = data || [];
        }

        async function saveEntity() {

            const name = document.getElementById('name').value.trim();
            const physicalname = document.getElementById('physicalname').value.trim();
            const icon = document.getElementById('icon').value.trim();

            if (!name || !physicalname) return alert("All fields required");

            await DBHandler.submitRecordData('entities', {
                name,
                physicalname,
                icon: icon || null
            }, editingEntityId, false);

            bootstrap.Modal.getInstance(entityModal).hide();
            loadEntities();
        }

        async function copySchemaToClipboard() {
            const selected = entityGrid.getSelectedRecords();
            if (selected.length !== 1) {
                alert("Select one entity to copy schema");
                return;
            }

            const entity = selected[0];
            const entityId = entity.id;
            const tableName = formatSqlName(entity.physicalname || entity.name || 'entity_table');

            const columns = await DBHandler.fetchEntityRecords(
                'entitycolumn',
                '*',
                'createdon',
                'asc',
                `entityid = '${entityId}'`
            ) || [];

            if (!columns.length) {
                alert('No columns found for selected entity');
                return;
            }

            const lines = [];
            lines.push(`CREATE TABLE ${tableName} (`);

            columns.forEach((column, index) => {
                const columnName = formatSqlName(column.physicalname || column.name || `column_${index + 1}`);
                const dataType = normalizeColumnType(column.columntype);
                const suffix = index === columns.length - 1 ? '' : ',';
                lines.push(`  ${columnName} ${dataType}${suffix}`);
            });

            lines.push(');');
            const schema = lines.join('\n');

            try {
                await navigator.clipboard.writeText(schema);
            } catch (error) {
                const helper = document.createElement('textarea');
                helper.value = schema;
                helper.style.position = 'fixed';
                helper.style.opacity = '0';
                document.body.appendChild(helper);
                helper.focus();
                helper.select();
                document.execCommand('copy');
                document.body.removeChild(helper);
            }

            alert('Schema copied to clipboard');
        }

        function formatSqlName(value) {
            return String(value)
                .trim()
                .toLowerCase()
                .replace(/\s+/g, '_')
                .replace(/[^a-z0-9_]/g, '') || 'entity_table';
        }

        function normalizeColumnType(value) {
            const type = String(value || 'VARCHAR(255)').trim().toUpperCase();
            if (type === 'DECIMAL') return 'DECIMAL(18,2)';
            if (type === 'TEXT') return 'TEXT';
            return type;
        }

        function bindEntityNameField() {

            const entityNameField = document.getElementById('name');
            const physicalNameField = document.getElementById('physicalname');

            if (!entityNameField || !physicalNameField) {
                console.error("Entity name or physical name field not found.");
                return;
            }

            const entityName = entityNameField.value;

            if (entityName) {
                const physicalName = entityName
                    .toLowerCase()
                    .replace(/\s+/g, '')       // remove spaces
                    .replace(/[^a-z0-9]/g, ''); // remove special characters

                physicalNameField.value = physicalName;
            } else {
                physicalNameField.value = '';
            }
        }

        $(document).ready(() => {
            initEntityGrid();
            loadEntities();
        });
    </script>
