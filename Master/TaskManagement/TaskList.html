    <script>

    </script>

    <script src="https://apisit.vsservices.in/css/Default/bootstrap.bundle.min.js"></script>

    <script src="https://apisit.vsservices.in/JS/utility.js?id=081220259"></script>

    <script src="https://apisit.vsservices.in/css/Default/popper.min.js"></script>

    <script src="https://apisit.vsservices.in/css/Default/moment.min.js"></script>

    <link rel="stylesheet" href="https://free-crm.csharpasp.net/lib/syncfusion/css/bootstrap5.dvnzgvxkcq.css" />

</head>

<body>

    <body>

        <div class="container2">
            <div id="taskGrid"></div>
        </div>

        <!-- Modal -->
        <div class="modal fade" id="taskModal" tabindex="-1">
            <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
                <div class="modal-content">

                    <div class="modal-header">
                        <h5 class="modal-title">Add Task</h5>
                        <button type="button" class="close" data-bs-dismiss="modal">
                            <span>&times;</span>
                        </button>
                    </div>

                    <div class="modal-body">
                        <form id="taskForm">

                            <div class="row g-3">

                                <div class="col-md-6">
                                    <label>Title <span class="text-danger">*</span></label>
                                    <input type="text" id="tk_title" class="form-control" required />
                                </div>

                                <div class="col-md-6">
                                    <label>Assigned To (User ID)</label>
                                    <input type="text" id="tk_assignedto" class="form-control" />
                                </div>

                                <div class="col-md-6">
                                    <label>Project ID</label>
                                    <input type="text" id="tk_projectid" class="form-control" />
                                </div>

                                <div class="col-md-6">
                                    <label>Priority</label>
                                    <select id="tk_priority" class="form-control">
                                        <option value="Low">Low</option>
                                        <option value="Medium" selected>Medium</option>
                                        <option value="High">High</option>
                                        <option value="Critical">Critical</option>
                                    </select>
                                </div>

                                <div class="col-md-6">
                                    <label>Status</label>
                                    <select id="tk_status" class="form-control">
                                        <option value="Not Started">Not Started</option>
                                        <option value="In Progress">In Progress</option>
                                        <option value="Completed">Completed</option>
                                        <option value="On Hold">On Hold</option>
                                        <option value="Cancelled">Cancelled</option>
                                    </select>
                                </div>

                                <div class="col-md-6">
                                    <label>Start Date</label>
                                    <input type="date" id="tk_startdate" class="form-control" datatype="date" />
                                </div>

                                <div class="col-md-6">
                                    <label>Due Date</label>
                                    <input type="date" id="tk_duedate" class="form-control" datatype="date" />
                                </div>

                                <div class="col-md-12">
                                    <label>Description</label>
                                    <textarea id="tk_description" rows="5" class="form-control"></textarea>
                                </div>

                            </div>

                        </form>
                    </div>

                    <div class="modal-footer">
                        <button class="btn btn-primary" onclick="saveTask()">Save</button>
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    </div>

                </div>
            </div>
        </div>
        <script>

            let taskGrid;
            let editingTaskId = null;
            let taskModal;

            var taskColumns = [
                { type: 'checkbox', width: 50 },
                { field: 'srno', headerText: 'S.No', width: 80, textAlign: 'Right' },
                { field: 'title', headerText: 'Title', width: 200 },
                { field: 'assignedto', headerText: 'Assigned To', width: 150 },
                { field: 'projectid', headerText: 'Project', width: 150, },
                { field: 'priority', headerText: 'Priority', width: 120, visible: false },
                { field: 'status', headerText: 'Status', width: 140, },
                { field: 'startdate', headerText: 'Start Date', type: 'date', width: 130, visible: false },
                { field: 'duedate', headerText: 'Due Date', type: 'date', width: 130, visible: false },
                { field: 'completedon', headerText: 'Completed On', type: 'date', width: 160, visible: false },
                { field: 'id', visible: false }
            ];

            // INIT GRID
            function initTaskGrid() {

                ej.grids.Grid.Inject(
                    ej.grids.Page,
                    ej.grids.Sort,
                    ej.grids.Filter,
                    ej.grids.Toolbar,
                    ej.grids.ColumnChooser,
                    ej.grids.ExcelExport,   // ✅ ADD
                    ej.grids.PdfExport
                );

                taskGrid = new ej.grids.Grid({

                    dataSource: [],
                    allowPaging: true,
                    allowSorting: true,
                    allowFiltering: true,
                    allowExcelExport: true,
                    allowPdfExport: true,
                    showColumnChooser: true,
                    filterSettings: { type: 'Excel' },
                    pageSettings: { pageSize: 10 },

                    toolbar: [
                        'ColumnChooser',
                        'Search',
                        {
                            prefixIcon: 'e-icons e-excelexport',
                            tooltipText: 'Export Excel',
                            id: 'excelExport'
                        },
                        {
                            prefixIcon: 'e-icons e-pdfexport',
                            tooltipText: 'Export PDF',
                            id: 'pdfExport'
                        },
                        {
                            prefixIcon: 'e-icons e-refresh',
                            tooltipText: 'Refresh Grid',
                            id: 'refreshGrid'
                        },
                        { text: 'New', prefixIcon: 'e-icons e-plus', id: 'new' },
                        { text: 'Edit', prefixIcon: 'e-icons e-edit', id: 'edit' },
                        { text: 'Delete', prefixIcon: 'e-icons e-delete', id: 'delete' }
                    ],

                    columns: taskColumns,

                    toolbarClick: function (args) {

                        // Excel Export
                        if (args.item.id === 'excelExport') {
                            taskGrid.excelExport({
                                fileName: `Tasks_${formatDate(new Date())}.xlsx`,
                                exportType: 'AllPages'
                            });
                        }

                        // PDF Export
                        if (args.item.id === 'pdfExport') {
                            taskGrid.pdfExport({
                                fileName: `Tasks_${formatDate(new Date())}.pdf`,
                                exportType: 'CurrentPage',
                                pageOrientation: 'Landscape',
                                pageSize: 'A4'
                            });
                        }

                        // Refresh
                        if (args.item.id === 'refreshGrid') {
                            loadTasks();
                        }

                        if (args.item.id === 'new') {
                            clearTaskForm();
                            editingTaskId = null;
                            document.querySelector('#taskModal .modal-title').innerText = "Add Task";
                            openTaskModal();
                        }

                        if (args.item.id === 'edit') {
                            editTask();
                        }

                        if (args.item.id === 'delete') {
                            deleteTask();
                        }
                    }
                });

                taskGrid.appendTo('#taskGrid');
            }


            // LOAD DATA
            async function loadTasks() {

                const data = await DBHandler.fetchEntityRecords(
                    'taskmanagement',
                    '*',
                    'startdate',
                    'desc',
                    '',
                    true,
                    0,
                    ''
                );

                let sr = 1;

                taskGrid.dataSource = (data || []).map(r => ({
                    ...r,
                    srno: sr++
                }));

                taskGrid.refresh();
            }


            // MODAL
            function openTaskModal() {
                if (!taskModal) {
                    taskModal = new bootstrap.Modal(document.getElementById('taskModal'));
                }
                taskModal.show();
            }

            function clearTaskForm() {
                document.getElementById('taskForm').reset();
            }


            // EDIT
            function editTask() {

                const selected = taskGrid.getSelectedRecords();
                if (selected.length !== 1) {
                    return alert("Select one task to edit");
                }

                const r = selected[0];
                editingTaskId = r.id;

                document.getElementById('tk_title').value = r.title;
                document.getElementById('tk_description').value = r.description;
                document.getElementById('tk_assignedto').value = r.assignedto;
                document.getElementById('tk_projectid').value = r.projectid;
                document.getElementById('tk_priority').value = r.priority;
                document.getElementById('tk_status').value = r.status;
                document.getElementById('tk_startdate').value = r.startdate;
                document.getElementById('tk_duedate').value = r.duedate;

                document.querySelector('#taskModal .modal-title').innerText = "Edit Task";

                openTaskModal();
            }


            // SAVE
            async function saveTask() {

                const btn = event.target;
                btn.disabled = true;
                btn.innerText = "Saving...";

                try {

                    const title = document.getElementById('tk_title').value.trim();
                    if (!title) {
                        alert("Title is required");
                        return;
                    }

                    const status = document.getElementById('tk_status').value;

                    await DBHandler.submitRecordData('taskmanagement', {

                        title: title,
                        description: document.getElementById('tk_description').value,
                        assignedto: document.getElementById('tk_assignedto').value,
                        projectid: document.getElementById('tk_projectid').value,
                        priority: document.getElementById('tk_priority').value,
                        status: status,
                        startdate: document.getElementById('tk_startdate').value || null,
                        duedate: document.getElementById('tk_duedate').value || null,
                        completedon: status === "Completed" ? new Date() : null

                    }, editingTaskId, false);

                    bootstrap.Modal.getInstance(document.getElementById('taskModal')).hide();

                    editingTaskId = null;
                    loadTasks();

                } catch (err) {
                    alert("Failed to save task");
                    console.error(err);
                }

                btn.disabled = false;
                btn.innerText = "Save";
            }


            // DELETE
            async function deleteTask() {

                const selected = taskGrid.getSelectedRecords();
                if (!selected.length) return alert("Select task(s) to delete");

                if (!confirm("Delete selected tasks?")) return;

                const ids = selected.map(r => r.id);

                await deleteRecordData('taskmanagement', ids, true, true);

                loadTasks();
            }


            $(document).ready(function () {
                initTaskGrid();
                loadTasks();
            });
            

        </script>

        <style>
            #taskGrid_toolbarItems {
                height: 10px !important;
            }
        </style>

    </body>

</html>
